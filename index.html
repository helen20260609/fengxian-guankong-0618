        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --primary-light: #e8f0fe;
            --secondary: #0097a7;
            --danger: #d93025;
            --warning: #e37400;
            --success: #1e8e3e;
            --bg-dark: #f0f2f5;
            --bg-header: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #e8eaed;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --border: #dadce0;
            --shadow: rgba(0,0,0,0.08);
            --header-height: 56px;
            --subnav-height: 44px;
            --sidebar-width: 260px;
        }
        :root[data-theme="dark"] {
            --primary: #1e6fdb;
            --primary-dark: #1557b0;
            --primary-light: #e8f1fd;
            --secondary: #00b4d8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --bg-dark: #0a1628;
            --bg-header: #0d1b2a;
            --bg-sidebar: #0d1b2a;
            --bg-card: #112240;
            --bg-hover: #1a2f4a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #1e3a5f;
            --shadow: rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        /* ========== TOP HEADER ========== */
        .top-header {
            height: var(--header-height);
            background: var(--bg-header);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 4px var(--shadow);
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            margin-right: 32px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; color: #fff;
        }
        .logo-text {
            font-size: 16px; font-weight: 700; color: var(--text-primary);
            letter-spacing: 1px; white-space: nowrap;
        }

        /* Level 1: Top Nav */
        .top-nav {
            display: flex; gap: 2px; flex: 1; height: 100%;
        }
        .top-nav-item {
            height: 100%;
            display: flex; align-items: center;
            padding: 0 18px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text-secondary);
            transition: all 0.3s;
            position: relative;
            white-space: nowrap;
            gap: 6px;
        }
        .top-nav-item:hover {
            color: var(--primary);
            background: rgba(30, 111, 219, 0.08);
        }
        .top-nav-item.active {
            color: var(--primary);
            font-weight: 600;
        }
        .top-nav-item.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 60%; height: 2px;
            background: var(--primary);
            border-radius: 1px;
        }
        .top-nav-item i { font-size: 14px; }

        /* Top Right */
        .top-right {
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0; margin-left: auto;
        }
        .search-box {
            width: 220px; height: 32px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            display: flex; align-items: center;
            padding: 0 14px; gap: 8px;
            color: var(--text-secondary); font-size: 13px;
            cursor: pointer; transition: border-color 0.3s;
        }
        .search-box:hover { border-color: var(--primary); }
        .top-icon-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-secondary);
            transition: all 0.3s; position: relative;
        }
        .top-icon-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .badge {
            position: absolute; top: 4px; right: 4px;
            width: 7px; height: 7px;
            background: var(--danger); border-radius: 50%;
        }
        .user-info {
            display: flex; align-items: center; gap: 8px;
            cursor: pointer; padding: 4px 8px;
            border-radius: 8px; transition: background 0.3s;
        }
        .user-info:hover { background: var(--bg-hover); }
        .user-avatar {
            width: 30px; height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 600; color: #fff;
        }
        .user-name { font-size: 13px; font-weight: 600; }
        .user-role { font-size: 11px; color: var(--text-secondary); }

        /* ========== LEVEL 2: SUB NAVIGATION (dropdown panel) ========== */
        .sub-nav-wrapper {
            position: fixed;
            top: var(--header-height); left: 0; right: 0;
            z-index: 999;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-header);
            border-bottom: 1px solid transparent;
            box-shadow: 0 8px 32px var(--shadow);
        }
        .sub-nav-wrapper.open {
            max-height: 300px;
            border-bottom-color: var(--border);
        }
        .sub-nav {
            display: flex;
            padding: 16px 24px 20px;
            gap: 6px;
            flex-wrap: wrap;
        }
        .sub-nav-item {
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s;
            white-space: nowrap;
            position: relative;
            border: 1px solid transparent;
        }
        .sub-nav-item:hover {
            color: var(--primary);
            background: rgba(30, 111, 219, 0.1);
            border-color: rgba(30, 111, 219, 0.3);
        }
        .sub-nav-item.active {
            color: #fff;
            background: var(--primary);
            font-weight: 600;
            border-color: var(--primary);
        }
        :root[data-theme="light"] .sub-nav-item.active {
            color: #fff;
        }

        /* ========== BREADCRUMB BAR ========== */
        .breadcrumb-bar {
            position: fixed;
            top: var(--header-height); left: 0; right: 0;
            height: 40px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            z-index: 998;
            transform: translateY(-100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .breadcrumb-bar.visible {
            transform: translateY(0);
        }
        .breadcrumb-path {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }
        .breadcrumb-path .bc-link {
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .breadcrumb-path .bc-link:hover {
            color: var(--primary);
        }
        .breadcrumb-path .bc-sep {
            color: var(--text-secondary);
            font-size: 10px;
        }
        .breadcrumb-path .bc-current {
            color: var(--text-primary);
            font-weight: 600;
        }
        .breadcrumb-path .bc-toggle {
            margin-left: 8px;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--primary);
            background: rgba(30, 111, 219, 0.1);
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(30, 111, 219, 0.2);
        }
        .breadcrumb-path .bc-toggle:hover {
            background: rgba(30, 111, 219, 0.2);
        }

        /* ========== LEFT SIDEBAR ========== */
        .sidebar {
            position: fixed;
            left: 0;
            top: calc(var(--header-height) + 40px);
            bottom: 0;
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 100;
            transform: translateX(-100%);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .sidebar-header {
            padding: 20px 20px 12px;
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header-icon {
            width: 40px; height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(30,111,219,0.2), rgba(0,180,216,0.1));
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: var(--primary);
        }
        .sidebar-header-title { font-size: 16px; font-weight: 700; }
        .sidebar-header-desc { font-size: 12px; color: var(--text-secondary); }

        .sidebar-section { padding: 12px 0; }
        .sidebar-group-label {
            padding: 0 20px 8px;
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .sidebar-item {
            display: flex; align-items: center;
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.25s;
            font-size: 14px;
            color: var(--text-secondary);
            gap: 10px;
        }
        .sidebar-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }
        .sidebar-item.active {
            background: rgba(30, 111, 219, 0.15);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }
        .sidebar-item .icon {
            width: 20px; text-align: center; font-size: 14px;
        }
        .sidebar-item .arrow {
            margin-left: auto; font-size: 11px;
            transition: transform 0.3s;
        }
        .sidebar-item.expanded .arrow {
            transform: rotate(90deg);
        }
        .sidebar-submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            background: var(--header-bg);
        }
        .sidebar-submenu.open { max-height: 500px; }
        .sidebar-sub-item {
            padding: 8px 20px 8px 50px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s;
            display: flex; align-items: center; gap: 8px;
        }
        .sidebar-sub-item:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .sidebar-sub-item.active {
            color: var(--primary);
            background: rgba(30, 111, 219, 0.1);
        }
        .sidebar-sub-item .dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--border);
            transition: background 0.3s;
        }
        .sidebar-sub-item.active .dot { background: var(--primary); }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }
        .sidebar-footer .sidebar-item {
            color: var(--text-secondary);
        }
        .sidebar-footer .sidebar-item:hover {
            color: var(--danger);
            background: rgba(239,68,68,0.08);
        }

        /* ========== CONTENT AREA ========== */
        .content-area {
            position: fixed;
            top: calc(var(--header-height) + 40px);
            left: 0; right: 0; bottom: 0;
            transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1), top 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .content-area.with-sidebar {
            left: var(--sidebar-width);
        }
        .content-area.no-breadcrumb {
            top: var(--header-height);
        }
        .content-area iframe {
            width: 100%; height: 100%;
            border: none;
            background: var(--bg-dark);
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .sub-nav-item { animation: fadeIn 0.3s ease backwards; }
        .sub-nav-item:nth-child(1) { animation-delay: 0.02s; }
        .sub-nav-item:nth-child(2) { animation-delay: 0.04s; }
        .sub-nav-item:nth-child(3) { animation-delay: 0.06s; }
        .sub-nav-item:nth-child(4) { animation-delay: 0.08s; }
        .sub-nav-item:nth-child(5) { animation-delay: 0.10s; }
        .sub-nav-item:nth-child(6) { animation-delay: 0.12s; }
        .sub-nav-item:nth-child(7) { animation-delay: 0.14s; }
        .sub-nav-item:nth-child(8) { animation-delay: 0.16s; }
        .sub-nav-item:nth-child(9) { animation-delay: 0.18s; }
        .sub-nav-item:nth-child(10) { animation-delay: 0.20s; }
        .sub-nav-item:nth-child(11) { animation-delay: 0.22s; }
        .sub-nav-item:nth-child(12) { animation-delay: 0.24s; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>

// ========== STATE ==========
let currentTopNav = null;
let currentSubNav = null;
let currentSubNavData = null; // store parent nav for breadcrumb
let currentSidebarItem = null;
let subNavVisible = false;

// ========== INIT ==========
function init() {
    applyTheme(localStorage.getItem('theme') || 'light');
    renderTopNav();
    // Load workspace page by default
    handleTopNavClick('workspace');
}

// ========== THEME ==========
function applyTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    const icon = document.getElementById('themeIcon');
    if (icon) {
        icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
    }
    // Broadcast to iframe
    const iframe = document.getElementById('contentFrame');
    if (iframe && iframe.contentWindow) {
        iframe.contentWindow.postMessage({ action: 'setTheme', theme: theme }, '*');
    }
}
function toggleTheme() {
    const current = document.documentElement.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
}

// ========== RENDER TOP NAV ==========
function renderTopNav() {
    const topNav = document.getElementById('topNav');
    topNav.innerHTML = NAV_DATA.map(item => `
        <div class="top-nav-item" data-id="${item.id}" onclick="handleTopNavClick('${item.id}')">
            <i class="fas ${item.icon}"></i>
            <span>${item.label}</span>
        </div>
    `).join('');
}

// ========== HANDLE TOP NAV CLICK ==========
function handleTopNavClick(id) {
    const navItem = NAV_DATA.find(n => n.id === id);
    if (!navItem) return;

    // Update top nav active state
    document.querySelectorAll('.top-nav-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`.top-nav-item[data-id="${id}"]`).classList.add('active');
    currentTopNav = id;

    if (navItem.direct) {
        // Direct page - show simple breadcrumb, no sub nav or sidebar
        closeSubNav();
        closeSidebar();
        showSimpleBreadcrumb(navItem.label);
        document.getElementById('contentArea').classList.remove('no-breadcrumb');
        loadPage(navItem.page);
    } else if (navItem.page && navItem.sidebar) {
        // Has page and sidebar but no children - direct load with sidebar (e.g. 风险督察考核)
        closeSubNav();
        showSimpleBreadcrumb(navItem.label);
        document.getElementById('contentArea').classList.remove('no-breadcrumb');
        renderSidebar(navItem);
        openSidebar();
        loadPage(navItem.page);
    } else if (navItem.sidebar) {
        // Has sidebar only - no page, no children (e.g. 风险知识栏目)
        closeSubNav();
        showSimpleBreadcrumb(navItem.label);
        document.getElementById('contentArea').classList.remove('no-breadcrumb');
        renderSidebar(navItem);
        openSidebar();
    } else if (navItem.children) {
        // Toggle: if same top nav and sub-nav already visible, close it
        if (subNavVisible && currentSubNavData === id) {
            closeSubNav();
            return;
        }
        // Render and show secondary nav (dropdown panel)
        currentSubNavData = id;
        renderSubNav(navItem.children);
        openSubNav();
    }
}

// ========== RENDER SUB NAV ==========
function renderSubNav(children) {
    const subNav = document.getElementById('subNav');
    subNav.innerHTML = children.map(child => `
        <div class="sub-nav-item" data-id="${child.id}" onclick="handleSubNavClick('${child.id}')">
            <i class="fas ${child.icon}" style="margin-right:4px;font-size:12px;"></i>
            ${child.label}
        </div>
    `).join('');
}

// ========== HANDLE SUB NAV CLICK ==========
function handleSubNavClick(id) {
    // Find the sub nav item in all top nav children
    let subItem = null;
    let parentLabel = '';
    for (const nav of NAV_DATA) {
        if (nav.children) {
            const found = nav.children.find(c => c.id === id);
            if (found) { subItem = found; parentLabel = nav.label; break; }
        }
    }
    if (!subItem) return;

    // Update sub nav active state
    document.querySelectorAll('.sub-nav-item').forEach(el => el.classList.remove('active'));
    const subEl = document.querySelector(`.sub-nav-item[data-id="${id}"]`);
    if (subEl) subEl.classList.add('active');
    currentSubNav = id;

    // Hide the secondary dropdown
    closeSubNav();

    // Show breadcrumb bar
    showBreadcrumb(parentLabel, subItem.label);
    document.getElementById('contentArea').classList.remove('no-breadcrumb');

    // Update sidebar
    if (subItem.sidebar) {
        renderSidebar(subItem);
        openSidebar();
    } else {
        closeSidebar();
    }

    // Load page
    loadPage(subItem.page);

    // Auto-click first sidebar item if exists, to sync with sidebar menu
    setTimeout(() => {
        const firstSidebarItem = document.querySelector('.sidebar-sub-item') || document.querySelector('.sidebar-item[data-section]');
        if (firstSidebarItem) {
            handleSidebarItemClick(firstSidebarItem, firstSidebarItem.dataset.section, firstSidebarItem.dataset.page);
        }
    }, 50);
}

// ========== RENDER SIDEBAR ==========
function renderSidebar(subItem) {
    const header = document.getElementById('sidebarHeader');
    header.innerHTML = `
        <div class="sidebar-header-icon"><i class="fas ${subItem.icon}"></i></div>
        <div>
            <div class="sidebar-header-title">${subItem.label}</div>
            <div class="sidebar-header-desc">治理模块</div>
        </div>
    `;
    // Update breadcrumb child label
    updateBreadcrumbChild(subItem.label);

    const content = document.getElementById('sidebarContent');
    let html = '<div class="sidebar-section">';

    subItem.sidebar.forEach((item, idx) => {
        if (item.children) {
            const isFirst = idx === 0;
            html += `
                <div class="sidebar-item ${isFirst ? 'expanded' : ''}" onclick="toggleSidebarGroup(this, '${item.id}')">
                    <span class="icon"><i class="fas ${item.icon}"></i></span>
                    <span>${item.label}</span>
                    <span class="arrow"><i class="fas fa-chevron-right"></i></span>
                </div>
                <div class="sidebar-submenu ${isFirst ? 'open' : ''}" id="sidebar-group-${item.id}">
                    ${item.children.map(child => `
                        <div class="sidebar-sub-item" data-page="${child.page || ''}" data-section="${child.section || child.id}" onclick="handleSidebarItemClick(this, '${child.section || child.id}', '${child.page || ''}')">
                            <span class="dot"></span>
                            <span>${child.label}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        } else {
            html += `
                <div class="sidebar-item" data-page="${item.page || ''}" data-section="${item.section || item.id}" onclick="handleSidebarItemClick(this, '${item.section || item.id}', '${item.page || ''}')">
                    <span class="icon"><i class="fas ${item.icon}"></i></span>
                    <span>${item.label}</span>
                </div>
            `;
        }
    });

    html += '</div>';
    content.innerHTML = html;

    // Auto-click first sidebar item
    const firstItem = content.querySelector('.sidebar-sub-item') || content.querySelector('.sidebar-item[data-section]');
    if (firstItem) {
        handleSidebarItemClick(firstItem, firstItem.dataset.section, firstItem.dataset.page);
    }
}

// ========== TOGGLE SIDEBAR GROUP ==========
function toggleSidebarGroup(el, groupId) {
    const submenu = document.getElementById('sidebar-group-' + groupId);
    el.classList.toggle('expanded');
    submenu.classList.toggle('open');
}

// ========== HANDLE SIDEBAR ITEM CLICK ==========
function handleSidebarItemClick(el, sectionId, pageUrl) {
    // Update active state
    document.querySelectorAll('.sidebar-item, .sidebar-sub-item').forEach(item => item.classList.remove('active'));
    el.classList.add('active');
    currentSidebarItem = sectionId;

    // If page URL is provided, load the page directly
    if (pageUrl) {
        loadPage(pageUrl);
    } else {
        // Notify iframe to switch section (legacy behavior)
        const iframe = document.getElementById('contentFrame');
        if (iframe.contentWindow) {
            iframe.contentWindow.postMessage({ action: 'switchSection', section: sectionId }, '*');
        }
    }
}

// ========== OPEN/CLOSE HELPERS ==========
function openSubNav() {
    document.getElementById('subNavWrapper').classList.add('open');
    subNavVisible = true;
}
function closeSubNav() {
    document.getElementById('subNavWrapper').classList.remove('open');
    subNavVisible = false;
}
function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('contentArea').classList.add('with-sidebar');
}
function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('contentArea').classList.remove('with-sidebar');
}

// ========== BREADCRUMB ==========
function showBreadcrumb(parentLabel, childLabel) {
    const bar = document.getElementById('breadcrumbBar');
    const path = document.getElementById('breadcrumbPath');
    path.innerHTML = `
        <span class="bc-link" onclick="handleTopNavClick('${currentTopNav}')">
            <i class="fas fa-home" style="font-size:12px"></i> 城市治理风险监管子系统
        </span>
        <span class="bc-sep"><i class="fas fa-chevron-right"></i></span>
        <span class="bc-link" onclick="handleTopNavClick('${currentTopNav}')">${parentLabel}</span>
        <span class="bc-sep"><i class="fas fa-chevron-right"></i></span>
        <span class="bc-current" id="bcChildLabel">${childLabel}</span>
        <span class="bc-toggle" onclick="handleTopNavClick('${currentTopNav}')">
            <i class="fas fa-exchange-alt" style="font-size:10px"></i> 切换
        </span>
    `;
    bar.classList.add('visible');
}
function showSimpleBreadcrumb(label) {
    const bar = document.getElementById('breadcrumbBar');
    const path = document.getElementById('breadcrumbPath');
    path.innerHTML = `
        <span class="bc-link" onclick="handleTopNavClick('${currentTopNav}')">
            <i class="fas fa-home" style="font-size:12px"></i> 城市治理风险监管子系统
        </span>
        <span class="bc-sep"><i class="fas fa-chevron-right"></i></span>
        <span class="bc-current">${label}</span>
    `;
    bar.classList.add('visible');
}
function hideBreadcrumb() {
    document.getElementById('breadcrumbBar').classList.remove('visible');
}
function updateBreadcrumbChild(label) {
    const el = document.getElementById('bcChildLabel');
    if (el) el.textContent = label;
}

// ========== LOAD PAGE ==========
function loadPage(src) {
    const iframe = document.getElementById('contentFrame');
    // 统计分析页面增加时间戳参数，避免 iframe 缓存损坏文件
    if (src && src.includes('hs-statistics.html') && !src.includes('?t=')) {
        src += (src.includes('?') ? '&' : '?') + 't=' + Date.now();
    }
    iframe.src = src;
    iframe.onload = function() {
        const theme = document.documentElement.getAttribute('data-theme') || 'light';
        iframe.contentWindow.postMessage({ action: 'setTheme', theme: theme }, '*');
    };
}

// ========== LOGOUT ==========
function handleLogout() {
    if (confirm('确定要退出系统吗？')) {
        alert('已退出系统');
    }
}

// ========== LISTEN FOR IFRAME MESSAGES ==========
window.addEventListener('message', function(event) {
    if (!event.data) return;
    if (event.data.action === 'navigate') {
        const { topNav, subNav, section, url } = event.data;
        if (url) {
            loadPage(url);
            return;
        }
        if (topNav) handleTopNavClick(topNav);
        if (subNav) setTimeout(() => handleSubNavClick(subNav), 100);
    }
    if (event.data.action === 'closeExpertModal') {
        const iframe = document.getElementById('contentFrame');
        const projectId = event.data.projectId || '';
        if (iframe) {
            if (projectId) {
                iframe.src = 'pages/tp-contract.html?projectId=' + encodeURIComponent(projectId);
            } else {
                iframe.contentWindow.history.back();
            }
        }
    }
    // expertSelected 仅保存到 localStorage，不自动跳转
});

// ========== START ==========
document.addEventListener('DOMContentLoaded', init);
