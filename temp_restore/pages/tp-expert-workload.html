<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专家工作量统计 - 第三方服务机构</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="tp-common.css">
<script src="../js/third-party-data.js"></script>
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

.stat-row {
    display: flex;
    flex-wrap: nowrap;
    gap: 12px;
    margin-bottom: 20px;
    min-width: 0;
    overflow-x: auto;
}
.stat-item {
    flex: 1 1 0;
    min-width: 200px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 8px var(--shadow);
    overflow: hidden;
}
.stat-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #fff;
    flex-shrink: 0;
}
.stat-icon.blue { background: linear-gradient(135deg, #1a73e8, #4285f4); }
.stat-icon.green { background: linear-gradient(135deg, #1e8e3e, #34a853); }
.stat-icon.orange { background: linear-gradient(135deg, #e37400, #f9ab00); }
.stat-icon.purple { background: linear-gradient(135deg, #6b4ce6, #9aa0f6); }
.stat-number {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    white-space: nowrap;
}
.stat-label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
    white-space: nowrap;
}
.stat-info {
    min-width: 0;
    overflow: hidden;
}
.stat-info .stat-label {
    overflow: hidden;
    text-overflow: ellipsis;
}

/* 图表区 */
.chart-row {
    margin-bottom: 20px;
}
.chart-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    padding: 0 4px;
}
.chart-tab {
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
}
.chart-tab i { color: var(--primary); }
.chart-tab.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
}
.chart-tab.active i { color: #fff; }
.chart-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: none;
}
.chart-card.active {
    display: block;
}
.chart-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.chart-title i { color: var(--primary); }
.chart-box { height: 320px; }

/* 工作量统计表：排名列不锁定，宽度适中 */
.workload-table.list-table thead th:first-child,
.workload-table.list-table tbody td:first-child {
    position: static;
    width: 80px;
    min-width: 80px;
    max-width: 80px;
    background: transparent;
    border-right: none;
    box-shadow: none;
    z-index: auto;
}
.workload-table.list-table thead th:first-child { background: var(--header-bg, rgba(0,0,0,0.02)); }

/* 列表区背景色修复：表体单元格使用卡片背景 */
.workload-table.list-table tbody td {
    background: var(--bg-card, #ffffff);
}
.workload-table.list-table tbody tr:hover td {
    background: var(--bg-hover, #e8eaed);
}

@media (max-width: 768px) {
    .chart-tabs { flex-wrap: wrap; }
    .chart-box { height: 260px; }
}

/* 专家详情弹窗模态框 */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
}
.modal-overlay.active {
    display: flex;
}
.modal-container {
    background: var(--bg-card);
    border-radius: 12px;
    width: 720px;
    max-width: 90vw;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 30px var(--shadow);
}
.modal-container.modal-narrow {
    width: 620px;
}
.modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.modal-title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}
.modal-close {
    background: transparent;
    border: none;
    font-size: 18px;
    color: var(--text-secondary);
    cursor: pointer;
}
.modal-body {
    padding: 0;
    overflow-y: auto;
    flex: 1;
}
.modal-iframe {
    width: 100%;
    height: 100%;
    min-height: 520px;
    border: none;
    display: block;
}
</style>
</head>
<body>

<!-- 统计卡片 -->
<div class="stat-row">
    <div class="stat-item">
        <div class="stat-icon blue"><i class="fas fa-tasks"></i></div>
        <div class="stat-info">
            <div class="stat-number" id="statTotalTasks">0</div>
            <div class="stat-label">年度任务总数</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon green"><i class="fas fa-user-graduate"></i></div>
        <div class="stat-info">
            <div class="stat-number" id="statActiveExperts">0</div>
            <div class="stat-label">参与专家人数</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
        <div class="stat-info">
            <div class="stat-number" id="statTotalWorkload">0</div>
            <div class="stat-label">总投入工时</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon purple"><i class="fas fa-chart-pie"></i></div>
        <div class="stat-info">
            <div class="stat-number" id="statAvgTasks">0</div>
            <div class="stat-label">人均任务数</div>
        </div>
    </div>
</div>

<!-- 图表区 -->
<div class="chart-row">
    <div class="chart-tabs">
        <div class="chart-tab active" data-target="barChart" onclick="switchChartTab(this)">
            <i class="fas fa-chart-bar"></i> 专家任务数量排行
        </div>
        <div class="chart-tab" data-target="pieChart" onclick="switchChartTab(this)">
            <i class="fas fa-chart-pie"></i> 任务类型分布
        </div>
    </div>
    <div class="chart-card active" id="barChart">
        <div class="chart-box" id="workloadBarChart"></div>
    </div>
    <div class="chart-card" id="pieChart">
        <div class="chart-box" id="taskTypePieChart"></div>
    </div>
</div>

<!-- 专家工作量明细 -->
<div class="list-card">
    <div class="list-header">
        <div class="list-title"><i class="fas fa-list-alt"></i> 专家工作量明细</div>
    </div>
    <div class="list-body">
        <div class="filter-card">
            <div class="filter-row">
                <div class="filter-item">
                    <label>年度</label>
                    <select id="yearFilter"></select>
                </div>
                <div class="filter-item">
                    <label>任务类型</label>
                    <select id="typeFilter">
                        <option value="">全部</option>
                    </select>
                </div>
                <div class="filter-item" style="flex:1; min-width:200px; max-width:300px;">
                    <input type="text" id="expertSearch" placeholder="搜索专家姓名/单位...">
                </div>
                <div class="filter-actions">
                    <button class="list-btn list-btn-primary" onclick="searchWorkload()"><i class="fas fa-search"></i> 查询</button>
                    <button class="list-btn list-btn-outline" onclick="resetWorkloadFilter()"><i class="fas fa-undo"></i> 重置</button>
                    <button class="list-btn list-btn-success" onclick="exportWorkload()"><i class="fas fa-download"></i> 导出</button>
                </div>
            </div>
        </div>

        <div class="table-wrapper">
            <table class="list-table workload-table" id="workloadTable">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>专家姓名</th>
                        <th>工作单位</th>
                        <th>任务总数</th>
                        <th>投入工时</th>
                        <th>任务类型分布</th>
                        <th style="text-align:center;">操作</th>
                    </tr>
                </thead>
                <tbody id="workloadTableBody"></tbody>
            </table>
        </div>
        <div class="list-pagination" id="workloadPagination"></div>
    </div>
</div>

<script src="../js/echarts.min.js"></script>
<script>
(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
        localStorage.setItem('theme', e.data.theme);
    }
});

// 任务类型字典
var taskTypes = ['安全检查', '隐患排查', '安全评估', '应急咨询', '检测检验', '事故调查'];
var typeColors = ['#1a73e8', '#34a853', '#e37400', '#f9ab00', '#9334e6', '#d93025'];

// 读取专家列表
function loadExpertList() {
    // 优先使用统一数据层，保证与机构库联动
    if (typeof getAllExperts === 'function') {
        var unified = getAllExperts();
        if (unified && unified.length) {
            return unified.map(function(e) {
                var org = getOrgById(e.orgId);
                var isInd = e.expertType === '独立专家' || !e.orgId;
                return {
                    name: e.name,
                    org: isInd ? '独立专家' : (e.orgName || e.workplace || ''),
                    orgId: e.orgId || '',
                    expertType: e.expertType || (e.orgId ? '机构专家' : '独立专家'),
                    orgCode: org ? org.orgCode : '',
                    workplace: org ? org.region : (e.workplace || '')
                };
            });
        }
    }
    try {
        var saved = localStorage.getItem('expertListData');
        if (saved) return JSON.parse(saved);
    } catch(e) {}
    return [];
}

// 生成模拟任务数据
function generateMockTaskRecords(expertList) {
    var records = [];
    var years = [2024, 2025, 2026];
    var seq = 1;
    expertList.forEach(function(expert) {
        years.forEach(function(year) {
            var count = Math.floor(Math.random() * 6) + 1;
            for (var i = 0; i < count; i++) {
                var typeIndex = Math.floor(Math.random() * taskTypes.length);
                var type = taskTypes[typeIndex];
                records.push({
                    taskId: 'TASK-' + year + '-' + String(seq++).padStart(3, '0'),
                    taskName: (expert.workplace || '') + type + '任务-' + seq,
                    taskType: type,
                    expertName: expert.name,
                    year: year,
                    month: Math.floor(Math.random() * 12) + 1,
                    workload: Math.floor(Math.random() * 16) + 4,
                    status: Math.random() > 0.2 ? '已完成' : '进行中',
                    org: expert.org,
                    orgId: expert.orgId || '',
                    createTime: year + '-' + String(Math.floor(Math.random() * 12) + 1).padStart(2, '0') + '-15 09:00:00'
                });
            }
        });
    });
    return records;
}

// 加载/生成任务记录
function loadTaskRecords() {
    try {
        var saved = localStorage.getItem('expertTaskRecords');
        if (saved) {
            var records = JSON.parse(saved);
            // 旧数据可能没有 orgId，使用当前专家列表补全，保证 URL 过滤可用
            var experts = loadExpertList();
            var nameToOrg = {};
            experts.forEach(function(e) { nameToOrg[e.name] = e.orgId || ''; });
            var needUpdate = false;
            records.forEach(function(r) {
                if (!r.orgId && nameToOrg[r.expertName]) {
                    r.orgId = nameToOrg[r.expertName];
                    needUpdate = true;
                }
            });
            if (needUpdate) {
                localStorage.setItem('expertTaskRecords', JSON.stringify(records));
            }
            return records;
        }
    } catch(e) {}
    // 如果没有数据，基于专家列表生成一次
    var experts = loadExpertList();
    if (!experts || experts.length === 0) {
        experts = [
            { name: '张奉贤', org: '上海市奉贤区建设工程安全质量监督站', workplace: '奉贤区' },
            { name: '李秀芳', org: '上海市奉贤区应急管理局', workplace: '奉贤区' },
            { name: '王建国', org: '上海市奉贤区燃气管理所', workplace: '奉贤区' },
            { name: '陈志强', org: '上海市奉贤区交通运输局', workplace: '奉贤区' },
            { name: '刘美华', org: '上海市奉贤区住房保障和房屋管理局', workplace: '奉贤区' }
        ];
    }
    var records = generateMockTaskRecords(experts);
    try {
        localStorage.setItem('expertTaskRecords', JSON.stringify(records));
    } catch(e) {}
    return records;
}

var allTaskRecords = loadTaskRecords();
var currentYear = 2026;
var workloadPage = 1;
var workloadPageSize = 8;
var aggregatedData = [];
var filteredData = [];
var currentOrgIdFilter = ''; // 用于按 URL orgId 过滤机构

// 从 URL 参数读取机构过滤条件
function initOrgFilterFromUrl() {
    if (typeof getTPQueryParams === 'function') {
        var params = getTPQueryParams();
        if (params.orgId) {
            currentOrgIdFilter = params.orgId;
        }
    }
}

// 初始化年份下拉
function initYearFilter() {
    var select = document.getElementById('yearFilter');
    var years = [2026, 2025, 2024];
    select.innerHTML = years.map(function(y) {
        return '<option value="' + y + '"' + (y === currentYear ? ' selected' : '') + '>' + y + '年</option>';
    }).join('');
    select.addEventListener('change', function() {
        currentYear = parseInt(this.value);
        searchWorkload();
    });
}

// 初始化任务类型下拉
function initTypeFilter() {
    var select = document.getElementById('typeFilter');
    select.innerHTML = '<option value="">全部</option>' + taskTypes.map(function(t) {
        return '<option value="' + t + '">' + t + '</option>';
    }).join('');
    select.addEventListener('change', searchWorkload);
}

// 聚合统计
function aggregateByExpert(year, typeFilter, keyword) {
    var records = allTaskRecords.filter(function(r) { return r.year === year; });
    if (currentOrgIdFilter) {
        records = records.filter(function(r) { return r.orgId === currentOrgIdFilter; });
    }
    if (typeFilter) {
        records = records.filter(function(r) { return r.taskType === typeFilter; });
    }
    if (keyword) {
        keyword = keyword.toLowerCase();
        records = records.filter(function(r) {
            return r.expertName.toLowerCase().indexOf(keyword) !== -1 ||
                   r.org.toLowerCase().indexOf(keyword) !== -1;
        });
    }

    var map = {};
    records.forEach(function(r) {
        if (!map[r.expertName]) {
            map[r.expertName] = {
                expertName: r.expertName,
                org: r.org,
                orgId: r.orgId,
                total: 0,
                workload: 0,
                typeMap: {}
            };
        }
        map[r.expertName].total += 1;
        map[r.expertName].workload += r.workload;
        map[r.expertName].typeMap[r.taskType] = (map[r.expertName].typeMap[r.taskType] || 0) + 1;
    });

    return Object.values(map).sort(function(a, b) { return b.total - a.total; });
}

// 统计总数
function updateStats() {
    var records = allTaskRecords.filter(function(r) { return r.year === currentYear; });
    if (currentOrgIdFilter) {
        records = records.filter(function(r) { return r.orgId === currentOrgIdFilter; });
    }
    var totalTasks = records.length;
    var activeExperts = new Set(records.map(function(r) { return r.expertName; })).size;
    var totalWorkload = records.reduce(function(sum, r) { return sum + r.workload; }, 0);
    var avgTasks = activeExperts ? (totalTasks / activeExperts).toFixed(1) : '0';

    document.getElementById('statTotalTasks').textContent = totalTasks;
    document.getElementById('statActiveExperts').textContent = activeExperts;
    document.getElementById('statTotalWorkload').textContent = totalWorkload;
    document.getElementById('statAvgTasks').textContent = avgTasks;
}

// 渲染表格
function renderWorkloadTable() {
    var tbody = document.getElementById('workloadTableBody');
    tbody.innerHTML = '';

    if (!filteredData || filteredData.length === 0) {
        var tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="7" style="text-align:center;color:var(--text-secondary);padding:24px;">暂无符合条件的数据</td>';
        tbody.appendChild(tr);
        renderWorkloadPagination(0);
        return;
    }

    var start = (workloadPage - 1) * workloadPageSize;
    var end = start + workloadPageSize;
    var pageData = filteredData.slice(start, end);

    pageData.forEach(function(item, index) {
        var rank = start + index + 1;
        var typeTags = Object.keys(item.typeMap).map(function(t) {
            return '<span class="type-tag-mini">' + t + ' ' + item.typeMap[t] + '</span>';
        }).join('');
        var isInd = item.expertType === '独立专家' || !item.orgId;
        var orgCell = isInd ?
            '<span style="display:inline-block;padding:2px 8px;background:#f0f4ff;color:#2a5cff;border-radius:4px;font-size:12px;">独立专家</span>' :
            '<a style="cursor:pointer;color:var(--primary);text-decoration:underline;" onclick="goToTPOrg(\'' + item.orgId + '\')">' + item.org + '</a>';
        var tr = document.createElement('tr');
        tr.innerHTML =
            '<td>' + rank + '</td>' +
            '<td>' + item.expertName + '</td>' +
            '<td>' + orgCell + '</td>' +
            '<td>' + item.total + '</td>' +
            '<td>' + item.workload + ' h</td>' +
            '<td>' + typeTags + '</td>' +
            '<td class="actions" style="text-align:center;">' +
                '<a class="table-link" onclick="viewExpertDetail(\'' + item.expertName + '\')">详情</a>' +
            '</td>';
        tbody.appendChild(tr);
    });

    var totalPages = Math.ceil(filteredData.length / workloadPageSize) || 1;
    renderWorkloadPagination(totalPages);
}

function renderWorkloadPagination(totalPages) {
    var container = document.getElementById('workloadPagination');
    var total = filteredData.length;
    var html = '<span class="page-info">共 ' + total + ' 条</span>';
    html += '<button class="page-btn" ' + (workloadPage === 1 || totalPages === 0 ? 'disabled' : '') + ' onclick="goWorkloadPage(' + (workloadPage - 1) + ')">上一页</button>';
    for (var i = 1; i <= totalPages; i++) {
        html += '<button class="page-btn ' + (i === workloadPage ? 'active' : '') + '" onclick="goWorkloadPage(' + i + ')" ' + (i === workloadPage ? 'disabled' : '') + '>' + i + '</button>';
    }
    html += '<button class="page-btn" ' + (workloadPage === totalPages || totalPages === 0 ? 'disabled' : '') + ' onclick="goWorkloadPage(' + (workloadPage + 1) + ')">下一页</button>';
    container.innerHTML = html;
}

function goWorkloadPage(page) {
    var totalPages = Math.ceil(filteredData.length / workloadPageSize) || 1;
    if (page < 1 || page > totalPages) return;
    workloadPage = page;
    renderWorkloadTable();
}

function searchWorkload() {
    var keyword = document.getElementById('expertSearch').value.trim();
    var typeFilter = document.getElementById('typeFilter').value;
    aggregatedData = aggregateByExpert(currentYear, typeFilter, keyword);
    filteredData = aggregatedData;
    workloadPage = 1;
    renderWorkloadTable();
    renderCharts();
}

function resetWorkloadFilter() {
    document.getElementById('expertSearch').value = '';
    document.getElementById('typeFilter').value = '';
    searchWorkload();
}

// 图表渲染
var barChart, pieChart;
function renderCharts() {
    renderWorkloadBarChart();
    renderTaskTypePieChart();
}

function switchChartTab(el) {
    var target = el.getAttribute('data-target');
    document.querySelectorAll('.chart-tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.chart-card').forEach(function(c) { c.classList.remove('active'); });
    el.classList.add('active');
    document.getElementById(target).classList.add('active');
    if (target === 'barChart' && barChart) barChart.resize();
    if (target === 'pieChart' && pieChart) pieChart.resize();
}

function renderWorkloadBarChart() {
    var dom = document.getElementById('workloadBarChart');
    if (!dom) return;
    if (!barChart) barChart = echarts.init(dom);

    var top10 = filteredData.slice(0, 10);
    var names = top10.map(function(d) { return d.expertName; });
    var counts = top10.map(function(d) { return d.total; });

    barChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: '3%', right: '4%', bottom: '3%', top: '10%', containLabel: true },
        xAxis: { type: 'category', data: names, axisLabel: { rotate: 30, fontSize: 11 } },
        yAxis: { type: 'value', name: '任务数' },
        series: [{
            data: counts,
            type: 'bar',
            barWidth: '50%',
            itemStyle: { color: '#1a73e8', borderRadius: [4, 4, 0, 0] }
        }]
    });
}

function renderTaskTypePieChart() {
    var dom = document.getElementById('taskTypePieChart');
    if (!dom) return;
    if (!pieChart) pieChart = echarts.init(dom);

    var records = allTaskRecords.filter(function(r) { return r.year === currentYear; });
    if (currentOrgIdFilter) {
        records = records.filter(function(r) { return r.orgId === currentOrgIdFilter; });
    }
    var typeMap = {};
    records.forEach(function(r) {
        typeMap[r.taskType] = (typeMap[r.taskType] || 0) + 1;
    });
    var data = Object.keys(typeMap).map(function(t, i) {
        return { name: t, value: typeMap[t], itemStyle: { color: typeColors[i % typeColors.length] } };
    });

    pieChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
        legend: { bottom: 0, left: 'center', type: 'scroll' },
        series: [{
            type: 'pie',
            radius: ['40%', '70%'],
            center: ['50%', '45%'],
            avoidLabelOverlap: true,
            itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
            label: { show: true, formatter: '{b}\n{c}' },
            data: data
        }]
    });
}

// 查看详情
function viewExpertDetail(expertName) {
    openExpertModal('tp-expert-view.html?name=' + encodeURIComponent(expertName), expertName + ' - 专家详情', 'modal-narrow');
    var iframe = document.getElementById('expertModalIframe');
    if (iframe) {
        iframe.onload = function() {
            try {
                iframe.contentWindow.postMessage({ action: 'setExpertData', list: loadExpertList() }, '*');
            } catch(e) {}
        };
    }
}

function openExpertModal(url, title, sizeClass) {
    var overlay = document.getElementById('expertModalOverlay');
    var iframe = document.getElementById('expertModalIframe');
    var modalTitle = document.getElementById('expertModalTitle');
    var container = document.getElementById('expertModalContainer');
    if (!overlay) return;
    iframe.src = url;
    modalTitle.textContent = title;
    container.className = 'modal-container ' + (sizeClass || '');
    overlay.classList.add('active');
}

function closeExpertModal() {
    var overlay = document.getElementById('expertModalOverlay');
    var iframe = document.getElementById('expertModalIframe');
    if (overlay) overlay.classList.remove('active');
    if (iframe) iframe.src = '';
}

window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'closeExpertModal') closeExpertModal();
});

// 导出
function exportWorkload() {
    var csv = '排名,专家姓名,工作单位,任务总数,投入工时,任务类型分布\n';
    filteredData.forEach(function(item, index) {
        var typeStr = Object.keys(item.typeMap).map(function(t) { return t + ':' + item.typeMap[t]; }).join(' ');
        csv += [index + 1, item.expertName, item.org, item.total, item.workload, typeStr].join(',') + '\n';
    });
    var blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = '专家工作量统计_' + currentYear + '.csv';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// 监听主题变化
window.addEventListener('resize', function() {
    if (barChart) barChart.resize();
    if (pieChart) pieChart.resize();
});

// 初始化
document.addEventListener('DOMContentLoaded', function() {
    initOrgFilterFromUrl();
    initYearFilter();
    initTypeFilter();
    updateStats();
    searchWorkload();
});
</script>

<!-- 弹窗模态框 -->
<div class="modal-overlay" id="expertModalOverlay" onclick="if(event.target===this)closeExpertModal()">
    <div class="modal-container" id="expertModalContainer">
        <div class="modal-header">
            <div class="modal-title" id="expertModalTitle"><i class="fas fa-user" style="color: var(--primary);"></i> 专家详情</div>
            <button class="modal-close" onclick="closeExpertModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" style="padding: 0; overflow: hidden;">
            <iframe id="expertModalIframe" class="modal-iframe"></iframe>
        </div>
    </div>
</div>

</body>
