<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>审核管理 - 风险知识栏目</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#1a73e8;--primary-rgb:26,115,232;--primary-dark:#1557b0;--danger:#d93025;--danger-rgb:217,48,37;--warning:#e37400;--warning-rgb:227,116,0;--success:#1e8e3e;--success-rgb:30,142,62;--bg-dark:#f0f2f5;--bg-card:#fff;--bg-hover:#e8eaed;--text-primary:#202124;--text-secondary:#5f6368;--border:#dadce0;--shadow:rgba(0,0,0,.08);--input-bg:#fff;--input-border:#dadce0;--modal-bg:#fff;--header-bg:rgba(0,0,0,.02);--row-hover:rgba(0,0,0,.02);--orange:#e37400}
:root[data-theme="dark"]{--primary:#1e6fdb;--primary-rgb:30,111,219;--primary-dark:#1557b0;--danger:#ef4444;--danger-rgb:239,68,68;--warning:#f59e0b;--warning-rgb:245,158,11;--success:#10b981;--success-rgb:16,185,129;--bg-dark:#0a1628;--bg-card:#112240;--bg-hover:#1a2f4a;--text-primary:#e2e8f0;--text-secondary:#94a3b8;--border:#1e3a5f;--shadow:rgba(0,0,0,.3);--input-bg:rgba(255,255,255,.05);--input-border:#1e3a5f;--modal-bg:#112240;--header-bg:rgba(0,0,0,.2);--row-hover:rgba(255,255,255,.02);--orange:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg-dark);color:var(--text-primary);margin:0;padding:20px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);margin-bottom:16px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 3px var(--shadow)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-body{padding:20px}
.filter-bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filter-input{background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;padding:8px 12px;color:var(--text-primary);font-size:13px}
.filter-input:focus{outline:none;border-color:var(--primary)}
.filter-select{background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;padding:8px 12px;color:var(--text-primary);font-size:13px}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;transition:all .3s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-warning{background:var(--orange);color:#fff}
.btn-sm{padding:4px 12px;font-size:12px}
.btn-ghost{background:transparent;color:var(--text-secondary);padding:6px 12px}.btn-ghost:hover{background:var(--bg-hover);color:var(--primary)}
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:12px 14px;text-align:left;font-size:13px;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);background:var(--header-bg);white-space:nowrap}
.data-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.data-table tr:hover td{background:var(--row-hover)}
.data-table .link-text{color:var(--primary);cursor:pointer}.data-table .link-text:hover{text-decoration:underline}
.badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500;display:inline-block;white-space:nowrap}
.badge-pending{background:rgba(227,116,0,.12);color:var(--orange)}
.badge-approved{background:rgba(30,142,62,.12);color:var(--success)}
.badge-rejected{background:rgba(217,48,37,.12);color:var(--danger)}
.action-link{color:var(--primary);cursor:pointer;font-size:12px;text-decoration:none;margin-right:8px}.action-link:hover{text-decoration:underline}
.action-link.del{color:var(--danger)}
.stat-row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-bottom:20px}
.stat-item{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;box-shadow:0 2px 8px var(--shadow);display:flex;align-items:center;gap:14px;transition:all .2s}
.stat-item:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--shadow)}
.stat-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-icon.blue{background:rgba(var(--primary-rgb),.1);color:var(--primary)}
.stat-icon.orange{background:rgba(var(--warning-rgb),.1);color:var(--orange)}
.stat-icon.green{background:rgba(var(--success-rgb),.1);color:var(--success)}
.stat-icon.red{background:rgba(var(--danger-rgb),.1);color:var(--danger)}
.stat-icon.purple{background:rgba(124,77,255,.1);color:#7c4dff}
[data-theme="dark"] .stat-icon.purple{background:rgba(124,77,255,.15);color:#9d84ff}
.stat-info .stat-num{font-size:24px;font-weight:700;color:var(--text-primary);line-height:1.2}
.stat-info .stat-label{font-size:12px;color:var(--text-secondary);margin-top:2px}
.main-tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:2px solid var(--border)}
.main-tab{padding:12px 22px;font-size:14px;font-weight:600;color:var(--text-secondary);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;display:flex;align-items:center;gap:8px;background:none;border-left:none;border-right:none;border-top:none}
.main-tab:hover{color:var(--primary)}
.main-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.main-tab .tab-count{padding:2px 8px;border-radius:10px;background:var(--bg-hover);font-size:11px}
.main-tab.active .tab-count{background:rgba(var(--primary-rgb),.15);color:var(--primary)}
.tab-content{display:none}.tab-content.active{display:block}
.pagination{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding:0 4px}
.pagination-info{font-size:13px;color:var(--text-secondary)}
.pagination-btns{display:flex;gap:4px}
.page-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);transition:all .2s}
.page-btn:hover{border-color:var(--primary);color:var(--primary)}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;justify-content:center;align-items:flex-start;padding-top:30px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{background:var(--modal-bg);border:1px solid var(--border);border-radius:12px;width:94%;max-width:1000px;box-shadow:0 12px 40px rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden;max-height:92vh}
.modal-box .modal-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-box .modal-title{font-size:16px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.modal-box .modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-hover);cursor:pointer;font-size:18px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-box .modal-close:hover{background:var(--danger);color:#fff}
.modal-box .modal-body{padding:24px;flex:1;overflow-y:auto}
.modal-box .modal-footer{padding:12px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px}
.form-group{margin-bottom:0}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px}
.form-label .required{color:var(--danger);margin-left:2px}
.form-control{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;padding:10px 12px;color:var(--text-primary);font-size:13px;box-sizing:border-box;font-family:inherit}
.form-control:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,115,232,.1)}
textarea.form-control{resize:vertical}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.detail-item{display:flex;gap:8px;font-size:13px;padding:6px 0}
.detail-item .lbl{color:var(--text-secondary);min-width:80px;flex-shrink:0;font-weight:600}
.detail-item .val{color:var(--text-primary);flex:1;word-break:break-all}
.detail-section{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.detail-section:last-child{border-bottom:none;margin-bottom:0}
.detail-section-title{font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.detail-section-title i{color:var(--primary);font-size:13px}
.detail-full{grid-column:1/-1}
.batch-bar{background:var(--primary);color:#fff;padding:10px 20px;border-radius:8px;display:none;align-items:center;justify-content:space-between;margin-bottom:12px;font-size:13px;animation:slideIn .2s ease}
.batch-bar.show{display:flex}
.review-content-box{padding:14px;background:var(--bg-hover);border-radius:8px;border:1px solid var(--border);margin-bottom:12px;line-height:1.7;font-size:13px}
.review-stars{display:flex;gap:2px;margin-bottom:8px}
.review-stars i{color:#f9ab00;font-size:14px}
.review-stars i.empty{color:var(--border)}
.review-meta{display:flex;gap:12px;font-size:12px;color:var(--text-secondary);margin-top:8px;align-items:center}
.type-badge{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px}
.type-badge.law{background:rgba(217,48,37,.1);color:var(--danger)}
.type-badge.policy{background:rgba(26,115,232,.1);color:var(--primary)}
.type-badge.standard{background:rgba(30,142,62,.1);color:var(--success)}
.type-badge.courseware{background:rgba(227,116,0,.1);color:var(--orange)}
.type-badge.share{background:rgba(124,77,255,.1);color:#7c4dff}
.type-badge.questionbank{background:rgba(0,172,193,.1);color:#00acc1}
.type-badge.review{background:rgba(103,58,183,.1);color:#673ab7}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- Page Title -->
<div class="page-title" style="font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:16px;">
    <i class="fas fa-user-check" style="color:var(--primary);"></i>
    <span>审核管理</span>
</div>

<!-- Stats -->
<div class="stat-row" id="statRow"></div>

<!-- Main Tabs -->
<div class="main-tabs" id="mainTabs">
  <div class="main-tab active" data-tab="law"><i class="fas fa-gavel"></i> 法规及案例审核 <span class="tab-count" id="count-law">0</span></div>
  <div class="main-tab" data-tab="policy"><i class="fas fa-file-contract"></i> 政策要求审核 <span class="tab-count" id="count-policy">0</span></div>
  <div class="main-tab" data-tab="standard"><i class="fas fa-ruler-combined"></i> 标准规范审核 <span class="tab-count" id="count-standard">0</span></div>
  <div class="main-tab" data-tab="courseware"><i class="fas fa-chalkboard-teacher"></i> 培训课件审核 <span class="tab-count" id="count-courseware">0</span></div>
  <div class="main-tab" data-tab="share"><i class="fas fa-lightbulb"></i> 知识分享审核 <span class="tab-count" id="count-share">0</span></div>
  <div class="main-tab" data-tab="questionbank"><i class="fas fa-database"></i> 题库审核 <span class="tab-count" id="count-questionbank">0</span></div>
  <div class="main-tab" data-tab="review"><i class="fas fa-comment-dots"></i> 评价审核 <span class="tab-count" id="count-review">0</span></div>
  <div class="main-tab" data-tab="flood"><i class="fas fa-cloud-showers-heavy"></i> 防汛防台专题库 <span class="tab-count" id="count-flood">0</span></div>
</div>

<!-- Tab Contents -->
<div class="tab-content active" id="tab-law"></div>
<div class="tab-content" id="tab-policy"></div>
<div class="tab-content" id="tab-standard"></div>
<div class="tab-content" id="tab-courseware"></div>
<div class="tab-content" id="tab-share"></div>
<div class="tab-content" id="tab-questionbank"></div>
<div class="tab-content" id="tab-review"></div>
<div class="tab-content" id="tab-flood"></div>

<!-- View Detail Modal -->
<div class="modal-overlay" id="modal-detail">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="detailTitle"></div>
      <button class="modal-close" onclick="closeModal('modal-detail')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal-edit">
  <div class="modal-box" style="max-width:900px">
    <div class="modal-header">
      <div class="modal-title"><i class="fas fa-edit" style="color:var(--primary)"></i> <span id="editTitle">在线编辑</span></div>
      <button class="modal-close" onclick="closeModal('modal-edit')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body" id="editBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-edit')">取消</button>
      <button class="btn btn-success" onclick="saveAndApprove()"><i class="fas fa-check"></i> 保存修改并审核通过</button>
    </div>
  </div>
</div>

<!-- Reject Reason Modal -->
<div class="modal-overlay" id="modal-reject">
  <div class="modal-box" style="max-width:520px">
    <div class="modal-header">
      <div class="modal-title"><i class="fas fa-undo" style="color:var(--danger)"></i> 退回修改</div>
      <button class="modal-close" onclick="closeModal('modal-reject')"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">退回原因 <span class="required">*</span></label>
        <textarea class="form-control" id="rejectReasonInput" rows="4" placeholder="请输入退回原因，将反馈给提交人修改后重新提交..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-reject')">取消</button>
      <button class="btn btn-danger" onclick="confirmReject()"><i class="fas fa-undo"></i> 确认退回</button>
    </div>
  </div>
</div>

  window.addEventListener('message',function(e){if(e.data&&e.data.type==='theme-change')document.documentElement.setAttribute('data-theme',e.data.theme)});
})();

var currentTab='law';
var currentItemId=null;
var currentItemType=null;
var pages={law:1,policy:1,standard:1,courseware:1,share:1,questionbank:1,review:1,flood:1};
var PAGE_SIZE=10;

// ===== Init =====
function init(){
  renderStats();
  Object.keys(DATA).forEach(function(k){renderTab(k)});
  // Tab switching
  document.querySelectorAll('.main-tab').forEach(function(t){
    t.addEventListener('click',function(){
      document.querySelectorAll('.main-tab').forEach(function(x){x.classList.remove('active')});
      document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active')});
      t.classList.add('active');
      currentTab=t.dataset.tab;
      document.getElementById('tab-'+currentTab).classList.add('active');
    });
  });
}

// ===== Stats =====
function renderStats(){
  var all=Object.keys(DATA).reduce(function(s,k){return s+DATA[k].length},0);
  var pending=Object.keys(DATA).reduce(function(s,k){return s+DATA[k].filter(function(d){return d.auditStatus==='pending'}).length},0);
  var approved=Object.keys(DATA).reduce(function(s,k){return s+DATA[k].filter(function(d){return d.auditStatus==='approved'}).length},0);
  var rejected=Object.keys(DATA).reduce(function(s,k){return s+DATA[k].filter(function(d){return d.auditStatus==='rejected'}).length},0);
  var revPending=DATA.review.filter(function(d){return d.auditStatus==='pending'}).length;
  document.getElementById('statRow').innerHTML=
    '<div class="stat-item"><div class="stat-icon blue"><i class="fas fa-clock"></i></div><div class="stat-info"><div class="stat-num">'+pending+'</div><div class="stat-label">待审核总数</div></div></div>'+
    '<div class="stat-item"><div class="stat-icon orange"><i class="fas fa-plus-circle"></i></div><div class="stat-info"><div class="stat-num">3</div><div class="stat-label">今日新增</div></div></div>'+
    '<div class="stat-item"><div class="stat-icon green"><i class="fas fa-check-circle"></i></div><div class="stat-info"><div class="stat-num">'+approved+'</div><div class="stat-label">已通过</div></div></div>'+
    '<div class="stat-item"><div class="stat-icon red"><i class="fas fa-times-circle"></i></div><div class="stat-info"><div class="stat-num">'+rejected+'</div><div class="stat-label">已退回</div></div></div>'+
    '<div class="stat-item"><div class="stat-icon purple"><i class="fas fa-comment-dots"></i></div><div class="stat-info"><div class="stat-num">'+revPending+'</div><div class="stat-label">待审评价</div></div></div>';
  // Update tab counts
  Object.keys(DATA).forEach(function(k){
    var c=document.getElementById('count-'+k);
    if(c)c.textContent=DATA[k].filter(function(d){return d.auditStatus==='pending'}).length;
  });
}

// ===== Tab Renderers =====
function renderTab(tab){
  var el=document.getElementById('tab-'+tab);
  var data=DATA[tab]||[];
  var pending=data.filter(function(d){return d.auditStatus==='pending'}).length;
  var filterHtml=buildFilter(tab);
  var tableHtml=buildTable(tab,data);
  el.innerHTML=
    '<div class="card"><div class="card-body">'+
      '<div class="filter-bar">'+
        '<input class="filter-input" style="flex:1;min-width:200px" id="search-'+tab+'" placeholder="搜索关键词..." onkeydown="if(event.key===\'Enter\')filterTab(\''+tab+'\')">'+
        filterHtml+
        '<button class="btn btn-primary btn-sm" onclick="filterTab(\''+tab+'\')"><i class="fas fa-search"></i> 搜索</button>'+
        '<button class="btn btn-outline btn-sm" onclick="filterTab(\''+tab+'\')"><i class="fas fa-redo"></i> 重置</button>'+
        (tab!=='review'?'<button class="btn btn-success btn-sm" onclick="batchAction(\''+tab+'\',\'approve\')"><i class="fas fa-check-double"></i> 批量通过</button><button class="btn btn-danger btn-sm" onclick="batchAction(\''+tab+'\',\'reject\')"><i class="fas fa-undo"></i> 批量退回</button>':'')+
      '</div>'+
    '</div></div>'+
    '<div class="card"><div style="overflow-x:auto">'+
      '<table class="data-table" id="table-'+tab+'">'+tableHtml+'</table>'+
    '</div></div>'+
    '<div class="pagination" id="pg-'+tab+'"></div>';
}

function buildFilter(tab){
  if(tab==='law')return '<select class="filter-select" id="f-subType-'+tab+'"><option value="">全部内容类型</option><option value="law">法律法规</option><option value="interpretation">法律解读</option><option value="case">相关案例</option></select><select class="filter-select" id="f-status-'+tab+'"><option value="">全部状态</option><option value="pending">待审核</option><option value="approved">已通过</option><option value="rejected">已退回</option></select>';
  if(tab==='policy')return '<select class="filter-select" id="f-subType-'+tab+'"><option value="">全部内容类型</option><option value="policy">政策要求</option><option value="interpretation">政策解读</option><option value="case">案例分析</option></select><select class="filter-select" id="f-status-'+tab+'"><option value="">全部状态</option><option value="pending">待审核</option><option value="approved">已通过</option><option value="rejected">已退回</option></select>';
  if(tab==='review')return '<select class="filter-select" id="f-parentType-'+tab+'"><option value="">全部关联类型</option><option value="interpretation">解读评价</option><option value="case">案例评价</option></select><select class="filter-select" id="f-status-'+tab+'"><option value="">全部状态</option><option value="pending">待审核</option><option value="approved">已通过</option></select>';
  if(tab==='flood')return '<select class="filter-select" id="f-subType-'+tab+'"><option value="">全部内容类型</option><option value="emergency">应急预案</option><option value="manual">防汛手册</option><option value="history">历史案例</option></select><select class="filter-select" id="f-status-'+tab+'"><option value="">全部状态</option><option value="pending">待审核</option><option value="approved">已通过</option><option value="rejected">已退回</option></select>';
  return '<select class="filter-select" id="f-status-'+tab+'"><option value="">全部状态</option><option value="pending">待审核</option><option value="approved">已通过</option><option value="rejected">已退回</option></select>';
}

function statusBadge(s){
  if(s==='pending')return '<span class="badge badge-pending"><i class="fas fa-clock"></i> 待审核</span>';
  if(s==='approved')return '<span class="badge badge-approved"><i class="fas fa-check"></i> 已通过</span>';
  return '<span class="badge badge-rejected"><i class="fas fa-times"></i> 已退回</span>';
}

function actionHtml(id,type,status){
  var h='<span class="action-link" onclick="openDetail(\''+id+'\',\''+type+'\')">查看</span>';
  if(status==='pending'&&type!=='review')h+='<span class="action-link" onclick="openEdit(\''+id+'\',\''+type+'\')">编辑</span>';
  if(status==='pending')h+='<span class="action-link" onclick="approveItem(\''+id+'\',\''+type+'\')" style="color:var(--success)">通过</span><span class="action-link del" onclick="rejectItem(\''+id+'\',\''+type+'\')">退回</span>';
  if(status==='rejected'&&type!=='review')h+='<span class="action-link" onclick="openDetail(\''+id+'\',\''+type+'\')">原因</span>';
  return h;
}

    standard:'<th style="width:36px"><input type="checkbox" onchange="toggleAll(\''+tab+'\',this)"></th><th>序号</th><th>标准名称</th><th>标准编号</th><th>标准类型</th><th>发布机关</th><th>提交人</th><th>提交时间</th><th>状态</th><th>操作</th>',
    courseware:'<th style="width:36px"><input type="checkbox" onchange="toggleAll(\''+tab+'\',this)"></th><th>序号</th><th>课件名称</th><th>课件类型</th><th>专业领域</th><th>讲师</th><th>提交人</th><th>提交时间</th><th>状态</th><th>操作</th>',
    share:'<th style="width:36px"><input type="checkbox" onchange="toggleAll(\''+tab+'\',this)"></th><th>序号</th><th>分享标题</th><th>分享类型</th><th>发布人</th><th>部门</th><th>提交时间</th><th>状态</th><th>操作</th>',
    questionbank:'<th style="width:36px"><input type="checkbox" onchange="toggleAll(\''+tab+'\',this)"></th><th>序号</th><th>题库名称</th><th>涉及领域</th><th>题目数</th><th>难度</th><th>提交人</th><th>提交时间</th><th>状态</th><th>操作</th>',

    flood:'<th style="width:36px"><input type="checkbox" onchange="toggleAll(\''+tab+'\',this)"></th><th>序号</th><th>名称/标题</th><th>内容类型</th><th>业务领域</th><th>提交人</th><th>提交时间</th><th>状态</th><th>操作</th>'};
  thead='<thead><tr>'+heads[tab]+'</tr></thead>';
  // Rows
  if(tab==='law')tbody=page.map(function(d,i){var subBadge=d.subType==='interpretation'?'<span class="type-badge law" style="background:rgba(124,77,255,.1);color:#7c4dff">法律解读</span>':d.subType==='case'?'<span class="type-badge law" style="background:rgba(227,116,0,.1);color:var(--orange)">相关案例</span>':'<span class="type-badge law">法律法规</span>';return '<tr><td><input type="checkbox" value="'+d.id+'"></td><td>'+(start+i+1)+'</td><td class="link-text" onclick="openDetail(\''+d.id+'\',\'law\')">'+d.title+'</td><td>'+subBadge+'</td><td>'+d.domain+'</td><td>'+d.submitUser+'</td><td>'+d.submitDate+'</td><td>'+statusBadge(d.auditStatus)+'</td><td>'+actionHtml(d.id,'law',d.auditStatus)+'</td></tr>'}).join('');
  else if(tab==='policy')tbody=page.map(function(d,i){var st=d.subType||'policy';var stLabel=st==='interpretation'?'政策解读':st==='case'?'案例分析':'政策要求';var stBadge=st==='interpretation'?'<span class="type-badge policy" style="background:rgba(124,77,255,.1);color:#7c4dff">'+stLabel+'</span>':st==='case'?'<span class="type-badge policy" style="background:rgba(227,116,0,.1);color:var(--orange)">'+stLabel+'</span>':'<span class="type-badge policy">'+stLabel+'</span>';var title=st==='policy'?d.name:d.title;var domain=st==='policy'?d.domain:(st==='case'?d.domain:d.interpType);return '<tr><td><input type="checkbox" value="'+d.id+'"></td><td>'+(start+i+1)+'</td><td class="link-text" onclick="openDetail(\''+d.id+'\',\'policy\')">'+title+'</td><td>'+stBadge+'</td><td>'+domain+'</td><td>'+d.submitUser+'</td><td>'+d.submitDate+'</td><td>'+statusBadge(d.auditStatus)+'</td><td>'+actionHtml(d.id,'policy',d.auditStatus)+'</td></tr>'}).join('');
  else if(tab==='standard')tbody=page.map(function(d,i){return '<tr><td><input type="checkbox" value="'+d.id+'"></td><td>'+(start+i+1)+'</td><td class="link-text" onclick="openDetail(\''+d.id+'\',\'standard\')">'+d.name+'</td><td>'+d.code+'</td><td><span class="type-badge standard">'+d.type+'</span></td><td>'+d.organ+'</td><td>'+d.submitUser+'</td><td>'+d.submitDate+'</td><td>'+statusBadge(d.auditStatus)+'</td><td>'+actionHtml(d.id,'standard',d.auditStatus)+'</td></tr>'}).join('');

  else if(tab==='questionbank')tbody=page.map(function(d,i){var domainStr=Array.isArray(d.domains)?d.domains.join('、'):d.domains;return '<tr><td><input type="checkbox" value="'+d.id+'"></td><td>'+(start+i+1)+'</td><td class="link-text" onclick="openDetail(\''+d.id+'\',\'questionbank\')">'+d.qbName+'</td><td><span class="type-badge questionbank">'+domainStr+'</span></td><td>'+d.totalQ+'题</td><td>'+d.difficulty+'</td><td>'+d.submitUser+'</td><td>'+d.submitDate+'</td><td>'+statusBadge(d.auditStatus)+'</td><td>'+actionHtml(d.id,'questionbank',d.auditStatus)+'</td></tr>'}).join('');

function pageBtns(cur,total,tab){var h='';for(var i=1;i<=total;i++)h+='<button class="page-btn'+(i===cur?' active':'')+'" onclick="goPage(\''+tab+'\','+i+')">'+i+'</button>';return h}
function goPage(tab,p){pages[tab]=p;renderTab(tab)}
function toggleAll(tab,el){document.querySelectorAll('#table-'+tab+' tbody input[type="checkbox"]').forEach(function(c){c.checked=el.checked})}

function starsHtml(r){var s='';for(var i=1;i<=5;i++)s+='<i class="fas fa-star'+(i>r?' empty':'')+'"></i>';return '<span class="review-stars">'+s+'</span>'}

// ===== Filter =====
function filterTab(tab){
  var kw=(document.getElementById('search-'+tab)||{}).value||'';
  kw=kw.toLowerCase();
  var statusEl=document.getElementById('f-status-'+tab);
  var statusVal=statusEl?statusEl.value:'';
  var data=DATA[tab].slice();
  if(kw)data=data.filter(function(d){return JSON.stringify(d).toLowerCase().indexOf(kw)!==-1});
  if(statusVal)data=data.filter(function(d){return d.auditStatus===statusVal});
  // type-specific filters
  if(tab==='law'){var st=(document.getElementById('f-subType-'+tab)||{}).value||'';if(st)data=data.filter(function(d){return d.subType===st})}
  if(tab==='policy'){var st=(document.getElementById('f-subType-'+tab)||{}).value||'';if(st)data=data.filter(function(d){return (d.subType||'policy')===st})}
  if(tab==='flood'){var st=(document.getElementById('f-subType-'+tab)||{}).value||'';if(st)data=data.filter(function(d){return d.subType===st})}
  if(tab==='review'){var pt=(document.getElementById('f-parentType-'+tab)||{}).value||'';if(pt)data=data.filter(function(d){return d.parentType===pt})}
  pages[tab]=1;
  var table=document.getElementById('table-'+tab);
  if(table){var p=1,start=0,end=Math.min(PAGE_SIZE,data.length);var page=data.slice(start,end);table.outerHTML='<table class="data-table" id="table-'+tab+'">'+buildTable(tab,data)+'</table>'}
}

// ===== Detail Modal =====
function findItem(id,type){return DATA[type]?DATA[type].find(function(d){return d.id===id}):null}

function openDetail(id,type){
  var item=findItem(id,type);
  if(!item)return;
  currentItemId=id;currentItemType=type;
  var typeLabel={law:'法规及案例',policy:'政策要求',standard:'标准规范',courseware:'培训课件',share:'知识分享',questionbank:'测试题库',review:'评价信息',flood:'防汛防台专题'}[type]||'';
  document.getElementById('detailTitle').innerHTML='<i class="fas fa-eye" style="color:var(--primary)"></i> 审核'+typeLabel+'详情';
  document.getElementById('detailBody').innerHTML=renderDetailFields(item,type);
  // Footer
  var footer=document.getElementById('detailFooter');
  footer.innerHTML='';
  if(item.auditStatus==='pending'){
    if(type!=='review')footer.innerHTML='<button class="btn btn-outline" onclick="closeModal(\'modal-detail\')">关闭</button><button class="btn btn-warning" onclick="closeModal(\'modal-detail\');openEdit(\''+id+'\',\''+type+'\')"><i class="fas fa-edit"></i> 在线编辑</button><button class="btn btn-danger" onclick="closeModal(\'modal-detail\');rejectItem(\''+id+'\',\''+type+'\')"><i class="fas fa-undo"></i> 退回修改</button><button class="btn btn-success" onclick="approveItem(\''+id+'\',\''+type+'\')"><i class="fas fa-check"></i> 审核通过</button>';
    else footer.innerHTML='<button class="btn btn-outline" onclick="closeModal(\'modal-detail\')">关闭</button><button class="btn btn-danger" onclick="closeModal(\'modal-detail\');rejectItem(\''+id+'\',\''+type+'\')"><i class="fas fa-trash"></i> 删除评价</button><button class="btn btn-success" onclick="approveItem(\''+id+'\',\''+type+'\')"><i class="fas fa-check"></i> 审核通过</button>';
  }else{
    footer.innerHTML='<button class="btn btn-outline" onclick="closeModal(\'modal-detail\')">关闭</button>';
  }
  openModal('modal-detail');
}

function openEdit(id,type){
  var item=findItem(id,type);
  if(!item)return;
  currentItemId=id;currentItemType=type;
  var typeLabel={law:'法规及案例',policy:'政策要求',standard:'标准规范',courseware:'培训课件',share:'知识分享',questionbank:'测试题库',flood:'防汛防台专题'}[type]||'';
  document.getElementById('editTitle').textContent='编辑'+typeLabel+' - 在线修改元数据';
  document.getElementById('editBody').innerHTML=renderEditForm(item,type);
  openModal('modal-edit');
}

function ft(label,id,val,ph){return '<div class="form-group" style="grid-column:1/-1"><label class="form-label">'+label+'</label><textarea class="form-control" id="'+id+'" rows="3" placeholder="'+(ph||'')+'">'+(val||'')+'</textarea></div>'}
function esc(s){return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;')}

// ===== Approve / Reject =====
function approveItem(id,type){
  var item=findItem(id,type);if(!item)return;
  item.auditStatus='approved';item.auditUser='当前管理员';item.auditDate='2026-06-11';
  closeModal('modal-detail');closeModal('modal-edit');
  renderStats();renderTab(type);
  showToast('审核通过，内容已发布至知识库');
}

function rejectItem(id,type){
  currentItemId=id;currentItemType=type;
  document.getElementById('rejectReasonInput').value='';
  openModal('modal-reject');
}

function confirmReject(){
  var reason=document.getElementById('rejectReasonInput').value.trim();
  if(!reason){alert('请输入退回原因');return}
  var item=findItem(currentItemId,currentItemType);
  if(!item)return;
  item.auditStatus='rejected';item.auditUser='当前管理员';item.auditDate='2026-06-11';item.rejectReason=reason;
  closeModal('modal-reject');closeModal('modal-detail');
  renderStats();renderTab(currentItemType);
  showToast('已退回修改，原因已反馈给提交人');
}

function saveAndApprove(){
  var item=findItem(currentItemId,currentItemType);
  if(!item)return;
  // Collect edited fields back to item
  collectEditFields(item,currentItemType);
  item.auditStatus='approved';item.auditUser='当前管理员';item.auditDate='2026-06-11';
  closeModal('modal-edit');
  renderStats();renderTab(currentItemType);
  showToast('修改已保存并审核通过');
}

// ===== Batch Operations =====
function batchAction(tab,action){
  var checked=document.querySelectorAll('#table-'+tab+' tbody input[type="checkbox"]:checked');
  if(!checked.length){alert('请先勾选要操作的项');return}
  if(action==='approve'){
    if(!confirm('确认批量通过选中的 '+checked.length+' 项？'))return;
    checked.forEach(function(c){var item=findItem(c.value,tab);if(item&&item.auditStatus==='pending'){item.auditStatus='approved';item.auditUser='当前管理员';item.auditDate='2026-06-11'}});
    renderStats();renderTab(tab);showToast('已批量通过 '+checked.length+' 项');
  }else{
    currentItemType=tab;
    document.getElementById('rejectReasonInput').value='';
    // Store checked IDs for batch reject
    window._batchRejectIds=Array.from(checked).map(function(c){return c.value});
    openModal('modal-reject');
  }
}

confirmReject=function(){
  var reason=document.getElementById('rejectReasonInput').value.trim();
  if(!reason){alert('请输入退回原因');return}
  if(window._batchRejectIds&&window._batchRejectIds.length>1){
    window._batchRejectIds.forEach(function(id){var item=findItem(id,currentItemType);if(item&&item.auditStatus==='pending'){item.auditStatus='rejected';item.auditUser='当前管理员';item.auditDate='2026-06-11';item.rejectReason=reason}});
    var cnt=window._batchRejectIds.length;
    window._batchRejectIds=null;
    closeModal('modal-reject');
    renderStats();renderTab(currentItemType);
    showToast('已批量退回 '+cnt+' 项');
  }else{
    var item=findItem(currentItemId,currentItemType);
    if(!item)return;
    item.auditStatus='rejected';item.auditUser='当前管理员';item.auditDate='2026-06-11';item.rejectReason=reason;
    closeModal('modal-reject');closeModal('modal-detail');
    renderStats();renderTab(currentItemType);
    showToast('已退回修改，原因已反馈给提交人');
  }
};

// ===== Modal Helpers =====
function openModal(id){document.getElementById(id).classList.add('open');document.body.style.overflow='hidden'}
function closeModal(id){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}
document.querySelectorAll('.modal-overlay').forEach(function(m){
  m.addEventListener('click',function(e){if(e.target===m){m.classList.remove('open');document.body.style.overflow=''}});
});

// ===== Toast =====
function showToast(msg){
  var existing=document.querySelector('.toast-msg');if(existing)existing.remove();
  var toast=document.createElement('div');toast.className='toast-msg';
  toast.style.cssText='position:fixed;top:24px;right:24px;z-index:99999;background:var(--success);color:#fff;padding:14px 24px;border-radius:8px;font-size:14px;box-shadow:0 4px 16px rgba(0,0,0,.15);display:flex;align-items:center;gap:8px;animation:slideIn .3s ease';
  toast.innerHTML='<i class="fas fa-check-circle"></i> '+msg;
  document.body.appendChild(toast);
  setTimeout(function(){toast.style.opacity='0';toast.style.transition='opacity .3s';setTimeout(function(){toast.remove()},300)},3000);
}

// ===== Start =====
init();
</script>
