<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考核评估标准配置</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --primary-light: #e8f0fe;
            --secondary: #0097a7;
            --danger: #d93025;
            --warning: #e37400;
            --success: #1e8e3e;
            --bg-dark: #f0f2f5;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #e8eaed;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --border: #dadce0;
            --shadow: rgba(0,0,0,0.08);
            --radius: 8px;
        }
        :root[data-theme="dark"] {
            --primary: #1e6fdb;
            --primary-dark: #1557b0;
            --primary-light: #e8f1fd;
            --secondary: #00b4d8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --bg-dark: #0a1628;
            --bg-header: #0d1b2a;
            --bg-card: #112240;
            --bg-hover: #1a2f4a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #1e3a5f;
            --shadow: rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* 顶部操作栏 */
        .top-bar {
            height: 56px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover {
            background: var(--bg-hover);
            border-color: var(--primary);
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-success {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }
        .btn-success:hover {
            opacity: 0.9;
        }
        .btn-warning {
            background: var(--warning);
            color: #fff;
            border-color: var(--warning);
        }
        .btn-warning:hover {
            opacity: 0.9;
        }
        .btn-info {
            background: var(--secondary);
            color: #fff;
            border-color: var(--secondary);
        }
        .btn-info:hover {
            opacity: 0.9;
        }

        /* 搜索栏 */
        .search-bar {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-input {
            width: 260px;
            padding: 8px 12px 8px 36px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            position: relative;
        }
        .search-input:focus {
            border-color: var(--primary);
        }
        .search-wrapper {
            position: relative;
        }
        .search-wrapper i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 13px;
        }
        .filter-select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            cursor: pointer;
        }
        .filter-select:focus {
            border-color: var(--primary);
        }

        /* 主体区域 */
        .main-container {
            height: calc(100vh - 56px);
            overflow: auto;
            padding: 20px;
        }
        .main-container::-webkit-scrollbar { width: 6px; }
        .main-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* 统计卡片 */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.25s;
        }
        .stat-card:hover {
            box-shadow: 0 4px 12px var(--shadow);
            transform: translateY(-2px);
        }
        .stat-icon {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .stat-icon.blue { background: rgba(26, 115, 232, 0.1); color: var(--primary); }
        .stat-icon.green { background: rgba(30, 142, 62, 0.1); color: var(--success); }
        .stat-icon.orange { background: rgba(227, 116, 0, 0.1); color: var(--warning); }
        .stat-icon.purple { background: rgba(107, 70, 193, 0.1); color: #6b46c1; }
        .stat-info { flex: 1; }
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* 数据表格 */
        .data-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .data-card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .data-card-header h3 {
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        .data-table td {
            padding: 14px 16px;
            font-size: 13px;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
        }
        .data-table tr:hover td {
            background: var(--bg-hover);
        }
        .data-table tr:last-child td {
            border-bottom: none;
        }

        /* 状态标签 */
        .status-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-tag.enabled {
            background: rgba(30, 142, 62, 0.1);
            color: var(--success);
        }
        .status-tag.disabled {
            background: rgba(217, 48, 37, 0.1);
            color: var(--danger);
        }
        .status-tag.draft {
            background: rgba(227, 116, 0, 0.1);
            color: var(--warning);
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
        }
        .status-dot.enabled { background: var(--success); }
        .status-dot.disabled { background: var(--danger); }
        .status-dot.draft { background: var(--warning); }

        /* 操作按钮组 */
        .action-group {
            display: flex;
            gap: 6px;
        }
        .action-btn {
            width: 28px; height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
        }
        .action-btn:hover {
            background: var(--bg-hover);
            color: var(--primary);
            border-color: var(--primary);
        }
        .action-btn.view:hover { color: var(--primary); border-color: var(--primary); }
        .action-btn.compare:hover { color: var(--warning); border-color: var(--warning); }
        .action-btn.update:hover { color: var(--success); border-color: var(--success); }

        /* 版本号样式 */
        .version-code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            background: rgba(26, 115, 232, 0.08);
            padding: 2px 8px;
            border-radius: 4px;
        }

        /* 分页 */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }
        .page-btn {
            min-width: 32px;
            height: 32px;
            padding: 0 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .page-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        .page-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .page-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .page-info {
            font-size: 13px;
            color: var(--text-secondary);
            margin-right: 8px;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            gap: 12px;
        }
        .empty-state i {
            font-size: 48px;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 14px;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: var(--bg-card);
            border-radius: 12px;
            width: 700px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
        }
        .modal-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: var(--bg-hover);
            color: var(--danger);
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }
        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* 对比视图 */
        .diff-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .diff-panel {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .diff-panel-header {
            padding: 10px 16px;
            background: var(--bg-hover);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .diff-panel-body {
            padding: 16px;
            font-size: 13px;
            line-height: 1.8;
        }
        .diff-added {
            background: rgba(30, 142, 62, 0.1);
            color: var(--success);
            padding: 2px 4px;
            border-radius: 3px;
        }
        .diff-removed {
            background: rgba(217, 48, 37, 0.1);
            color: var(--danger);
            padding: 2px 4px;
            border-radius: 3px;
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <!-- 顶部操作栏 -->
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="btn btn-primary" onclick="goToDetail()">
                <i class="fas fa-plus"></i> 新增标准
            </button>
            <button class="btn" onclick="batchOperation()">
                <i class="fas fa-cogs"></i> 批量操作
            </button>
        </div>
        <div class="search-bar">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" class="search-input" placeholder="搜索版本名称、版本号..." id="searchInput" oninput="filterVersions()">
            </div>
            <select class="filter-select" id="statusFilter" onchange="filterVersions()">
                <option value="">全部状态</option>
                <option value="enabled">已启用</option>
                <option value="disabled">已停用</option>
                <option value="draft">草稿</option>
            </select>
        </div>
    </div>

    <!-- 主体区域 -->
    <div class="main-container">
        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-layer-group"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="statTotal">8</div>
                    <div class="stat-label">版本总数</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="statEnabled">3</div>
                    <div class="stat-label">已启用</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-file-alt"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="statDraft">2</div>
                    <div class="stat-label">草稿</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon purple"><i class="fas fa-history"></i></div>
                <div class="stat-info">
                    <div class="stat-value" id="statThisYear">5</div>
                    <div class="stat-label">本年度新增</div>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <div class="data-card">
            <div class="data-card-header">
                <h3><i class="fas fa-list-alt" style="color: var(--primary);"></i> 指标版本列表</h3>
                <span style="font-size: 12px; color: var(--text-secondary);">共 <strong id="totalCount">8</strong> 条记录</span>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th style="width: 40px;"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                        <th>版本名称</th>
                        <th>版本号</th>
                        <th>创建时间</th>
                        <th>创建人</th>
                        <th>状态</th>
                        <th>指标数量</th>
                        <th style="width: 180px; text-align: center;">操作</th>
                    </tr>
                </thead>
                <tbody id="versionTableBody">
                    <!-- 数据由JS渲染 -->
                </tbody>
            </table>
            <div class="pagination" id="pagination">
                <span class="page-info">共 8 条，每页 10 条</span>
                <button class="page-btn disabled"><i class="fas fa-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn disabled"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <!-- 查看弹窗 -->
    <div class="modal-overlay" id="viewModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-eye" style="color: var(--primary);"></i> 版本详情</h3>
                <div class="modal-close" onclick="closeModal('viewModal')">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="modal-body" id="viewModalBody">
                <!-- 动态内容 -->
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('viewModal')">关闭</button>
                <button class="btn btn-primary" onclick="goToDetail()">
                    <i class="fas fa-edit"></i> 进入详细配置
                </button>
            </div>
        </div>
    </div>

    <!-- 对比弹窗 -->
    <div class="modal-overlay" id="compareModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-exchange-alt" style="color: var(--warning);"></i> 版本对比</h3>
                <div class="modal-close" onclick="closeModal('compareModal')">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="modal-body">
                <div class="diff-view" id="compareContent">
                    <!-- 动态内容 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('compareModal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- 更新弹窗 -->
    <div class="modal-overlay" id="updateModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-arrow-up" style="color: var(--success);"></i> 更新版本</h3>
                <div class="modal-close" onclick="closeModal('updateModal')">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="modal-body">
                <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">
                    基于当前版本创建新版本，原有版本将自动归档。
                </p>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px;">新版本名称</label>
                    <input type="text" class="form-control" id="newVersionName" placeholder="请输入新版本名称" style="width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-dark); color: var(--text-primary); font-size: 13px; outline: none;">
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 6px;">更新说明</label>
                    <textarea class="form-control" id="updateDesc" rows="3" placeholder="请输入更新说明..." style="width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-dark); color: var(--text-primary); font-size: 13px; outline: none; resize: vertical; font-family: inherit;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal('updateModal')">取消</button>
                <button class="btn btn-success" onclick="confirmUpdate()">
                    <i class="fas fa-check"></i> 确认更新
                </button>
            </div>
        </div>
    </div>

    <script>
        // ========== 版本数据 ==========
        let versionData = [
            {
                id: 'V2026_Rev3',
                name: '2026年度考核评估标准（第三版）',

            {
                id: 'V2025_Rev1',
                name: '2025年度考核评估标准（第一版）',
                version: 'V2025_Rev1',

            },
            {

                version: 'V2026_Draft1',

                creator: '张管理员',
                status: 'draft',
                indicatorCount: 26,
                description: '草案版本，新增第三方服务机构考核指标，待评审。'
            },
            {
                id: 'V2026_Draft2',
                name: '2026年度考核评估标准（草案二）',
                version: 'V2026_Draft2',
                createTime: '2026-05-28 15:40:00',
                creator: '李管理员',
                status: 'draft',
                indicatorCount: 25,
                description: '草案版本，优化房屋安全管理指标权重，待评审。'
            },
            {
                id: 'V2024_Final',
                name: '2024年度考核评估标准（终版）',
                version: 'V2024_Final',
                createTime: '2024-12-01 09:00:00',
                creator: '赵管理员',
                status: 'disabled',
                indicatorCount: 15,
                description: '2024年度终版，已归档。'
            }
        ];

        let currentViewId = null;
        let currentUpdateId = null;

        // ========== 初始化 ==========
        function init() {
            renderTable(versionData);
            updateStats();
        }

        // ========== 渲染表格 ==========
        function renderTable(data) {
            const tbody = document.getElementById('versionTableBody');
            const totalCount = document.getElementById('totalCount');
            
            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>暂无数据</p>
                            </div>
                        </td>
                    </tr>
                `;
                totalCount.textContent = '0';
                return;
            }

            totalCount.textContent = data.length;
            
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><input type="checkbox" class="row-checkbox" data-id="${item.id}"></td>
                    <td>
                        <div style="font-weight: 600;">${item.name}</div>
                        <div style="font-size: 11px; color: var(--text-secondary); margin-top: 2px;">${item.description.substring(0, 30)}${item.description.length > 30 ? '...' : ''}</div>
                    </td>
                    <td><span class="version-code">${item.version}</span></td>
                    <td>${item.createTime}</td>
                    <td><i class="fas fa-user" style="font-size: 11px; color: var(--text-secondary); margin-right: 4px;"></i>${item.creator}</td>
                    <td>${renderStatusTag(item.status)}</td>
                    <td><span class="tree-badge" style="padding: 2px 8px; background: rgba(26, 115, 232, 0.1); border-radius: 10px; font-size: 12px; color: var(--primary);">${item.indicatorCount} 个</span></td>
                    <td>
                        <div class="action-group" style="justify-content: center; gap: 12px;">
                            <a href="javascript:void(0);" style="color: var(--primary); font-size: 13px; text-decoration: none;" onclick="goToDetail()">查看</a>
                            <a href="javascript:void(0);" style="color: var(--primary); font-size: 13px; text-decoration: none;" onclick="compareVersion('${item.id}')">对比</a>
                            <a href="javascript:void(0);" style="color: var(--danger); font-size: 13px; text-decoration: none;" onclick="updateVersion('${item.id}')">更新</a>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderStatusTag(status) {
            const statusMap = {
                'enabled': { text: '已启用', class: 'enabled' },
                'disabled': { text: '已停用', class: 'disabled' },
                'draft': { text: '草稿', class: 'draft' }
            };
            const s = statusMap[status] || statusMap['draft'];
            return `<span class="status-tag ${s.class}"><span class="status-dot ${s.class}"></span>${s.text}</span>`;
        }

        // ========== 更新统计 ==========
        function updateStats() {
            const total = versionData.length;
            const enabled = versionData.filter(v => v.status === 'enabled').length;
            const draft = versionData.filter(v => v.status === 'draft').length;
            const thisYear = versionData.filter(v => v.createTime.startsWith('2026')).length;
            
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statEnabled').textContent = enabled;
            document.getElementById('statDraft').textContent = draft;
            document.getElementById('statThisYear').textContent = thisYear;
        }

        // ========== 筛选 ==========
        function filterVersions() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const status = document.getElementById('statusFilter').value;
            
            let filtered = versionData.filter(item => {
                const matchKeyword = !keyword || 
                    item.name.toLowerCase().includes(keyword) || 
                    item.version.toLowerCase().includes(keyword);
                const matchStatus = !status || item.status === status;
                return matchKeyword && matchStatus;
            });
            
            renderTable(filtered);
        }

        // ========== 操作 ==========
        function viewVersion(id) {
            currentViewId = id;
            const item = versionData.find(v => v.id === id);
            if (!item) return;
            
            document.getElementById('viewModalBody').innerHTML = `
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px;">
                    <div style="background: var(--bg-dark); padding: 12px 16px; border-radius: var(--radius);">
                        <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;">版本名称</div>
                        <div style="font-size: 14px; font-weight: 600;">${item.name}</div>
                    </div>
                    <div style="background: var(--bg-dark); padding: 12px 16px; border-radius: var(--radius);">
                        <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;">版本号</div>
                        <div style="font-size: 14px; font-weight: 600; color: var(--primary);">${item.version}</div>
                    </div>
                    <div style="background: var(--bg-dark); padding: 12px 16px; border-radius: var(--radius);">
                        <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;">创建时间</div>
                        <div style="font-size: 14px;">${item.createTime}</div>
                    </div>
                    <div style="background: var(--bg-dark); padding: 12px 16px; border-radius: var(--radius);">
                        <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;">创建人</div>
                        <div style="font-size: 14px;"><i class="fas fa-user" style="margin-right: 4px;"></i>${item.creator}</div>
                    </div>
                </div>
                <div style="margin-bottom: 16px;">
                    <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 6px;">状态</div>
                    <div>${renderStatusTag(item.status)}</div>
                </div>
                <div style="margin-bottom: 16px;">
                    <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 6px;">指标数量</div>
                    <div style="font-size: 14px; font-weight: 600;">${item.indicatorCount} 个考核指标</div>
                </div>
                <div>
                    <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 6px;">版本说明</div>
                    <div style="background: var(--bg-dark); padding: 12px 16px; border-radius: var(--radius); font-size: 13px; line-height: 1.6;">${item.description}</div>
                </div>
            `;
            
            openModal('viewModal');
        }

        function compareVersion(id) {
            const item = versionData.find(v => v.id === id);
            const current = versionData.find(v => v.status === 'enabled');
            if (!item || !current) return;
            
            document.getElementById('compareContent').innerHTML = `
                <div class="diff-panel">
                    <div class="diff-panel-header">
                        <span><i class="fas fa-check-circle" style="color: var(--success);"></i> 当前生效版本</span>
                        <span class="version-code">${current.version}</span>
                    </div>
                    <div class="diff-panel-body">
                        <div style="margin-bottom: 12px;"><strong>版本名称：</strong>${current.name}</div>
                        <div style="margin-bottom: 12px;"><strong>指标数量：</strong>${current.indicatorCount} 个</div>
                        <div style="margin-bottom: 12px;"><strong>创建时间：</strong>${current.createTime}</div>
                        <div><strong>版本说明：</strong>${current.description}</div>
                    </div>
                </div>
                <div class="diff-panel">
                    <div class="diff-panel-header">
                        <span><i class="fas fa-history" style="color: var(--warning);"></i> 对比版本</span>
                        <span class="version-code">${item.version}</span>
                    </div>
                    <div class="diff-panel-body">
                        <div style="margin-bottom: 12px;"><strong>版本名称：</strong>${item.name}</div>
                        <div style="margin-bottom: 12px;"><strong>指标数量：</strong>${item.indicatorCount} 个 ${item.indicatorCount !== current.indicatorCount ? `<span class="diff-${item.indicatorCount > current.indicatorCount ? 'added' : 'removed'}">${item.indicatorCount > current.indicatorCount ? '+' : ''}${item.indicatorCount - current.indicatorCount}</span>` : ''}</div>
                        <div style="margin-bottom: 12px;"><strong>创建时间：</strong>${item.createTime}</div>
                        <div><strong>版本说明：</strong>${item.description}</div>
                    </div>
                </div>
            `;
            
            openModal('compareModal');
        }

        function updateVersion(id) {
            currentUpdateId = id;
            const item = versionData.find(v => v.id === id);
            if (!item) return;
            
            document.getElementById('newVersionName').value = item.name + '（更新版）';
            document.getElementById('updateDesc').value = '';
            openModal('updateModal');
        }

        function confirmUpdate() {
            const name = document.getElementById('newVersionName').value.trim();
            const desc = document.getElementById('updateDesc').value.trim();
            
            if (!name) {
                alert('请输入新版本名称');
                return;
            }
            
            const currentItem = versionData.find(v => v.id === currentUpdateId);
            if (!currentItem) return;
            
            // 将当前版本停用
            if (currentItem.status === 'enabled') {
                currentItem.status = 'disabled';
            }
            
            // 创建新版本
            const now = new Date();
            const dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            const timeStr = dateStr + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') + ':00';
            const newVersion = 'V' + now.getFullYear() + '_Rev' + (versionData.filter(v => v.createTime.startsWith(String(now.getFullYear()))).length + 1);
            
            const newItem = {
                id: newVersion,
                name: name,
                version: newVersion,
                createTime: timeStr,
                creator: '当前用户',
                status: 'enabled',
                indicatorCount: currentItem.indicatorCount,
                description: desc || '基于 ' + currentItem.version + ' 更新'
            };
            
            versionData.unshift(newItem);
            renderTable(versionData);
            updateStats();
            closeModal('updateModal');
            alert('版本更新成功！');
        }

        function createNewVersion() {
            const now = new Date();
            const dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
            const timeStr = dateStr + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') + ':00';
            const newVersion = 'V' + now.getFullYear() + '_Rev' + (versionData.filter(v => v.createTime.startsWith(String(now.getFullYear()))).length + 1);
            
            const newItem = {
                id: newVersion,
                name: now.getFullYear() + '年度考核评估标准（新版本）',
                version: newVersion,
                createTime: timeStr,
                creator: '当前用户',
                status: 'draft',
                indicatorCount: 0,
                description: '新建版本，待配置指标内容'
            };
            
            versionData.unshift(newItem);
            renderTable(versionData);
            updateStats();
            alert('新版本创建成功！');
        }

        function goToDetail() {
            // 跳转到详细配置页面
            window.location.href = 'insp-standard-xq.html';
        }

        function batchOperation() {
            alert('批量操作功能：支持批量启用、停用、删除版本');
        }

        // ========== 弹窗控制 ==========
        function openModal(id) {
            document.getElementById(id).classList.add('open');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('open');
        }

        // ========== 全选 ==========
        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            document.querySelectorAll('.row-checkbox').forEach(cb => cb.checked = checked);
        }

        // ========== 主题同步 ==========
        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'setTheme') {
                document.documentElement.setAttribute('data-theme', event.data.theme);
            }
        });

        // ========== 启动 ==========
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
