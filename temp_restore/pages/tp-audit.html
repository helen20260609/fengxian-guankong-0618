<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>材料审核中心 - 第三方服务机构</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="tp-common.css">
<script src="../js/third-party-data.js"></script>
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

/* 统计卡片 */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.stat-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: all 0.3s;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
.stat-icon {
    width: 48px; height: 48px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #fff;
    flex-shrink: 0;
}
.stat-icon.blue { background: var(--primary); }
.stat-icon.green { background: var(--success); }
.stat-icon.purple { background: #7c4dff; }
.stat-icon.orange { background: var(--warning); }
.stat-info { display: flex; flex-direction: column; }
.stat-value { font-size: 22px; font-weight: 700; color: var(--text-primary); }
.stat-label { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

/* 表单卡片 */
.form-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 20px;
    overflow: hidden;
}
.form-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--header-bg);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.form-title { font-size: 15px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }

/* Tab 标签 */
.tab-bar { display: flex; gap: 24px; padding: 0 20px; border-bottom: 1px solid var(--border); }
.tab-item {
    padding: 12px 4px;
    font-size: 14px;
    color: var(--text-secondary);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
}
.tab-item:hover { color: var(--primary); }
.tab-item.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.tab-badge {
    padding: 1px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
}
.tab-badge.red { background: rgba(217,48,37,0.12); color: var(--danger); }
.tab-badge.orange { background: rgba(227,116,0,0.12); color: var(--warning); }

/* 表格 */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th, .data-table td { padding: 12px 20px; text-align: left; font-size: 13px; }
.data-table th { color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border); }
.data-table td { color: var(--text-primary); border-bottom: 1px solid var(--border); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--bg-hover); }

/* 标签 */
.tag {
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    display: inline-block;
}
.tag-blue { background: var(--primary-light); color: var(--primary); }
.tag-green { background: rgba(30,142,62,0.12); color: var(--success); }
.tag-grey { background: var(--bg-hover); color: var(--text-secondary); }

/* 按钮 */
.btn {
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-family: inherit;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* 筛选栏 */
.filter-bar { display: flex; align-items: center; gap: 10px; padding: 16px 20px; }
.filter-bar select, .filter-bar input {
    padding: 7px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    font-family: inherit;
}
.filter-bar input { width: 160px; }
.filter-bar input::placeholder { color: var(--text-secondary); }

/* 链接 */
.link { color: var(--primary); text-decoration: none; font-size: 13px; }
.link:hover { text-decoration: underline; }

/* 响应式 */
@media (max-width: 768px) {
    .stat-row { grid-template-columns: repeat(2, 1fr); }
    .tab-bar { overflow-x: auto; }
}
</style>
</head>
<body>

<!-- 统计卡片 -->
<div class="stat-row">
    <div class="stat-card">
        <div class="stat-icon blue"><i class="fas fa-building"></i></div>
        <div class="stat-info">
            <div class="stat-value">12</div>
            <div class="stat-label">机构待审</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon green"><i class="fas fa-chart-line"></i></div>
        <div class="stat-info">
            <div class="stat-value">8</div>
            <div class="stat-label">业绩待审</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon purple"><i class="fas fa-user-tie"></i></div>
        <div class="stat-info">
            <div class="stat-value">6</div>
            <div class="stat-label">专家待审</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
        <div class="stat-info">
            <div class="stat-value">24</div>
            <div class="stat-label">本月已审核</div>
        </div>
    </div>
</div>

<!-- 审核列表 -->
<div class="list-card">
    <div class="list-header">
        <div class="list-title"><i class="fas fa-list-check"></i> 审核列表</div>
    </div>
    <div class="list-body">
        <div class="tab-bar">
            <div class="tab-item active">机构资质审核 <span class="tab-badge red">12</span></div>
            <div class="tab-item">业绩材料审核 <span class="tab-badge orange">8</span></div>
            <div class="tab-item">专家资质审核 <span class="tab-badge orange">6</span></div>
        </div>

        <div class="filter-card" style="margin-top: 20px;">
            <div class="filter-row">
                <div class="filter-item">
                    <label>机构筛选：</label>
                    <select id="orgFilter" onchange="renderOrgAuditList()">
                        <option value="">全部机构</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>审核类型：</label>
                    <select>
                        <option>全部</option>
                        <option>机构资质</option>
                        <option>业绩材料</option>
                        <option>专家资质</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>申请方式：</label>
                    <select>
                        <option>全部</option>
                        <option>自助注册</option>
                        <option>平台抓取</option>
                    </select>
                </div>
                <div class="filter-item" style="flex:1; min-width:200px; max-width:300px;">
                    <input type="text" placeholder="请输入机构名称 / 统一代码">
                </div>
                <div class="filter-actions">
                    <button class="list-btn list-btn-primary"><i class="fas fa-search"></i> 查询</button>
                    <button class="list-btn list-btn-outline"><i class="fas fa-undo"></i> 重置</button>
                </div>
            </div>
        </div>

        <table class="list-table">
            <thead>
                <tr>
                    <th>机构名称</th>
                    <th>统一代码</th>
                    <th>提交时间</th>
                    <th>申请方式</th>
                    <th style="text-align:center; width:160px;">操作</th>
                </tr>
            </thead>
            <tbody id="orgAuditBody">
                <tr><td colspan="5" style="text-align:center;color:var(--text-secondary);padding:24px;">加载中...</td></tr>
            </tbody>
        </table>
        <div class="list-pagination">
            <button class="page-btn" disabled>上一页</button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">下一页</button>
        </div>
    </div>
</div>

<!-- 审核记录与附件归档 -->
<div class="list-card">
    <div class="list-header">
        <div class="list-title"><i class="fas fa-folder-open"></i> 审核记录与附件归档</div>
    </div>
    <div class="list-body">
        <div class="filter-card">
            <div class="filter-row">
                <div class="filter-item">
                    <label>类型：</label>
                    <select>
                        <option>全部类型</option>
                        <option>机构</option>
                        <option>业绩</option>
                        <option>专家</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>结果：</label>
                    <select>
                        <option>全部</option>
                        <option>通过</option>
                        <option>退回</option>
                    </select>
                </div>
                <div class="filter-item" style="flex:1; min-width:200px; max-width:300px;">
                    <input type="text" placeholder="请输入关键词">
                </div>
                <div class="filter-actions">
                    <button class="list-btn list-btn-primary"><i class="fas fa-search"></i> 查询</button>
                    <button class="list-btn list-btn-outline"><i class="fas fa-undo"></i> 重置</button>
                </div>
            </div>
        </div>

        <table class="list-table">
            <thead>
                <tr>
                    <th>时间</th>
                    <th>类型</th>
                    <th>名称</th>
                    <th>审核结果</th>
                    <th>附件</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2026-06-28 10:32</td>
                    <td>机构</td>
                    <td>安信消防技术公司</td>
                    <td><span class="status-tag success">通过</span></td>
                    <td><a href="#" class="table-link" onclick="return false;"><i class="fas fa-paperclip"></i> 查看</a></td>
                </tr>
                <tr>
                    <td>2026-06-26 09:15</td>
                    <td>业绩</td>
                    <td>黄埔区化工园区安全评估</td>
                    <td><span class="status-tag success">通过</span></td>
                    <td><a href="#" class="table-link" onclick="return false;"><i class="fas fa-paperclip"></i> 查看</a></td>
                </tr>
                <tr>
                    <td>2026-06-25 16:40</td>
                    <td>专家</td>
                    <td>陈丽华</td>
                    <td><span class="status-tag danger">退回</span></td>
                    <td><a href="#" class="table-link" onclick="return false;"><i class="fas fa-paperclip"></i> 查看</a></td>
                </tr>
            </tbody>
        </table>
        <div class="list-pagination">
            <button class="page-btn" disabled>上一页</button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">下一页</button>
        </div>
    </div>
</div>

<script>
(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
        localStorage.setItem('theme', e.data.theme);
    }
});

function generateSubmitTime(orgId) {
    var base = new Date('2026-06-20 09:00:00').getTime();
    var seed = 0;
    for (var i = 0; i < orgId.length; i++) seed += orgId.charCodeAt(i);
    var offset = (seed % 10) * 86400000 + (seed % 24) * 3600000;
    var d = new Date(base + offset);
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function initOrgFilter() {
    var sel = document.getElementById('orgFilter');
    if (!sel || typeof getAllOrgs !== 'function') return;
    var current = sel.value;
    sel.innerHTML = '<option value="">全部机构</option>';
    getAllOrgs().forEach(function(o) {
        var opt = document.createElement('option');
        opt.value = o.orgId;
        opt.textContent = o.orgName;
        sel.appendChild(opt);
    });
    sel.value = current;
}

function renderOrgAuditList() {
    var tbody = document.getElementById('orgAuditBody');
    if (!tbody) return;
    if (typeof getAllOrgs !== 'function') {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-secondary);padding:24px;">缺少统一数据脚本</td></tr>';
        return;
    }
    var sel = document.getElementById('orgFilter');
    var orgId = sel ? sel.value : '';
    var orgs = getAllOrgs();
    if (orgId) orgs = orgs.filter(function(o) { return o.orgId === orgId; });
    if (orgs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:var(--text-secondary);padding:24px;">暂无数据</td></tr>';
        return;
    }
    tbody.innerHTML = '';
    orgs.forEach(function(o, index) {
        var tr = document.createElement('tr');
        var methodClass = index % 2 === 0 ? 'primary' : 'success';
        var methodText = index % 2 === 0 ? '自助注册' : '平台抓取';
        var nameCell = '<a style="cursor:pointer;color:var(--primary);text-decoration:underline;" onclick="goToTPOrg(\'' + o.orgId + '\')">' + o.orgName + '</a>';
        tr.innerHTML =
            '<td>' + nameCell + '</td>' +
            '<td>' + (o.orgCode || '-') + '</td>' +
            '<td>' + generateSubmitTime(o.orgId) + '</td>' +
            '<td><span class="status-tag ' + methodClass + '">' + methodText + '</span></td>' +
            '<td style="text-align:center;">' +
                '<a href="#" class="table-link" onclick="auditOrg(\'' + o.orgId + '\');return false;">审核</a>' +
                '<a href="#" class="table-link" onclick="viewAttachment(\'' + o.orgId + '\');return false;">查看附件</a>' +
            '</td>';
        tbody.appendChild(tr);
    });
}

function auditOrg(orgId) {
    var o = getOrgById ? getOrgById(orgId) : null;
    alert('打开【' + (o ? o.orgName : orgId) + '】的机构资质审核流程');
}

function viewAttachment(orgId) {
    var o = getOrgById ? getOrgById(orgId) : null;
    alert('查看【' + (o ? o.orgName : orgId) + '】的资质附件材料');
}

window.onload = function() {
    initOrgFilter();
    var params = getTPQueryParams ? getTPQueryParams() : { orgId: '' };
    if (params.orgId) {
        var sel = document.getElementById('orgFilter');
        if (sel) sel.value = params.orgId;
    }
    renderOrgAuditList();
};
</script>
</body>
</html>
