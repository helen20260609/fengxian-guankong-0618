<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --danger: #d93025;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); padding: 20px; }
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; max-width: 900px; margin: 0 auto; }
.form-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.form-body { padding: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; color: var(--text-primary); }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row-full { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 16px; }
.form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }
.btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.upload-area {
    border: 2px dashed var(--input-border);
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--bg-card);
    color: var(--text-secondary);
}
.upload-area:hover { border-color: var(--primary); color: var(--primary); }
.upload-area i { font-size: 28px; margin-bottom: 10px; display: block; }
.upload-area .upload-text { font-size: 14px; color: var(--text-primary); margin-bottom: 6px; }
.upload-area .upload-hint { font-size: 12px; color: var(--text-secondary); }
.upload-area input[type="file"] { display: none; }
.file-list { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
.file-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg-card); font-size: 13px;
}
.file-item .file-info { display: flex; align-items: center; gap: 10px; }
.file-item .file-name { color: var(--text-primary); }
.file-item .file-size { color: var(--text-secondary); font-size: 12px; }
.file-item .file-remove { color: var(--danger); cursor: pointer; font-size: 13px; }
.file-item .file-remove:hover { text-decoration: underline; }
@media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
}
</style>
</head>

<script>
function initOrgSelect() {
    var select = document.getElementById('expertOrg');
    if (!select) return;
    var orgs = getAllOrgs();
    var params = getTPQueryParams();
    select.innerHTML = '<option value="">独立专家（无单位）</option>' + orgs.map(function(o) {
        return '<option value="' + o.orgId + '">' + o.orgName + '</option>';
    }).join('');
    if (params.orgId) {
        select.value = params.orgId;
    }
}

function initExpertAdd() {
    initOrgSelect();
    var mode = getParam('mode');
    var name = getParam('name');
    var titleEl = document.getElementById('submitBtn');
    if (mode === 'edit' && name && titleEl) {
        titleEl.innerHTML = '<i class="fas fa-save"></i> 保存修改';
    }
}

// 回填专家数据到表单
function loadExpertIntoForm(item) {
    if (!item) return;
    if (item.name) document.getElementById('expertName').value = item.name;
    if (item.gender) document.getElementById('expertGender').value = item.gender;
    if (item.birth) document.getElementById('expertBirth').value = item.birth;
    var orgSelect = document.getElementById('expertOrg');
    if (orgSelect) {
        if (item.orgId) {
            orgSelect.value = item.orgId;
        } else if (item.org) {
            for (var i = 0; i < orgSelect.options.length; i++) {
                if (orgSelect.options[i].text === item.org) {
                    orgSelect.value = orgSelect.options[i].value;
                    break;
                }
            }
            // 未匹配到现有机构时，动态添加一个选项以保留原单位
            if (!orgSelect.value && orgSelect.value !== item.org) {
                var customOpt = document.createElement('option');
                customOpt.value = '__CUSTOM__';
                customOpt.text = item.org;
                orgSelect.appendChild(customOpt);
                orgSelect.value = '__CUSTOM__';
            }
        }
    }
    if (item.domain) document.getElementById('expertDomain').value = item.domain;
    if (item.direction) document.getElementById('expertDirection').value = item.direction;
    if (item.title) document.getElementById('expertTitle').value = item.title;
    if (item.workplace) document.getElementById('expertWorkplace').value = item.workplace;
    if (item.titleTime) document.getElementById('expertTitleTime').value = item.titleTime;
    if (item.years) document.getElementById('expertYears').value = item.years;
    if (item.phone) document.getElementById('expertPhone').value = item.phone;
    if (item.email) document.getElementById('expertEmail').value = item.email;
    if (item.address) document.getElementById('expertAddress').value = item.address;
    if (item.emergencyPosition) document.getElementById('emergencyPosition').value = item.emergencyPosition;
    if (item.originalDepartment) document.getElementById('originalDepartment').value = item.originalDepartment;
    if (item.emergencySpecialty) document.getElementById('emergencySpecialty').value = item.emergencySpecialty;
    if (item.experience) document.getElementById('expertExperience').value = item.experience;
}

// 监听父页传过来的专家数据
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setExpertData' && e.data.item) {
        loadExpertIntoForm(e.data.item);
    }
});

function submitExpert() {
    var name = document.getElementById('expertName').value.trim();
    var orgSelect = document.getElementById('expertOrg');
    var orgId = orgSelect.value;
    // 自定义单位仅用于展示，保存时视为独立专家但保留原始单位名称
    var orgName = '';
    if (orgId && orgSelect.options[orgSelect.selectedIndex]) {
        orgName = orgSelect.options[orgSelect.selectedIndex].text;
    }
    var expertType = (orgId && orgId !== '__CUSTOM__') ? '机构专家' : '独立专家';
    var phone = document.getElementById('expertPhone').value.trim();
    if (!name || !phone) {
        alert('请填写姓名和联系电话');
        return;
    }
    var isEdit = getParam('mode') === 'edit';
    var payload = {
        action: 'expertUpdated',
        payload: {
            mode: isEdit ? 'edit' : 'add',
            data: {
                name: name,
                gender: document.getElementById('expertGender').value,
                birth: document.getElementById('expertBirth').value,
                org: orgName,
                orgId: orgId === '__CUSTOM__' ? '' : orgId,
                expertType: expertType,
                domain: document.getElementById('expertDomain').value,
                direction: document.getElementById('expertDirection').value,
                title: document.getElementById('expertTitle').value,
                workplace: document.getElementById('expertWorkplace').value,
                titleOrg: document.getElementById('expertTitleOrg') ? document.getElementById('expertTitleOrg').value : '',
                titleTime: document.getElementById('expertTitleTime').value,
                years: document.getElementById('expertYears').value,
                phone: phone,
                email: document.getElementById('expertEmail').value,
                address: document.getElementById('expertAddress').value,
            emergencyPosition: document.getElementById('emergencyPosition').value,
            originalDepartment: document.getElementById('originalDepartment').value,
            emergencySpecialty: document.getElementById('emergencySpecialty').value,
                emergencyPosition: document.getElementById('emergencyPosition').value,
                originalDepartment: document.getElementById('originalDepartment').value,
                emergencySpecialty: document.getElementById('emergencySpecialty').value
            }
        }
    };
    if (window.parent && window.parent !== window) {
        try {
            window.parent.postMessage(payload, '*');
            window.parent.postMessage({ action: 'closeExpertModal' }, '*');
        } catch (e) {}
    }
    alert(isEdit ? '专家信息已保存。' : '专家信息已提交，进入审核中心。');
}

function closeWindow() {
    if (window.parent && window.parent !== window) {
        try {
            window.parent.postMessage({ action: 'closeExpertModal' }, '*');
        } catch (e) {}
    } else {
        window.close();
    }
}
function getParam(key) {
    var params = new URLSearchParams(window.location.search);
    return params.get(key);
}
function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    var k = 1024;
    var sizes = ['B', 'KB', 'MB', 'GB'];
    var i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
}
var selectedFiles = [];
function handleFiles(input) {
    var files = Array.from(input.files);
    files.forEach(function(file) {
        selectedFiles.push({ file: file, id: Date.now() + Math.random().toString(36).substr(2, 9) });
    });
    renderFileList();
}
function removeFile(id) {
    selectedFiles = selectedFiles.filter(function(item) { return item.id !== id; });
    renderFileList();
}
function renderFileList() {
    var container = document.getElementById('fileList');
    if (!selectedFiles.length) {
        container.innerHTML = '';
        return;
    }
    container.innerHTML = selectedFiles.map(function(item) {
        return '<div class="file-item">' +
            '<div class="file-info">' +
                '<i class="fas fa-file-alt"></i>' +
                '<span class="file-name">' + item.file.name + '</span>' +
                '<span class="file-size">(' + formatSize(item.file.size) + ')</span>' +
            '</div>' +
            '<span class="file-remove" onclick="removeFile(\'' + item.id + '\')">删除</span>' +
        '</div>';
    }).join('');
}

document.addEventListener('DOMContentLoaded', function() {
    initOrgSelect();
    if (getParam('mode') === 'edit') {
        var name = getParam('name');
        var item = expertList.find(function(e) { return e.name === name; });
        if (!item && typeof getExpertByName === 'function') {
            item = mapUnifiedExpert(getExpertByName(name));
        }
        if (item) {
            document.getElementById('expertName').value = item.name;
            document.getElementById('expertGender').value = item.gender;
            document.getElementById('expertBirth').value = item.birth;
            if (item.orgId) document.getElementById('expertOrg').value = item.orgId;
            document.getElementById('expertDomain').value = item.domain;
            document.getElementById('expertDirection').value = item.direction;
            document.getElementById('expertTitle').value = item.title;
            document.getElementById('expertWorkplace').value = item.workplace || '奉贤区';
            document.getElementById('expertTitleTime').value = item.titleTime;
            document.getElementById('expertYears').value = item.years;
            document.getElementById('expertPhone').value = item.phone;
            document.getElementById('expertEmail').value = item.email;
            document.getElementById('expertAddress').value = item.address;
            document.getElementById('submitBtn').innerHTML = '<i class="fas fa-save"></i> 保存修改';
        }
    }
});

function initOrgSelect() {
    var select = document.getElementById('expertOrg');
    if (!select || typeof getAllOrgs !== 'function') return;
    var orgs = getAllOrgs();
    var params = getTPQueryParams ? getTPQueryParams() : { orgId: getParam('orgId') };
    select.innerHTML = '<option value="">独立专家（无单位）</option>' + orgs.map(function(o) {
        return '<option value="' + o.orgId + '" data-name="' + o.orgName + '">' + o.orgName + '</option>';
    }).join('');
    if (params.orgId) {
        select.value = params.orgId;
    }
}

function mapUnifiedExpert(ue) {
    if (!ue) return null;
    return {
        name: ue.name,
        gender: ue.gender,
        birth: ue.birth,
        orgId: ue.orgId,
        org: ue.orgName,
        domain: ue.domain,
        direction: ue.direction,
        title: ue.title,
        workplace: ue.workplace,
        titleOrg: ue.titleOrg,
        titleTime: ue.titleTime,
        years: ue.years,
        phone: ue.phone,
        email: ue.email,
        address: ue.address,
        status: ue.status
    };
}
