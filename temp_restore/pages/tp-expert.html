<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

/* 统计卡片 */
.stat-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-bottom: 20px; }
.stat-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; display: flex; align-items: center; gap: 12px; transition: all 0.3s; min-width: 0; }
.stat-item:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stat-icon.blue { background: rgba(26,115,232,0.12); color: var(--primary); }
.stat-icon.green { background: rgba(30,142,62,0.12); color: var(--success); }
.stat-icon.orange { background: rgba(227,116,0,0.12); color: var(--warning); }
.stat-info { display: flex; flex-direction: column; }
.stat-number { font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

/* 表单卡片 */
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.form-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.form-title .badge { font-size: 12px; font-weight: 400; color: var(--text-secondary); margin-left: 4px; }
.form-body { padding: 20px; position: relative; }
.table-wrapper { overflow-x: auto; border: none; border-radius: 0; }
    .table-wrapper .list-table { min-width: 1040px; width: 100%; border-collapse: collapse; }
    .table-wrapper .list-table th, .table-wrapper .list-table td {
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .table-wrapper .list-table .sticky-col-1,
    .table-wrapper .list-table td:first-child {
        width: 120px;
        min-width: 120px;
        max-width: 120px;
        position: sticky;
        left: 0;
        z-index: 100;
        background: #ffffff;
        border-right: 1px solid var(--border, #dadce0);
        box-shadow: 2px 0 4px rgba(0,0,0,0.06);
    }
    .table-wrapper .list-table .sticky-col-2,
    .table-wrapper .list-table td:nth-child(2) {
        width: 180px;
        min-width: 180px;
        max-width: 180px;
    }
    .table-wrapper .list-table thead th.sticky-col-1 { z-index: 101; background: #f8f9fa; }
    .table-wrapper .list-table thead th { position: sticky; top: 0; z-index: 1; background: #f8f9fa; border-bottom: 1px solid var(--border); }

/* 表单布局 */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; color: var(--text-primary); }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }

/* 全宽表单行 */
.form-row-full { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 16px; }

/* 按钮 */
.btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* 过滤栏 */
.filter-bar { display: flex; align-items: center; gap: 14px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-wrap: nowrap; }
.filter-group { display: flex; align-items: center; gap: 8px; flex: 0 0 auto; }
.filter-group label { font-size: 13px; color: var(--text-primary); white-space: nowrap; }
.filter-group select { padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--input-bg); color: var(--text-primary); font-size: 13px; outline: none; width: 130px; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.filter-group select:focus { border-color: var(--primary); }
.filter-bar .search-bar { flex: 0 0 auto; margin-left: 0; }
.filter-bar .btn-primary { flex: 0 0 auto; }

.search-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 0 0 auto;
}
.search-bar input {
    padding: 8px 14px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    width: 180px;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.search-bar input::placeholder { color: var(--text-secondary); }
.search-bar .btn-search {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--primary);
    color: #fff;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
}
.search-bar .btn-search:hover { background: var(--primary-dark); }

/* 专家卡片网格 */
.expert-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px; }
.expert-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: all 0.3s;
}
.expert-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
.expert-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; color: #fff;
    margin-bottom: 12px;
}
.expert-avatar.blue { background: var(--primary); }
.expert-avatar.purple { background: #7c4dff; }
.expert-avatar.orange { background: var(--warning); }
.expert-avatar.teal { background: var(--secondary); }
.expert-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.expert-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
.expert-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.expert-tag {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    background: var(--bg-hover);
    color: var(--text-secondary);
}
.expert-tag.active { background: rgba(30,142,62,0.12); color: var(--success); }
.expert-tag.inactive { background: rgba(95,99,104,0.12); color: var(--text-secondary); }

/* 数据表格 */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
.data-table th, .data-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); color: var(--text-primary); vertical-align: middle; }
.data-table th { background: var(--header-bg); font-weight: 600; color: var(--text-primary); font-size: 14px; border-bottom: 1px solid var(--border); }
.data-table tbody tr:hover { background: var(--bg-hover); }
.data-table .tag { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; white-space: nowrap; }
.data-table .tag-success { background: rgba(30,142,62,0.12); color: var(--success); }
.data-table .tag-info { background: rgba(26,115,232,0.12); color: var(--primary); }
.data-table .tag-danger { background: rgba(217,48,37,0.12); color: var(--danger); }
.data-table .actions { text-align: center; white-space: nowrap; vertical-align: middle; }
.data-table .actions-inner { display: inline-flex; gap: 12px; align-items: center; }
.data-table .actions a { font-size: 13px; cursor: pointer; text-decoration: none; }
.data-table .actions .view { color: var(--primary); cursor: pointer; }
.data-table .actions .view:hover { color: var(--primary-dark); text-decoration: underline; }
.data-table .actions .audit { color: var(--warning); cursor: pointer; }
.data-table .actions .audit:hover { color: #c2410c; text-decoration: underline; }
.data-table .actions .edit { color: var(--primary); cursor: pointer; }
.data-table .actions .edit:hover { color: var(--primary-dark); text-decoration: underline; }
.data-table .actions .domain { color: var(--secondary); cursor: pointer; }
.data-table .actions .domain:hover { color: #1a6f4b; text-decoration: underline; }
.data-table .actions .history { color: var(--text-secondary); cursor: pointer; }
.data-table .actions .history:hover { color: var(--text-primary); text-decoration: underline; }
.data-table th:nth-child(7), .data-table td:nth-child(7) { min-width: 60px; }
/* 状态开关（Apple UISwitch 风格） */
	.switch-wrap { display: inline-flex; align-items: center; cursor: pointer; }
	.switch { position: relative; display: inline-block; width: 34px; height: 18px; flex-shrink: 0; }
	.switch input { opacity: 0; width: 0; height: 0; }
	.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #9aa0a6; transition: .25s; border-radius: 18px; }
	.slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .25s; border-radius: 50%; box-shadow: 0 1px 2px rgba(0,0,0,0.25); }
	input:checked + .slider { background-color: var(--success); }
	input:checked + .slider:before { transform: translateX(16px); }
	/* 开关文字提示已移除，仅保留开关控件 */

/* 分页 */
.pagination { display: flex; align-items: center; justify-content: flex-end; gap: 12px; margin-top: 16px; padding-top: 12px; border-top: none; }
.pagination .page-info { font-size: 13px; color: var(--text-secondary); }

/* 弹窗页面打开 */
.form-actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 8px; }

/* 模态框（与合同管理保持一致） */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal-container { background: var(--bg-card); border-radius: 12px; width: 720px; max-width: 90vw; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 30px var(--shadow); }
.modal-container.modal-wide { width: 900px; }
.modal-container.modal-narrow { width: 620px; }
.modal-container.modal-history { width: 560px; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.modal-close { background: transparent; border: none; font-size: 18px; color: var(--text-secondary); cursor: pointer; }
.modal-body { padding: 20px; overflow-y: auto; }
.modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }
.modal-iframe { width: 100%; height: 100%; min-height: 520px; border: none; }

/* 时间轴变更历史 */
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
.timeline-item { position: relative; margin-bottom: 20px; }
.timeline-item:last-child { margin-bottom: 0; }
.timeline-dot { position: absolute; left: -20px; top: 6px; width: 12px; height: 12px; border-radius: 50%; background: var(--primary); border: 2px solid var(--bg-card); box-shadow: 0 0 0 2px var(--border); }
.timeline-dot.add { background: var(--primary); }
.timeline-dot.edit { background: var(--warning); }
.timeline-dot.audit { background: var(--success); }
.timeline-dot.reject { background: var(--danger); }
.timeline-dot.delete { background: var(--text-secondary); }
.timeline-dot.enable { background: var(--success); }
.timeline-dot.disable { background: var(--danger); }
.timeline-time { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.timeline-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.timeline-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.timeline-badge.add { background: rgba(26,115,232,0.12); color: var(--primary); }
.timeline-badge.edit { background: rgba(227,116,0,0.12); color: var(--warning); }
.timeline-badge.audit { background: rgba(30,142,62,0.12); color: var(--success); }
.timeline-badge.reject { background: rgba(217,48,37,0.12); color: var(--danger); }
.timeline-badge.delete { background: rgba(95,99,104,0.12); color: var(--text-secondary); }
.timeline-badge.enable { background: rgba(30,142,62,0.12); color: var(--success); }
.timeline-badge.disable { background: rgba(217,48,37,0.12); color: var(--danger); }
.timeline-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.timeline-remark { font-size: 13px; color: var(--text-primary); line-height: 1.5; }
.timeline-diff { margin-top: 6px; padding: 8px 12px; background: var(--bg-dark); border-radius: 8px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
.timeline-diff-item { margin-bottom: 2px; }
.timeline-empty { text-align: center; color: var(--text-secondary); padding: 40px 0; font-size: 13px; }

@media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
    .expert-grid { grid-template-columns: 1fr; }
}
.timeline-dot { left: -21px; }
</style>

</head>

var filteredExpertList = expertList.slice();
var expertPage = 1;
var expertPageSize = 5;

function renderExpertTable() {
    var tbody = document.getElementById('expertTableBody');
    if (!tbody) return;
    tbody.innerHTML = '';
    if (!filteredExpertList || filteredExpertList.length === 0) {
        var tr = document.createElement('tr');
        tr.innerHTML = '<td colspan="8" style="text-align:center;color:var(--text-secondary);padding:24px;">暂无符合条件的数据</td>';
        tbody.appendChild(tr);
        renderExpertPagination(0);
        return;
    }
    var start = (expertPage - 1) * expertPageSize;
    var end = start + expertPageSize;
    var pageData = filteredExpertList.slice(start, end);
    pageData.forEach(function(item) {
        var tr = document.createElement('tr');
        var statusSwitch =
            '<div class="switch-wrap">' +
                '<label class="switch">' +
                    '<input type="checkbox" ' + (item.status === '启用' ? 'checked' : '') + ' onclick="event.preventDefault(); event.stopPropagation(); toggleExpertStatus(\'' + item.name + '\')">' +
                    '<span class="slider"></span>' +
                '</label>' +
            '</div>';
        var isInd = !item.org && (item.expertType === '独立专家' || !item.expertType);
        var orgCell = isInd ?
            '<span style="color:var(--primary);font-weight:500;">独立专家</span>' :
            (item.orgId ?
                '<a style="cursor:pointer;color:var(--primary);text-decoration:underline;" onclick="goToTPOrg(\'' + item.orgId + '\')">' + (item.org || '') + '</a>' :
                (item.org || '<span style="color:var(--primary);font-weight:500;">独立专家</span>'));
        tr.innerHTML =
            '<td>' + item.name + '</td>' +
            '<td>' + orgCell + '</td>' +
            '<td><span class="status-tag primary">' + item.domain + '</span></td>' +
            '<td>' + item.direction + '</td>' +
            '<td>' + item.title + '</td>' +
            '<td>' + (item.workplace || '') + '</td>' +
            '<td>' + statusSwitch + '</td>' +
            '<td class="actions">' +
                '<div class="actions-inner">' +
                    '<a class="table-link view" onclick="viewExpert(\'' + item.name + '\')">查看</a>' +
                    '<a class="table-link edit" onclick="editExpert(\'' + item.name + '\')">编辑</a>' +
                    '<a class="table-link audit" onclick="auditExpert(\'' + item.name + '\')">审核</a>' +
                    '<a class="table-link domain" onclick="adjustExpertDomain(\'' + item.name + '\')">专业领域调整</a>' +
                    '<a class="table-link history" onclick="viewExpertHistory(\'' + item.name + '\')">历史</a>' +
                '</div>' +
            '</td>';
        tbody.appendChild(tr);
    });
    var totalPages = Math.ceil(filteredExpertList.length / expertPageSize) || 1;
    renderExpertPagination(totalPages);
}

function renderExpertPagination(totalPages) {
    var container = document.getElementById('expertPagination');
    if (!container) return;
    var total = filteredExpertList.length;
    var html = '<span class="page-info">共 ' + total + ' 条</span>';
    html += '<button class="page-btn" ' + (expertPage === 1 || totalPages === 0 ? 'disabled' : '') + ' onclick="goExpertPage(' + (expertPage - 1) + ')">上一页</button>';
    for (var i = 1; i <= totalPages; i++) {
        html += '<button class="page-btn ' + (i === expertPage ? 'active' : '') + '" onclick="goExpertPage(' + i + ')" ' + (i === expertPage ? 'disabled' : '') + '>' + i + '</button>';
    }
    html += '<button class="page-btn" ' + (expertPage === totalPages || totalPages === 0 ? 'disabled' : '') + ' onclick="goExpertPage(' + (expertPage + 1) + ')">下一页</button>';
    container.innerHTML = html;
}

function goExpertPage(page) {
    var totalPages = Math.ceil(filteredExpertList.length / expertPageSize) || 1;
    if (page < 1 || page > totalPages) return;
    expertPage = page;
    renderExpertTable();
}

function changeExpertPage(delta) {
    var totalPages = Math.ceil(filteredExpertList.length / expertPageSize) || 1;
    var newPage = expertPage + delta;
    if (newPage < 1 || newPage > totalPages) return;
    expertPage = newPage;
    renderExpertTable();
}

function resetExpertFilter() {
    document.getElementById('filterDomain').value = '';
    document.getElementById('filterTitle').value = '';
    document.getElementById('filterWorkplace').value = '';
    document.getElementById('filterOrg').value = '';
    document.getElementById('filterExpertType').value = '';
    document.getElementById('expertSearch').value = '';
    searchExpert();
}

function searchExpert() {
    var keyword = document.getElementById('expertSearch').value.trim().toLowerCase();
    var domain = document.getElementById('filterDomain').value;
    var title = document.getElementById('filterTitle').value;
    var workplace = document.getElementById('filterWorkplace').value;
    var orgId = document.getElementById('filterOrg').value;
    var expertType = document.getElementById('filterExpertType').value;
    filteredExpertList = expertList.filter(function(item) {
        if (domain && item.domain !== domain) return false;
        if (title && item.title !== title) return false;
        if (workplace && (item.workplace || '') !== workplace) return false;
        if (orgId && item.orgId !== orgId) return false;
        if (expertType) {
            var isIndependent = item.expertType === '独立专家' || (!item.expertType && !item.orgId && !item.org);
            if (expertType === '独立专家' && !isIndependent) return false;
            if (expertType === '机构专家' && isIndependent) return false;
        }
        if (keyword) {
            var k = keyword;
            return item.name.toLowerCase().indexOf(k) !== -1 ||
                (item.org || '').toLowerCase().indexOf(k) !== -1 ||
                item.domain.toLowerCase().indexOf(k) !== -1 ||
                item.title.toLowerCase().indexOf(k) !== -1 ||
                (item.workplace || '').toLowerCase().indexOf(k) !== -1;
        }
        return true;
    });
    expertPage = 1;
    renderExpertTable();
}

// 下拉变更时自动触发筛选
document.getElementById('filterDomain').addEventListener('change', searchExpert);
document.getElementById('filterTitle').addEventListener('change', searchExpert);
document.getElementById('filterWorkplace').addEventListener('change', searchExpert);
document.getElementById('filterOrg').addEventListener('change', searchExpert);
document.getElementById('filterExpertType').addEventListener('change', searchExpert);

// 模态框弹窗控制（与合同管理保持一致）
function openExpertModal(url, title, sizeClass) {
    var overlay = document.getElementById('expertModalOverlay');
    var iframe = document.getElementById('expertModalIframe');
    var modalTitle = document.getElementById('expertModalTitle');
    var container = document.getElementById('expertModalContainer');
    if (!overlay) return;
    iframe.src = url;
    modalTitle.textContent = title;
    container.className = 'modal-container ' + (sizeClass || '');
    overlay.classList.add('active');
}

function closeExpertModal() {
    var overlay = document.getElementById('expertModalOverlay');
    var iframe = document.getElementById('expertModalIframe');
    if (overlay) overlay.classList.remove('active');
    if (iframe) iframe.src = '';
    // 关闭弹窗后刷新列表，确保子页面修改生效
    searchExpert();
}

function viewExpert(name) {
    var item = expertList.find(function(e) { return e.name === name; });
    if (!item) return;
    openExpertModal('tp-expert-view.html?name=' + encodeURIComponent(name), item.name + ' - 专家详情', 'modal-narrow');
    // iframe 加载完成后把完整专家列表 postMessage 传给子页面，避免 file 协议下 opener 不可用
    var iframe = document.getElementById('expertModalIframe');
    if (iframe) {
        iframe.onload = function() {
            try {
                iframe.contentWindow.postMessage({ action: 'setExpertData', list: expertList }, '*');
            } catch(e) {}
        };
    }
}

function editExpert(name) {
    var params = getTPQueryParams();
    var url = 'tp-expert-add.html?mode=edit&name=' + encodeURIComponent(name);
    if (params.orgId) url += '&orgId=' + encodeURIComponent(params.orgId);
    openExpertModal(url, '编辑专家信息', 'modal-wide');
    var iframe = document.getElementById('expertModalIframe');
    if (iframe) {
        iframe.onload = function() {
            try {
                var item = expertList.find(function(e) { return e.name === name; });
                if (item) {
                    iframe.contentWindow.postMessage({ action: 'setExpertData', item: item }, '*');
                }
            } catch(e) {}
        };
    }
}

function auditExpert(name) {
    var params = getTPQueryParams();
    var url = 'tp-expert-audit.html?name=' + encodeURIComponent(name);
    if (params.orgId) url += '&orgId=' + encodeURIComponent(params.orgId);
    openExpertModal(url, '专家信息审核', 'modal-wide');
}

function openExpertAdd() {
    var params = getTPQueryParams();
    var url = 'tp-expert-add.html';
    if (params.orgId) url += '?orgId=' + encodeURIComponent(params.orgId);
    openExpertModal(url, '专家信息录入', 'modal-wide');
}

function adjustExpertDomain(name) {
    var item = expertList.find(function(e) { return e.name === name; });
    if (!item) return;
    document.getElementById('domainExpertName').value = name;
    document.getElementById('domainExpertNameDisplay').value = name;
    document.getElementById('domainExpertOldDomain').value = item.domain || '';
    document.getElementById('domainExpertOldDirection').value = item.direction || '';
    document.getElementById('domainExpertNewDomain').value = item.domain || '';
    document.getElementById('domainExpertNewDirection').value = item.direction || '';
    document.getElementById('domainAdjustReason').value = '';
    document.getElementById('domainModalOverlay').classList.add('active');
}

function closeDomainModal() {
    var overlay = document.getElementById('domainModalOverlay');
    if (overlay) overlay.classList.remove('active');
}

function submitDomainAdjust() {
    var name = document.getElementById('domainExpertName').value;
    var item = expertList.find(function(e) { return e.name === name; });
    if (!item) return;
    var newDomain = document.getElementById('domainExpertNewDomain').value;
    var newDirection = document.getElementById('domainExpertNewDirection').value;
    var reason = document.getElementById('domainAdjustReason').value.trim();
    if (!newDomain || !newDirection) {
        alert('请选择新的专业领域和从事方向');
        return;
    }
    if (newDomain === item.domain && newDirection === item.direction) {
        alert('新的专业领域/方向与当前相同，无需调整');
        return;
    }
    var data = { name: name, domain: newDomain, direction: newDirection, remark: reason };
    var idx = expertList.findIndex(function(e) { return e.name === name; });
    if (idx !== -1) {
        var oldItem = expertList[idx];
        recordExpertChange(name, '专业领域调整', oldItem, data, getCurrentOperator(), reason || '调整专业领域');
        expertList[idx] = Object.assign({}, oldItem, { domain: newDomain, direction: newDirection });
    }
    saveExpertData();
    searchExpert();
    closeDomainModal();
    alert('专家 "' + name + '" 的专业领域已调整。');
}

function toggleExpertStatus(name) {
    var item = expertList.find(function(e) { return e.name === name; });
    if (!item) return;
    var newStatus = item.status === '启用' ? '停用' : '启用';
    var actionText = item.status === '启用' ? '停用' : '启用';
    if (!confirm('确定要' + actionText + '专家 "' + name + '" 吗？')) return;
    item.status = newStatus;
    recordExpertChange(name, '状态变更', null, { status: newStatus }, getCurrentOperator(), '专家状态被' + actionText);
    saveExpertData();
    searchExpert();
    alert('专家 "' + name + '" 已' + actionText + '。');
}

function deleteExpert(name) {
    alert('专家信息不支持删除，请使用“停用/启用”功能切换状态。');
}

function getCurrentOperator() {
    // 后续可从登录信息或 localStorage 读取
    return localStorage.getItem('currentUser') || '系统管理员';
}

function formatNow() {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    var h = String(now.getHours()).padStart(2, '0');
    var min = String(now.getMinutes()).padStart(2, '0');
    var s = String(now.getSeconds()).padStart(2, '0');
    return y + '-' + m + '-' + d + ' ' + h + ':' + min + ':' + s;
}

function addExpertHistory(name, record) {
    var item = expertList.find(function(e) { return e.name === name; });
    if (item) {
        if (!item.history) item.history = [];
        item.history.unshift(record);
    }
}

var globalExpertHistory = [];

function addGlobalHistory(record) {
    globalExpertHistory.unshift(record);
    try {
        localStorage.setItem('expertGlobalHistory', JSON.stringify(globalExpertHistory));
    } catch(e) {}
}

function loadExpertData() {
    try {
        var saved = localStorage.getItem('expertListData');
        if (saved) {
            expertList = JSON.parse(saved);
        }
    } catch(e) {}
    try {
        var savedGlobal = localStorage.getItem('expertGlobalHistory');
        if (savedGlobal) {
            globalExpertHistory = JSON.parse(savedGlobal);
        }
    } catch(e) {}

    // 归一化专家类型：未设置时根据单位自动推断
    expertList.forEach(function(item) {
        if (!item.expertType) {
            item.expertType = (item.org && item.org.trim()) || item.orgId ? '机构专家' : '独立专家';
        }
    });

    // 合并统一数据层专家（third-party-data.js）
    if (typeof getAllExperts === 'function') {
        var unifiedExperts = getAllExperts();
        unifiedExperts.forEach(function(ue) {
            var found = expertList.find(function(e) {
                return e.name === ue.name || (e.expertId && e.expertId === ue.expertId);
            });
            if (!found) {
                var org = getOrgById(ue.orgId);
                var expertType = ue.expertType || (ue.orgId ? '机构专家' : '独立专家');
                expertList.push({
                    expertId: ue.expertId,
                    name: ue.name,
                    gender: ue.gender,
                    birth: ue.birth,
                    org: ue.orgName,
                    orgId: ue.orgId,
                    orgCode: org ? org.orgCode : '',
                    domain: ue.domain,
                    direction: ue.direction,
                    title: ue.title,
                    titleOrg: ue.titleOrg,
                    titleTime: ue.titleTime,
                    years: ue.years,
                    phone: ue.phone,
                    email: ue.email,
                    address: ue.address,
                    emergencyPosition: ue.emergencyPosition || '',
                    originalDepartment: ue.originalDepartment || '',
                    emergencySpecialty: ue.emergencySpecialty || '',
                    workplace: org ? org.region : (ue.workplace || ''),
                    status: ue.status === '正常' ? '启用' : (ue.status || '启用'),
                    expertType: expertType,
                    history: []
                });
            }
        });
    }

    saveExpertData();
}

function saveExpertData() {
    try {
        localStorage.setItem('expertListData', JSON.stringify(expertList));
    } catch(e) {}
    // 同步回统一数据层
    if (typeof updateExpert === 'function') {
        expertList.forEach(function(e) {
            var org = getOrgById(e.orgId) || {};
            updateExpert({
                expertId: e.expertId || ('EXP-' + e.name),
                name: e.name,
                gender: e.gender,
                birth: e.birth,
                orgId: e.orgId || '',
                orgName: e.org || org.orgName || '',
                orgCode: e.orgCode || org.orgCode || '',
                expertType: e.expertType || (e.orgId ? '机构专家' : '独立专家'),
                domain: e.domain,
                direction: e.direction,
                title: e.title,
                titleOrg: e.titleOrg,
                titleTime: e.titleTime,
                years: e.years,
                phone: e.phone,
                email: e.email,
                address: e.address,
                emergencyPosition: e.emergencyPosition || '',
                originalDepartment: e.originalDepartment || '',
                emergencySpecialty: e.emergencySpecialty || '',
                workplace: e.workplace,
                status: e.status === '启用' ? '正常' : (e.status || '正常')
            });
        });
    }
}

function recordExpertChange(name, type, oldData, newData, operator, remark) {
    var item = expertList.find(function(e) { return e.name === name; });
    if (!item) return;
    var record = {
        time: formatNow(),
        action: type,
        operator: operator || getCurrentOperator(),
        remark: remark || ''
    };
    if (type === '编辑' && oldData && newData) {
        var fields = {
            name: '姓名', gender: '性别', birth: '出生年月', org: '工作单位',
            domain: '专业领域', direction: '专业方向', title: '职称', titleOrg: '评定机构',
            titleTime: '评定时间', years: '工作年限', phone: '联系电话', email: '电子邮箱', address: '通讯地址',
            emergencyPosition: '应急管理职务', originalDepartment: '原单位部门', emergencySpecialty: '应急管理特长'
        };
        var diff = [];
        for (var key in fields) {
            var oldVal = (oldData[key] || '').toString();
            var newVal = (newData[key] || '').toString();
            if (oldVal !== newVal) {
                diff.push(fields[key] + '：' + oldVal + ' → ' + newVal);
            }
        }
        if (diff.length) record.diff = diff;
    } else if (type === '专业领域调整' && oldData && newData) {
        var oldDomain = (oldData.domain || '').toString();
        var oldDirection = (oldData.direction || '').toString();
        var newDomain = (newData.domain || '').toString();
        var newDirection = (newData.direction || '').toString();
        if (oldDomain !== newDomain || oldDirection !== newDirection) {
            record.diff = ['专业领域：' + oldDomain + ' → ' + newDomain, '从事方向：' + oldDirection + ' → ' + newDirection];
        }
    }
    if (!item.history) item.history = [];
    item.history.unshift(record);
    addGlobalHistory({
        targetName: item.name,
        action: type,
        operator: record.operator,
        remark: remark || '',
        time: record.time
    });
    saveExpertData();
}

function viewExpertHistory(name) {
    var item = expertList.find(function(e) { return e.name === name; });
    if (!item) return;
    var title = document.getElementById('historyModalTitle');
    var container = document.getElementById('historyModalContainer');
    var overlay = document.getElementById('historyModalOverlay');
    if (title) title.textContent = item.name + ' - 变更历史';
    if (container) container.className = 'modal-container modal-history';
    renderHistoryTimeline(item);
    if (overlay) overlay.classList.add('active');
}

function closeHistoryModal() {
    var overlay = document.getElementById('historyModalOverlay');
    if (overlay) overlay.classList.remove('active');
}

function renderHistoryTimeline(item) {
    var container = document.getElementById('historyTimeline');
    if (!container) return;
    var list = (item.history || []).slice();
    // 按时间倒序
    list.sort(function(a, b) { return new Date(b.time) - new Date(a.time); });
    if (list.length === 0) {
        container.innerHTML = '<div class="timeline-empty">暂无变更历史</div>';
        return;
    }
    var map = {
        '新增': 'add', '编辑': 'edit', '审核通过': 'audit', '审核驳回': 'reject',
        '删除': 'delete', '启用': 'enable', '停用': 'disable'
    };
    container.innerHTML = '<div class="timeline">' + list.map(function(r) {
        var cls = map[r.action] || 'edit';
        var diffHtml = '';
        if (r.diff && r.diff.length) {
            diffHtml = '<div class="timeline-diff">' + r.diff.map(function(d) {
                return '<div class="timeline-diff-item">' + d + '</div>';
            }).join('') + '</div>';
        }
        return '<div class="timeline-item">' +
            '<div class="timeline-dot ' + cls + '"></div>' +
            '<div class="timeline-time">' + r.time + '</div>' +
            '<div class="timeline-title">' +
                '<span class="timeline-badge ' + cls + '">' + r.action + '</span>' +
            '</div>' +
            '<div class="timeline-meta">操作人：' + (r.operator || '-') + '</div>' +
            '<div class="timeline-remark">' + (r.remark || '') + '</div>' +
            diffHtml +
        '</div>';
    }).join('') + '</div>';
}

// 监听子页面通过 postMessage 通知关闭弹窗
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'closeExpertModal') {
        closeExpertModal();
    }
    if (e.data && e.data.action === 'expertUpdated') {
        var payload = e.data.payload || {};
        var mode = payload.mode || 'add';
        var data = payload.data || {};
        var name = data.name;
        if (!name) {
            searchExpert();
            return;
        }
        if (mode === 'add') {
            // 新增专家
            var newItem = Object.assign({}, data, {
                status: '待审核',
                history: [{
                    time: formatNow(),
                    action: '新增',
                    operator: getCurrentOperator(),
                    remark: '专家信息录入，提交审核'
                }]
            });
            expertList.unshift(newItem);
        } else if (mode === 'edit') {
            var idx = expertList.findIndex(function(item) { return item.name === name; });
            if (idx !== -1) {
                var oldItem = expertList[idx];
                recordExpertChange(name, '编辑', oldItem, data, getCurrentOperator(), '修改专家信息');
                expertList[idx] = Object.assign({}, oldItem, data);
            }
        } else if (mode === 'domain') {
            var idx = expertList.findIndex(function(item) { return item.name === name; });
            if (idx !== -1) {
                var oldItem = expertList[idx];
                recordExpertChange(name, '专业领域调整', oldItem, data, getCurrentOperator(), data.remark || '调整专业领域');
                expertList[idx] = Object.assign({}, oldItem, {
                    domain: data.domain,
                    direction: data.direction
                });
            }
        }
        saveExpertData();
        searchExpert();
    }
    if (e.data && e.data.action === 'expertAudit') {
        var payload = e.data.payload || {};
        var name = payload.name;
        var passed = payload.passed;
        var remark = payload.remark || '';
        var idx = expertList.findIndex(function(item) { return item.name === name; });
        if (idx !== -1) {
            var item = expertList[idx];
            var newStatus = passed ? '启用' : '停用';
            item.status = newStatus;
            if (!item.history) item.history = [];
            item.history.unshift({
                time: formatNow(),
                action: passed ? '审核通过' : '审核驳回',
                operator: getCurrentOperator(),
                remark: remark
            });
            saveExpertData();
        }
        searchExpert();
    }
});

function computeDiff(oldItem, newItem) {
    var fields = {
        name: '姓名', gender: '性别', birth: '出生年月', org: '工作单位',
        domain: '专业领域', direction: '专业方向', title: '职称', titleOrg: '评定机构',
        titleTime: '评定时间', years: '工作年限', phone: '联系电话', email: '电子邮箱', address: '通讯地址'
    };
    var diff = [];
    for (var key in fields) {
        var oldVal = (oldItem[key] || '').toString();
        var newVal = (newItem[key] || '').toString();
        if (oldVal !== newVal) {
            diff.push(fields[key] + '：' + oldVal + ' → ' + newVal);
        }
    }
    return diff;
}
