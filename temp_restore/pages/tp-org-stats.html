<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机构信息统计 - 第三方服务机构</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="tp-common.css">
<script src="../js/third-party-data.js"></script>
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
    --radius: 12px;
    --gap: 16px;
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

/* 页面标签 */
.page-tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.page-tab {
    padding: 10px 20px; border-radius: 8px 8px 0 0; font-size: 14px; cursor: pointer; color: var(--text-secondary);
    border: 1px solid transparent; border-bottom: none; background: transparent; transition: all .2s;
}
.page-tab:hover { color: var(--primary); background: rgba(26,115,232,0.06); }
.page-tab.active { color: var(--primary); font-weight: 600; background: var(--bg-card); border-color: var(--border); border-bottom: 1px solid var(--bg-card); margin-bottom: -1px; }

/* 通用面板 */
.panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
.panel-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.panel-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.panel-title i { color: var(--primary); }
.panel-body { padding: 20px; }

/* 统计卡片 */
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); margin-bottom: 20px; }
.stat-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 12px; transition: all 0.3s; cursor: pointer; }
.stat-item:hover, .stat-item.active { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); border-color: var(--primary); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stat-icon.blue { background: rgba(26,115,232,0.12); color: var(--primary); }
.stat-icon.green { background: rgba(30,142,62,0.12); color: var(--success); }
.stat-icon.orange { background: rgba(227,116,0,0.12); color: var(--warning); }
.stat-icon.red { background: rgba(217,48,37,0.12); color: var(--danger); }
.stat-icon.purple { background: rgba(156,39,176,0.12); color: #9c27b0; }
.stat-icon.cyan { background: rgba(0,188,212,0.12); color: #00bcd4; }
.stat-icon.teal { background: rgba(0,150,136,0.12); color: #009688; }
.stat-info { display: flex; flex-direction: column; }
.stat-number { font-size: 26px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
.stat-trend { font-size: 12px; margin-top: 4px; }
.stat-trend.up { color: var(--success); }
.stat-trend.down { color: var(--danger); }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; animation: fadeUp 0.4s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 图表区域 */
.chart-row { display: flex; flex-direction: row; gap: var(--gap); }
.chart-row + .chart-row { margin-top: var(--gap); }
.chart-card { min-width: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.chart-card.wide { flex: 2 1 0; }
.chart-card.narrow { flex: 1 1 0; min-width: 0; }
.chart-card.full { flex: 1 1 100%; min-width: 0; }
.chart-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.chart-title { font-size: 15px; font-weight: 600; }
.chart-title span { font-size: 13px; color: var(--text-secondary); font-weight: 400; margin-left: 8px; }
.chart-actions { display: flex; gap: 8px; }
.chart-body { padding: 20px; height: 340px; position: relative; }

/* 筛选栏 */
.filter-bar { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.filter-group { display: flex; align-items: center; gap: 8px; }
.filter-group label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
.filter-group select, .filter-group input {
    padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg);
    color: var(--text-primary); font-size: 13px; outline: none; min-width: 120px;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.filter-group select:focus, .filter-group input:focus { border-color: var(--primary); }
.filter-actions { display: flex; gap: 8px; margin-left: auto; }
.btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #166534; }
.btn-warning { background: var(--warning); color: #fff; }
.btn-warning:hover { background: #c2410c; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* 数据表格 */
.data-table { width: 100%; border-collapse: collapse; }
.data-table thead th { padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); background: var(--header-bg); border-bottom: 1px solid var(--border); white-space: nowrap; }
.data-table tbody td { padding: 14px 16px; font-size: 13px; color: var(--text-primary); border-bottom: 1px solid var(--border); }
.data-table tbody tr:hover { background: var(--bg-hover); cursor: pointer; }
.data-table tbody tr:last-child td { border-bottom: none; }
.td-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.badge-blue { background: rgba(26,115,232,0.12); color: var(--primary); }
.badge-green { background: rgba(30,142,62,0.12); color: var(--success); }
.badge-orange { background: rgba(227,116,0,0.12); color: var(--warning); }
.badge-purple { background: rgba(156,39,176,0.12); color: #9c27b0; }
.badge-cyan { background: rgba(0,188,212,0.12); color: #00bcd4; }
.badge-grey { background: rgba(0,0,0,0.06); color: var(--text-secondary); }
.td-progress { display: flex; align-items: center; gap: 8px; }
.progress-bar { width: 80px; height: 6px; background: var(--bg-hover); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; }
.progress-fill.blue { background: var(--primary); }
.progress-fill.green { background: var(--success); }
.progress-fill.orange { background: var(--warning); }

/* 报表配置抽屉 */
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: flex-end; }
.drawer-overlay.active { display: flex; }
.drawer { width: 520px; max-width: 90vw; height: 100%; background: var(--bg-card); border-left: 1px solid var(--border); box-shadow: -4px 0 24px var(--shadow); display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.3s; }
.drawer-overlay.active .drawer { transform: translateX(0); }
.drawer-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.drawer-title { font-size: 15px; font-weight: 600; }
.drawer-close { background: transparent; border: none; font-size: 18px; color: var(--text-secondary); cursor: pointer; }
.drawer-body { flex: 1; overflow-y: auto; padding: 20px; }
.drawer-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; color: var(--text-primary); margin-bottom: 6px; }
.form-group input, .form-group select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg);
    color: var(--text-primary); font-size: 13px; outline: none; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus { border-color: var(--primary); }
.checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
.checkbox-item { display: flex; align-items: center; gap: 6px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; transition: all .2s; font-size: 13px; }
.checkbox-item:hover { border-color: var(--primary); color: var(--primary); }
.checkbox-item input { display: none; }
.checkbox-item.checked { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.template-list { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
.template-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all .2s; }
.template-item:hover, .template-item.active { border-color: var(--primary); background: var(--primary-light); }
.template-name { font-size: 13px; font-weight: 600; }
.template-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.template-actions { display: flex; gap: 8px; }

/* 模态框 */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1001; display: none; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal-container { background: var(--bg-card); border-radius: var(--radius); width: 720px; max-width: 90vw; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 30px var(--shadow); }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 600; }
.modal-close { background: transparent; border: none; font-size: 18px; color: var(--text-secondary); cursor: pointer; }
.modal-body { padding: 20px; overflow-y: auto; }
.modal-footer { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; }
.report-preview { background: var(--bg-dark); border-radius: 8px; padding: 16px; font-size: 13px; line-height: 1.8; color: var(--text-primary); min-height: 120px; }

/* 报告卡片 */
.report-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; align-items: center; gap: 14px; margin-bottom: 12px; transition: all .2s; }
.report-card:hover { border-color: var(--primary); box-shadow: 0 2px 8px var(--shadow); }
.report-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; flex-shrink: 0; }
.report-icon.blue { background: var(--primary); }
.report-icon.green { background: var(--success); }
.report-icon.orange { background: var(--warning); }
.report-icon.purple { background: #9c27b0; }
.report-info { flex: 1; }
.report-title { font-size: 14px; font-weight: 600; }
.report-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.report-actions { display: flex; gap: 8px; }

@media (max-width: 1200px) {
    .chart-row { flex-direction: column; }
    .stat-row { grid-template-columns: repeat(3, 1fr); }
    .drawer { width: 100%; }
}
@media (max-width: 768px) {
    .stat-row { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
    .stat-item { flex: 1 1 calc(50% - 8px); }
    .filter-bar { flex-direction: column; align-items: stretch; }
    .filter-actions { margin-left: 0; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>

<!-- 页面切换标签 -->
<div class="page-tabs" id="pageTabs">
    <div class="page-tab active" data-tab="overview" onclick="switchTab('overview')">
        <i class="fas fa-chart-pie"></i> 统计概览
    </div>
    <div class="page-tab" data-tab="report" onclick="switchTab('report')">
        <i class="fas fa-file-alt"></i> 自定义报表
    </div>
    <div class="page-tab" data-tab="reports" onclick="switchTab('reports')">
        <i class="fas fa-history"></i> 报告中心
    </div>
</div>

<!-- 统计概览 Tab -->
<div id="tab-overview" class="tab-panel active">
    <!-- 统计卡片 -->
    <div class="stat-row" id="statCards">
        <div class="stat-item" data-drill="orgCount" onclick="setDrill('orgCount')">
            <div class="stat-icon blue"><i class="fas fa-building"></i></div>
            <div class="stat-info">
                <div class="stat-number" id="statOrgCount">0</div>
                <div class="stat-label">机构总数</div>
                <div class="stat-trend up" id="statOrgTrend"><i class="fas fa-arrow-up"></i> 本月新增 <span>0</span></div>
            </div>
        </div>
        <div class="stat-item" data-drill="serviceCount" onclick="setDrill('serviceCount')">
            <div class="stat-icon green"><i class="fas fa-file-contract"></i></div>
            <div class="stat-info">
                <div class="stat-number" id="statServiceCount">0</div>
                <div class="stat-label">服务数量</div>
                <div class="stat-trend up">合同/项目/报告</div>
            </div>
        </div>
        <div class="stat-item" data-drill="serviceQuality" onclick="setDrill('serviceQuality')">
            <div class="stat-icon cyan"><i class="fas fa-award"></i></div>
            <div class="stat-info">
                <div class="stat-number" id="statQuality">0%</div>
                <div class="stat-label">服务质量</div>
                <div class="stat-trend up">合格/及时/一次通过</div>
            </div>
        </div>
        <div class="stat-item" data-drill="satisfaction" onclick="setDrill('satisfaction')">
            <div class="stat-icon purple"><i class="fas fa-smile"></i></div>
            <div class="stat-info">
                <div class="stat-number" id="statSatisfaction">0</div>
                <div class="stat-label">客户满意度</div>
                <div class="stat-trend up">平均分 5分制</div>
            </div>
        </div>
        <div class="stat-item" data-drill="credit" onclick="setDrill('credit')">
            <div class="stat-icon orange"><i class="fas fa-star"></i></div>
            <div class="stat-info">
                <div class="stat-number" id="statCredit">A级 0%</div>
                <div class="stat-label">信用分布</div>
                <div class="stat-trend">各等级机构占比</div>
            </div>
        </div>
    </div>

    <!-- 维度切换 -->
    <div class="panel" style="margin-bottom: 20px;">
        <div class="panel-body">
            <div class="filter-bar" style="border-bottom: none; padding: 0; margin-bottom: 0;">
                <div class="filter-group">
                    <label>机构筛选</label>
                    <select id="orgFilter" onchange="applyOrgFilter(); refreshOverview();">
                        <option value="">全部机构</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>时间维度</label>
                    <select id="timeDim" onchange="refreshOverview()">
                        <option value="week">本周</option>
                        <option value="month" selected>本月</option>
                        <option value="quarter">本季度</option>
                        <option value="year">本年度</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>区域维度</label>
                    <select id="areaDim" onchange="refreshOverview()">
                        <option value="">全部区域</option>
                        <option>奉贤区</option>
                        <option>浦东新区</option>
                        <option>徐汇区</option>
                        <option>黄浦区</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>专业领域</label>
                    <select id="fieldDim" onchange="refreshOverview()">
                        <option value="">全部领域</option>
                        <option>建筑工地</option>
                        <option>基坑</option>
                        <option>交通</option>
                        <option>玻璃幕墙</option>
                        <option>燃气</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>机构类型</label>
                    <select id="typeDim" onchange="refreshOverview()">
                        <option value="">全部类型</option>
                        <option>检测检验机构</option>
                        <option>安全评价机构</option>
                        <option>设计咨询机构</option>
                        <option>施工监理机构</option>
                    </select>
                </div>
                <div class="filter-actions">
                    <button class="btn btn-primary" onclick="refreshOverview()">
                        <i class="fas fa-sync-alt"></i> 刷新
                    </button>
                    <button class="btn btn-outline" onclick="resetDrillFilter()">
                        <i class="fas fa-undo"></i> 重置下钻
                    </button>
                    <button class="btn btn-outline" onclick="openReportConfig()">
                        <i class="fas fa-cog"></i> 自定义报表
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 图表区域 -->
    <div class="chart-row" style="display:flex !important;flex-direction:row !important;gap:var(--gap);">
        <div class="chart-card wide" style="flex:2 1 0;min-width:0;">
            <div class="chart-header">
                <div class="chart-title" id="mainChartTitle">机构类型分布 <span>按第三方服务机构类型统计</span></div>
                <div class="chart-actions">
                    <button class="btn btn-sm btn-outline" onclick="switchChartType('bar')">柱状</button>
                    <button class="btn btn-sm btn-outline" onclick="switchChartType('line')">折线</button>
                    <button class="btn btn-sm btn-outline" onclick="switchChartType('pie')">饼图</button>
                </div>
            </div>
            <div class="chart-body">
                <div id="mainChart" style="width:100%;height:100%;"></div>
            </div>
        </div>
        <div class="chart-card narrow" style="flex:1 1 0;min-width:0;">
            <div class="chart-header">
                <div class="chart-title">关键指标占比</div>
            </div>
            <div class="chart-body">
                <div id="subChart" style="width:100%;height:100%;"></div>
            </div>
        </div>
    </div>

    <div class="chart-row">
        <div class="chart-card full">
            <div class="chart-header">
                <div class="chart-title">趋势分析 <span>点击图表数据可下钻查看明细</span></div>
            </div>
            <div class="chart-body">
                <div id="trendChart" style="width:100%;height:100%;"></div>
            </div>
        </div>
    </div>

    <!-- 明细表格 -->
    <div class="panel" style="margin-top: 32px;">
        <div class="panel-header">
            <div class="panel-title"><i class="fas fa-table"></i> 机构统计明细</div>
            <div class="filter-actions">
                <button class="btn btn-sm btn-outline" onclick="exportTable()">
                    <i class="fas fa-download"></i> 导出
                </button>
            </div>
        </div>
        <div class="panel-body" style="padding: 0;">
            <div class="table-wrapper">
                <table class="data-table" id="statsTable">
                    <thead id="statsTableHead"></thead>
                    <tbody id="statsTableBody"></tbody>
                </table>
            </div>
            <div class="list-pagination" id="statsPagination"></div>
        </div>
    </div>
</div>

<!-- 自定义报表 Tab -->
<div id="tab-report" class="tab-panel">
    <div class="panel">
        <div class="panel-header">
            <div class="panel-title"><i class="fas fa-sliders-h"></i> 报表配置</div>
            <div class="filter-actions">
                <button class="btn btn-sm btn-outline" onclick="openTemplateDrawer()">
                    <i class="fas fa-save"></i> 保存为模板
                </button>
                <button class="btn btn-sm btn-primary" onclick="generateReport()">
                    <i class="fas fa-magic"></i> 生成报告
                </button>
            </div>
        </div>
        <div class="panel-body">
            <div class="form-row" style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div class="form-group">
                    <label>报表名称</label>
                    <input type="text" id="reportName" placeholder="请输入报表名称">
                </div>
                <div class="form-group">
                    <label>统计周期</label>
                    <select id="reportPeriod">
                        <option value="week">周报</option>
                        <option value="month" selected>月报</option>
                        <option value="quarter">季报</option>
                        <option value="year">年报</option>
                    </select>
                </div>

<script>
(function(){

    document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
        localStorage.setItem('theme', e.data.theme);
    }
});

// 从统一数据层构建机构统计列表
function buildOrgList() {
    if (typeof getAllOrgs !== 'function') return [];
    return getAllOrgs().map(function(o) {
        var contracts = typeof getContractsByOrg === 'function' ? getContractsByOrg(o.orgId) : [];
        var performances = typeof getPerformancesByOrg === 'function' ? getPerformancesByOrg(o.orgId) : [];
        var experts = typeof getExpertsByOrg === 'function' ? getExpertsByOrg(o.orgId) : [];
        var credit = typeof getCreditByOrg === 'function' ? getCreditByOrg(o.orgId) : null;
        var score = credit && typeof credit.score === 'number' ? credit.score : (o.score || 80);
        var creditLevel = o.creditLevel || '未评级';
        if (!o.creditLevel) {
            if (score >= 90) creditLevel = 'AAA';
            else if (score >= 85) creditLevel = 'AA';
            else if (score >= 80) creditLevel = 'A';
            else if (score >= 70) creditLevel = 'B';
            else creditLevel = 'C';
        }
        var district = (o.region || '').replace(/^上海市/, '');
        // 基于真实合同/业绩计算数量，避免随机 seed
        var contractCount = contracts.length;
        var projectCount = performances.length;
        var reportCount = contractCount + projectCount;
        // 服务质量指标：基于合同状态计算，默认兜底
        var qualifiedRate = computeQualifiedRate(contracts, performances);
        var onTimeRate = computeOnTimeRate(contracts, performances);
        var passRate = computePassRate(performances);
        // 满意度：基于业绩结论映射
        var satisfaction = computeSatisfaction(performances);
        var satisfactionDist = computeSatisfactionDist(performances);
        return {
            orgId: o.orgId,
            name: o.orgName,
            type: o.orgType || '其他机构',
            field: o.field || '',
            district: district,
            established: o.established || '',
            contracts: contractCount,
            projects: projectCount,
            reports: reportCount,
            qualifiedRate: qualifiedRate,
            onTimeRate: onTimeRate,
            passRate: passRate,
            satisfaction: satisfaction,
            satisfactionDist: satisfactionDist,
            experts: experts.length,
            credit: creditLevel,
            score: score,
            status: o.status === '正常' ? '已审核' : '待审核'
        };
    });
}

function computeQualifiedRate(contracts, performances) {
    var total = contracts.length + performances.length;
    if (total === 0) return 0;
    var pass = 0;
    contracts.forEach(function(c) { if (c.status === '已验收' || c.status === '执行中') pass++; });
    performances.forEach(function(p) { if (p.conclusion === '优秀' || p.conclusion === '良好' || p.conclusion === '合格') pass++; });
    return Math.round(pass / total * 100);
}

function computeOnTimeRate(contracts, performances) {
    var total = contracts.length + performances.length;
    if (total === 0) return 0;
    // 简单判定：已验收/已通过视为按时
    var onTime = 0;
    contracts.forEach(function(c) { if (c.status === '已验收') onTime++; });
    performances.forEach(function(p) { if (p.auditStatus === '已通过') onTime++; });
    return Math.round(onTime / total * 100);
}

function computePassRate(performances) {
    var total = performances.length;
    if (total === 0) return 0;
    var pass = performances.filter(function(p) { return p.auditStatus === '已通过'; }).length;
    return Math.round(pass / total * 100);
}

function computeSatisfaction(performances) {
    if (!performances.length) return 4.0;
    var map = { '优秀': 5.0, '良好': 4.5, '合格': 4.0, '不合格': 2.5 };
    var sum = 0;
    performances.forEach(function(p) { sum += map[p.conclusion] || 4.0; });
    return parseFloat((sum / performances.length).toFixed(1));
}

function computeSatisfactionDist(performances) {
    var dist = { '5星': 0, '4星': 0, '3星': 0, '2星': 0, '1星': 0 };
    if (!performances.length) return dist;
    var map = { '优秀': 5, '良好': 4, '合格': 3, '不合格': 2 };
    performances.forEach(function(p) {
        var star = map[p.conclusion] || 3;
        dist[star + '星']++;
    });
    return dist;
}

var orgList = buildOrgList();
var currentDrill = 'orgCount';
var currentChartType = 'bar';
var filteredOrgList = orgList.slice();
var statsPage = 1;
var statsPageSize = 5;

        setTimeout(function() {
            chartInstances.main && chartInstances.main.resize();
            chartInstances.sub && chartInstances.sub.resize();
            chartInstances.trend && chartInstances.trend.resize();

    } else if (tab === 'report') {
        renderTemplates();
        renderReportPreview();
    } else if (tab === 'reports') {

function initOrgFilter() {
    var sel = document.getElementById('orgFilter');
    if (!sel || typeof getAllOrgs !== 'function') return;
    var current = sel.value;
    sel.innerHTML = '<option value="">全部机构</option>';
    getAllOrgs().forEach(function(o) {
        var opt = document.createElement('option');
        opt.value = o.orgId;
        opt.textContent = o.orgName;
        sel.appendChild(opt);
    });
    sel.value = current;
}

function initAreaFilter() {
    var sel = document.getElementById('areaDim');
    if (!sel || typeof getAllOrgs !== 'function') return;
    var areas = [];
    getAllOrgs().forEach(function(o) {
        var district = (o.region || '').replace(/^上海市/, '');
        if (district && areas.indexOf(district) === -1) areas.push(district);
    });
    sel.innerHTML = '<option value="">全部区域</option>' + areas.map(function(a) { return '<option>' + a + '</option>'; }).join('');
}

function applyFilters() {
    var orgSel = document.getElementById('orgFilter');
    var timeSel = document.getElementById('timeDim');
    var areaSel = document.getElementById('areaDim');
    var fieldSel = document.getElementById('fieldDim');
    var typeSel = document.getElementById('typeDim');
    currentFilters = {
        orgId: orgSel ? orgSel.value : '',
        timeDim: timeSel ? timeSel.value : 'month',
        area: areaSel ? areaSel.value : '',
        field: fieldSel ? fieldSel.value : '',
        type: typeSel ? typeSel.value : ''
    };
    filteredOrgList = orgList.filter(function(item) {
        if (currentFilters.orgId && item.orgId !== currentFilters.orgId) return false;
        if (currentFilters.area && item.district !== currentFilters.area) return false;
        if (currentFilters.field && item.field !== currentFilters.field) return false;
        if (currentFilters.type && item.type !== currentFilters.type) return false;
        return true;
    });
    statsPage = 1;
}

function setOrgFilter(orgId) {
    var sel = document.getElementById('orgFilter');
    if (!sel || !orgId) return;
    sel.value = orgId;
    applyFilters();
}

function setDrill(type) {
    currentDrill = type;
    document.querySelectorAll('.stat-item').forEach(function(el) { el.classList.remove('active'); });
    event.currentTarget.classList.add('active');
    refreshOverview();
}

function renderStatCards() {
    var list = filteredOrgList.length ? filteredOrgList : orgList;
    var total = list.length;
    var serviceCount = list.reduce(function(sum, i) { return sum + i.contracts + i.projects + i.reports; }, 0);
    var avgQuality = total ? Math.round(list.reduce(function(sum, i) { return sum + i.qualifiedRate; }, 0) / total) : 0;
    var avgSatisfaction = total ? (list.reduce(function(sum, i) { return sum + i.satisfaction; }, 0) / total).toFixed(1) : 0;
    var creditA = list.filter(function(i) { return i.credit === 'A' || i.credit === 'AA' || i.credit === 'AAA'; }).length;
    var creditAPct = total ? Math.round(creditA / total * 100) : 0;
    var newThisMonth = list.filter(function(i) {
        if (!i.established) return false;
        var d = new Date(i.established);
        var now = new Date();
        return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    }).length;
    document.getElementById('statOrgCount').textContent = total;
    document.querySelector('#statOrgTrend span').textContent = newThisMonth;
    document.getElementById('statServiceCount').textContent = serviceCount.toLocaleString();
    document.getElementById('statQuality').textContent = avgQuality + '%';
    document.getElementById('statSatisfaction').textContent = avgSatisfaction;
    document.getElementById('statCredit').textContent = 'A级及以上 ' + creditAPct + '%';
    document.querySelectorAll('.stat-item').forEach(function(el) { el.classList.toggle('active', el.dataset.drill === currentDrill); });
}

function switchChartType(type) {
    currentChartType = type;
    refreshOverview();
}

function refreshOverview() {
    applyFilters();
    renderStatCards();
    setTimeout(function() {
        renderMainChart();
        renderSubChart();
        renderTrendChart();
    }, 100);
    renderStatsTable();
}

function renderSubChart(highlightName) {
    var el = document.getElementById('subChart');
    if (!el) return;
    if (chartInstances.sub) { chartInstances.sub.dispose(); }
    chartInstances.sub = echarts.init(el);
    var list = filteredOrgList.length ? filteredOrgList : orgList;
    var creditMap = {};
    list.forEach(function(item) {
        var key = item.credit + '级';
        creditMap[key] = (creditMap[key] || 0) + 1;
    });
    if (Object.keys(creditMap).length === 0) {
        creditMap['未评级'] = 0;
    }
    var creditData = Object.keys(creditMap).map(function(k) { return { value: creditMap[k], name: k }; });
    var selected = {};
    if (highlightName) {
        creditData.forEach(function(d) { selected[d.name] = d.name === highlightName; });
    }
    chartInstances.sub.setOption({
        tooltip: { trigger: 'item' },
        legend: { orient: 'vertical', left: 'left', textStyle: { color: 'var(--text-secondary)' } },
        series: [{ type: 'pie', radius: ['40%', '70%'], avoidLabelOverlap: false, label: { show: false }, selectedMode: highlightName ? 'single' : false, selected: selected, data: creditData }]
    });
    chartInstances.sub.on('click', function(params) { showDrillDetail(params.name); });
}

function drillByMainChart(name) {
    // 根据当前指标判断下钻维度
    var list = filteredOrgList.length ? filteredOrgList : orgList;
    if (currentDrill === 'credit') {
        var level = name.replace('级', '');
        filteredOrgList = list.filter(function(item) { return item.credit === level; });
        renderSubChart(name);
    } else if (currentDrill === 'satisfaction') {
        filteredOrgList = list.filter(function(item) { return Math.round(item.satisfaction) === Math.round(parseFloat(name)) || item.type === name; });
        renderSubChart();
    } else if (currentDrill === 'newOrg') {
        var year = name.replace('年', '');
        filteredOrgList = list.filter(function(item) { return (item.established || '').substring(0, 4) === year; });
        renderSubChart();
    } else {
        filteredOrgList = list.filter(function(item) { return item.type === name; });
        renderSubChart();
    }
    statsPage = 1;
    renderStatsTable();
    renderStatCards();
    renderTrendChart();
}

function resetDrillFilter() {
    applyFilters();
    refreshOverview();
}

function renderMainChart() {
    var el = document.getElementById('mainChart');
    if (!el) return;
    if (chartInstances.main) { chartInstances.main.dispose(); }

    var titleMap = {
        orgCount: '机构数量统计',
        serviceCount: '服务数量统计',

        satisfaction: '客户满意度统计',

        passRate: '一次通过率统计',
        newOrg: '新增机构统计'
    };
    document.getElementById('mainChartTitle').innerHTML = titleMap[currentDrill] + ' <span>按当前维度统计</span>';

    var data = getDrillData(currentDrill);

        option = {

        };
    } else if (currentChartType === 'line') {
        option = {
            tooltip: { trigger: 'axis' },
            grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
            xAxis: { type: 'category', data: data.map(function(i) { return i.name; }), axisLabel: { color: 'var(--text-secondary)' } },
            yAxis: { type: 'value', axisLabel: { color: 'var(--text-secondary)' }, splitLine: { lineStyle: { color: 'var(--border)' } } },
            series: [{ data: data.map(function(i) { return i.value; }), type: 'line', smooth: true, itemStyle: { color: '#1a73e8' } }]
        };
    } else {
        option = {
            tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
            grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
            xAxis: { type: 'category', data: data.map(function(i) { return i.name; }), axisLabel: { color: 'var(--text-secondary)' } },
            yAxis: { type: 'value', axisLabel: { color: 'var(--text-secondary)' }, splitLine: { lineStyle: { color: 'var(--border)' } } },
            series: [{ data: data.map(function(i) { return i.value; }), type: 'bar', barWidth: '40%', itemStyle: { borderRadius: [4, 4, 0, 0], color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: '#1a73e8' }, { offset: 1, color: '#64b5f6' }]) } }]
        };
    }
    chartInstances.main.setOption(option);
    chartInstances.main.on('click', function(params) { drillByMainChart(params.name); });
}

function renderTrendChart() {
    var el = document.getElementById('trendChart');

    if (chartInstances.trend) { chartInstances.trend.dispose(); }

    var values = timeDim === 'week' ? [120, 122, 124, 125, 126, 127, 128] : (timeDim === 'quarter' ? [115, 122, 128] : (timeDim === 'year' ? [98, 102, 108, 115, 122, 128, 130, 132, 135, 138, 140, 142] : [98, 102, 108, 115, 122, 128]));
    chartInstances.trend.setOption({
        tooltip: { trigger: 'axis' },

        series: [{
            data: values, type: 'line', smooth: true,
            areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{ offset: 0, color: 'rgba(26,115,232,0.3)' }, { offset: 1, color: 'rgba(26,115,232,0.05)' }]) },
            lineStyle: { color: '#1a73e8', width: 3 }, itemStyle: { color: '#1a73e8' }
        }]
    });
    chartInstances.trend.on('click', function(params) { showDrillDetail(params.name); });
}

function getDrillData(drill) {
    var list = filteredOrgList.length ? filteredOrgList : orgList;
    var counts = {};
    if (drill === 'orgCount') {
        list.forEach(function(item) { counts[item.type] = (counts[item.type] || 0) + 1; });
    } else if (drill === 'serviceCount') {
        list.forEach(function(item) { counts[item.type] = (counts[item.type] || 0) + item.contracts + item.projects + item.reports; });
    } else if (drill === 'serviceQuality') {
        list.forEach(function(item) { counts[item.type] = (counts[item.type] || 0) + item.qualifiedRate; });
        for (var k in counts) { counts[k] = Math.round(counts[k] / list.filter(function(i) { return i.type === k; }).length); }
    } else if (drill === 'satisfaction') {
        list.forEach(function(item) { counts[item.type] = (counts[item.type] || 0) + item.satisfaction; });
        for (var k in counts) { counts[k] = (counts[k] / list.filter(function(i) { return i.type === k; }).length).toFixed(1); }
    } else if (drill === 'credit') {
        list.forEach(function(item) { counts[item.credit + '级'] = (counts[item.credit + '级'] || 0) + 1; });
    } else if (drill === 'timeliness') {
        list.forEach(function(item) { counts[item.type] = (counts[item.type] || 0) + item.onTimeRate; });
        for (var k in counts) { counts[k] = Math.round(counts[k] / list.filter(function(i) { return i.type === k; }).length); }
    } else if (drill === 'passRate') {
        list.forEach(function(item) { counts[item.type] = (counts[item.type] || 0) + item.passRate; });
        for (var k in counts) { counts[k] = Math.round(counts[k] / list.filter(function(i) { return i.type === k; }).length); }
    } else if (drill === 'newOrg') {
        return getNewOrgData(list);
    }
    return Object.keys(counts).map(function(k) { return { name: k, value: counts[k] }; });
}

function getNewOrgData(list) {
    var map = {};
    list.forEach(function(item) {
        var y = (item.established || '').substring(0, 4);
        if (y) map[y] = (map[y] || 0) + 1;
    });
    if (Object.keys(map).length === 0) {
        return [{ name: '检测检验', value: 0 }, { name: '安全评价', value: 0 }, { name: '设计咨询', value: 0 }, { name: '施工监理', value: 0 }, { name: '其他', value: 0 }];
    }
    return Object.keys(map).sort().map(function(k) { return { name: k + '年', value: map[k] }; });
}

function showDrillDetail(name) {
    document.getElementById('reportModalTitle').textContent = '明细数据 - ' + name;
    var html = '<p style="color:var(--text-secondary);margin-bottom:12px;">已筛选出 ' + name + ' 相关的机构数据：</p>';
    html += '<table class="data-table"><thead><tr><th>机构名称</th><th>类型</th><th>领域</th><th>区域</th><th>合同数</th><th>项目数</th><th>报告数</th><th>满意度</th></tr></thead><tbody>';
    var filter = name.replace('级', '');
    var list = orgList.filter(function(item) { return item.type.indexOf(name) !== -1 || item.credit === filter || item.field === name; });
    list.forEach(function(item) {
        var nameCell = item.orgId ? '<a style="cursor:pointer;color:var(--primary);text-decoration:underline;" onclick="goToTPOrg(\'' + item.orgId + '\')">' + item.name + '</a>' : item.name;
        html += '<tr><td>' + nameCell + '</td><td>' + item.type + '</td><td>' + item.field + '</td><td>' + item.district + '</td><td>' + item.contracts + '</td><td>' + item.projects + '</td><td>' + item.reports + '</td><td>' + item.satisfaction + '</td></tr>';
    });
    html += '</tbody></table>';
    document.getElementById('reportModalBody').innerHTML = html;
    document.getElementById('reportModal').classList.add('active');
}

function closeReportModal() { document.getElementById('reportModal').classList.remove('active'); }

function renderStatsTable() {
    var thead = document.getElementById('statsTableHead');
    var tbody = document.getElementById('statsTableBody');
    if (!tbody) return;
    thead.innerHTML = '<tr><th>机构名称</th><th>机构类型</th><th>业务领域</th><th>所在区域</th><th>合同数</th><th>项目数</th><th>报告数</th><th>合格率</th><th>及时率</th><th>满意度</th><th>信用等级</th><th>状态</th></tr>';
    tbody.innerHTML = '';
    if (!filteredOrgList || filteredOrgList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="12" style="text-align:center;color:var(--text-secondary);padding:24px;">暂无符合条件的数据</td></tr>';
        renderStatsPagination(0);
        return;
    }
    var start = (statsPage - 1) * statsPageSize;
    var pageData = filteredOrgList.slice(start, start + statsPageSize);
    pageData.forEach(function(item) {
        var creditClass = item.credit === 'A' ? 'badge-green' : (item.credit === 'B' ? 'badge-blue' : 'badge-orange');
        var statusClass = item.status === '已审核' ? 'badge-green' : 'badge-orange';
        var nameCell = item.orgId ?
            '<a style="cursor:pointer;color:var(--primary);text-decoration:underline;" onclick="goToTPOrg(\'' + item.orgId + '\')">' + item.name + '</a>' :
            item.name;
        var row = document.createElement('tr');
        row.innerHTML =
            '<td>' + nameCell + '</td>' +
            '<td>' + item.type + '</td>' +
            '<td>' + item.field + '</td>' +
            '<td>' + item.district + '</td>' +
            '<td>' + item.contracts + '</td>' +
            '<td>' + item.projects + '</td>' +
            '<td>' + item.reports + '</td>' +
            '<td>' + item.qualifiedRate + '%</td>' +
            '<td>' + item.onTimeRate + '%</td>' +
            '<td>' + item.satisfaction + '</td>' +
            '<td><span class="td-badge ' + creditClass + '">' + item.credit + '</span></td>' +
            '<td><span class="td-badge ' + statusClass + '">' + item.status + '</span></td>';
        row.onclick = function() { showDrillDetail(item.name); };
        tbody.appendChild(row);
    });
    renderStatsPagination(Math.ceil(filteredOrgList.length / statsPageSize) || 1);
}

function renderStatsPagination(totalPages) {
    var container = document.getElementById('statsPagination');
    if (!container) return;
    var total = filteredOrgList.length;
    var html = '<span class="page-info">共 ' + total + ' 条</span>';
    html += '<button class="page-btn" ' + (statsPage === 1 || totalPages === 0 ? 'disabled' : '') + ' onclick="goStatsPage(' + (statsPage - 1) + ')">上一页</button>';
    for (var i = 1; i <= totalPages; i++) {
        html += '<button class="page-btn ' + (i === statsPage ? 'active' : '') + '" onclick="goStatsPage(' + i + ')" ' + (i === statsPage ? 'disabled' : '') + '>' + i + '</button>';
    }
    html += '<button class="page-btn" ' + (statsPage === totalPages || totalPages === 0 ? 'disabled' : '') + ' onclick="goStatsPage(' + (statsPage + 1) + ')">下一页</button>';
    container.innerHTML = html;
}

function goStatsPage(page) {
    var totalPages = Math.ceil(filteredOrgList.length / statsPageSize) || 1;
    if (page < 1 || page > totalPages) return;
    statsPage = page;
    renderStatsTable();
}

function searchStats() {
    var type = document.getElementById('filterType').value;
    var field = document.getElementById('filterField').value;
    var district = document.getElementById('filterDistrict').value;
    filteredOrgList = orgList.filter(function(item) {
        if (type && item.type !== type) return false;
        if (field && item.field !== field) return false;
        if (district && item.district !== district) return false;
        return true;
    });
    statsPage = 1;
    renderStatsTable();
}

function resetStats() {
    document.getElementById('filterType').value = '';
    document.getElementById('filterField').value = '';
    document.getElementById('filterDistrict').value = '';
    filteredOrgList = orgList.slice();
    statsPage = 1;
    renderStatsTable();
}

function exportTable() {
    alert('数据导出功能：将导出当前机构统计明细为 Excel/CSV 格式');
}

// 自定义报表配置
function initCheckboxGroup(id, key) {
    document.querySelectorAll('#' + id + ' .checkbox-item').forEach(function(el) {
        el.addEventListener('click', function() {
            el.classList.toggle('checked');
            var vals = Array.from(document.querySelectorAll('#' + id + ' .checkbox-item.checked')).map(function(e) { return e.dataset.value; });
            reportConfig[key] = vals;
            debounceRenderReportPreview();
        });
    });
}

var reportPreviewTimer = null;
function debounceRenderReportPreview() {
    if (reportPreviewTimer) clearTimeout(reportPreviewTimer);
    reportPreviewTimer = setTimeout(renderReportPreview, 300);
}

function renderReportPreview() {
    var name = document.getElementById('reportName').value.trim() || '自定义统计报告';
    var period = document.getElementById('reportPeriod').value;
    var periodText = { week: '周报', month: '月报', quarter: '季报', year: '年报' }[period];
    var preview = document.getElementById('reportPreview');
    var panel = document.getElementById('reportPreviewPanel');
    var chartsContainer = document.getElementById('reportCharts');
    panel.style.display = 'block';
    var html = '<strong>' + name + '（' + periodText + '）</strong><br>';
    html += '统计指标：' + reportConfig.indicators.map(function(i) { return indicatorName(i); }).join('、') + '<br>';
    html += '统计维度：' + reportConfig.dimensions.map(function(i) { return dimensionName(i); }).join('、') + '<br>';
    html += '可视化形式：' + reportConfig.chartTypes.join('、') + '<br><br>';
    html += '核心数据摘要：<br>';
    reportConfig.indicators.forEach(function(ind) {
        html += '• ' + indicatorName(ind) + '：' + getIndicatorSummary(ind) + '<br>';
    });
    preview.innerHTML = html;

    chartsContainer.innerHTML = '';
    if (reportConfig.chartTypes.indexOf('table') !== -1) {
        chartsContainer.appendChild(buildReportTable());
    }
    reportConfig.chartTypes.forEach(function(type) {
        if (type === 'table') return;
        var chartDiv = document.createElement('div');
        chartDiv.className = 'panel';
        chartDiv.style.marginTop = '16px';
        chartDiv.style.marginBottom = '0';
        chartDiv.innerHTML = '<div class="panel-header"><div class="panel-title">' + chartTypeTitle(type) + '</div></div><div class="panel-body" style="height:320px;"><div id="reportChart-' + type + '" style="width:100%;height:100%;"></div></div>';
        chartsContainer.appendChild(chartDiv);
        setTimeout(function() { renderReportChart(type, 'reportChart-' + type); }, 0);
    });
}

function chartTypeTitle(type) {
    return { bar: '柱状图', pie: '饼图', line: '折线图' }[type] || type;
}

function buildReportTable() {
    var panel = document.createElement('div');
    panel.className = 'panel';
    panel.style.marginTop = '16px';
    panel.style.marginBottom = '0';
    var list = filteredOrgList.length ? filteredOrgList : orgList;
    var html = '<div class="panel-header"><div class="panel-title"><i class="fas fa-table"></i> 数据明细</div></div><div class="panel-body" style="padding:0;"><div class="table-wrapper"><table class="data-table"><thead><tr><th>机构名称</th><th>类型</th><th>领域</th><th>区域</th>' + reportConfig.indicators.map(function(i) { return '<th>' + indicatorName(i) + '</th>'; }).join('') + '</tr></thead><tbody>';
    list.slice(0, 20).forEach(function(item) {
        html += '<tr><td>' + item.name + '</td><td>' + item.type + '</td><td>' + item.field + '</td><td>' + item.district + '</td>' + reportConfig.indicators.map(function(i) { return '<td>' + formatIndicatorValue(i, item) + '</td>'; }).join('') + '</tr>';
    });
    html += '</tbody></table></div></div>';
    panel.innerHTML = html;
    return panel;
}

function formatIndicatorValue(ind, item) {
    if (ind === 'orgCount') return 1;
    if (ind === 'serviceCount') return item.contracts + item.projects + item.reports;
    if (ind === 'serviceQuality') return item.qualifiedRate + '%';
    if (ind === 'satisfaction') return item.satisfaction;
    if (ind === 'credit') return item.credit;
    if (ind === 'timeliness') return item.onTimeRate + '%';
    if (ind === 'passRate') return item.passRate + '%';
    if (ind === 'newOrg') return item.established || '-';
    return '-';
}

function renderReportChart(type, containerId) {
    var el = document.getElementById(containerId);
    if (!el) return;
    var chart = echarts.init(el);
    var dimension = reportConfig.dimensions[0] || 'orgType';
    var indicator = reportConfig.indicators[0] || 'orgCount';
    var data = getReportDataByDimension(dimension, indicator);
    var option = {};
    if (type === 'bar') {
        option = {
            tooltip: { trigger: 'axis' }, grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: data.map(function(i) { return i.name; }) },
            yAxis: { type: 'value' },
            series: [{ data: data.map(function(i) { return i.value; }), type: 'bar', itemStyle: { borderRadius: [4, 4, 0, 0], color: '#1a73e8' } }]
        };
    } else if (type === 'pie') {
        option = { tooltip: { trigger: 'item' }, series: [{ type: 'pie', radius: '60%', data: data }] };
    } else if (type === 'line') {
        option = {
            tooltip: { trigger: 'axis' }, grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
            xAxis: { type: 'category', data: data.map(function(i) { return i.name; }) },
            yAxis: { type: 'value' },
            series: [{ data: data.map(function(i) { return i.value; }), type: 'line', smooth: true }]
        };
    }
    chart.setOption(option);
    chart.resize();
}

function getReportDataByDimension(dimension, indicator) {
    var list = filteredOrgList.length ? filteredOrgList : orgList;
    var keyFn = function(item) {
        if (dimension === 'time') return (item.established || '').substring(0, 4) || '未知';
        if (dimension === 'area') return item.district || '未知';
        if (dimension === 'field') return item.field || '未知';
        if (dimension === 'orgType') return item.type || '未知';
        if (dimension === 'credit') return item.credit || '未知';
        return item.type;
    };
    var counts = {};
    list.forEach(function(item) {
        var key = keyFn(item);
        var value = 0;
        if (indicator === 'orgCount') value = 1;
        else if (indicator === 'serviceCount') value = item.contracts + item.projects + item.reports;
        else if (indicator === 'serviceQuality') value = item.qualifiedRate;
        else if (indicator === 'satisfaction') value = item.satisfaction;
        else if (indicator === 'timeliness') value = item.onTimeRate;
        else if (indicator === 'passRate') value = item.passRate;
        counts[key] = (counts[key] || 0) + value;
    });
    return Object.keys(counts).map(function(k) { return { name: k, value: counts[k] }; });
}

function openReportConfig() { switchTab('report'); }

function openTemplateDrawer() {
    document.getElementById('templateDrawer').classList.add('active');
    document.getElementById('templatePreview').textContent = '已选择指标：' + reportConfig.indicators.join('、') + '；统计维度：' + reportConfig.dimensions.join('、') + '；图表类型：' + reportConfig.chartTypes.join('、');
}

function closeTemplateDrawer() { document.getElementById('templateDrawer').classList.remove('active'); }

function saveTemplate() {
    var name = document.getElementById('templateName').value.trim();
    if (!name) { alert('请输入模板名称'); return; }
    var template = {
        id: Date.now(),
        name: name,
        desc: document.getElementById('templateDesc').value.trim() || '',
        indicators: reportConfig.indicators.slice(),
        dimensions: reportConfig.dimensions.slice(),
        chartTypes: reportConfig.chartTypes.slice(),
        period: document.getElementById('reportPeriod').value,
        createTime: formatNow()
    };
    templates.push(template);
    localStorage.setItem('orgReportTemplates', JSON.stringify(templates));
    closeTemplateDrawer();
    renderTemplates();
    alert('模板保存成功');
}

function renderTemplates() {
    var container = document.getElementById('templateList');
    if (!container) return;
    if (templates.length === 0) { container.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;padding:12px 0;">暂无保存的模板，请配置后保存。</p>'; return; }
    container.innerHTML = templates.map(function(t) {
        return '<div class="template-item" onclick="loadTemplate(' + t.id + ')" id="template-' + t.id + '">' +
            '<div><div class="template-name">' + t.name + '</div><div class="template-meta">' + (t.desc || '') + ' · 创建时间：' + t.createTime + '</div></div>' +
            '<div class="template-actions"><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();deleteTemplate(' + t.id + ')">删除</button><button class="btn btn-sm btn-primary" onclick="event.stopPropagation();applyTemplate(' + t.id + ')">应用</button></div>' +
            '</div>';
    }).join('');
}

function loadTemplate(id) {
    var t = templates.find(function(i) { return i.id === id; });
    if (!t) return;
    document.getElementById('reportName').value = t.name;
    document.getElementById('reportPeriod').value = t.period;
    setCheckboxValues('indicatorGroup', t.indicators);
    setCheckboxValues('dimensionGroup', t.dimensions);
    setCheckboxValues('chartTypeGroup', t.chartTypes);
    reportConfig = { indicators: t.indicators, dimensions: t.dimensions, chartTypes: t.chartTypes };
    document.querySelectorAll('.template-item').forEach(function(el) { el.classList.remove('active'); });
    document.getElementById('template-' + id).classList.add('active');
}

function applyTemplate(id) {
    loadTemplate(id);
    generateReport();
}

function deleteTemplate(id) {
    if (!confirm('确定删除该模板？')) return;
    templates = templates.filter(function(i) { return i.id !== id; });
    localStorage.setItem('orgReportTemplates', JSON.stringify(templates));
    renderTemplates();
}

function setCheckboxValues(groupId, values) {
    document.querySelectorAll('#' + groupId + ' .checkbox-item').forEach(function(el) {
        el.classList.toggle('checked', values.indexOf(el.dataset.value) !== -1);
    });
}

function generateReport() {
    var name = document.getElementById('reportName').value.trim() || '自定义统计报告';
    var period = document.getElementById('reportPeriod').value;
    var periodText = { week: '周报', month: '月报', quarter: '季报', year: '年报' }[period];
    var preview = document.getElementById('reportPreview');
    var panel = document.getElementById('reportPreviewPanel');
    panel.style.display = 'block';
    var html = '<strong>' + name + '（' + periodText + '）</strong><br>';
    html += '统计指标：' + reportConfig.indicators.map(function(i) { return indicatorName(i); }).join('、') + '<br>';
    html += '统计维度：' + reportConfig.dimensions.map(function(i) { return dimensionName(i); }).join('、') + '<br>';
    html += '可视化形式：' + reportConfig.chartTypes.join('、') + '<br><br>';
    html += '核心数据摘要：<br>';
    reportConfig.indicators.forEach(function(ind) {
        html += '• ' + indicatorName(ind) + '：' + getIndicatorSummary(ind) + '<br>';
    });
    preview.innerHTML = html;

    var report = { id: Date.now(), name: name, period: periodText, createTime: formatNow(), indicators: reportConfig.indicators.slice() };
    reports.unshift(report);
    localStorage.setItem('orgReports', JSON.stringify(reports));
    renderReportPreview();
}

function generateAutoReport(period) {
    var periodText = { week: '周报', month: '月报', quarter: '季报', year: '年报' }[period];
    var report = { id: Date.now(), name: '第三方服务机构' + periodText, period: periodText, createTime: formatNow(), indicators: ['orgCount', 'serviceCount', 'serviceQuality', 'satisfaction'] };
    reports.unshift(report);
    localStorage.setItem('orgReports', JSON.stringify(reports));
    renderReports();
    alert(periodText + '已生成');
}

function renderReports() {
    var container = document.getElementById('reportList');
    if (!container) return;
    if (reports.length === 0) { container.innerHTML = '<p style="color:var(--text-secondary);font-size:13px;">暂无生成的报告，可点击上方按钮生成。</p>'; return; }
    container.innerHTML = reports.map(function(r) {
        var iconClass = r.period === '周报' ? 'blue' : (r.period === '月报' ? 'green' : (r.period === '季报' ? 'orange' : 'purple'));
        return '<div class="report-card">' +
            '<div class="report-icon ' + iconClass + '"><i class="fas fa-file-alt"></i></div>' +
            '<div class="report-info"><div class="report-title">' + r.name + '</div><div class="report-meta">生成时间：' + r.createTime + ' · 指标：' + r.indicators.map(function(i) { return indicatorName(i); }).join('、') + '</div></div>' +
            '<div class="report-actions"><button class="btn btn-sm btn-outline" onclick="viewReport(' + r.id + ')">查看</button><button class="btn btn-sm btn-primary" onclick="exportReport(' + r.id + ')">导出</button></div>' +
            '</div>';
    }).join('');
}

function viewReport(id) {
    var r = reports.find(function(i) { return i.id === id; });
    if (!r) return;
    document.getElementById('reportModalTitle').textContent = r.name;
    document.getElementById('reportModalBody').innerHTML = '<p><strong>生成时间：</strong>' + r.createTime + '</p><p><strong>统计指标：</strong>' + r.indicators.map(function(i) { return indicatorName(i); }).join('、') + '</p><p style="color:var(--text-secondary);margin-top:12px;">此处展示完整的报告内容，包括表格、图表和数据分析结论。</p>';
    document.getElementById('reportModal').classList.add('active');
}

function exportReport(id) {
    alert('报告导出功能：将生成 PDF/Excel 格式的统计报告供下载');
}

function indicatorName(key) {
    var map = { orgCount: '机构数量', serviceCount: '服务数量', serviceQuality: '服务质量', satisfaction: '客户满意度', credit: '信用分布', timeliness: '及时率', passRate: '一次通过率', newOrg: '新增机构' };
    return map[key] || key;
}

function dimensionName(key) {
    var map = { time: '时间', area: '区域', field: '专业领域', orgType: '机构类型', credit: '信用等级' };
    return map[key] || key;
}

function getIndicatorSummary(ind) {
    var map = { orgCount: '128 家机构', serviceCount: '1,256 项服务', serviceQuality: '平均合格率 96.2%', satisfaction: '平均满意度 4.8 分', credit: 'A级机构占比 68%', timeliness: '平均及时率 93.5%', passRate: '平均一次通过率 94.2%', newOrg: '本月新增 8 家' };
    return map[ind] || '-';
}

function formatNow() {
    var now = new Date();
    return now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0') + ' ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
}

window.addEventListener('resize', function() {
    for (var k in chartInstances) { if (chartInstances[k]) chartInstances[k].resize(); }
});

window.onload = function() {
    initOrgFilter();
    initAreaFilter();
    var params = getTPQueryParams ? getTPQueryParams() : { orgId: '' };
    if (params.orgId) {
        setOrgFilter(params.orgId);
    }
    initCheckboxGroup('indicatorGroup', 'indicators', reportConfig, renderReportPreview);
    initCheckboxGroup('dimensionGroup', 'dimensions', reportConfig, renderReportPreview);
    initCheckboxGroup('chartTypeGroup', 'chartTypes', reportConfig, renderReportPreview);
    document.getElementById('reportName').addEventListener('input', debounceRenderReportPreview);
    document.getElementById('reportPeriod').addEventListener('change', renderReportPreview);
    refreshOverview();
    renderTemplates(templates);
    renderReports(reports);
    renderReportPreview();
};
</script>
