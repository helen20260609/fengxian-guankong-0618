<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专家详情</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #1a73e8;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --bg-card: #ffffff;
    --bg-dark: #f0f2f5;
    --success: #1e8e3e;
    --danger: #d93025;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-card); padding: 0; }
.card { max-width: 100%; margin: 0; background: var(--bg-card); border: none; border-radius: 0; overflow: hidden; }
.body { padding: 20px; background: var(--bg-card); }
.header { display: none; }
.actions { display: none; }
.section-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin: 20px 0 12px; display: flex; align-items: center; gap: 8px; }
.section-title:first-of-type { margin-top: 0; }
.info-table { width: 100%; border-collapse: collapse; font-size: 14px; line-height: 1.8; }
.info-table td { padding: 8px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
.info-table td:first-child { width: 110px; color: var(--text-secondary); border-bottom: 1px solid var(--border); }
.info-table tr:last-child td { border-bottom: none; }
.tag { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; white-space: nowrap; }
.tag-success { background: rgba(30,142,62,0.12); color: var(--success); }
.tag-danger { background: rgba(217,48,37,0.12); color: var(--danger); }
.timeline { position: relative; padding-left: 20px; margin-top: 12px; }
.timeline::before { content: ''; position: absolute; left: 5px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
.timeline-item { position: relative; margin-bottom: 16px; }
.timeline-item:last-child { margin-bottom: 0; }
.timeline-dot { position: absolute; left: -17px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); border: 2px solid var(--bg-card); box-shadow: 0 0 0 2px var(--border); }
.timeline-dot.add { background: var(--primary); }
.timeline-dot.edit { background: var(--warning); }
.timeline-dot.audit { background: var(--success); }
.timeline-dot.reject { background: var(--danger); }
.timeline-dot.delete { background: var(--text-secondary); }
.timeline-dot.enable { background: var(--success); }
.timeline-dot.disable { background: var(--danger); }
.timeline-time { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
.timeline-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
.timeline-badge { display: inline-block; padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 500; }
.timeline-badge.add { background: rgba(26,115,232,0.12); color: var(--primary); }
.timeline-badge.edit { background: rgba(227,116,0,0.12); color: var(--warning); }
.timeline-badge.audit { background: rgba(30,142,62,0.12); color: var(--success); }
.timeline-badge.reject { background: rgba(217,48,37,0.12); color: var(--danger); }
.timeline-badge.delete { background: rgba(95,99,104,0.12); color: var(--text-secondary); }
.timeline-badge.enable { background: rgba(30,142,62,0.12); color: var(--success); }
.timeline-badge.disable { background: rgba(217,48,37,0.12); color: var(--danger); }
.timeline-meta { font-size: 11px; color: var(--text-secondary); margin-bottom: 2px; }
.timeline-remark { font-size: 12px; color: var(--text-primary); line-height: 1.5; }
.timeline-diff { margin-top: 4px; padding: 6px 10px; background: var(--bg-dark); border-radius: 6px; font-size: 11px; color: var(--text-secondary); line-height: 1.5; }
.timeline-diff-item { margin-bottom: 2px; }
.timeline-empty { text-align: center; color: var(--text-secondary); padding: 24px 0; font-size: 12px; }
.file-list { display: flex; flex-direction: column; gap: 8px; }
.file-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); font-size: 13px; color: var(--text-primary); }
.file-item i { color: var(--primary); }
.file-item .file-name { flex: 1; }
.file-item .file-status { font-size: 12px; color: var(--text-secondary); }
.actions { display: flex; justify-content: flex-end; margin-top: 16px; }
.btn { padding: 8px 20px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-primary); font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn:hover { border-color: var(--primary); color: var(--primary); }
</style>
<!-- 在iframe中显示，隐藏关闭按钮和header -->
<style>
@media (max-width: 1px) {}
.view-in-iframe .header,
.view-in-iframe .actions,
.view-in-iframe .close-btn {
    display: none !important;
}
</style>
</head>
<body>
<!-- 专家详情（用于iframe弹窗内嵌显示�?-->
<div class="card" id="expertCard">
    <div class="body">
        <table class="info-table" id="infoTable"></table>
        <div class="section-title"><i class="fas fa-paperclip" style="color: var(--primary);"></i> 附件材料</div>
        <div class="file-list" id="fileList"></div>
        <div class="section-title"><i class="fas fa-history" style="color: var(--primary);"></i> 变更历史</div>
        <div id="historyTimeline"></div>
    </div>
</div>
<script src="../js/third-party-data.js"></script>
<script src="tp-expert-view.js"></script>
</body>
</html>
