</head>

    function init() {
        loadData();
        renderCategoryList();
        bindFilterEvents();
        renderList();
        renderKPIs();
    }

    function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try { allData = JSON.parse(raw); } catch (e) { allData = getDefaultData(); }
        } else {
            allData = getDefaultData();
            saveData();
        }
    }

    function saveData() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(allData));
    }

    function restoreDefaultData() {
        if (confirm('确定恢复默认技术资料数据吗？当前新增或修改的数据将被覆盖。')) {
            allData = getDefaultData();
            saveData();
            currentPage = 1;
            renderCategoryList();
            renderList();
            renderKPIs();
        }
    }

    function bindFilterEvents() {
        document.getElementById('searchKeyword').addEventListener('input', () => { currentPage = 1; renderList(); });
        document.getElementById('searchCategory').addEventListener('change', () => { currentPage = 1; renderList(); });
        document.getElementById('searchFormat').addEventListener('change', () => { currentPage = 1; renderList(); });
    }

    function renderCategoryList() {
        const counts = {};
        allData.forEach(item => { counts[item.category] = (counts[item.category] || 0) + 1; });
        const container = document.getElementById('categoryList');
        container.innerHTML = CATEGORIES.map(cat => `
            <div class="category-item ${cat.id === currentCategory ? 'active' : ''}" onclick="selectCategory('${cat.id}')">
                <span><i class="fas ${cat.icon}"></i> ${cat.label}</span>
                <span class="category-count">${cat.id === 'all' ? allData.length : (counts[cat.id] || 0)}</span>
            </div>
        `).join('');
    }

    function selectCategory(cat) {
        currentCategory = cat;
        currentPage = 1;
        document.getElementById('searchCategory').value = cat === 'all' ? '' : cat;
        renderCategoryList();
        renderList();
    }

    function getFilteredData() {
        const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
        const category = document.getElementById('searchCategory').value;
        const format = document.getElementById('searchFormat').value;
        return allData.filter(item => {
            if (currentCategory !== 'all' && item.category !== currentCategory) return false;
            if (category && item.category !== category) return false;
            if (format && item.format !== format) return false;
            if (keyword) {
                const text = [item.title, item.summary, item.tags.join(' '), item.content].join(' ').toLowerCase();
                return text.includes(keyword);
            }
            return true;
        }).sort((a, b) => new Date(b.updateDate) - new Date(a.updateDate));
    }

    function renderList() {
        const data = getFilteredData();
        const total = data.length;
        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * pageSize;
        const list = data.slice(start, start + pageSize);

        const categoryLabel = CATEGORIES.find(c => c.id === currentCategory).label;
        document.getElementById('contentTitle').textContent = categoryLabel;
        document.getElementById('contentStats').textContent = `共 ${total} 条`;

        const container = document.getElementById('materialList');
        if (list.length === 0) {
            container.innerHTML = `
                <div class="empty-state" style="grid-column: 1 / -1;">
                    <i class="fas fa-folder-open"></i>
                    <div>未找到符合条件的技术资料</div>
                </div>`;
        } else {
            container.innerHTML = list.map(item => `
                <div class="material-card" onclick="openDetail('${item.id}')">
                    <div class="material-icon"><i class="fas ${FORMAT_ICONS[item.format] || 'fa-file'}"></i></div>
                    <div class="material-info">
                        <div class="material-title">${item.title}</div>
                        <div class="material-meta">
                            <span><i class="fas fa-tag"></i> ${getCategoryLabel(item.category)}</span>
                            <span><i class="fas fa-file"></i> ${item.format}</span>
                            <span><i class="fas fa-weight-hanging"></i> ${item.size}</span>
                            <span><i class="fas fa-calendar-alt"></i> ${item.updateDate}</span>
                            <span><i class="fas fa-eye"></i> ${item.views}</span>
                            <span><i class="fas fa-download"></i> ${item.downloads}</span>
                        </div>
                        <div class="material-tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                        <div class="material-desc">${item.summary}</div>
                        <div class="material-actions" onclick="event.stopPropagation()">
                            <button class="btn btn-primary btn-sm" onclick="openDetail('${item.id}')"><i class="fas fa-eye"></i> 查阅</button>
                            <button class="btn btn-outline btn-sm" onclick="downloadMaterial('${item.id}')"><i class="fas fa-download"></i> 下载</button>
                            <button class="btn btn-outline btn-sm" onclick="openEditModal('${item.id}')"><i class="fas fa-edit"></i> 编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteMaterial('${item.id}')"><i class="fas fa-trash"></i> 删除</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const container = document.getElementById('pagination');
        if (totalPages <= 1) { container.innerHTML = ''; return; }
        let html = `<button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        }
        html += `<button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
        container.innerHTML = html;
    }

    function changePage(p) {
        currentPage = p;
        renderList();
    }

    function renderKPIs() {
        const total = allData.length;
        const guides = allData.filter(i => i.category === 'guide').length;
        const atlas = allData.filter(i => i.category === 'atlas').length;
        const now = new Date();
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        const newCount = allData.filter(i => new Date(i.updateDate) >= monthStart).length;
        document.getElementById('kpiTotal').textContent = total;
        document.getElementById('kpiGuide').textContent = guides;
        document.getElementById('kpiAtlas').textContent = atlas;
        document.getElementById('kpiNew').textContent = newCount;
    }

    function getCategoryLabel(id) {
        const cat = CATEGORIES.find(c => c.id === id);
        return cat ? cat.label : id;
    }

    function resetFilter() {
        document.getElementById('searchKeyword').value = '';
        document.getElementById('searchCategory').value = '';
        document.getElementById('searchFormat').value = '';
        currentCategory = 'all';
        currentPage = 1;
        renderCategoryList();
        renderList();
    }

    function initEditor() {
        if (editor) return;
        const { createEditor, createToolbar } = window.wangEditor;
        const editorConfig = { placeholder: '支持在线查阅的详细内容...', onChange: () => {} };
        editor = createEditor({
            selector: '#editor-container',
            html: '<p><br></p>',
            config: editorConfig,
            mode: 'simple'
        });
        createToolbar({
            editor,
            selector: '#toolbar-container',
            mode: 'simple'
        });
    }

    function openAddModal() {
        document.getElementById('editModalTitle').textContent = '新增技术资料';
        document.getElementById('materialId').value = '';
        document.getElementById('mTitle').value = '';
        document.getElementById('mCategory').value = 'guide';
        document.getElementById('mFormat').value = 'PDF';
        document.getElementById('mVersion').value = 'V1.0';
        document.getElementById('mSize').value = '';
        document.getElementById('mUpdateDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('mTags').value = '';
        document.getElementById('mSummary').value = '';
        openModal('editModal');
        initEditor();
        setTimeout(() => { if (editor) editor.setHtml('<p><br></p>'); }, 0);
    }

    function openEditModal(id) {
        const item = allData.find(i => i.id === id);
        if (!item) return;
        document.getElementById('editModalTitle').textContent = '编辑技术资料';
        document.getElementById('materialId').value = item.id;
        document.getElementById('mTitle').value = item.title;
        document.getElementById('mCategory').value = item.category;
        document.getElementById('mFormat').value = item.format;
        document.getElementById('mVersion').value = item.version;
        document.getElementById('mSize').value = item.size;
        document.getElementById('mUpdateDate').value = item.updateDate;
        document.getElementById('mTags').value = item.tags.join(' ');
        document.getElementById('mSummary').value = item.summary;
        openModal('editModal');
        initEditor();
        setTimeout(() => { if (editor) editor.setHtml(item.content || '<p><br></p>'); }, 0);
    }

    function saveMaterial() {
        const title = document.getElementById('mTitle').value.trim();
        const category = document.getElementById('mCategory').value;
        if (!title) { alert('请输入资料标题'); return; }
        const id = document.getElementById('materialId').value;
        const tags = document.getElementById('mTags').value.split(/\s+/).filter(Boolean);
        const newItem = {
            id: id || Date.now().toString(),
            title: title,
            category: category,
            format: document.getElementById('mFormat').value,
            version: document.getElementById('mVersion').value || 'V1.0',
            size: document.getElementById('mSize').value || '-',
            updateDate: document.getElementById('mUpdateDate').value || new Date().toISOString().split('T')[0],
            tags: tags,
            summary: document.getElementById('mSummary').value,
            content: editor ? editor.getHtml() : '',
            downloads: id ? allData.find(i => i.id === id).downloads : 0,
            views: id ? allData.find(i => i.id === id).views : 0
        };
        if (id) {
            const idx = allData.findIndex(i => i.id === id);
            if (idx >= 0) allData[idx] = newItem;
        } else {
            allData.unshift(newItem);
        }
        saveData();
        closeModal('editModal');
        renderCategoryList();
        renderList();
        renderKPIs();
    }

    function deleteMaterial(id) {
        if (confirm('确定删除该技术资料吗？')) {
            allData = allData.filter(i => i.id !== id);
            saveData();
            renderCategoryList();
            renderList();
            renderKPIs();
        }
    }

    function openDetail(id) {
        const item = allData.find(i => i.id === id);
        if (!item) return;
        currentDetail = item;
        item.views++;
        saveData();
        document.getElementById('detailModalTitle').textContent = item.title;
        document.getElementById('detailModalBody').innerHTML = `
            <div class="detail-header">
                <div class="material-icon" style="width:64px;height:64px;font-size:28px;"><i class="fas ${FORMAT_ICONS[item.format] || 'fa-file'}"></i></div>
                <div class="detail-main">
                    <div class="detail-title">${item.title}</div>
                    <div class="material-meta" style="margin-bottom:0;">
                        <span><i class="fas fa-tag"></i> ${getCategoryLabel(item.category)}</span>
                        <span><i class="fas fa-file"></i> ${item.format}</span>
                        <span><i class="fas fa-code-branch"></i> ${item.version}</span>
                        <span><i class="fas fa-weight-hanging"></i> ${item.size}</span>
                        <span><i class="fas fa-calendar-alt"></i> ${item.updateDate}</span>
                    </div>
                </div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-info-circle"></i> 内容简介</div>
                <div class="detail-content">${item.summary}</div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-tags"></i> 关键词</div>
                <div class="material-tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-book"></i> 在线查阅</div>
                <div class="detail-content">${item.content}</div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-paperclip"></i> 附件文件</div>
                <div class="file-list">
                    <div class="file-item">
                        <div class="file-item-info">
                            <i class="fas ${FORMAT_ICONS[item.format] || 'fa-file'} file-item-icon"></i>
                            <span>${item.title}.${item.format.toLowerCase()}</span>
                        </div>
                        <button class="btn btn-primary btn-sm" onclick="downloadCurrentMaterial()"><i class="fas fa-download"></i> 下载</button>
                    </div>
                </div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-chart-bar"></i> 使用统计</div>
                <div class="detail-grid">
                    <div><span class="label">浏览次数：</span>${item.views}</div>
                    <div><span class="label">下载次数：</span>${item.downloads}</div>
                </div>
            </div>
        `;
        openModal('detailModal');
        renderList();
    }

    function downloadMaterial(id) {
        const item = allData.find(i => i.id === id);
        if (!item) return;
        item.downloads++;
        saveData();
        simulateDownload(item);
        renderList();
    }

    function downloadCurrentMaterial() {
        if (!currentDetail) return;
        currentDetail.downloads++;
        saveData();
        simulateDownload(currentDetail);
        renderList();
    }

    function simulateDownload(item) {
        const blob = new Blob([`【${item.title}】\n版本：${item.version}\n更新日期：${item.updateDate}\n\n${item.summary}\n\n${item.content.replace(/<[^>]+>/g, '')}`], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${item.title}.${item.format.toLowerCase()}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
    });

    window.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open')); });

    init();
</script>
