<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农村自建房 - 政策宣传</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/@wangeditor/editor@5.1.23/dist/css/style.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
            --secondary: #0097a7; --danger: #d93025; --warning: #e65100; --success: #1e8e3e;
            --bg-dark: #f0f2f5; --bg-card: #ffffff; --bg-hover: #e8eaed;
            --text-primary: #202124; --text-secondary: #5f6368; --border: #dadce0;
            --shadow: rgba(0,0,0,0.08); --input-bg: #ffffff; --input-border: #dadce0;
            --radius: 8px;
        }
        :root[data-theme="dark"] {
            --primary: #1e6fdb; --primary-dark: #1557b0; --primary-light: #e8f1fd;
            --secondary: #00b4d8; --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
            --bg-dark: #0a1628; --bg-card: #112240; --bg-hover: #1a2f4a;
            --text-primary: #e2e8f0; --text-secondary: #94a3b8; --border: #1e3a5f;
            --shadow: rgba(0,0,0,0.3); --input-bg: rgba(255,255,255,0.05); --input-border: #1e3a5f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 1400px; margin: 0 auto; }
        .page-title {
            font-size: 20px; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 16px;
        }
        .page-title i { color: var(--primary); }
        .page-desc {
            font-size: 13px; color: var(--text-secondary);
            margin-bottom: 20px; line-height: 1.6;
        }

        /* Toolbar */
        .toolbar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 16px;
            display: flex; gap: 12px; flex-wrap: wrap;
            align-items: center; justify-content: space-between;
            box-shadow: 0 1px 3px var(--shadow);
        }
        .filter-group {
            display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        .filter-item {
            display: flex; align-items: center; gap: 6px;
        }
        .filter-item label {
            font-size: 13px; color: var(--text-secondary); white-space: nowrap;
        }
        .filter-item input, .filter-item select {
            padding: 7px 10px; font-size: 13px;
            border: 1px solid var(--input-border); border-radius: 6px;
            background: var(--input-bg); color: var(--text-primary);
            min-width: 140px; outline: none; transition: border 0.2s;
        }
        .filter-item input:focus, .filter-item select:focus { border-color: var(--primary); }
        .btn {
            padding: 8px 14px; border-radius: 6px; font-size: 13px;
            border: 1px solid transparent; cursor: pointer; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border-color: var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-hover); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #b71c1c; }
        .btn-success { background: var(--success); color: #fff; }

        /* Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 16px;
        }
        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* Left category tree */
        .category-card {
            background: var(--bg-card);
            border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: 0 1px 3px var(--shadow);
            overflow: hidden;
        }
        .category-header {
            padding: 14px 16px; font-size: 14px; font-weight: 700;
            border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
        }
        .category-list { padding: 8px 0; }
        .category-item {
            padding: 9px 16px; font-size: 13px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 8px; color: var(--text-secondary);
        }
        .category-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .category-item.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
        .category-item i { font-size: 12px; width: 16px; text-align: center; }

        /* Content area */
        .content-card {
            background: var(--bg-card);
            border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: 0 1px 3px var(--shadow); overflow: hidden;
            display: flex; flex-direction: column; min-height: 560px;
        }
        .content-header {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .content-title { font-size: 14px; font-weight: 700; }
        .content-stats { font-size: 12px; color: var(--text-secondary); }

        .article-list { padding: 0; }
        .article-item {
            padding: 16px; border-bottom: 1px solid var(--border);
            transition: background 0.2s; cursor: pointer; position: relative;
        }
        .article-item:hover { background: var(--bg-hover); }
        .article-item:last-child { border-bottom: none; }
        .article-title {
            font-size: 15px; font-weight: 700; color: var(--text-primary);
            margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
        }
        .article-title .badge {
            font-size: 11px; font-weight: 500; padding: 2px 6px; border-radius: 4px;
            background: var(--primary-light); color: var(--primary);
        }
        .article-summary {
            font-size: 13px; color: var(--text-secondary); line-height: 1.6;
            margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        .article-meta {
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
            font-size: 12px; color: var(--text-secondary);
        }
        .article-meta span { display: inline-flex; align-items: center; gap: 4px; }
        .article-actions {
            position: absolute; top: 16px; right: 16px;
            display: flex; gap: 8px; opacity: 0; transition: opacity 0.2s;
        }
        .article-item:hover .article-actions { opacity: 1; }
        .article-actions .btn { padding: 4px 8px; font-size: 12px; }

        .media-preview {
            display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;
        }
        .media-thumb {
            width: 80px; height: 60px; border-radius: 6px; overflow: hidden;
            border: 1px solid var(--border); position: relative;
            background: var(--bg-dark); display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 12px;
        }
        .media-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .media-thumb .play-icon {
            position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3); color: #fff; font-size: 18px;
        }

        /* Pagination */
        .pagination {
            display: flex; align-items: center; justify-content: flex-end;
            gap: 6px; padding: 12px 16px; border-top: 1px solid var(--border);
        }
        .pagination button {
            padding: 5px 10px; font-size: 13px; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-primary); border-radius: 6px; cursor: pointer;
        }
        .pagination button:hover:not(:disabled) { background: var(--bg-hover); }
        .pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination .active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* Empty state */
        .empty-state {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-secondary); padding: 40px; gap: 12px;
        }
        .empty-state i { font-size: 48px; opacity: 0.3; }
        .empty-state p { font-size: 14px; }

        /* Modal */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            display: none; align-items: center; justify-content: center; z-index: 9999;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
            width: 100%; max-width: 820px; max-height: 90vh; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-header {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; font-weight: 700;
        }
        .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-secondary); }
        .modal-body { padding: 18px; overflow-y: auto; }
        .form-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px;
        }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text-primary);
        }
        .form-group label .required { color: var(--danger); margin-left: 2px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px 10px; font-size: 13px;
            border: 1px solid var(--input-border); border-radius: 6px;
            background: var(--input-bg); color: var(--text-primary); outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 120px; line-height: 1.5; }
        .editor-wrapper { border: 1px solid var(--input-border); border-radius: 6px; overflow: hidden; background: var(--input-bg); }
        .form-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .target-picker {
            display: flex; gap: 12px; border: 1px solid var(--input-border); border-radius: 8px; overflow: hidden;
            background: var(--input-bg); box-shadow: inset 0 1px 3px rgba(0,0,0,0.04); min-height: 280px; max-height: 320px;
        }
        .target-picker .panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .target-picker .panel + .panel { border-left: 1px solid var(--border); }
        .target-picker .panel-title {
            padding: 10px 14px; font-size: 13px; font-weight: 600; color: var(--text-secondary);
            background: var(--bg-hover); border-bottom: 1px solid var(--border);
        }
        .target-tree {
            flex: 1; overflow-y: auto; padding: 6px 0;
        }
        .target-group { border-bottom: 1px solid var(--border); }
        .target-group:last-child { border-bottom: none; }
        .target-group-header {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            font-weight: 600; font-size: 14px; cursor: pointer; background: transparent;
            user-select: none; transition: background 0.15s, color 0.15s; color: var(--text-primary);
        }
        .target-group-header:hover { background: var(--bg-hover); color: var(--primary); }
        .target-group-header i { transition: transform 0.2s; color: var(--text-secondary); width: 12px; text-align: center; font-size: 12px; }
        .target-group-header.expanded i { transform: rotate(90deg); }
        .target-group-header .town-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary); }
        .target-group-header span { flex: 1; }
        .target-group-body { display: none; padding: 4px 14px 10px 40px; }
        .target-group-body.expanded { display: block; }
        .target-row {
            display: flex; align-items: center; gap: 8px; padding: 6px 8px; margin: 2px 0; border-radius: 4px;
            font-size: 13px; color: var(--text-primary); transition: background 0.15s;
        }
        .target-row:hover { background: var(--bg-hover); }
        .target-row input { width: auto; accent-color: var(--primary); }

        .target-selected {
            flex: 1; overflow-y: auto; padding: 10px 14px;
        }
        .selected-empty { font-size: 13px; color: var(--text-secondary); text-align: center; margin-top: 40px; }
        .selected-list { display: flex; flex-direction: column; gap: 8px; }
        .selected-group { background: var(--bg-hover); border-radius: 6px; padding: 8px 10px; }
        .selected-group-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .selected-group-title i { color: var(--primary); font-size: 12px; }
        .selected-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .selected-tag {
            display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 12px;
            font-size: 12px; background: var(--primary); color: #fff; cursor: pointer; user-select: none;
            transition: opacity 0.15s;
        }
        .selected-tag:hover { opacity: 0.85; }
        .selected-tag i { font-size: 10px; }

        .modal-footer {
            padding: 12px 18px; border-top: 1px solid var(--border);
            display: flex; justify-content: flex-end; gap: 10px;
        }

        /* Detail preview */
        .detail-modal .modal { max-width: 900px; }
        .detail-body h2 { font-size: 18px; margin-bottom: 12px; }
        .detail-meta { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }
        .detail-content { font-size: 14px; line-height: 1.8; color: var(--text-primary); }
        .detail-content img { max-width: 100%; border-radius: 6px; margin: 10px 0; }
        .detail-content video { max-width: 100%; border-radius: 6px; margin: 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="page-title"><i class="fas fa-bullhorn"></i> 政策宣传</div>
    <div class="page-desc">
        发布农村危房改造政策、补助标准、申请流程等信息，支持图文、视频等多种形式，便于农户了解政策。内容可按乡镇、村定向推送。
    </div>

    <div class="toolbar">
        <div class="filter-group">
            <div class="filter-item">
                <label>关键字</label>
                <input type="text" id="searchKeyword" placeholder="搜索标题/内容">
            </div>
            <div class="filter-item">
                <label>分类</label>
                <select id="searchCategory">
                    <option value="">全部</option>
                    <option value="危房改造">危房改造</option>
                    <option value="补助标准">补助标准</option>
                    <option value="申请流程">申请流程</option>
                    <option value="技术指导">技术指导</option>
                    <option value="工匠培训">工匠培训</option>
                </select>
            </div>
            <div class="filter-item">
                <label>乡镇</label>
                <select id="searchTown">
                    <option value="">全部</option>
                </select>
            </div>
            <div class="filter-item">
                <label>村</label>
                <select id="searchVillage">
                    <option value="">全部</option>
                </select>
            </div>
            <div class="filter-item">
                <label>状态</label>
                <select id="searchStatus" onchange="onStatusChange()">
                    <option value="">全部（不含回收站）</option>
                    <option value="published">已发布</option>
                    <option value="draft">草稿</option>
                    <option value="deleted">回收站</option>
                </select>
            </div>
        </div>
        <div class="filter-group">
            <button class="btn btn-outline" onclick="resetFilter()"><i class="fas fa-rotate-left"></i> 重置</button>
            <button class="btn btn-outline" id="recycleBtn" onclick="toggleRecycle()"><i class="fas fa-trash-restore"></i> 回收站</button>
            <button class="btn btn-outline" onclick="restoreDefaultData()"><i class="fas fa-rotate-right"></i> 恢复默认数据</button>
            <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> 新增政策</button>
        </div>
    </div>

    <div class="main-layout">
        <div class="category-card">
            <div class="category-header"><i class="fas fa-folder-open" style="color:var(--primary)"></i> 政策分类</div>
            <div class="category-list" id="categoryList"></div>
        </div>

        <div class="content-card">
            <div class="content-header">
                <div class="content-title" id="contentTitle">全部政策</div>
                <div class="content-stats">共 <span id="totalCount">0</span> 条</div>
            </div>
            <div class="article-list" id="articleList"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header"><span id="modalTitle">新增政策宣传</span><button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label>标题 <span class="required">*</span></label>
                    <input type="text" id="editTitle" placeholder="请输入政策标题">
                </div>
                <div class="form-group">
                    <label>分类 <span class="required">*</span></label>
                    <select id="editCategory">
                        <option value="">请选择</option>
                        <option value="危房改造">危房改造</option>
                        <option value="补助标准">补助标准</option>
                        <option value="申请流程">申请流程</option>
                        <option value="技术指导">技术指导</option>
                        <option value="工匠培训">工匠培训</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>发布来源</label>
                    <input type="text" id="editSource" placeholder="如：住建局、乡村振兴局">
                </div>
                <div class="form-group">
                    <label>发布时间</label>
                    <input type="date" id="editDate">
                </div>
            </div>
            <div class="form-group">
                <label>摘要</label>
                <textarea id="editSummary" placeholder="简要概括政策内容，50-200字"></textarea>
            </div>
            <div class="form-group">
                <label>正文内容</label>
                <div class="editor-wrapper">
                    <div id="toolbar-container"></div>
                    <div id="editor-container"></div>
                </div>
            </div>
            <div class="form-group">
                <label>附件（图文/视频）</label>
                <input type="file" id="editFiles" multiple accept="image/*,video/*">
                <div class="form-hint">支持图片、视频文件，可一次上传多个。</div>
            </div>
            <div class="form-group">
                <label>定向推送</label>
                <div class="target-picker">
                    <div class="panel">
                        <div class="panel-title"><i class="fas fa-map-marker-alt"></i> 可选区域</div>
                        <div class="target-tree" id="targetTree"></div>
                    </div>
                    <div class="panel">
                        <div class="panel-title"><i class="fas fa-check-circle"></i> 已选区域</div>
                        <div class="target-selected" id="targetSelected"></div>
                    </div>
                </div>
                <div class="form-hint">左侧勾选乡镇或村，右侧实时显示已选区域；未选择则默认全区域可见。</div>
            </div>
            <div class="form-group">
                <label>状态</label>
                <select id="editStatus">
                    <option value="published">已发布</option>
                    <option value="draft">草稿</option>
                </select>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="savePolicy()"><i class="fas fa-save"></i> 保存</button>
        </div>
    </div>
</div>

<!-- Detail Modal -->
<div class="modal-overlay detail-modal" id="detailModal">
    <div class="modal">
        <div class="modal-header"><span>政策详情</span><button class="modal-close" onclick="closeDetailModal()"><i class="fas fa-times"></i></button></div>
        <div class="modal-body" id="detailBody"></div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeDetailModal()">关闭</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@wangeditor/editor@5.1.23/dist/index.js"></script>
<script>
const { createEditor, createToolbar } = window.wangEditor;
let editor = null;

const categories = [
    { id: '', label: '全部', icon: 'fa-th-large', count: 0 },
    { id: '危房改造', label: '危房改造', icon: 'fa-hammer', count: 0 },
    { id: '补助标准', label: '补助标准', icon: 'fa-coins', count: 0 },
    { id: '申请流程', label: '申请流程', icon: 'fa-clipboard-list', count: 0 },
    { id: '技术指导', label: '技术指导', icon: 'fa-tools', count: 0 },
    { id: '工匠培训', label: '工匠培训', icon: 'fa-user-graduate', count: 0 }
];

const regionTree = [
    { town: '南桥镇', villages: ['沈陆村', '江海村', '六墩村', '张翁庙村', '华严村'] },
    { town: '奉城镇', villages: ['幸福村', '集贤村', '蔡家桥村', '白衣聚村', '东门村'] },
    { town: '庄行镇', villages: ['庄行村', '潘垫村', '新华村', '长浜村', '存古村'] },
    { town: '金汇镇', villages: ['金汇村', '光辉村', '新建村', '明星村', '白沙村'] },
    { town: '青村镇', villages: ['陶宅村', '北唐村', '岳和村', '湾张村', '钱忠村'] },
    { town: '柘林镇', villages: ['柘林村', '华亭村', '新塘村', '营房村', '夹路村'] },
    { town: '四团镇', villages: ['四团村', '平安村', '邵厂村', '拾村村', '渔洋村'] },

function saveStorage() {
    localStorage.setItem('rural_policy_publicity', JSON.stringify(policies));
}

function renderCategories() {
    categories.forEach(c => {
        c.count = c.id ? policies.filter(p => p.category === c.id && p.status !== 'deleted').length : policies.filter(p => p.status !== 'deleted').length;
    });
    const html = categories.map(c => `
        <div class="category-item ${c.id === currentCategory ? 'active' : ''}" onclick="selectCategory('${c.id}')">
            <i class="fas ${c.icon}"></i>
            <span>${c.label}</span>
            <span style="margin-left:auto;font-size:12px;color:var(--text-secondary)">${c.count}</span>
        </div>
    `).join('');
    document.getElementById('categoryList').innerHTML = html;
}

function selectCategory(id) {
    currentCategory = id;
    currentPage = 1;
    renderCategories();
    renderList();
}

function renderTargetTree() {
    const html = regionTree.map(t => `
        <div class="target-group" data-town="${t.town}">
            <div class="target-group-header" onclick="toggleTargetGroup(event, '${t.town}')">
                <i class="fas fa-chevron-right"></i>
                <input type="checkbox" class="town-check" data-town="${t.town}" onclick="onTownCheckClick(event, '${t.town}')">
                <span>${t.town}</span>
            </div>
            <div class="target-group-body" id="target-group-${t.town}">
                ${t.villages.map(v => `
                    <div class="target-row">
                        <input type="checkbox" class="village-check" data-town="${t.town}" data-village="${v}" onchange="onVillageCheckChange('${t.town}')">
                        <span>${v}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
    document.getElementById('targetTree').innerHTML = html;
}

function toggleTargetGroup(event, town) {
    if (event && event.target.closest('.town-check')) return;
    const header = document.querySelector(`.target-group[data-town="${town}"] .target-group-header`);
    const body = document.getElementById(`target-group-${town}`);
    header.classList.toggle('expanded');
    body.classList.toggle('expanded');
}

function onTownCheckClick(event, town) {
    event.stopPropagation();
    const townCb = document.querySelector(`.town-check[data-town="${town}"]`);
    const checked = townCb.checked;
    document.querySelectorAll(`.village-check[data-town="${town}"]`).forEach(v => v.checked = checked);
    const header = document.querySelector(`.target-group[data-town="${town}"] .target-group-header`);
    const body = document.getElementById(`target-group-${town}`);
    if (checked) {
        header.classList.add('expanded');
        body.classList.add('expanded');
    }
    renderSelectedTargets();
}

function onVillageCheckChange(town) {
    updateTownCheck(town);
    renderSelectedTargets();
}

function updateTownCheck(town) {
    const villages = document.querySelectorAll(`.village-check[data-town="${town}"]`);
    const townCb = document.querySelector(`.town-check[data-town="${town}"]`);
    const checkedCount = Array.from(villages).filter(v => v.checked).length;
    townCb.checked = checkedCount > 0;
    if (checkedCount > 0) {
        const header = document.querySelector(`.target-group[data-town="${town}"] .target-group-header`);
        const body = document.getElementById(`target-group-${town}`);
        header.classList.add('expanded');
        body.classList.add('expanded');
    }
}

function renderSelectedTargets() {
    const targets = getFilterTargets();
    const container = document.getElementById('targetSelected');
    if (!targets.length) {
        container.innerHTML = '<div class="selected-empty">尚未选择定向推送区域<br>未选择则默认全区域可见</div>';
        return;
    }
    const grouped = {};
    targets.forEach(t => {
        if (!grouped[t.town]) grouped[t.town] = [];
        grouped[t.town].push(t.village);
    });
    const html = Object.entries(grouped).map(([town, villages]) => `
        <div class="selected-group">
            <div class="selected-group-title"><i class="fas fa-map-marker-alt"></i> ${town}</div>
            <div class="selected-tags">
                ${villages.map(v => `
                    <span class="selected-tag" onclick="removeSelectedTarget('${town}', '${v}')" title="点击移除">
                        ${v} <i class="fas fa-times"></i>
                    </span>
                `).join('')}
            </div>
        </div>
    `).join('');
    container.innerHTML = `<div class="selected-list">${html}</div>`;
}

function removeSelectedTarget(town, village) {
    const cb = document.querySelector(`.village-check[data-town="${town}"][data-village="${village}"]`);
    if (cb) {
        cb.checked = false;
        updateTownCheck(town);
        renderSelectedTargets();
    }
}

function initRegionFilters() {
    const townSel = document.getElementById('searchTown');
    const villageSel = document.getElementById('searchVillage');
    regionTree.forEach(t => {
        const opt = document.createElement('option'); opt.value = t.town; opt.textContent = t.town; townSel.appendChild(opt);
    });
    townSel.addEventListener('change', () => {
        villageSel.innerHTML = '<option value="">全部</option>';
        const town = regionTree.find(t => t.town === townSel.value);
        if (town) {
            town.villages.forEach(v => {
                const opt = document.createElement('option'); opt.value = v; opt.textContent = v; villageSel.appendChild(opt);
            });
        }
        currentPage = 1; renderList();
    });
    villageSel.addEventListener('change', () => { currentPage = 1; renderList(); });
}

function getFilterTargets() {
    const checked = document.querySelectorAll('.village-check:checked');
    return Array.from(checked).map(cb => ({ town: cb.dataset.town, village: cb.dataset.village }));
}

function setFilterTargets(targets) {
    document.querySelectorAll('.town-check, .village-check').forEach(cb => cb.checked = false);
    document.querySelectorAll('.target-group-header').forEach(h => h.classList.remove('expanded'));
    document.querySelectorAll('.target-group-body').forEach(b => b.classList.remove('expanded'));
    (targets || []).forEach(t => {
        const cb = document.querySelector(`.village-check[data-town="${t.town}"][data-village="${t.village}"]`);
        if (cb) {
            cb.checked = true;
            const header = document.querySelector(`.target-group[data-town="${t.town}"] .target-group-header`);
            const body = document.getElementById(`target-group-${t.town}`);
            if (header) header.classList.add('expanded');
            if (body) body.classList.add('expanded');
        }
    });
    regionTree.forEach(t => updateTownCheck(t.town));
    renderSelectedTargets();
}

function filterData() {
    const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
    const cat = document.getElementById('searchCategory').value;
    const town = document.getElementById('searchTown').value;
    const village = document.getElementById('searchVillage').value;
    const status = document.getElementById('searchStatus').value;

    return policies.filter(p => {
        if (status === 'deleted') {
            if (p.status !== 'deleted') return false;
        } else {
            if (p.status === 'deleted') return false;
            if (status && p.status !== status) return false;
        }
        if (currentCategory && p.category !== currentCategory) return false;
        if (cat && p.category !== cat) return false;
        if (keyword && !(p.title.includes(keyword) || p.summary.includes(keyword) || p.content.includes(keyword))) return false;
        if (town) {
            if (!p.targets || p.targets.length === 0) return false;
            if (!p.targets.some(t => t.town === town)) return false;
            if (village && !p.targets.some(t => t.village === village)) return false;
        }
        return true;
    }).sort((a, b) => new Date(b.date) - new Date(a.date));
}

function renderList() {
    const data = filterData();
    const status = document.getElementById('searchStatus').value;
    const inRecycle = status === 'deleted';
    document.getElementById('totalCount').textContent = data.length;
    document.getElementById('contentTitle').textContent = inRecycle ? '回收站' : (currentCategory ? categories.find(c => c.id === currentCategory).label : '全部政策');

    const listEl = document.getElementById('articleList');
    const start = (currentPage - 1) * pageSize;
    const pageData = data.slice(start, start + pageSize);

    if (data.length === 0) {
        listEl.innerHTML = `
            <div class="empty-state">
                <i class="fas ${inRecycle ? 'fa-trash-alt' : 'fa-folder-open'}"></i>
                <p>${inRecycle ? '回收站为空。' : '暂无政策宣传内容，点击“新增政策”发布第一条内容。'}</p>
            </div>
        `;
        document.getElementById('pagination').innerHTML = '';
        return;
    }

    listEl.innerHTML = pageData.map(p => `
        <div class="article-item" onclick="${inRecycle ? '' : `openDetail(${p.id})`}">
            <div class="article-title">
                ${p.title}
                <span class="badge">${p.category}</span>
                ${p.status === 'draft' ? '<span class="badge" style="background:var(--bg-hover);color:var(--text-secondary)">草稿</span>' : ''}
                ${p.status === 'deleted' ? '<span class="badge" style="background:var(--danger-light);color:var(--danger)">已删除</span>' : ''}
            </div>
            <div class="article-summary">${p.summary}</div>
            ${renderMediaPreview(p.media)}
            <div class="article-meta">
                <span><i class="fas fa-building"></i> ${p.source || '未知来源'}</span>
                <span><i class="fas fa-calendar-alt"></i> ${p.date}</span>
                <span><i class="fas fa-map-marker-alt"></i> ${formatTargets(p.targets)}</span>
                <span><i class="fas fa-eye"></i> ${p.status === 'published' ? '已发布' : (p.status === 'draft' ? '草稿' : '已删除')}</span>
            </div>
            <div class="article-actions" onclick="event.stopPropagation()">
                ${inRecycle ? `
                    <button class="btn btn-success" onclick="restorePolicy(${p.id})"><i class="fas fa-trash-restore"></i> 恢复</button>
                    <button class="btn btn-danger" onclick="permanentlyDelete(${p.id})"><i class="fas fa-trash-alt"></i> 彻底删除</button>
                ` : `
                    <button class="btn btn-outline" onclick="openEdit(${p.id})"><i class="fas fa-edit"></i> 编辑</button>
                    <button class="btn btn-danger" onclick="deletePolicy(${p.id})"><i class="fas fa-trash-alt"></i> 删除</button>
                `}
            </div>
        </div>
    `).join('');

    renderPagination(data.length);
}

function renderMediaPreview(media) {
    if (!media || media.length === 0) return '';
    const html = media.slice(0, 3).map((m, i) => {
        if (m.type && m.type.startsWith('video')) {
            return `<div class="media-thumb"><i class="fas fa-video"></i><div class="play-icon"><i class="fas fa-play-circle"></i></div></div>`;
        }
        return `<div class="media-thumb"><img src="${m.url || m}" alt=""></div>`;
    }).join('');
    return `<div class="media-preview">${html}${media.length > 3 ? `<div class="media-thumb" style="align-items:center;justify-content:center;">+${media.length-3}</div>` : ''}</div>`;
}

function formatTargets(targets) {
    if (!targets || targets.length === 0) return '全区域';
    const towns = [...new Set(targets.map(t => t.town))];
    if (towns.length === 1) {
        const villages = targets.filter(t => t.town === towns[0]).map(t => t.village);
        return `${towns[0]}（${villages.length}个村）`;
    }
    return `${towns.length}个乡镇`;
}

function renderPagination(total) {
    const totalPages = Math.ceil(total / pageSize) || 1;
    let html = `
        <button onclick="goPage(${currentPage-1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>
    `;
    for (let i = 1; i <= totalPages; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button onclick="goPage(${currentPage+1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
    document.getElementById('pagination').innerHTML = html;
}

function goPage(p) { currentPage = p; renderList(); }

function resetFilter() {
    document.getElementById('searchKeyword').value = '';
    document.getElementById('searchCategory').value = '';
    document.getElementById('searchTown').value = '';
    document.getElementById('searchVillage').innerHTML = '<option value="">全部</option>';
    document.getElementById('searchStatus').value = '';
    document.getElementById('recycleBtn').innerHTML = '<i class="fas fa-trash-restore"></i> 回收站';
    currentCategory = ''; currentPage = 1;
    renderCategories(); renderList();
}

function toggleRecycle() {
    const statusSel = document.getElementById('searchStatus');
    const btn = document.getElementById('recycleBtn');
    if (statusSel.value === 'deleted') {
        statusSel.value = '';
        btn.innerHTML = '<i class="fas fa-trash-restore"></i> 回收站';
    } else {
        statusSel.value = 'deleted';
        btn.innerHTML = '<i class="fas fa-list"></i> 返回列表';
    }
    currentPage = 1;
    renderList();
}

function onStatusChange() {
    const statusSel = document.getElementById('searchStatus');
    const btn = document.getElementById('recycleBtn');
    btn.innerHTML = statusSel.value === 'deleted' ? '<i class="fas fa-list"></i> 返回列表' : '<i class="fas fa-trash-restore"></i> 回收站';
    currentPage = 1;
    renderList();
}

function restoreDefaultData() {
    if (!confirm('确定恢复默认政策数据吗？会补充缺失的默认政策，已有的自定义政策不会被覆盖。')) return;
    const defaults = getDefaultPolicies();
    defaults.forEach(d => {
        const existing = policies.find(p => p.id === d.id);
        if (!existing) {
            policies.push(d);
        }
    });
    saveStorage();
    renderCategories();
    renderList();
    alert('默认政策数据已恢复。');
}

function initEditor(html) {
    if (editor) { editor.destroy(); editor = null; }
    const editorConfig = { placeholder: '请输入正文内容...', autoFocus: false };
    editor = createEditor({ selector: '#editor-container', html: html || '', config: editorConfig, mode: 'default' });
    createToolbar({ editor, selector: '#toolbar-container', config: { excludeKeys: ['group-video', 'insertVideo', 'uploadVideo'] }, mode: 'default' });
}

function getEditorHtml() { return editor ? editor.getHtml() : ''; }
function setEditorHtml(html) { if (editor) editor.setHtml(html || ''); }

function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '新增政策宣传';
    document.getElementById('editTitle').value = '';
    document.getElementById('editCategory').value = '';
    document.getElementById('editSource').value = '';
    document.getElementById('editDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('editSummary').value = '';
    document.getElementById('editStatus').value = 'published';
    document.getElementById('editFiles').value = '';
    setFilterTargets([]);
    document.getElementById('editModal').classList.add('open');
    initEditor('');
}

function openEdit(id) {
    const p = policies.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = '编辑政策宣传';
    document.getElementById('editTitle').value = p.title;
    document.getElementById('editCategory').value = p.category;
    document.getElementById('editSource').value = p.source || '';
    document.getElementById('editDate').value = p.date;
    document.getElementById('editSummary').value = p.summary;
    document.getElementById('editStatus').value = p.status;
    document.getElementById('editFiles').value = '';
    setFilterTargets(p.targets);
    document.getElementById('editModal').classList.add('open');
    initEditor(p.content || '');
}

function closeModal() { document.getElementById('editModal').classList.remove('open'); }

function savePolicy() {
    const title = document.getElementById('editTitle').value.trim();
    const category = document.getElementById('editCategory').value;
    const source = document.getElementById('editSource').value.trim();
    const date = document.getElementById('editDate').value;
    const summary = document.getElementById('editSummary').value.trim();
    const content = getEditorHtml();
    const status = document.getElementById('editStatus').value;
    const targets = getFilterTargets();

    if (!title || !category) {
        alert('请填写标题和分类'); return;
    }

    // Handle file attachments (mock URLs)
    const fileInput = document.getElementById('editFiles');
    const media = [];
    if (fileInput.files.length > 0) {
        Array.from(fileInput.files).forEach(f => {
            media.push({ name: f.name, type: f.type, url: URL.createObjectURL(f) });
        });
    }

    if (editingId) {
        const p = policies.find(x => x.id === editingId);
        Object.assign(p, { title, category, source, date, summary, content, status, targets });
        if (media.length > 0) p.media = media;
    } else {
        const newId = policies.length ? Math.max(...policies.map(p => p.id)) + 1 : 1;
        policies.push({ id: newId, title, category, source, date, summary, content, status, targets, media });
    }
    saveStorage();
    closeModal();
    renderCategories();
    renderList();
}

function deletePolicy(id) {
    if (!confirm('确定将该政策宣传内容移入回收站吗？')) return;
    const p = policies.find(x => x.id === id);
    if (p) {
        p.status = 'deleted';
        p.deletedAt = new Date().toISOString();
    }
    saveStorage();
    renderCategories();
    renderList();
}

function restorePolicy(id) {
    const p = policies.find(x => x.id === id);
    if (p) {
        p.status = 'published';
        delete p.deletedAt;
    }
    saveStorage();
    renderCategories();
    renderList();
}

function permanentlyDelete(id) {
    if (!confirm('确定彻底删除该政策？此操作无法恢复。')) return;
    policies = policies.filter(p => p.id !== id);
    saveStorage();
    renderCategories();
    renderList();
}

function openDetail(id) {
    const p = policies.find(x => x.id === id);
    if (!p) return;
    const mediaHtml = (p.media || []).map(m => {
        if (m.type && m.type.startsWith('video')) {
            return `<video controls src="${m.url}"></video>`;
        }
        return `<img src="${m.url}" alt="">`;
    }).join('');
    document.getElementById('detailBody').innerHTML = `
        <h2>${p.title}</h2>
        <div class="detail-meta">
            <span><i class="fas fa-building"></i> ${p.source || '未知来源'}</span>
            <span style="margin-left:12px;"><i class="fas fa-calendar-alt"></i> ${p.date}</span>
            <span style="margin-left:12px;"><i class="fas fa-map-marker-alt"></i> ${formatTargets(p.targets)}</span>
            <span style="margin-left:12px;"><i class="fas fa-tag"></i> ${p.category}</span>
        </div>
        <div class="detail-content">
            ${p.content}
            ${mediaHtml}
        </div>
    `;
    document.getElementById('detailModal').classList.add('open');
}
