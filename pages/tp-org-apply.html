<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机构在线提交资料 - 第三方服务机构</title>
<link rel="stylesheet" href="./all.min.css">
<script src="../js/third-party-data.js"></script>
<style>
:root {
    --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
    --secondary: #0097a7; --danger: #d93025; --warning: #e37400; --success: #1e8e3e;
    --bg-dark: #f0f2f5; --bg-card: #ffffff; --bg-hover: #e8eaed;
    --text-primary: #202124; --text-secondary: #5f6368; --border: #dadce0; --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff; --input-border: #dadce0;
}
:root[data-theme="dark"] {
    --primary: #1e6fdb; --primary-dark: #1557b0; --primary-light: #e8f1fd;
    --secondary: #00b4d8; --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
    --bg-dark: #0a1628; --bg-card: #112240; --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0; --text-secondary: #94a3b8; --border: #1e3a5f; --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05); --input-border: #1e3a5f;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }
.page-header { max-width: 900px; margin: 0 auto 20px; }
.page-title { font-size: 20px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
.page-subtitle { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; max-width: 900px; margin: 0 auto 20px; overflow: hidden; }
.form-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.form-body { padding: 20px; }
.form-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.form-section:last-child { border-bottom: none; margin-bottom: 0; }
.form-section-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-row:last-child { margin-bottom: 0; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full-width { grid-column: 1 / -1; }
.form-group label { font-size: 13px; color: var(--text-primary); font-weight: 500; }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--input-bg); color: var(--text-primary); font-size: 13px; outline: none; transition: border-color 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }
.file-upload { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--input-bg); }
.file-upload input[type="file"] { display: none; }
.file-upload-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text-primary); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.file-upload-btn:hover { border-color: var(--primary); color: var(--primary); }
.file-upload-text { font-size: 13px; color: var(--text-secondary); }
.form-actions { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
.btn { padding: 10px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.step-bar { display: flex; align-items: center; justify-content: space-between; max-width: 700px; margin: 0 auto 24px; }
.step-item { display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 13px; }
.step-dot { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-hover); display: flex; align-items: center; justify-content: center; font-weight: 600; }
.step-item.active .step-dot { background: var(--primary); color: #fff; }
.step-item.active { color: var(--primary); font-weight: 600; }
.success-card { text-align: center; padding: 40px 20px; display: none; }
.success-card.active { display: block; }
.success-icon { font-size: 56px; color: var(--success); margin-bottom: 16px; }
.success-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.success-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
.success-meta { background: var(--bg-dark); border-radius: 8px; padding: 16px; display: inline-block; text-align: left; font-size: 13px; line-height: 1.8; }
</style>
</head>
<body>
<div class="page-header">
    <div class="page-title"><i class="fas fa-building" style="color: var(--primary);"></i> 机构在线提交资料</div>
    <div class="page-subtitle">请如实填写机构信息并上传相关资质材料，提交后进入审核流程。</div>
</div>

<div class="step-bar" id="stepBar">
    <div class="step-item active" data-step="1"><div class="step-dot">1</div><span>填写资料</span></div>
    <div class="step-item" data-step="2"><div class="step-dot">2</div><span>提交审核</span></div>
    <div class="step-item" data-step="3"><div class="step-dot">3</div><span>完成</span></div>
</div>

<div class="form-card" id="applyFormCard">
    <div class="form-header">
        <div class="form-title"><i class="fas fa-edit" style="color: var(--primary);"></i> 机构申请信息</div>
    </div>
    <div class="form-body">
        <div class="form-section">
            <div class="form-section-title"><i class="fas fa-user-tie"></i> 法人信息</div>
            <div class="form-row">
                <div class="form-group"><label>法人姓名 <span class="required">*</span></label><input type="text" id="legalName" placeholder="请输入法人姓名"></div>
                <div class="form-group"><label>联系电话 <span class="required">*</span></label><input type="text" id="legalPhone" placeholder="请输入联系电话"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>身份证号 <span class="required">*</span></label><input type="text" id="legalIdCard" placeholder="请输入18位身份证号"></div>
                <div class="form-group"><label>电子邮箱</label><input type="email" id="legalEmail" placeholder="请输入电子邮箱"></div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title"><i class="fas fa-building"></i> 企业信息</div>
            <div class="form-row">
                <div class="form-group"><label>企业名称 <span class="required">*</span></label><input type="text" id="enterpriseName" placeholder="请输入企业全称"></div>
                <div class="form-group"><label>统一社会信用代码 <span class="required">*</span></label><input type="text" id="creditCode" placeholder="请输入18位统一社会信用代码"></div>
            </div>
            <div class="form-row">
                <div class="form-group full-width"><label>注册地址 <span class="required">*</span></label><input type="text" id="address" placeholder="请输入详细注册地址"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>成立时间 <span class="required">*</span></label><input type="date" id="establishDate"></div>
                <div class="form-group"><label>注册资本 (万元) <span class="required">*</span></label><input type="number" id="capital" placeholder="请输入注册资本"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>专业领域 <span class="required">*</span></label>
                    <select id="field">
                        <option value="">请选择专业领域</option>
                        <option>建筑工地</option><option>基坑</option><option>交通</option><option>玻璃幕墙</option>
                        <option>燃气</option><option>高空坠物</option><option>城镇自建房</option><option>农村自建房</option>
                    </select>
                </div>
                <div class="form-group"><label>服务区域 <span class="required">*</span></label>
                    <select id="serviceArea">
                        <option value="">请选择服务区域</option>
                        <option>黄浦区</option><option>静安区</option><option>徐汇区</option><option>长宁区</option>
                        <option>浦东新区</option><option>杨浦区</option><option>虹口区</option><option>闵行区</option><option>奉贤区</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>资质等级 <span class="required">*</span></label>
                    <select id="qual"><option value="">请选择</option><option>甲级</option><option>乙级</option><option>丙级</option></select>
                </div>
                <div class="form-group"><label>机构类型</label>
                    <select id="orgType"><option value="">请选择</option><option>检测机构</option><option>评估机构</option><option>研究院</option><option>服务机构</option><option>鉴定机构</option><option>咨询机构</option></select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group full-width"><label>经营范围 <span class="required">*</span></label><textarea id="businessScope" rows="3" placeholder="请详细描述企业经营范围"></textarea></div>
            </div>
            <div class="form-row">
                <div class="form-group full-width"><label>营业执照 <span class="required">*</span></label>
                    <div class="file-upload"><label class="file-upload-btn" for="businessLicenseFile">选择文件</label><input type="file" id="businessLicenseFile"><span class="file-upload-text" id="businessLicenseText">请上传营业执照扫描件（JPG/PNG/PDF）</span></div>
                </div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-section-title"><i class="fas fa-certificate"></i> 资质证书</div>
            <div id="qualList">
                <div class="form-row qual-row">
                    <div class="form-group"><label>资质证书名称</label><input type="text" class="qual-name" placeholder="如：建设工程质量检测机构资质证书"></div>
                    <div class="form-group"><label>证书编号</label><input type="text" class="qual-code" placeholder="证书编号"></div>
                    <div class="form-group"><label>发证机关</label><input type="text" class="qual-issuer" placeholder="发证机关全称"></div>
                    <div class="form-group"><label>有效期至</label><input type="date" class="qual-end"></div>
                </div>
            </div>
            <button type="button" class="btn btn-outline" onclick="addQualRow()" style="margin-top:8px;"><i class="fas fa-plus"></i> 添加资质证书</button>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" onclick="resetApplyForm()"><i class="fas fa-undo"></i> 重置</button>
            <button class="btn btn-primary" onclick="submitApply()"><i class="fas fa-paper-plane"></i> 提交审核</button>
        </div>
    </div>
</div>

<div class="form-card success-card" id="successCard">
    <div class="success-icon"><i class="fas fa-check-circle"></i></div>
    <div class="success-title">提交成功</div>
    <div class="success-desc">您的机构资料已提交，请使用以下信息查询审核进度。</div>
    <div class="success-meta" id="successMeta"></div>
    <div class="form-actions" style="border-top:none; justify-content:center;">
        <a href="tp-audit-progress.html" class="btn btn-primary" style="text-decoration:none;"><i class="fas fa-search"></i> 查询审核进度</a>
        <a href="tp-overview.html" class="btn btn-outline" style="text-decoration:none;"><i class="fas fa-arrow-left"></i> 返回机构名录</a>
    </div>
</div>

<script>
(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') { document.documentElement.setAttribute('data-theme', e.data.theme); localStorage.setItem('theme', e.data.theme); }
});

function bindFileUpload(inputId, textId, defaultText) {
    var input = document.getElementById(inputId);
    var text = document.getElementById(textId);
    if (!input || !text) return;
    input.addEventListener('change', function() { text.textContent = input.files.length ? input.files[0].name : defaultText; });
}
bindFileUpload('businessLicenseFile', 'businessLicenseText', '请上传营业执照扫描件（JPG/PNG/PDF）');

function addQualRow() {
    var container = document.getElementById('qualList');
    var row = document.createElement('div');
    row.className = 'form-row qual-row';
    row.innerHTML = '<div class="form-group"><label>资质证书名称</label><input type="text" class="qual-name" placeholder="如：建设工程质量检测机构资质证书"></div>' +
        '<div class="form-group"><label>证书编号</label><input type="text" class="qual-code" placeholder="证书编号"></div>' +
        '<div class="form-group"><label>发证机关</label><input type="text" class="qual-issuer" placeholder="发证机关全称"></div>' +
        '<div class="form-group"><label>有效期至</label><input type="date" class="qual-end"></div>';
    container.appendChild(row);
}

function getVal(id) { return document.getElementById(id).value.trim(); }
function pad(n) { return String(n).padStart(2, '0'); }
function nowStr() { var d = new Date(); return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()); }

function submitApply() {
    var enterpriseName = getVal('enterpriseName');
    var creditCode = getVal('creditCode');
    var legalName = getVal('legalName');
    var legalPhone = getVal('legalPhone');
    var legalIdCard = getVal('legalIdCard');
    var address = getVal('address');
    var establishDate = getVal('establishDate');
    var capital = getVal('capital');
    var field = getVal('field');
    var serviceArea = getVal('serviceArea');
    var qual = getVal('qual');
    var businessScope = getVal('businessScope');

    if (!enterpriseName || !creditCode || !legalName || !legalPhone || !legalIdCard || !address || !establishDate || !capital || !field || !serviceArea || !qual || !businessScope) {
        alert('请填写所有必填项');
        return;
    }

    var applicationId = 'APP-' + new Date().getFullYear() + pad(new Date().getMonth()+1) + pad(new Date().getDate()) + '-' + String(Math.floor(Math.random() * 9000) + 1000);
    var orgId = 'ORG-' + new Date().getFullYear() + pad(new Date().getMonth()+1) + pad(new Date().getDate()) + '-' + String(Math.floor(Math.random() * 9000) + 1000);

    var qualifications = [];
    document.querySelectorAll('.qual-row').forEach(function(row) {
        var name = row.querySelector('.qual-name').value.trim();
        var code = row.querySelector('.qual-code').value.trim();
        var issuer = row.querySelector('.qual-issuer').value.trim();
        var end = row.querySelector('.qual-end').value.trim();
        if (name || code || issuer || end) {
            qualifications.push({ name: name, code: code, issuer: issuer, end: end });
        }
    });

    var application = {
        applicationId: applicationId,
        orgId: orgId,
        status: '待审核',
        submitTime: nowStr(),
        basic: {
            enterpriseName: enterpriseName,
            creditCode: creditCode,
            legalName: legalName,
            legalPhone: legalPhone,
            legalIdCard: legalIdCard,
            legalEmail: getVal('legalEmail'),
            address: address,
            establishDate: establishDate,
            capital: capital,
            field: field,
            serviceArea: serviceArea,
            qual: qual,
            orgType: getVal('orgType') || '检测机构',
            businessScope: businessScope
        },
        qualifications: qualifications,
        auditHistory: []
    };

    if (typeof submitOrgApplication === 'function') {
        try {
            submitOrgApplication(application);
        } catch (err) {
            alert(err.message || '提交失败');
            return;
        }
    } else {
        var data = JSON.parse(localStorage.getItem('thirdPartyData') || '{}');
        if (!data.orgApplications) data.orgApplications = [];
        data.orgApplications.push(application);
        localStorage.setItem('thirdPartyData', JSON.stringify(data));
    }

    document.getElementById('applyFormCard').style.display = 'none';
    document.getElementById('successCard').classList.add('active');
    document.querySelectorAll('.step-item').forEach(function(item) { item.classList.remove('active'); });
    document.querySelector('.step-item[data-step="3"]').classList.add('active');
    document.getElementById('successMeta').innerHTML =
        '<div><strong>申请编号：</strong>' + applicationId + '</div>' +
        '<div><strong>统一社会信用代码：</strong>' + creditCode + '</div>' +
        '<div><strong>提交时间：</strong>' + application.submitTime + '</div>' +
        '<div><strong>当前状态：</strong>待审核</div>' +
        '<div><a href="tp-audit-progress.html?orgCode=' + encodeURIComponent(creditCode) + '" style="color:var(--primary);text-decoration:none;"><i class="fas fa-search"></i> 查询审核进度</a></div>';
}

function resetApplyForm() {
    if (!confirm('确定要重置所有内容吗？')) return;
    document.querySelectorAll('#applyFormCard input, #applyFormCard select, #applyFormCard textarea').forEach(function(el) { el.value = ''; });
    document.getElementById('businessLicenseText').textContent = '请上传营业执照扫描件（JPG/PNG/PDF）';
    document.querySelectorAll('.qual-row').forEach(function(row, idx) { if (idx > 0) row.remove(); });
}
</script>
</body>
</html>
