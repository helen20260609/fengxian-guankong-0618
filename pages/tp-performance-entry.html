<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业绩录入 - 第三方服务机构</title>
<link rel="stylesheet" href="./all.min.css">
<link rel="stylesheet" href="./tp-common.css">
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-card); color: var(--text-primary); margin: 0; padding: 20px; }

.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.form-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.form-title .badge { font-size: 12px; font-weight: 400; color: var(--text-secondary); margin-left: 4px; }
.form-body { padding: 20px; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; color: var(--text-primary); }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row-full { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 16px; }

.file-upload { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--input-bg); }
.file-upload input[type="file"] { display: none; }
.file-upload label { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; cursor: pointer; background: var(--bg-card); color: var(--text-primary); transition: all 0.2s; }
.file-upload label:hover { border-color: var(--primary); color: var(--primary); }
.file-upload .file-name { font-size: 13px; color: var(--text-secondary); }

.form-actions { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
.btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

.file-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.file-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg-card); font-size: 13px;
}
.file-list-item .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-list-item .file-size { color: var(--text-secondary); font-size: 12px; margin-left: 8px; }
.file-list-item .file-remove { color: var(--danger); cursor: pointer; margin-left: 10px; font-size: 12px; }
.file-list-item .file-remove:hover { text-decoration: underline; }

@media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row-3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="form-card">
    <div class="form-body">
        <div class="form-row">
            <div class="form-group">
                <label>项目名称 <span class="required">*</span></label>
                <input type="text" id="inputProjectName" value="奉贤区青村镇农村自建房风险普查">
            </div>
            <div class="form-group">
                <label>机构名称 <span class="required">*</span></label>
                <input type="text" id="inputOrgName" value="上海建科咨询有限公司">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>委托单位 <span class="required">*</span></label>
                <input type="text" id="inputClient" value="奉贤区住房城乡建设委">
            </div>
            <div class="form-group">
                <label>服务时间 <span class="required">*</span></label>
                <input type="text" id="inputServiceTime" value="2026-01 ~ 2026-06">
            </div>
        </div>
        <div class="form-row-3">
            <div class="form-group">
                <label>服务领域 <span class="required">*</span></label>
                <select id="inputDomain">
                    <option>建筑工地</option>
                    <option>基坑</option>
                    <option>交通</option>
                    <option>玻璃幕墙</option>
                    <option>燃气</option>
                    <option>高空坠物</option>
                    <option>城镇自建房</option>
                    <option selected>农村自建房</option>
                </select>
            </div>
            <div class="form-group">
                <label>服务类型 <span class="required">*</span></label>
                <select id="inputServiceType">
                    <option>应急咨询</option>
                    <option>安全评估</option>
                    <option>检测检验</option>
                    <option>隐患排查</option>
                </select>
            </div>
            <div class="form-group">
                <label>数据来源 <span class="required">*</span></label>
                <select id="inputSource">
                    <option>平台录入</option>
                    <option>合同导入</option>
                    <option>手工补录</option>
                    <option>第三方接口</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>合同金额 (万元)</label>
                <input type="number" id="inputAmount" value="76.5">
            </div>
            <div class="form-group">
                <label>验收结论</label>
                <select id="inputConclusion">
                    <option>合格</option>
                    <option>基本合格</option>
                    <option>不合格</option>
                    <option>待验收</option>
                </select>
            </div>
        </div>
        <div class="form-row-full">
            <div class="form-group">
                <label>交付物 <span class="required">*</span></label>
                <textarea id="inputDeliverable" placeholder="请填写交付成果，如：排查报告、评估报告、检测报告、验收记录等">完成奉贤区青村镇 8 个行政村、约 3200 栋农村自建房风险普查，形成一户一档风险台账，提交排查报告 8 份。</textarea>
            </div>
        </div>
        <div class="form-row-full">
            <div class="form-group">
                <label>业绩说明</label>
                <textarea id="inputDesc" placeholder="补充说明项目背景、服务过程、关键节点等"></textarea>
            </div>
        </div>
        <div class="form-row-full">
            <div class="form-group">
                <label>证明材料 <span class="required">*</span></label>
                <div class="file-upload">
                    <label for="fileInput">选择文件</label>
                    <input type="file" id="fileInput" multiple onchange="onProofFilesSelected(this)">
                    <span class="file-name" id="fileName">支持多选，建议选择合同、报告、验收单等扫描件</span>
                </div>
                <div class="file-list" id="proofFileList"></div>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary" onclick="submitPerformance()"><i class="fas fa-save"></i> 提交审核</button>
            <button class="btn btn-outline" onclick="closeEntryWindow()"><i class="fas fa-times"></i> 取消</button>
        </div>
    </div>
</div>

<script>
(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();

// 证明材料临时文件列表
var proofFiles = [];
function onProofFilesSelected(input) {
    var list = document.getElementById('proofFileList');
    var nameEl = document.getElementById('fileName');
    for (var i = 0; i < input.files.length; i++) {
        var f = input.files[i];
        proofFiles.push(f);
        var item = document.createElement('div');
        item.className = 'file-list-item';
        item.innerHTML = '<span class="file-name">' + escapeHtml(f.name) + '</span>' +
            '<span class="file-size">' + formatSize(f.size) + '</span>' +
            '<span class="file-remove" onclick="removeProofFile(this)">删除</span>';
        list.appendChild(item);
    }
    nameEl.textContent = proofFiles.length ? '已选择 ' + proofFiles.length + ' 个文件' : '支持多选，建议选择合同、报告、验收单等扫描件';
    input.value = '';
}
function removeProofFile(el) {
    var idx = Array.prototype.indexOf.call(el.parentElement.parentElement.children, el.parentElement);
    if (idx > -1) proofFiles.splice(idx, 1);
    el.parentElement.remove();
    document.getElementById('fileName').textContent = proofFiles.length ? '已选择 ' + proofFiles.length + ' 个文件' : '支持多选，建议选择合同、报告、验收单等扫描件';
}
function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}
function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function getStorage(name) {
    try { return JSON.parse(localStorage.getItem(name) || '[]'); } catch (e) { return []; }
}
function setStorage(name, data) {
    localStorage.setItem(name, JSON.stringify(data));
}

function submitPerformance() {
    var projectName = document.getElementById('inputProjectName').value.trim();
    var orgName = document.getElementById('inputOrgName').value.trim();
    var client = document.getElementById('inputClient').value.trim();
    var domain = document.getElementById('inputDomain').value;
    var serviceType = document.getElementById('inputServiceType').value;
    var serviceTime = document.getElementById('inputServiceTime').value.trim();
    var amount = parseFloat(document.getElementById('inputAmount').value) || 0;
    var conclusion = document.getElementById('inputConclusion').value;
    var source = document.getElementById('inputSource').value;
    var deliverable = document.getElementById('inputDeliverable').value.trim();
    var desc = document.getElementById('inputDesc').value.trim();

    if (!projectName) { alert('请输入项目名称'); return; }
    if (!orgName) { alert('请输入机构名称'); return; }
    if (!client) { alert('请输入委托单位'); return; }
    if (!domain) { alert('请选择服务领域'); return; }
    if (!serviceType) { alert('请选择服务类型'); return; }
    if (!serviceTime) { alert('请输入服务时间'); return; }
    if (!deliverable) { alert('请填写交付物'); return; }
    if (!proofFiles.length) { alert('请至少上传一个证明材料'); return; }

    var data = getStorage('performanceData');
    var record = {
        id: Date.now(),
        projectName: projectName,
        orgName: orgName,
        client: client,
        domain: domain,
        serviceType: serviceType,
        serviceTime: serviceTime,
        amount: amount,
        conclusion: conclusion,
        deliverable: deliverable,
        desc: desc,
        proofFiles: proofFiles.map(function(f) { return f.name; }),
        auditStatus: '待审核',
        source: source,
        createTime: new Date().toISOString().slice(0, 10)
    };
    data.unshift(record);
    setStorage('performanceData', data);

    var auditList = getStorage('auditListData');
    auditList.unshift({
        id: record.id,
        type: '业绩录入',
        title: projectName,
        org: orgName,
        submitTime: new Date().toISOString().slice(0, 10) + ' ' + new Date().toTimeString().slice(0, 5),
        status: '待审核'
    });
    setStorage('auditListData', auditList);

    alert('业绩已提交，进入审核中心');
    if (window.parent && window.parent !== window) {
        window.parent.postMessage({ action: 'performanceEntrySaved' }, '*');
    }
}

function closeEntryWindow() {
    if (window.parent && window.parent !== window) {
        window.parent.postMessage({ action: 'closeModal' }, '*');
    }
}
</script>
</body>
</html>
