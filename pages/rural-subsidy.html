<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农村自建房 - 资金补助</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
            --secondary: #0097a7; --danger: #d93025; --warning: #e65100; --success: #1e8e3e;
            --bg-dark: #f0f2f5; --bg-card: #ffffff; --bg-hover: #e8eaed;
            --text-primary: #202124; --text-secondary: #5f6368; --border: #dadce0;
            --shadow: rgba(0,0,0,0.08); --input-bg: #ffffff; --input-border: #dadce0;
            --radius: 8px;
        }
        :root[data-theme="dark"] {
            --primary: #1e6fdb; --primary-dark: #1557b0; --primary-light: #e8f1fd;
            --secondary: #00b4d8; --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
            --bg-dark: #0a1628; --bg-card: #112240; --bg-hover: #1a2f4a;
            --text-primary: #e2e8f0; --text-secondary: #94a3b8; --border: #1e3a5f;
            --shadow: rgba(0,0,0,0.3); --input-bg: rgba(255,255,255,0.05); --input-border: #1e3a5f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
            background: var(--bg-dark); color: var(--text-primary);
            padding: 20px; min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .page-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .page-title i { color: var(--success); }
        .page-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }

        .kpi-wrapper {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px;
        }
        @media (max-width: 1024px) { .kpi-wrapper { grid-template-columns: repeat(2, 1fr); } }
        .kpi-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 14px 16px; box-shadow: 0 1px 3px var(--shadow); display: flex; flex-direction: column; gap: 8px;
        }
        .kpi-card-header { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--text-secondary); }
        .kpi-card-main { display: flex; align-items: baseline; gap: 6px; }
        .kpi-card-value { font-size: 26px; font-weight: 700; }
        .kpi-card-unit { font-size: 13px; color: var(--text-secondary); }

        .toolbar {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap;
            align-items: center; justify-content: space-between; box-shadow: 0 1px 3px var(--shadow);
        }
        .filter-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-item { display: flex; align-items: center; gap: 6px; }
        .filter-item label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
        .filter-item input, .filter-item select {
            padding: 7px 10px; font-size: 13px; border: 1px solid var(--input-border); border-radius: 6px;
            background: var(--input-bg); color: var(--text-primary); min-width: 120px; outline: none;
        }
        .filter-item input:focus, .filter-item select:focus { border-color: var(--primary); }
        .btn {
            padding: 8px 14px; border-radius: 6px; font-size: 13px; border: 1px solid transparent;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border-color: var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-hover); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        .main-layout { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .section-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: 0 1px 3px var(--shadow); overflow: hidden; margin-bottom: 16px;
        }
        .section-header {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .section-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: var(--primary); }
        .section-body { padding: 16px; }

        .workflow-bar {
            display: flex; align-items: center; justify-content: space-between; padding: 16px 24px;
            background: var(--primary-light); border-radius: var(--radius); margin-bottom: 16px; flex-wrap: wrap; gap: 10px;
        }
        .workflow-step {
            display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; min-width: 80px;
        }
        .workflow-step .circle {
            width: 36px; height: 36px; border-radius: 50%; background: var(--bg-card); border: 2px solid var(--primary);
            color: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;
        }
        .workflow-step .label { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
        .workflow-step.active .circle { background: var(--primary); color: #fff; }
        .workflow-step.active .label { color: var(--primary); }
        .workflow-arrow { color: var(--primary); font-size: 14px; }

        .subsidy-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .subsidy-table th, .subsidy-table td {
            padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border);
        }
        .subsidy-table th { background: var(--bg-hover); color: var(--text-secondary); font-weight: 600; }
        .subsidy-table tr:hover { background: var(--bg-hover); }
        .subsidy-table td { color: var(--text-primary); }
        .status-badge {
            font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: 600; white-space: nowrap;
        }
        .status-apply { background: #e3f2fd; color: #1565c0; }
        .status-audit { background: #fff3e0; color: #e65100; }
        .status-public { background: #f3e5f5; color: #7b1fa2; }
        .status-pay { background: #e8f5e9; color: #1b5e20; }
        .status-writeoff { background: #f5f5f5; color: #616161; }
        .status-reject { background: #fde7e7; color: #b71c1c; }

        .amount { font-weight: 700; color: var(--success); }
        .progress-bar { width: 100%; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center;
            z-index: 9999; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; width: 100%; max-width: 800px;
            max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-weight: 700; }
        .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-secondary); }
        .modal-body { padding: 18px; overflow-y: auto; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .form-group label .required { color: var(--danger); margin-left: 2px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid var(--input-border); border-radius: 6px;
            background: var(--input-bg); color: var(--text-primary); outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

        .detail-section { margin-bottom: 14px; }
        .detail-section-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; color: var(--primary); }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
        .detail-grid .label { color: var(--text-secondary); }
        .timeline { position: relative; padding-left: 18px; }
        .timeline::before { content: ''; position: absolute; left: 5px; top: 4px; bottom: 4px; width: 2px; background: var(--border); }
        .timeline-item { position: relative; padding-bottom: 14px; font-size: 13px; }
        .timeline-item::before { content: ''; position: absolute; left: -16px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); }
        .timeline-item.done::before { background: var(--success); }
        .timeline-item.pending::before { background: var(--warning); }
        .timeline-item.reject::before { background: var(--danger); }
        .timeline-time { color: var(--text-secondary); font-size: 12px; }
        .timeline-title { font-weight: 600; margin-bottom: 2px; }
        .timeline-desc { color: var(--text-secondary); font-size: 12px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 40px; margin-bottom: 12px; color: var(--border); }
        .pagination { display: flex; justify-content: center; align-items: center; padding: 14px 16px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-primary); gap: 8px; }
        .pagination .page-btn { padding: 8px 14px; border: 1px solid var(--border); background: var(--bg-card); border-radius: 6px; cursor: pointer; font-size: 13px; color: var(--text-primary); min-width: 36px; text-align: center; }
        .pagination .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination .page-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .pagination .page-ellipsis { display: flex; align-items: center; padding: 0 4px; color: var(--text-secondary); }
    </style>
</head>
<body>
<div class="container">
    <div class="page-title"><i class="fas fa-hand-holding-usd"></i> 资金补助</div>
    <div class="page-desc">
        跟踪危房改造补助资金的申请、审核、拨付、使用情况，实现申请、审核、公示、拨付、核销的全流程跟踪，确保资金规范使用。
    </div>

    <div class="kpi-wrapper">
        <div class="kpi-card">
            <div class="kpi-card-header"><span>申请户数</span><i class="fas fa-users" style="color:var(--primary)"></i></div>
            <div class="kpi-card-main"><div class="kpi-card-value" id="kpiApply">0</div></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-card-header"><span>已拨付金额</span><i class="fas fa-coins" style="color:var(--success)"></i></div>
            <div class="kpi-card-main"><div class="kpi-card-value" id="kpiPaid">0</div><div class="kpi-card-unit">万元</div></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-card-header"><span>待审核</span><i class="fas fa-clock" style="color:var(--warning)"></i></div>
            <div class="kpi-card-main"><div class="kpi-card-value" id="kpiPending">0</div></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-card-header"><span>已核销</span><i class="fas fa-check-circle" style="color:var(--secondary)"></i></div>
            <div class="kpi-card-main"><div class="kpi-card-value" id="kpiWriteoff">0</div></div>
        </div>
    </div>

    <div class="toolbar">
        <div class="filter-group">
            <div class="filter-item">
                <label>关键字</label>
                <input type="text" id="searchKeyword" placeholder="户主/房屋/申请编号">
            </div>
            <div class="filter-item">
                <label>流程状态</label>
                <select id="searchStatus">
                    <option value="">全部</option>
                    <option value="apply">申请中</option>
                    <option value="audit">审核中</option>
                    <option value="public">公示中</option>
                    <option value="pay">已拨付</option>
                    <option value="writeoff">已核销</option>
                    <option value="reject">已驳回</option>
                </select>
            </div>
            <div class="filter-item">
                <label>乡镇</label>
                <select id="searchTown">
                    <option value="">全部</option>
                    <option value="青村镇">青村镇</option>
                    <option value="南桥镇">南桥镇</option>
                    <option value="庄行镇">庄行镇</option>
                    <option value="四团镇">四团镇</option>
                    <option value="奉城镇">奉城镇</option>
                    <option value="金汇镇">金汇镇</option>
                    <option value="柘林镇">柘林镇</option>
                    <option value="海湾镇">海湾镇</option>
                </select>
            </div>
            <button class="btn btn-outline" onclick="resetFilter()"><i class="fas fa-undo"></i> 重置</button>
        </div>
        <div class="action-group">
            <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> 新增申请</button>
            <button class="btn btn-outline" onclick="restoreDefaultData()"><i class="fas fa-redo"></i> 恢复默认</button>
        </div>
    </div>

    <div class="section-card">
        <div class="section-header">
            <div class="section-title"><i class="fas fa-project-diagram"></i> 资金补助流程</div>
        </div>
        <div class="section-body">
            <div class="workflow-bar">
                <div class="workflow-step active" data-step="apply">
                    <div class="circle">1</div>
                    <div class="label">申请</div>
                </div>
                <div class="workflow-arrow"><i class="fas fa-chevron-right"></i></div>
                <div class="workflow-step" data-step="audit">
                    <div class="circle">2</div>
                    <div class="label">审核</div>
                </div>
                <div class="workflow-arrow"><i class="fas fa-chevron-right"></i></div>
                <div class="workflow-step" data-step="public">
                    <div class="circle">3</div>
                    <div class="label">公示</div>
                </div>
                <div class="workflow-arrow"><i class="fas fa-chevron-right"></i></div>
                <div class="workflow-step" data-step="pay">
                    <div class="circle">4</div>
                    <div class="label">拨付</div>
                </div>
                <div class="workflow-arrow"><i class="fas fa-chevron-right"></i></div>
                <div class="workflow-step" data-step="writeoff">
                    <div class="circle">5</div>
                    <div class="label">核销</div>
                </div>
            </div>
        </div>
    </div>

    <div class="section-card">
        <div class="section-header">
            <div class="section-title"><i class="fas fa-list-alt"></i> 补助申请列表</div>
            <div class="filter-item">
                <span class="content-stats" id="listStats" style="margin-right:12px;">共 0 条</span>
                <label style="font-size:13px;">每页</label>
                <select id="pageSizeSelect" onchange="changePageSize(this.value)" style="min-width:60px;">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="20">20</option>
                </select>
            </div>
        </div>
        <div class="section-body" style="padding:0;">
            <table class="subsidy-table" id="subsidyTable">
                <thead>
                    <tr>
                        <th>申请编号</th>
                        <th>户主信息</th>
                        <th>乡镇/村</th>
                        <th>申请金额</th>
                        <th>流程状态</th>
                        <th>当前节点进度</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="subsidyTableBody"></tbody>
            </table>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>
</div>

<!-- 新增/编辑模态框 -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <span id="editModalTitle">新增补助申请</span>
            <button class="modal-close" onclick="closeModal('editModal')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="subsidyId">
            <div class="form-row">
                <div class="form-group">
                    <label>户主姓名<span class="required">*</span></label>
                    <input type="text" id="sOwner" placeholder="请输入户主姓名">
                </div>
                <div class="form-group">
                    <label>身份证号</label>
                    <input type="text" id="sIdCard" placeholder="请输入身份证号">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>所属乡镇</label>
                    <select id="sTown">
                        <option value="青村镇">青村镇</option>
                        <option value="南桥镇">南桥镇</option>
                        <option value="庄行镇">庄行镇</option>
                        <option value="四团镇">四团镇</option>
                        <option value="奉城镇">奉城镇</option>
                        <option value="金汇镇">金汇镇</option>
                        <option value="柘林镇">柘林镇</option>
                        <option value="海湾镇">海湾镇</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>所属村</label>
                    <input type="text" id="sVillage" placeholder="请输入村名">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>申请金额（万元）<span class="required">*</span></label>
                    <input type="number" id="sAmount" placeholder="如 3.5" step="0.1">
                </div>
                <div class="form-group">
                    <label>房屋风险等级</label>
                    <select id="sRiskLevel">
                        <option value="C">C级</option>
                        <option value="D">D级</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>申请理由</label>
                <textarea id="sReason" placeholder="请描述申请补助资金的原因及用途..."></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('editModal')">取消</button>
            <button class="btn btn-primary" onclick="saveSubsidy()"><i class="fas fa-save"></i> 保存</button>
        </div>
    </div>
</div>

<!-- 详情模态框 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header">
            <span id="detailModalTitle">申请详情</span>
            <button class="modal-close" onclick="closeModal('detailModal')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" id="detailModalBody"></div>
        <div class="modal-footer" id="detailModalFooter">
            <button class="btn btn-outline" onclick="closeModal('detailModal')">关闭</button>
        </div>
    </div>
</div>

<script>

    function init() {
        loadData();
        bindEvents();
        renderList();
        renderKPIs();
    }

    function loadData() {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
            try { allData = JSON.parse(raw); } catch (e) { allData = getDefaultData(); }
        } else {
            allData = getDefaultData();
            saveData();
        }
    }

    function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(allData)); }

    function restoreDefaultData() {
        if (confirm('确定恢复默认资金补助数据吗？当前数据将被覆盖。')) {
            allData = getDefaultData();
            saveData();
            currentPage = 1;
            renderList();
            renderKPIs();
        }
    }

    function bindEvents() {
        document.getElementById('searchKeyword').addEventListener('input', () => { currentPage = 1; renderList(); });
        document.getElementById('searchStatus').addEventListener('change', () => { currentPage = 1; renderList(); });
        document.getElementById('searchTown').addEventListener('change', () => { currentPage = 1; renderList(); });
    }

    function getFilteredData() {
        const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
        const status = document.getElementById('searchStatus').value;
        const town = document.getElementById('searchTown').value;
        return allData.filter(item => {
            if (status && item.status !== status) return false;
            if (town && item.town !== town) return false;
            if (keyword) {
                const text = [item.id, item.owner, item.idCard, item.town, item.village, item.address, item.reason].join(' ').toLowerCase();
                return text.includes(keyword);
            }
            return true;
        }).sort((a, b) => new Date(b.createTime) - new Date(a.createTime));
    }

    function renderList() {
        const data = getFilteredData();
        const total = data.length;
        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * pageSize;
        const list = data.slice(start, start + pageSize);

        document.getElementById('listStats').textContent = `共 ${total} 条`;
        const tbody = document.getElementById('subsidyTableBody');
        if (list.length === 0) {
            tbody.innerHTML = `
                <tr><td colspan="7" class="empty-state">
                    <i class="fas fa-inbox"></i><div>未找到符合条件的补助申请</div>
                </td></tr>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }

        tbody.innerHTML = list.map(item => {
            const stepIndex = STATUS_MAP[item.status].step;
            const progress = stepIndex * 20;
            return `
                <tr onclick="openDetail('${item.id}')" style="cursor:pointer;">
                    <td>${item.id}</td>
                    <td>
                        <div>${item.owner}</div>
                        <div style="color:var(--text-secondary);font-size:12px;">${item.idCard}</div>
                    </td>
                    <td>${item.town}<br><span style="color:var(--text-secondary);font-size:12px;">${item.village} ${item.address}</span></td>
                    <td><span class="amount">${item.amount.toFixed(1)}</span> 万元</td>
                    <td><span class="status-badge ${STATUS_MAP[item.status].class}">${STATUS_MAP[item.status].label}</span></td>
                    <td style="min-width:140px;">
                        <div style="font-size:12px;color:var(--text-secondary);">${stepIndex}/5 ${getStepLabel(item.status)}</div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
                    </td>
                    <td onclick="event.stopPropagation()">
                        <button class="btn btn-primary btn-sm" onclick="advanceFlow('${item.id}')"><i class="fas fa-arrow-right"></i> 推进</button>
                        <button class="btn btn-outline btn-sm" onclick="openEditModal('${item.id}')"><i class="fas fa-edit"></i></button>
                    </td>
                </tr>
            `;
        }).join('');
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const container = document.getElementById('pagination');
        if (totalPages <= 0) { container.innerHTML = ''; return; }
        let html = '';
        html += `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
            } else if (i === currentPage - 3 || i === currentPage + 3) {
                html += `<span class="page-ellipsis">...</span>`;
            }
        }
        html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
        container.innerHTML = html;
    }

    function changePage(p) {
        const data = getFilteredData();
        const totalPages = Math.max(1, Math.ceil(data.length / pageSize));
        if (p < 1) p = 1;
        if (p > totalPages) p = totalPages;
        currentPage = p;
        renderList();
    }

    function jumpToPage(val, totalPages) {
        let p = parseInt(val);
        if (isNaN(p)) p = 1;
        if (p < 1) p = 1;
        if (p > totalPages) p = totalPages;
        changePage(p);
    }

    function getStepLabel(status) {
        const labels = { apply: '申请', audit: '审核', public: '公示', pay: '拨付', writeoff: '核销', reject: '驳回' };
        return labels[status] || status;
    }

    function renderKPIs() {
        const apply = allData.length;
        const paid = allData.filter(i => i.status === 'pay' || i.status === 'writeoff').reduce((sum, i) => sum + i.amount, 0);
        const pending = allData.filter(i => i.status === 'apply' || i.status === 'audit').length;
        const writeoff = allData.filter(i => i.status === 'writeoff').length;
        document.getElementById('kpiApply').textContent = apply;
        document.getElementById('kpiPaid').textContent = paid.toFixed(1);
        document.getElementById('kpiPending').textContent = pending;
        document.getElementById('kpiWriteoff').textContent = writeoff;
    }

    function resetFilter() {
        document.getElementById('searchKeyword').value = '';
        document.getElementById('searchStatus').value = '';
        document.getElementById('searchTown').value = '';
        currentPage = 1;
        renderList();
    }

    function openAddModal() {
        document.getElementById('editModalTitle').textContent = '新增补助申请';
        document.getElementById('subsidyId').value = '';
        document.getElementById('sOwner').value = '';
        document.getElementById('sIdCard').value = '';
        document.getElementById('sTown').value = '青村镇';
        document.getElementById('sVillage').value = '';
        document.getElementById('sAmount').value = '';
        document.getElementById('sRiskLevel').value = 'C';
        document.getElementById('sReason').value = '';
        openModal('editModal');
    }

    function openEditModal(id) {
        const item = allData.find(i => i.id === id);
        if (!item) return;
        document.getElementById('editModalTitle').textContent = '编辑补助申请';
        document.getElementById('subsidyId').value = item.id;
        document.getElementById('sOwner').value = item.owner;
        document.getElementById('sIdCard').value = item.idCard;
        document.getElementById('sTown').value = item.town;
        document.getElementById('sVillage').value = item.village;
        document.getElementById('sAmount').value = item.amount;
        document.getElementById('sRiskLevel').value = item.riskLevel;
        document.getElementById('sReason').value = item.reason;
        openModal('editModal');
    }

    function saveSubsidy() {
        const owner = document.getElementById('sOwner').value.trim();
        const amount = parseFloat(document.getElementById('sAmount').value);
        if (!owner) { alert('请输入户主姓名'); return; }
        if (isNaN(amount) || amount <= 0) { alert('请输入有效的申请金额'); return; }
        const id = document.getElementById('subsidyId').value;
        const newItem = {
            id: id || generateId(),
            owner: owner,
            idCard: document.getElementById('sIdCard').value,
            town: document.getElementById('sTown').value,
            village: document.getElementById('sVillage').value,
            address: document.getElementById('sVillage').value + '某组',
            riskLevel: document.getElementById('sRiskLevel').value,
            amount: amount,
            reason: document.getElementById('sReason').value,
            status: id ? allData.find(i => i.id === id).status : 'apply',
            createTime: id ? allData.find(i => i.id === id).createTime : new Date().toISOString().replace('T', ' ').substring(0, 19),
            operator: '当前用户',
            flow: id ? allData.find(i => i.id === id).flow : [
                { step: 'apply', title: '提交申请', time: new Date().toISOString().replace('T', ' ').substring(0, 19), desc: '户主提交补助资金申请。', operator: owner }
            ]
        };
        if (id) {
            const idx = allData.findIndex(i => i.id === id);
            if (idx >= 0) allData[idx] = newItem;
        } else {
            allData.unshift(newItem);
        }
        saveData();
        closeModal('editModal');
        renderList();
        renderKPIs();
    }

    function generateId() {
        const date = new Date().toISOString().replace(/[-T:]/g, '').slice(0, 14);
        return 'SB' + date + String(Math.floor(Math.random() * 1000)).padStart(3, '0');
    }

    function advanceFlow(id) {
        const item = allData.find(i => i.id === id);
        if (!item) return;
        const stepOrder = ['apply', 'audit', 'public', 'pay', 'writeoff'];
        const idx = stepOrder.indexOf(item.status);
        if (idx >= stepOrder.length - 1) { alert('该申请已完成全部流程'); return; }
        const nextStatus = stepOrder[idx + 1];
        const titles = { apply: '提交申请', audit: '审核', public: '公示', pay: '资金拨付', writeoff: '核销' };
        const now = new Date().toISOString().replace('T', ' ').substring(0, 19);
        item.status = nextStatus;
        item.flow.push({ step: nextStatus, title: titles[nextStatus], time: now, desc: `流程推进至${titles[nextStatus]}环节。`, operator: '当前用户' });
        saveData();
        renderList();
        renderKPIs();
        alert(`已推进至"${titles[nextStatus]}"环节。`);
    }

    function rejectSubsidy(id) {
        const item = allData.find(i => i.id === id);
        if (!item) return;
        item.status = 'reject';
        item.flow.push({ step: 'reject', title: '驳回', time: new Date().toISOString().replace('T', ' ').substring(0, 19), desc: '申请被驳回。', operator: '当前用户' });
        saveData();
        renderList();
        renderKPIs();
    }

    function openDetail(id) {
        const item = allData.find(i => i.id === id);
        if (!item) return;
        currentDetail = item;
        document.getElementById('detailModalTitle').textContent = `申请详情：${item.id}`;
        document.getElementById('detailModalBody').innerHTML = `
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-info-circle"></i> 基本信息</div>
                <div class="detail-grid">
                    <div><span class="label">申请编号：</span>${item.id}</div>
                    <div><span class="label">当前状态：</span><span class="status-badge ${STATUS_MAP[item.status].class}">${STATUS_MAP[item.status].label}</span></div>
                    <div><span class="label">户主姓名：</span>${item.owner}</div>
                    <div><span class="label">身份证号：</span>${item.idCard}</div>
                    <div><span class="label">所属乡镇：</span>${item.town}</div>
                    <div><span class="label">所属村：</span>${item.village} ${item.address}</div>
                    <div><span class="label">房屋等级：</span>${item.riskLevel}级</div>
                    <div><span class="label">申请金额：</span><span class="amount">${item.amount.toFixed(1)}</span> 万元</div>
                </div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-file-alt"></i> 申请理由</div>
                <div class="detail-content">${item.reason}</div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-stream"></i> 流程跟踪</div>
                <div class="timeline">
                    ${item.flow.map(f => `
                        <div class="timeline-item done">
                            <div class="timeline-time">${f.time}</div>
                            <div class="timeline-title">${f.title}</div>
                            <div class="timeline-desc">${f.desc}（操作人：${f.operator}）</div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        const footer = document.getElementById('detailModalFooter');
        footer.innerHTML = `
            <button class="btn btn-outline" onclick="closeModal('detailModal')">关闭</button>
            ${item.status !== 'writeoff' && item.status !== 'reject' ? `
            <button class="btn btn-primary" onclick="advanceFlow('${item.id}');closeModal('detailModal');"><i class="fas fa-arrow-right"></i> 推进流程</button>
            <button class="btn btn-danger" onclick="rejectSubsidy('${item.id}');closeModal('detailModal');"><i class="fas fa-times"></i> 驳回</button>` : ''}
        `;
        openModal('detailModal');
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
    });

    window.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open')); });

    init();
</script>
