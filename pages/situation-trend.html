<!DOCTYPE html><html lang="zh-CN" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>趋势分析</title><link rel="stylesheet" href="./all.min.css"><style>
/* Theme Variables */
:root {
    --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
    --secondary: #0097a7; --danger: #d93025; --warning: #e37400; --success: #1e8e3e;
    --bg-dark: #f0f2f5; --bg-card: #ffffff; --bg-hover: #e8eaed;
    --text-primary: #202124; --text-secondary: #5f6368; --border: #dadce0;
    --shadow: rgba(0,0,0,0.08); --input-bg: #ffffff; --input-border: #dadce0;
    --modal-bg: #ffffff; --tag-bg: #f1f3f4; --tag-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02); --tree-group-bg: rgba(26,115,232,0.06);
    --tree-row-hover: rgba(0,0,0,0.02);
    --dot-red: #d93025; --dot-orange: #e37400; --dot-yellow: #f9ab00; --dot-blue: #1a73e8;
}
:root[data-theme="dark"] {
    --primary: #1e6fdb; --primary-dark: #1557b0; --primary-light: #e8f1fd;
    --secondary: #00b4d8; --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
    --bg-dark: #0a1628; --bg-card: #112240; --bg-hover: #1a2f4a;

    --modal-bg: #112240; --tag-bg: rgba(255,255,255,0.05); --tag-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2); --tree-group-bg: rgba(30,111,219,0.08);
    --tree-row-hover: rgba(255,255,255,0.02);
    --dot-red: #ef4444; --dot-orange: #f59e0b; --dot-yellow: #eab308; --dot-blue: #3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0a1628;color:#e2e8f0;padding:20px;overflow-y:auto}.card{background:#112240;border:1px solid #1e3a5f;border-radius:12px;overflow:hidden;margin-bottom:16px}.card-header{padding:16px 20px;border-bottom:1px solid #1e3a5f;display:flex;align-items:center;justify-content:space-between}.card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}.card-body{padding:20px}.page-section{display:none}.page-section.active{display:block}.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8;margin-bottom:16px}.breadcrumb .current{color:#e2e8f0}.btn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px}.btn-primary{background:#1e6fdb;color:#fff}.btn-outline{background:transparent;border:1px solid #1e3a5f;color:#94a3b8}.icon-box{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}.filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}.filter-input{background:rgba(255,255,255,.05);border:1px solid #1e3a5f;border-radius:6px;padding:8px 12px;color:#e2e8f0;font-size:13px}.filter-select{background:rgba(255,255,255,.05);border:1px solid #1e3a5f;border-radius:6px;padding:8px 12px;color:#e2e8f0;font-size:13px}.data-table{width:100%;border-collapse:collapse}.data-table th{padding:12px 16px;text-align:left;font-size:13px;font-weight:600;color:#94a3b8;border-bottom:1px solid #1e3a5f;background:rgba(0,0,0,.2)}.data-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid #1e3a5f}.data-table tr:hover td{background:rgba(255,255,255,.02)}.status-badge{padding:2px 10px;border-radius:10px;font-size:12px}.status-badge.pending{background:rgba(245,158,11,.15);color:#f59e0b}.status-badge.approved{background:rgba(16,185,129,.15);color:#10b981}.pagination{display:flex;justify-content:flex-end;gap:4px;margin-top:16px}.page-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;border:1px solid #1e3a5f;background:#112240;color:#94a3b8}.page-btn.active{background:#1e6fdb;color:#fff;border-color:#1e6fdb}.risk-tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}.risk-tag.red{background:rgba(239,68,68,.15);color:#ef4444}.risk-tag.orange{background:rgba(245,158,11,.15);color:#f59e0b}.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}.kpi-card{background:#112240;border:1px solid #1e3a5f;border-radius:12px;padding:20px}.kpi-label{font-size:13px;color:#94a3b8;margin-bottom:8px}.kpi-value{font-size:28px;font-weight:700;color:#fff}</style></head><body><div class="breadcrumb"><a href="#" style="color:#94a3b8;text-decoration:none"><i class="fas fa-home"></i></a><i class="fas fa-chevron-right" style="font-size:10px"></i><span>风险态势感知</span><i class="fas fa-chevron-right" style="font-size:10px"></i><span class="current">趋势分析</span></div><div class="page-section active" id="section-trend-chart"><div class="card"><div class="card-header"><div class="card-title"><div class="icon-box" style="background:rgba(59,130,246,.15);color:#3b82f6"><i class="fas fa-chart-bar"></i></div>趋势图表</div></div><div class="card-body"><div style="display:flex;gap:8px;margin-bottom:16px"><button class="btn btn-primary" style="padding:4px 12px;font-size:12px">本月</button><button class="btn btn-outline" style="padding:4px 12px;font-size:12px">本季</button><button class="btn btn-outline" style="padding:4px 12px;font-size:12px">本年</button></div><div style="display:flex;align-items:flex-end;gap:8px;height:200px;padding:0 8px"><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:60px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">1月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:75px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">2月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:90px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">3月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:65px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">4月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:80px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">5月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:100px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">6月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:85px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">7月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:70px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">8月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:95px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">9月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:110px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">10月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:88px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">11月</div></div><div style="flex:1;display:flex;flex-direction:column;align-items:center"><div style="width:100%;background:linear-gradient(180deg,#ef4444 30%,#f59e0b 30% 60%,#eab308 60%);border-radius:4px 4px 0 0;height:72px"></div><div style="font-size:11px;color:#94a3b8;margin-top:4px">12月</div></div></div></div></div></div><div class="page-section" id="section-trend-compare"><div class="card"><div class="card-header"><div class="card-title"><div class="icon-box" style="background:rgba(245,158,11,.15);color:#f59e0b"><i class="fas fa-balance-scale"></i></div>对比分析</div></div><div class="card-body"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px"><div style="background:rgba(255,255,255,.02);border:1px solid #1e3a5f;border-radius:10px;padding:16px;text-align:center"><div style="font-size:12px;color:#94a3b8;margin-bottom:4px">本期 (8月)</div><div style="font-size:24px;font-weight:700;color:#1e6fdb">281</div><div style="font-size:12px;color:#94a3b8">风险事件数</div></div><div style="background:rgba(255,255,255,.02);border:1px solid #1e3a5f;border-radius:10px;padding:16px;text-align:center"><div style="font-size:12px;color:#94a3b8;margin-bottom:4px">上期 (7月)</div><div style="font-size:24px;font-weight:700;color:#94a3b8">256</div><div style="font-size:12px;color:#94a3b8">风险事件数</div></div></div><div style="padding:12px;background:rgba(239,68,68,.1);border-radius:8px;font-size:13px"><i class="fas fa-arrow-up" style="color:#ef4444"></i> 环比上升 <span style="color:#ef4444;font-weight:600">9.8%</span></div></div></div></div><div class="page-section" id="section-trend-predict"><div class="card"><div class="card-header"><div class="card-title"><div class="icon-box" style="background:rgba(139,92,246,.15);color:#8b5cf6"><i class="fas fa-brain"></i></div>预测模型</div></div><div class="card-body"><div style="margin-bottom:16px"><div style="display:flex;gap:12px;margin-bottom:16px"><select class="filter-select"><option>线性回归</option><option>ARIMA</option></select><select class="filter-select"><option>置信度 90%</option><option>置信度 95%</option></select></div><div style="font-weight:600;margin-bottom:12px">7天预测趋势</div><div style="display:flex;align-items:center;gap:12px;padding:16px;background:rgba(255,255,255,.02);border:1px solid #1e3a5f;border-radius:10px"><div style="text-align:center"><div style="font-size:12px;color:#94a3b8">预测风险数</div><div style="font-size:24px;font-weight:700;color:#f59e0b">42</div></div><div style="text-align:center"><div style="font-size:12px;color:#94a3b8">置信区间</div><div style="font-size:16px;font-weight:600">35-49</div></div><div style="text-align:center"><div style="font-size:12px;color:#94a3b8">趋势</div><div style="font-size:16px;font-weight:600;color:#ef4444"><i class="fas fa-arrow-up"></i> 上升</div></div></div></div></div></div></div><script>window.addEventListener("message",function(e){if(e.data&&e.data.action==="switchSection"){document.querySelectorAll(".page-section").forEach(function(el){el.classList.remove("active")});var t=document.getElementById("section-"+e.data.section);if(t)t.classList.add("active")}});// Theme sync
(function(){var s=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',s);})();
window.addEventListener('message',function(e){if(e.data&&e.data.action==='setTheme'){document.documentElement.setAttribute('data-theme',e.data.theme);localStorage.setItem('theme',e.data.theme);}});
</script></body></html>
