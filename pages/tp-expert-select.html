<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专家选取 - 第三方服务机构</title>
<link rel="stylesheet" href="./all.min.css">
<link rel="stylesheet" href="./tp-common.css">
<script src="../js/third-party-data.js"></script>
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

.page-title { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.page-title i { color: var(--primary); }

.select-layout { display: flex; gap: 20px; min-height: calc(100vh - 120px); }

/* 左侧已选面板 */
.selected-panel {
    width: 320px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
}
.selected-header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
}
.selected-title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}
.selected-title i { color: var(--primary); }
.selected-count {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 6px;
}
.selected-count span { color: var(--primary); font-weight: 600; }

.selected-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
}
.selected-empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text-secondary);
    font-size: 13px;
}
.selected-empty i {
    font-size: 36px;
    color: var(--border);
    margin-bottom: 12px;
    display: block;
}
.selected-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    background: var(--bg-card);
    transition: all 0.2s;
    position: relative;
}
.selected-item:hover {
    background: var(--bg-hover);
    border-color: var(--primary);
}
.selected-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600; color: #fff;
    flex-shrink: 0;
}
.selected-info { flex: 1; min-width: 0; }
.selected-name {
    font-size: 14px; font-weight: 600; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.selected-org {
    font-size: 12px; color: var(--text-secondary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
}
.selected-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    background: rgba(26,115,232,0.12); color: var(--primary);
    margin-top: 6px;
}
.selected-remove {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
}
.selected-remove:hover {
    background: rgba(217,48,37,0.1); color: var(--danger);
}

.selected-actions {
    padding: 14px 16px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 10px;
}

/* 右侧主面板 */
.main-panel {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 2px 8px var(--shadow);
}
.toolbar {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
}
.toolbar .search-bar { flex: 1; min-width: 220px; }
.search-bar {
    display: flex; align-items: center; gap: 8px;
}
.search-bar input {
    flex: 1;
    padding: 8px 14px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.search-bar input::placeholder { color: var(--text-secondary); }
.search-bar i { color: var(--text-secondary); }

.filter-group { display: flex; align-items: center; gap: 8px; }
.filter-group select {
    padding: 8px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    min-width: 120px;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}

.btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #166534; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.expert-list { flex: 1; overflow-y: auto; padding: 0 20px 20px; min-height: 520px; }

.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}
.data-table thead,
.data-table tbody,
.data-table tr {
    display: table;
    width: 100%;
    table-layout: fixed;
}
.data-table tbody { min-height: 380px; }
.data-table th, .data-table td {
    padding: 14px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text-primary);
    height: 76px;
}
.data-table tbody tr:last-child td {
    border-bottom: none;
}
.data-table th {
    background: var(--header-bg);
    font-weight: 600;
    font-size: 14px;
}
.data-table tbody tr:hover { background: var(--bg-hover); }
.data-table .col-check { width: 50px; text-align: center; }
.data-table .col-info { width: 40%; }
.data-table .col-org { width: 30%; }
.data-table .col-domain { width: 30%; }

.expert-info {
    display: flex; align-items: center; gap: 12px;
}
.expert-avatar {
    width: 48px; height: 48px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; color: #fff;
    flex-shrink: 0;
}
.expert-meta { min-width: 0; }
.expert-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.expert-title { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.domain-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    background: rgba(26,115,232,0.12); color: var(--primary);
}

.add-btn { display: none; }

.list-pagination {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; border-top: 1px solid var(--border);
    font-size: 13px; color: var(--text-secondary);
}
.list-pagination .page-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-primary); padding: 4px 10px; border-radius: 6px;
    cursor: pointer; font-size: 13px; margin-left: 6px;
}
.list-pagination .page-btn:hover { border-color: var(--primary); color: var(--primary); }
.list-pagination .page-btn.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.list-pagination .page-btn:disabled { opacity: 0.5; cursor: not-allowed; border-color: var(--border); color: var(--text-secondary); }
.list-pagination .page-btn:disabled:hover { background: transparent; color: var(--text-secondary); }
.list-pagination .page-info { display: inline-flex; align-items: center; gap: 8px; }

.empty-tip {
    text-align: center;
    padding: 60px 0;
    color: var(--text-secondary);
    font-size: 14px;
}
.empty-tip i { font-size: 48px; display: block; margin-bottom: 16px; color: var(--border); }

@media (max-width: 1024px) {
    .select-layout { flex-direction: column; }
    .selected-panel { width: 100%; min-width: 300px; }
}
</style>
</head>
<body>

<div class="select-layout">
    <!-- 左侧已选专家 -->
    <div class="selected-panel">
        <div class="selected-header">
            <div class="selected-title"><i class="fas fa-users"></i> 已选专家</div>
            <div class="selected-count">已选 <span id="selectedCount">0</span> 位专家</div>
        </div>
        <div class="selected-list" id="selectedList">
            <div class="selected-empty">
                <i class="fas fa-user-friends"></i>
                暂未选择专家<br>请从右侧列表添加
            </div>
        </div>
        <div class="selected-actions">
            <button class="btn btn-outline" style="width: 100%; justify-content: center;" onclick="clearSelected()">
                <i class="fas fa-trash-alt"></i> 清空列表
            </button>
            <button class="btn btn-primary" style="width: 100%; justify-content: center;" onclick="confirmGroup()" id="btnConfirmGroup">
                <i class="fas fa-check"></i> 确认选择
            </button>
            <button class="btn btn-outline" style="width: 100%; justify-content: center;" onclick="closeSelectPage()">
                <i class="fas fa-times"></i> 关闭
            </button>
            <div id="saveResult" style="display:none; text-align:center; font-size:12px; padding:6px; border-radius:6px; margin-top:6px;"></div>
        </div>
    </div>

    <!-- 右侧专家列表 -->
    <div class="main-panel">
        <div class="toolbar">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索姓名、单位或领域..." oninput="filterExperts()">
            </div>
            <div class="filter-group">
                <select id="typeFilter" onchange="filterExperts()">
                    <option value="">专家类型</option>
                    <option value="独立专家">独立专家</option>
                    <option value="机构专家">机构专家</option>
                </select>
            </div>
        </div>
        <div class="expert-list">
            <table class="data-table">
                <thead>
                    <tr>
                        <th class="col-check"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                        <th class="col-info">专家信息</th>
                        <th class="col-org">所属单位</th>
                        <th class="col-domain">专业领域</th>
                    </tr>
                </thead>
                <tbody id="expertTableBody"></tbody>
            </table>
            <div class="empty-tip" id="emptyTip" style="display: none;">
                <i class="fas fa-search"></i>
                未找到符合条件的专家
            </div>
            <div class="list-pagination" id="listPagination"></div>
        </div>
    </div>
</div>

<script>
(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
        localStorage.setItem('theme', e.data.theme);
    }
});

const STORAGE_KEY = 'expertSelectedGroup';

// 全局错误监听，便于排查“点击无反应”
window.addEventListener('error', function(e) {
    console.error('[tp-expert-select] global error:', e.message, 'at', e.filename + ':' + e.lineno);
});

const avatarColors = ['#1a73e8', '#7c4dff', '#e37400', '#0097a7', '#34a853', '#9333ea', '#ea580c', '#16a34a'];

var allExperts = [];
var selectedExperts = [];
var currentPage = 1;
var pageSize = 5;

function getInitial(name) { return name ? name.charAt(0) : '?'; }

function getAvatarColor(name) {
    var sum = 0;
    for (var i = 0; i < name.length; i++) sum += name.charCodeAt(i);
    return avatarColors[sum % avatarColors.length];
}

function initData() {
    allExperts = (typeof getAllExperts === 'function') ? getAllExperts() : [];
    // 若数据层没有返回有效专家数据，使用默认内置数据兜底
    if (!allExperts || allExperts.length === 0) {
        allExperts = getDefaultExperts();
    }
    selectedExperts = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    renderSelected();
    renderExpertList();
}

function initTypeFilter() {
    // 专家类型下拉已固定为：全部、独立专家、机构专家
}

function saveSelectedExperts() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(selectedExperts));
}

function filterExperts() {
    currentPage = 1;
    renderExpertList();
}

function goPage(page) {
    currentPage = page;
    renderExpertList();
}

function getFilteredExperts() {
    var keyword = document.getElementById('searchInput').value.trim().toLowerCase();
    var type = document.getElementById('typeFilter').value;
    return allExperts.filter(function(e) {
        var isIndependent = e.expertType === '独立专家' || !e.orgId;
        var matchKeyword = !keyword ||
            (e.name && e.name.toLowerCase().indexOf(keyword) !== -1) ||
            (e.orgName && e.orgName.toLowerCase().indexOf(keyword) !== -1) ||
            (e.domain && e.domain.toLowerCase().indexOf(keyword) !== -1) ||
            (e.title && e.title.toLowerCase().indexOf(keyword) !== -1);
        var matchType = !type ||
            (type === '独立专家' && isIndependent) ||
            (type === '机构专家' && !isIndependent);
        return matchKeyword && matchType;
    });
}

function isSelected(expertId) {
    return selectedExperts.some(function(s) { return s.expertId === expertId; });
}

function addExpert(expertId) {
    var expert = allExperts.find(function(e) { return e.expertId === expertId; });
    if (!expert || isSelected(expertId)) return;
    var isIndependent = expert.expertType === '独立专家' || !expert.orgId;
    selectedExperts.push({
        expertId: expert.expertId,
        name: expert.name,
        orgName: isIndependent ? '独立专家' : (expert.orgName || ''),
        domain: expert.domain,
        title: expert.title,
        expertType: isIndependent ? '独立专家' : '机构专家'
    });
    saveSelectedExperts();
    renderSelected();
    renderExpertList();
}

function removeExpert(expertId) {
    selectedExperts = selectedExperts.filter(function(s) { return s.expertId !== expertId; });
    saveSelectedExperts();
    renderSelected();
    renderExpertList();
}

function clearSelected() {
    if (!selectedExperts.length) return;
    if (!confirm('确定要清空已选专家列表吗？')) return;
    selectedExperts = [];
    saveSelectedExperts();
    renderSelected();
    renderExpertList();
}

function showAllExperts() {
    // 已合并到列表直接选择，无需弹窗
}

function toggleSelectAll() {
    var list = getFilteredExperts();
    var allSelected = list.length > 0 && list.every(function(e) { return isSelected(e.expertId); });
    list.forEach(function(e) {
        if (allSelected) {
            removeExpert(e.expertId);
        } else {
            addExpert(e.expertId);
        }
    });
}
function renderSelected() {
    var container = document.getElementById('selectedList');
    var countEl = document.getElementById('selectedCount');
    if (!container || !countEl) return;
    countEl.textContent = selectedExperts.length;

    if (!selectedExperts.length) {
        container.innerHTML = '<div class="selected-empty"><i class="fas fa-user-friends"></i>暂未选择专家<br>请从右侧列表添加</div>';
        return;
    }

    container.innerHTML = selectedExperts.map(function(s) {
        return '<div class="selected-item">' +
            '<div class="selected-avatar" style="background:' + getAvatarColor(s.name) + '">' + getInitial(s.name) + '</div>' +
            '<div class="selected-info">' +
                '<div class="selected-name">' + s.name + '</div>' +
                '<div class="selected-org">' + (s.orgName || '-') + '</div>' +
                '<div class="selected-tag">' + (s.domain || '-') + '</div>' +
            '</div>' +
            '<button class="selected-remove" onclick="removeExpert(\'' + s.expertId + '\')" title="删除"><i class="fas fa-times"></i></button>' +
        '</div>';
    }).join('');
}

function renderExpertList() {
    var tbody = document.getElementById('expertTableBody');
    var emptyTip = document.getElementById('emptyTip');
    if (!tbody) return;
    var list = getFilteredExperts();

    if (!list.length) {
        tbody.innerHTML = '';
        if (emptyTip) emptyTip.style.display = 'block';
        return;
    }
    if (emptyTip) emptyTip.style.display = 'none';

    var total = list.length;
    var totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    if (currentPage < 1) currentPage = 1;
    var start = (currentPage - 1) * pageSize;
    var displayList = list.slice(start, start + pageSize);

    var selectAll = document.getElementById('selectAll');
    if (selectAll) {
        selectAll.checked = displayList.length > 0 && displayList.every(function(e) { return isSelected(e.expertId); });
    }

    tbody.innerHTML = displayList.map(function(e) {
        var selected = isSelected(e.expertId);
        var checked = selected ? 'checked' : '';
        var isIndependent = e.expertType === '独立专家' || !e.orgId;
        var orgDisplay = isIndependent ? '<span style="color:var(--primary);font-weight:500;">独立专家</span>' : (e.orgName || '-');
        return '<tr>' +
            '<td class="col-check"><input type="checkbox" ' + checked + ' onclick="toggleExpert(\'' + e.expertId + '\')"></td>' +
            '<td class="col-info">' +
                '<div class="expert-info">' +
                    '<div class="expert-avatar" style="background:' + getAvatarColor(e.name) + '">' + getInitial(e.name) + '</div>' +
                    '<div class="expert-meta">' +
                        '<div class="expert-name">' + (e.name || '-') + '</div>' +
                        '<div class="expert-title">' + (e.title || '-') + '</div>' +
                    '</div>' +
                '</div>' +
            '</td>' +
            '<td class="col-org">' + orgDisplay + '</td>' +
            '<td class="col-domain"><span class="domain-tag">' + (e.domain || '-') + '</span></td>' +
        '</tr>';
    }).join('');

    renderPagination(total, totalPages);
}

function renderPagination(total, totalPages) {
    var container = document.getElementById('listPagination');
    if (!container) return;
    var html = '<span class="page-info">共 ' + total + ' 条，第 ' + currentPage + '/' + totalPages + ' 页</span>';
    html += '<div>';
    html += '<button class="page-btn" onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled' : '') + '><i class="fas fa-chevron-left"></i></button>';
    for (var i = 1; i <= totalPages; i++) {
        html += '<button class="page-btn ' + (i === currentPage ? 'active' : '') + '" onclick="goPage(' + i + ')" ' + (i === currentPage ? 'disabled' : '') + '>' + i + '</button>';
    }
    html += '<button class="page-btn" onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? 'disabled' : '') + '><i class="fas fa-chevron-right"></i></button>';
    html += '</div>';
    container.innerHTML = html;
}

function toggleExpert(expertId) {
    if (isSelected(expertId)) {
        removeExpert(expertId);
    } else {
        addExpert(expertId);
    }
}

function confirmGroup() {
    try {
        console.log('[tp-expert-select] confirmGroup start, selected=' + selectedExperts.length);

        var btn = document.getElementById('btnConfirmGroup');
        if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';
            btn.style.opacity = '0.7';
        }

        if (selectedExperts.length === 0) {
            if (!confirm('尚未选择任何专家，是否直接关闭选择窗口？')) {
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-check"></i> 确认选择';
                    btn.style.opacity = '1';
                }
                return;
            }
        }

        // 保存最终选择结果
        saveSelectedExperts();
        console.log('[tp-expert-select] selected experts saved to localStorage');

        var params = getTPQueryParams();
        var projectId = params.projectId;
        console.log('[tp-expert-select] projectId=' + projectId);

        if (projectId && typeof getProjectGroupById === 'function') {
            var project = getProjectGroupById(projectId);
            if (project) {
                project.experts = selectedExperts.map(function(s) {
                    return {
                        expertId: s.expertId,
                        name: s.name,
                        orgName: s.orgName,
                        domain: s.domain,
                        title: s.title,
                        expertType: s.expertType
                    };
                });
                if (typeof updateProjectGroup === 'function') {
                    updateProjectGroup(project);
                    console.log('[tp-expert-select] project group updated');
                }
            } else {
                console.warn('[tp-expert-select] project not found: ' + projectId);
            }
        }

        var payload = {
            action: 'expertSelected',
            list: selectedExperts,
            count: selectedExperts.length,
            source: 'tp-expert-select',
            projectId: projectId || ''
        };

        try {
            if (window.parent && window.parent !== window) {
                window.parent.postMessage(payload, '*');
                console.log('[tp-expert-select] notified parent');
            } else if (window.opener) {
                window.opener.postMessage(payload, '*');
                console.log('[tp-expert-select] notified opener');
            }
        } catch (e) {
            console.error('[tp-expert-select] postMessage error:', e);
        }

        // 方案 A：保存后停留在当前页，提示成功
        showSaveResult('success', '已保存 ' + selectedExperts.length + ' 位专家选择');
        console.log('[tp-expert-select] saved, stay on page');

        if (btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check"></i> 确认选择';
            btn.style.opacity = '1';
        }

    } catch (err) {
        console.error('[tp-expert-select] confirmGroup fatal error:', err);
        showSaveResult('error', '保存失败：' + err.message);
        var btn = document.getElementById('btnConfirmGroup');
        if (btn) {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check"></i> 确认选择';
            btn.style.opacity = '1';
        }
    }
}

function showSaveResult(type, text) {
    var el = document.getElementById('saveResult');
    if (!el) return;
    el.style.display = 'block';
    el.textContent = text;
    if (type === 'success') {
        el.style.color = 'var(--success)';
        el.style.background = 'rgba(30, 142, 62, 0.08)';
    } else {
        el.style.color = 'var(--danger)';
        el.style.background = 'rgba(217, 48, 37, 0.08)';
    }
    setTimeout(function() {
        el.style.display = 'none';
    }, 3000);
}

function closeSelectPage() {
    var params = getTPQueryParams();
    var projectId = params.projectId;
    try {
        if (window.parent && window.parent !== window) {
            window.parent.postMessage({ action: 'closeExpertModal', projectId: projectId || '' }, '*');
            console.log('[tp-expert-select] closeSelectPage sent to parent');
        } else if (window.opener) {
            window.close();
            console.log('[tp-expert-select] closeSelectPage closing window');
        } else if (projectId) {
            location.href = 'tp-contract.html?projectId=' + encodeURIComponent(projectId);
        } else if (history.length > 1) {
            history.back();
        } else {
            alert('请返回原页面。');
        }
    } catch (e) {
        console.error('[tp-expert-select] closeSelectPage error:', e);
    }
}

initData();

// 额外绑定确认按钮，防止某些浏览器/框架下 onclick 失效
document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('btnConfirmGroup');
    if (btn) {
        btn.addEventListener('click', function(e) {
            console.log('[tp-expert-select] confirm button clicked (addEventListener)');
            confirmGroup();
        });
    }
});
</script>
