<!DOCTYPE html>

<html lang="zh-CN" data-theme="light"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>农村自建房 - 风险隐患管理</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="../js/house-arch-data.js"></script>
<style>
/* ===== Theme Variables ===== */
:root {
    --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
    --secondary: #0097a7; --danger: #d93025; --warning: #e65100; --success: #1e8e3e;
    --bg-dark: #f0f2f5; --bg-card: #ffffff; --bg-hover: #e8eaed;
    --text-primary: #202124; --text-secondary: #5f6368; --border: #dadce0;
    --shadow: rgba(0,0,0,0.08); --input-bg: #ffffff; --input-border: #dadce0;
}
:root[data-theme="dark"] {
    --primary: #1e6fdb; --primary-dark: #1557b0; --primary-light: #e8f1fd;
    --secondary: #00b4d8; --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
    --bg-dark: #0a1628; --bg-card: #112240; --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0; --text-secondary: #94a3b8; --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3); --input-bg: rgba(255,255,255,0.05); --input-border: #1e3a5f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    padding: 20px;
    min-height: 100vh;
}

/* ===== 4-Color Risk KPI Cards ===== */
.kpi-wrapper {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 20px;
}
.kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.3s;
    box-shadow: 0 1px 3px var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }

.kpi-card.red-top    { border-top: 4px solid var(--danger); }
.kpi-card.orange-top { border-top: 4px solid var(--warning); }
.kpi-card.yellow-top { border-top: 4px solid #c78000; }
.kpi-card.blue-top   { border-top: 4px solid var(--primary); }

.kpi-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.kpi-card-label {
    font-size: 15px;
    font-weight: 700;
}
.kpi-card-label.red    { color: var(--danger); }
.kpi-card-label.orange { color: var(--warning); }
.kpi-card-label.yellow { color: #c78000; }
.kpi-card-label.blue   { color: var(--primary); }

.kpi-card-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
}
.kpi-card-icon.red    { background: rgba(217,48,37,0.15); color: var(--danger); }
.kpi-card-icon.orange { background: rgba(227,116,0,0.15); color: var(--warning); }
.kpi-card-icon.yellow { background: rgba(249,200,70,0.15); color: #c78000; }
.kpi-card-icon.blue   { background: rgba(26,115,232,0.15); color: var(--primary); }

.kpi-card-main {
    display: flex;
    align-items: baseline;
    gap: 8px;
}
.kpi-card-total {
    font-size: 32px;
    font-weight: 700;
    line-height: 1;
}
.kpi-card-total.red    { color: var(--danger); }
.kpi-card-total.orange { color: var(--warning); }
.kpi-card-total.yellow { color: #c78000; }
.kpi-card-total.blue   { color: var(--primary); }

.kpi-card-trend {
    font-size: 12px;
    color: var(--text-secondary);
}

.kpi-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: auto;
    padding-top: 4px;
}

.kpi-card-note {
    font-size: 12px;
    font-weight: 600;
    padding: 2px 6px;
    border-radius: 4px;
    line-height: 1.4;
    white-space: nowrap;
}
.kpi-card-note.red    { color: var(--danger);  background: rgba(217,48,37,0.08); }
.kpi-card-note.orange { color: var(--warning); background: rgba(230,81,0,0.08); }
.kpi-card-note.yellow { color: #c78000;        background: rgba(199,128,0,0.08); }
.kpi-card-note.blue   { color: var(--primary); background: rgba(26,115,232,0.08); }

:root[data-theme="dark"] .kpi-card-note.red    { background: rgba(217,48,37,0.18); }
:root[data-theme="dark"] .kpi-card-note.orange { background: rgba(230,81,0,0.18); }
:root[data-theme="dark"] .kpi-card-note.yellow { background: rgba(199,128,0,0.18); }
:root[data-theme="dark"] .kpi-card-note.blue   { background: rgba(26,115,232,0.18); }

/* ===== Filter Bar ===== */
.filter-bar {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
}
.filter-group {
    display: flex;
    align-items: center;
    gap: 8px;
}
.filter-label {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
}
.filter-input,
.filter-select {
    height: 34px;
    padding: 0 12px;
    border: 1px solid var(--input-border);
    border-radius: 6px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
}
.filter-input:focus,
.filter-select:focus { border-color: var(--primary); }
.filter-input { width: 160px; }
.filter-select { min-width: 120px; cursor: pointer; }

.btn {
    height: 34px;
    padding: 0 18px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
}
.btn-primary {
    background: var(--primary);
    color: #fff;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-default {
    background: var(--bg-hover);
    color: var(--text-primary);
    border: 1px solid var(--border);
}
.btn-default:hover { background: var(--border); }

/* ===== Table ===== */
.table-wrapper {
    overflow-x: auto;
    max-width: 100%;
}
.data-table {
    width: 100%;
    min-width: 1500px;
    border-collapse: separate;
    border-spacing: 0;
}
.table-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: auto;
    box-shadow: 0 1px 3px var(--shadow);
}
.data-table thead {
    background: var(--bg-hover);
}
.data-table th {
    padding: 12px 10px;
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
}
.data-table td {
    padding: 12px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    vertical-align: middle;
    font-size: 13px;
}
.data-table td:nth-child(3),
.data-table td:nth-child(4),
.data-table td:nth-child(8) {
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.data-table td:nth-child(10) {
    max-width: 140px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.data-table tbody tr:hover {
    background: rgba(26,115,232,0.04);
}
.data-table tbody tr:last-child td {
    border-bottom: none;
}

/* 固定列样式：仅在中等以上屏幕启用 */
@media (min-width: 1440px) {
    .data-table th:first-child,
    .data-table td:first-child,
    .data-table th:nth-last-child(2),
    .data-table td:nth-last-child(2),
    .data-table th:last-child,
    .data-table td:last-child {
        position: sticky;
        background: var(--bg-card);
        z-index: 2;
        box-shadow: -2px 0 4px -2px rgba(0,0,0,0.08);
    }
    .data-table th:first-child,
    .data-table td:first-child { left: 0; }
    .data-table th:nth-last-child(2),
    .data-table td:nth-last-child(2) { right: 100px; }
    .data-table th:last-child,
    .data-table td:last-child { right: 0; }
    .data-table th:first-child,
    .data-table th:nth-last-child(2),
    .data-table th:last-child { background: var(--bg-hover); }
    .data-table tbody tr:hover td:first-child,
    .data-table tbody tr:hover td:nth-last-child(2),
    .data-table tbody tr:hover td:last-child { background: var(--bg-hover); }
}

@media (max-width: 1439px) {
    .data-table th,
    .data-table td {
        white-space: nowrap;
    }
    .data-table td:nth-child(1),
    .data-table td:nth-child(4),
    .data-table td:nth-child(8),
    .data-table td:nth-child(10) {
        max-width: 140px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }
}

/* Action links */
.actions {
    display: flex;
    gap: 10px;
    align-items: center;
    white-space: nowrap;
}
.action-link {
    font-size: 13px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    color: var(--primary);
    transition: none;
    opacity: 1 !important;
}
.action-link:hover { text-decoration: underline; opacity: 1 !important; }
.action-link.delete { color: var(--danger); }
.risk-badge {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
}
.risk-badge.red {
    background: rgba(217,48,37,0.1);
    color: var(--danger);
}
.risk-badge.orange {
    background: rgba(227,116,0,0.1);
    color: var(--warning);
}
.risk-badge.yellow {
    background: rgba(199,128,0,0.1);
    color: #c78000;
}
.risk-badge.blue {
    background: rgba(26,115,232,0.1);
    color: var(--primary);
}

/* Source tag */
.source-tag {
    font-size: 13px;
    color: var(--text-primary);
}

/* Status tag */
.status-tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
}
.status-tag.pending      { background: rgba(217,48,37,0.1);  color: var(--danger); }
.status-tag.dispatch     { background: rgba(227,116,0,0.1);  color: var(--warning); }
.status-tag.handling     { background: rgba(26,115,232,0.1); color: var(--primary); }
.status-tag.accept       { background: rgba(142,36,170,0.1); color: #8e24aa; }
.status-tag.closed       { background: rgba(30,142,62,0.1);  color: var(--success); }
.status-tag.reject-audit { background: rgba(100,100,100,0.1); color: var(--text-secondary); }
.status-tag.reject-check { background: rgba(100,100,100,0.1); color: var(--text-secondary); }
.status-tag.overdue      { background: rgba(217,48,37,0.15); color: var(--danger); }

/* 处置中心状态 */
.status-tag.receive      { background: rgba(26,115,232,0.1); color: var(--primary); }
.status-tag.survey       { background: rgba(0,151,167,0.1);  color: var(--secondary); }
.status-tag.plan         { background: rgba(142,36,170,0.1);  color: #8e24aa; }
.status-tag.repair       { background: rgba(227,116,0,0.1);   color: var(--warning); }
.status-tag.check        { background: rgba(30,142,62,0.1);  color: var(--success); }
.status-tag.received     { background: rgba(26,115,232,0.1); color: var(--primary); }

/* Action links */
.actions {
    display: flex;
    gap: 10px;
    align-items: center;
}
.action-link {
    font-size: 13px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    transition: opacity 0.2s;
    color: var(--primary);
}
.action-link:hover { text-decoration: underline; }
.action-link.delete { color: var(--danger); }

/* Pagination */
.pagination-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-card);
    position: relative;
    z-index: 10;
}
.page-btn {
    min-width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
}
.page-btn:hover { border-color: var(--primary); color: var(--primary); }
.page-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
}
.page-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.page-info {
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
    flex-shrink: 0;
}

/* ===== Sub Tabs ===== */
.sub-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
}
.sub-tab-group {
    display: none;
    gap: 4px;
    flex-wrap: wrap;
}
.sub-tab-group.active {
    display: flex;
}
.sub-tab-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    border: none;
    background: transparent;
}
.sub-tab-item:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
}
.sub-tab-item.active {
    background: var(--primary);
    color: #fff;
}

/* ===== Status Tabs ===== */
.status-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
}
.tab-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    border: none;
    background: transparent;
}
.tab-item:hover {
    background: var(--bg-hover);
    color: var(--text-primary);
}
.tab-item.active {
    background: var(--primary);
    color: #fff;
}
.tab-item .tab-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 20px;
    height: 20px;
    padding: 0 6px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    background: rgba(0,0,0,0.06);
}
.tab-item.active .tab-count {
    background: rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<!-- ===== 4-Color Risk KPI Cards ===== -->
<div class="kpi-wrapper">
    <div class="kpi-card red-top">
        <div class="kpi-card-header">
            <span class="kpi-card-label red">重大隐患</span>
            <div class="kpi-card-icon red"><i class="fa-solid fa-triangle-exclamation"></i></div>
        </div>
        <div class="kpi-card-main">
            <span class="kpi-card-total red" id="kpi-major">0</span>
        </div>
        <div class="kpi-card-footer">
            <div class="kpi-card-trend">隐患存量</div>
            <div class="kpi-card-note red">疑似危房</div>
        </div>
    </div>
    <div class="kpi-card orange-top">
        <div class="kpi-card-header">
            <span class="kpi-card-label orange">较大隐患</span>
            <div class="kpi-card-icon orange"><i class="fa-solid fa-circle-exclamation"></i></div>
        </div>
        <div class="kpi-card-main">
            <span class="kpi-card-total orange" id="kpi-significant">0</span>
        </div>
        <div class="kpi-card-footer">
            <div class="kpi-card-trend">隐患存量</div>
            <div class="kpi-card-note orange">严重损坏房</div>
        </div>
    </div>
    <div class="kpi-card yellow-top">
        <div class="kpi-card-header">
            <span class="kpi-card-label yellow">一般隐患</span>
            <div class="kpi-card-icon yellow"><i class="fa-solid fa-exclamation"></i></div>
        </div>
        <div class="kpi-card-main">
            <span class="kpi-card-total yellow" id="kpi-general">0</span>
        </div>
        <div class="kpi-card-footer">
            <div class="kpi-card-trend">隐患存量</div>
            <div class="kpi-card-note yellow">一般损坏房</div>
        </div>
    </div>
    <div class="kpi-card blue-top">
        <div class="kpi-card-header">
            <span class="kpi-card-label blue">轻微/安全</span>
            <div class="kpi-card-icon blue"><i class="fa-solid fa-shield"></i></div>
        </div>
        <div class="kpi-card-main">
            <span class="kpi-card-total blue" id="kpi-low">0</span>
        </div>
        <div class="kpi-card-footer">
            <div class="kpi-card-trend">隐患存量</div>
            <div class="kpi-card-note blue">完好房（基本完好房）</div>
        </div>
    </div>
</div>

<!-- ===== Filter Bar ===== -->
<div class="filter-bar">
    <div class="filter-group">
        <span class="filter-label">隐患编号</span>
        <input type="text" id="filter-no" class="filter-input" placeholder="请输入隐患编号">
    </div>
    <div class="filter-group">
        <span class="filter-label">隐患地址</span>
        <input type="text" id="filter-address" class="filter-input" placeholder="请输入地址关键词">
    </div>
    <div class="filter-group">
        <span class="filter-label">隐患等级</span>
        <select id="filter-level" class="filter-select">
            <option value="">全部</option>
            <option value="重大隐患">重大隐患</option>
            <option value="较大隐患">较大隐患</option>
            <option value="一般隐患">一般隐患</option>
            <option value="安全">安全/低风险</option>
        </select>
    </div>
    <div class="filter-group">
        <span class="filter-label">处理状态</span>
        <select id="filter-status" class="filter-select">
            <option value="">全部</option>
            <option value="待审核">待审核</option>
            <option value="待分发">待分发</option>
            <option value="处置中">处置中</option>
            <option value="待验收">待验收</option>
            <option value="已销号">已销号</option>
            <option value="已驳回">已驳回</option>
        </select>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="btn btn-primary" id="btn-search"><i class="fa-solid fa-search"></i> 查询</button>
        <button class="btn btn-default" id="btn-reset"><i class="fa-solid fa-undo"></i> 重置</button>
    </div>
</div>

<!-- ===== Status Tabs ===== -->
<div class="status-tabs">
    <button class="tab-item active" data-tab="all">
        <span>全部</span>
        <span class="tab-count" id="tab-count-all">0</span>
    </button>
    <button class="tab-item" data-tab="pending-audit">
        <span>待审核</span>
        <span class="tab-count" id="tab-count-pending-audit">0</span>
    </button>
    <button class="tab-item" data-tab="pending-dispatch">
        <span>待分发</span>
        <span class="tab-count" id="tab-count-pending-dispatch">0</span>
    </button>
    <button class="tab-item" data-tab="handling">
        <span>处置中</span>
        <span class="tab-count" id="tab-count-handling">0</span>
    </button>
    <button class="tab-item" data-tab="pending-accept">
        <span>待验收</span>
        <span class="tab-count" id="tab-count-pending-accept">0</span>
    </button>
</div>

<!-- ===== Risk Hidden Danger List ===== -->
<div class="table-card">
    <div class="table-wrapper">
    <table class="data-table">
        <thead>
            <tr>
                <th>隐患名称</th>
                <th>隐患类型</th>
                <th>隐患等级</th>
                <th>隐患地址</th>
                <th>上报来源</th>
                <th>上报人</th>
                <th>处置单位</th>
                <th>处置人</th>
                <th>上报时间</th>
                <th>产权人</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="hazard-table-body">
            <!-- 由脚本动态填充 -->
        </tbody>
    </table>
    </div>
    <div class="pagination-bar">
        <span class="page-info" id="page-info">共 0 条，每页 10 条</span>
        <button class="page-btn" id="page-prev"><i class="fa-solid fa-chevron-left"></i></button>
        <span id="page-numbers"></span>
        <button class="page-btn" id="page-next"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
</div>

<script src="../js/house-arch-data.js"></script>
<script>
(function() {
    const PAGE_SIZE = 10;
    let allHazards = [];
    let filteredHazards = [];
    let currentPage = 1;
    let currentTab = 'all';

    const HAZARD_TYPE_MAP = {
        '承重墙': '结构隐患',
        '屋面': '屋面隐患',
        '地基基础': '地基隐患',
        '木构架': '结构隐患',
        '楼梯间': '结构隐患',
        '阳台': '结构隐患',
        '外墙': '外围隐患',
        '梁柱': '结构隐患',
        '楼板': '结构隐患',
        '排水系统': '设施隐患'
    };

    const SOURCE_OPTIONS = ['物联自动上报', '巡查人员上报', '排查发现', '群众举报', '专家研判'];

    function pad2(n) { return n < 10 ? '0' + n : n; }

    function formatDateTime(d) {
        if (!d) return '-';
        if (typeof d === 'string' && d.includes(' ')) return d;
        const dt = new Date(d);
        if (isNaN(dt)) return d;
        return dt.getFullYear() + '-' + pad2(dt.getMonth() + 1) + '-' + pad2(dt.getDate()) + ' ' + pad2(dt.getHours()) + ':' + pad2(dt.getMinutes());
    }

    function mapRiskClass(level) {
        if (level === '重大隐患') return 'red';
        if (level === '较大隐患') return 'orange';
        if (level === '一般隐患') return 'yellow';
        return 'blue';
    }

    function mapStatus(governance, closeStatus) {
        if (closeStatus === '已通过') return { key: 'closed', label: '已销号', cls: 'closed' };
        if (closeStatus === '已驳回') return { key: 'reject-check', label: '已驳回', cls: 'reject-check' };
        if (closeStatus === '审核中') return { key: 'pending-accept', label: '待验收', cls: 'accept' };
        if (governance === 'done') return { key: 'pending-accept', label: '待验收', cls: 'accept' };
        if (governance === 'doing') return { key: 'handling', label: '处置中', cls: 'handling' };
        if (governance === 'overdue') return { key: 'handling', label: '处置中', cls: 'handling' };
        if (governance === 'pending') {
            // 待整治进一步区分为待审核/待分发（按序号奇偶分布）
            return { key: 'pending-audit', label: '待审核', cls: 'pending' };
        }
        return { key: 'pending-audit', label: '待审核', cls: 'pending' };
    }

    function generateHazardRowsFromRecords() {
        if (typeof initHouseArchSeed !== 'function' || typeof getAllHouseRecords !== 'function') return [];
        initHouseArchSeed();
        const records = getAllHouseRecords().filter(r => (r.houseType || r.category) === '农村自建房');
        const rows = [];
        records.forEach((rec, idx) => {
            const hazards = rec.hazards && rec.hazards.length ? rec.hazards : [{ part: '房屋结构', type: '安全隐患', level: rec.riskLevel }];
            const source = SOURCE_OPTIONS[idx % SOURCE_OPTIONS.length];
            const reportTime = rec.inspectionRecords && rec.inspectionRecords.length
                ? rec.inspectionRecords[0].reportTime || rec.inspectionRecords[0].checkDate + ' 09:00'
                : (rec.archiveRecords && rec.archiveRecords.length ? rec.archiveRecords[0].archiveTime + ' 09:00' : '2025-06-01 09:00');
            const dutyUnit = rec.responsibleDept || (rec.street + '城建中心');
            const dutyPerson = rec.responsiblePerson || rec.owner;

            hazards.forEach((h, hIdx) => {
                const hazardNo = rec.no + '-H' + (hIdx + 1);
                const hazardType = HAZARD_TYPE_MAP[h.part] || '结构隐患';
                const level = h.level || rec.riskLevel || '一般隐患';
                const status = mapStatus(rec.governance, rec.closeStatus);
                const name = rec.name + ' ' + h.part + h.type;
                rows.push({
                    id: rec.no + '-' + hIdx,
                    hazardNo: hazardNo,
                    hazardName: name,
                    hazardType: hazardType,
                    hazardLevel: level,
                    address: rec.address,
                    community: rec.community,
                    source: source,
                    reporter: rec.owner,
                    dutyUnit: dutyUnit,
                    dutyPerson: dutyPerson,
                    reportTime: reportTime,
                    ownerName: rec.owner,
                    status: status,
                    houseNo: rec.no
                });
            });
        });
        return rows;
    }

    function renderBadge(level) {
        const cls = mapRiskClass(level);
        return `<span class="risk-badge ${cls}">${level}</span>`;
    }

    function getActionButtons(status, houseNo) {
        const s = status.key;
        const detail = `<button class="action-link" onclick="window.location.href='rural-warning-detail.html?no=${houseNo}'">查看</button>`;
        if (s === 'pending-audit') {
            return `<button class="action-link" onclick="window.location.href='rural-warning-audit.html?no=${houseNo}'">审核</button>` + detail;
        }
        if (s === 'pending-dispatch') {
            return `<button class="action-link" onclick="window.location.href='rural-warning-dispatch.html?no=${houseNo}'">分发</button>` + detail;
        }
        if (s === 'handling') {
            return `<button class="action-link" onclick="window.location.href='rural-warning-handle.html?no=${houseNo}'">处置</button>` + detail;
        }
        if (s === 'pending-accept') {
            return `<button class="action-link" onclick="window.location.href='rural-warning-acceptance.html?no=${houseNo}'">验收</button>` + detail;
        }
        return detail;
    }

    function renderTable() {
        const tbody = document.getElementById('hazard-table-body');
        const start = (currentPage - 1) * PAGE_SIZE;
        const pageRows = filteredHazards.slice(start, start + PAGE_SIZE);
        tbody.innerHTML = '';
        pageRows.forEach(row => {
            const tr = document.createElement('tr');
            tr.dataset.status = row.status.key;
            tr.innerHTML = `
                <td>${row.hazardName}</td>
                <td>${row.hazardType}</td>
                <td>${renderBadge(row.hazardLevel)}</td>
                <td>${row.address}</td>
                <td>${row.source}</td>
                <td>${row.reporter}</td>
                <td>${row.dutyUnit}</td>
                <td>${row.dutyPerson}</td>
                <td>${formatDateTime(row.reportTime)}</td>
                <td>${row.ownerName}</td>
                <td><span class="status-tag ${row.status.cls}">${row.status.label}</span></td>
                <td><div class="actions">${getActionButtons(row.status, row.houseNo)}</div></td>
            `;
            tbody.appendChild(tr);
        });
        document.getElementById('page-info').textContent = `共 ${filteredHazards.length} 条，每页 ${PAGE_SIZE} 条`;
        renderPagination();
    }

    function renderPagination() {
        const totalPages = Math.max(1, Math.ceil(filteredHazards.length / PAGE_SIZE));
        const container = document.getElementById('page-numbers');
        let html = '';
        for (let i = 1; i <= totalPages; i++) {
            if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
            } else if (i === currentPage - 2 || i === currentPage + 2) {
                html += `<span style="color:var(--text-secondary);padding:0 4px">...</span>`;
            }
        }
        container.innerHTML = html;
        document.getElementById('page-prev').disabled = currentPage <= 1;
        document.getElementById('page-next').disabled = currentPage >= totalPages;

        container.querySelectorAll('button[data-page]').forEach(btn => {
            btn.addEventListener('click', function() {
                currentPage = parseInt(this.dataset.page, 10);
                renderTable();
            });
        });
    }

    function filterRows() {
        const noVal = document.getElementById('filter-no').value.trim();
        const addressVal = document.getElementById('filter-address').value.trim();
        const levelVal = document.getElementById('filter-level').value;
        const statusVal = document.getElementById('filter-status').value;

        filteredHazards = allHazards.filter(row => {
            if (currentTab !== 'all' && row.status.key !== currentTab) return false;
            if (noVal && !row.houseNo.includes(noVal)) return false;
            if (addressVal && !row.address.includes(addressVal)) return false;
            if (levelVal && row.hazardLevel !== levelVal) return false;
            if (statusVal && row.status.label !== statusVal) return false;
            return true;
        });
        currentPage = 1;
        updateTabCounts();
        renderTable();
    }

    function updateTabCounts() {
        const counts = {
            all: allHazards.length,
            'pending-audit': 0,
            'pending-dispatch': 0,
            handling: 0,
            'pending-accept': 0
        };
        allHazards.forEach(row => { if (counts[row.status.key] !== undefined) counts[row.status.key]++; });
        Object.keys(counts).forEach(k => {
            const el = document.getElementById('tab-count-' + k);
            if (el) el.textContent = counts[k];
        });

        const levelCounts = { '重大隐患': 0, '较大隐患': 0, '一般隐患': 0, '安全': 0, '无风险': 0 };
        allHazards.forEach(row => {
            if (levelCounts[row.hazardLevel] !== undefined) levelCounts[row.hazardLevel]++;
        });
        document.getElementById('kpi-major').textContent = levelCounts['重大隐患'];
        document.getElementById('kpi-significant').textContent = levelCounts['较大隐患'];
        document.getElementById('kpi-general').textContent = levelCounts['一般隐患'];
        document.getElementById('kpi-low').textContent = levelCounts['安全'] + levelCounts['无风险'];
    }

    function switchStatusTab(tabBtn) {
        document.querySelectorAll('.status-tabs .tab-item').forEach(btn => btn.classList.remove('active'));
        tabBtn.classList.add('active');
        currentTab = tabBtn.dataset.tab;
        filterRows();
    }

    document.querySelectorAll('.status-tabs .tab-item').forEach(btn => {
        btn.addEventListener('click', function() { switchStatusTab(this); });
    });

    document.getElementById('btn-search').addEventListener('click', filterRows);
    document.getElementById('btn-reset').addEventListener('click', function() {
        document.getElementById('filter-no').value = '';
        document.getElementById('filter-address').value = '';
        document.getElementById('filter-level').value = '';
        document.getElementById('filter-status').value = '';
        filterRows();
    });

    document.getElementById('page-prev').addEventListener('click', function() {
        if (currentPage > 1) { currentPage--; renderTable(); }
    });
    document.getElementById('page-next').addEventListener('click', function() {
        const totalPages = Math.ceil(filteredHazards.length / PAGE_SIZE);
        if (currentPage < totalPages) { currentPage++; renderTable(); }
    });

    // init
    allHazards = generateHazardRowsFromRecords().filter(row => row.source !== '物联自动上报' && row.source !== '专家研判');
    // 默认按状态分流：待审核(pending) -> 待审核；处置中(doing/overdue) -> 处置中；完成(done) -> 待验收；销号 -> 已销号；驳回 -> 已驳回
    // 将部分“待审核”状态再分流为“待分发”，使5个tab都有数据：按序号奇偶
    let dispatchIdx = 0;
    allHazards.forEach((row, idx) => {
        if (row.status.key === 'pending-audit' && idx % 7 === 0) {
            row.status = { key: 'pending-dispatch', label: '待分发', cls: 'dispatch' };
            dispatchIdx++;
        }
    });
    filteredHazards = allHazards.slice();
    updateTabCounts();
    renderTable();
})();
</script>



</body></html>
