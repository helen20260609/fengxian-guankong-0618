<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农村自建房 - 安全预警</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
            --secondary: #0097a7; --danger: #d93025; --warning: #e65100; --success: #1e8e3e;
            --bg-dark: #f0f2f5; --bg-card: #ffffff; --bg-hover: #e8eaed;
            --text-primary: #202124; --text-secondary: #5f6368; --border: #dadce0;
            --shadow: rgba(0,0,0,0.08); --input-bg: #ffffff; --input-border: #dadce0;
            --radius: 8px;
        }
        :root[data-theme="dark"] {
            --primary: #1e6fdb; --primary-dark: #1557b0; --primary-light: #e8f1fd;
            --secondary: #00b4d8; --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
            --bg-dark: #0a1628; --bg-card: #112240; --bg-hover: #1a2f4a;
            --text-primary: #e2e8f0; --text-secondary: #94a3b8; --border: #1e3a5f;
            --shadow: rgba(0,0,0,0.3); --input-bg: rgba(255,255,255,0.05); --input-border: #1e3a5f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
            background: var(--bg-dark); color: var(--text-primary);
            padding: 20px; min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .page-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .page-title i { color: var(--danger); }
        .page-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.6; }

        .kpi-wrapper {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px;
        }
        @media (max-width: 1024px) { .kpi-wrapper { grid-template-columns: repeat(2, 1fr); } }
        .kpi-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 14px 16px; box-shadow: 0 1px 3px var(--shadow); display: flex; flex-direction: column; gap: 8px;
        }
        .kpi-card-header { display: flex; align-items: center; justify-content: space-between; font-size: 13px; color: var(--text-secondary); }
        .kpi-card-main { display: flex; align-items: baseline; gap: 6px; }
        .kpi-card-value { font-size: 26px; font-weight: 700; }
        .kpi-card-trend { font-size: 12px; }
        .kpi-card-trend.up { color: var(--danger); }
        .kpi-card-trend.down { color: var(--success); }

        .toolbar {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 14px 16px; margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap;
            align-items: center; justify-content: space-between; box-shadow: 0 1px 3px var(--shadow);
        }
        .filter-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .filter-item { display: flex; align-items: center; gap: 6px; }
        .filter-item label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; }
        .filter-item input, .filter-item select {
            padding: 7px 10px; font-size: 13px; border: 1px solid var(--input-border); border-radius: 6px;
            background: var(--input-bg); color: var(--text-primary); min-width: 120px; outline: none;
        }
        .filter-item input:focus, .filter-item select:focus { border-color: var(--primary); }
        .btn {
            padding: 8px 14px; border-radius: 6px; font-size: 13px; border: 1px solid transparent;
            cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border-color: var(--border); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-hover); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-success { background: var(--success); color: #fff; }
        .btn-warning { background: var(--warning); color: #fff; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }

        .main-layout { display: grid; grid-template-columns: 1fr; gap: 16px; }
        .section-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            box-shadow: 0 1px 3px var(--shadow); overflow: hidden; margin-bottom: 16px;
        }
        .section-header {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .section-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: var(--primary); }
        .section-body { padding: 16px; }

        .rule-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (max-width: 1024px) { .rule-list { grid-template-columns: 1fr; } }
        .rule-card {
            border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px;
            display: flex; align-items: flex-start; gap: 12px; transition: all 0.2s;
        }
        .rule-card:hover { box-shadow: 0 2px 8px var(--shadow); border-color: var(--primary); }
        .rule-toggle { margin-top: 3px; }
        .rule-toggle input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .rule-info { flex: 1; }
        .rule-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .rule-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
        .rule-meta { font-size: 12px; color: var(--text-secondary); display: flex; gap: 12px; flex-wrap: wrap; }
        .rule-level { font-size: 11px; padding: 2px 6px; border-radius: 10px; font-weight: 600; }
        .level-high { background: #fde7e7; color: #b71c1c; }
        .level-medium { background: #fff3e0; color: #e65100; }
        .level-low { background: #e8f5e9; color: #1b5e20; }

        .warning-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .warning-table th, .warning-table td {
            padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border);
        }
        .warning-table th { background: var(--bg-hover); color: var(--text-secondary); font-weight: 600; }
        .warning-table tr:hover { background: var(--bg-hover); }
        .warning-table td { color: var(--text-primary); }
        .warning-table .level-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        #pagination {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            padding: 16px; border-top: 1px solid var(--border);
        }
        #pagination button {
            min-width: 34px; height: 34px; border: 1px solid var(--border); background: var(--bg-card);
            color: var(--text-primary); border-radius: 6px; cursor: pointer; font-size: 13px;
            display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s;
        }
        #pagination button:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
        #pagination button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        #pagination button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-badge {
            font-size: 11px; padding: 3px 8px; border-radius: 12px; font-weight: 600;
        }
        .status-pending { background: #fff3e0; color: #e65100; }
        .status-sent { background: #e8f5e9; color: #1b5e20; }
        .status-handled { background: #e3f2fd; color: #1565c0; }
        .status-closed { background: #f5f5f5; color: #616161; }
        .channel-icons { display: flex; gap: 6px; color: var(--text-secondary); }
        .channel-icons .sent { color: var(--success); }

        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; align-items: center; justify-content: center;
            z-index: 9999; padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; width: 100%; max-width: 800px;
            max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .modal-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; font-weight: 700; }
        .modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--text-secondary); }
        .modal-body { padding: 18px; overflow-y: auto; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 14px; }
        @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .form-group label .required { color: var(--danger); margin-left: 2px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid var(--input-border); border-radius: 6px;
            background: var(--input-bg); color: var(--text-primary); outline: none;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-hint { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
        .modal-footer { padding: 12px 18px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

        .detail-section { margin-bottom: 14px; }
        .detail-section-title { font-size: 14px; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; color: var(--primary); }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 13px; }
        .detail-grid .label { color: var(--text-secondary); }
        .detail-content { font-size: 13px; line-height: 1.8; color: var(--text-primary); }
        .push-log { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
        .push-log-item { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .push-log-item:last-child { border-bottom: none; }
        .push-log-item .status { margin-left: auto; font-size: 12px; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
        .empty-state i { font-size: 40px; margin-bottom: 12px; color: var(--border); }
    </style>
</head>
<body>
<div class="container">
    <div class="page-title"><i class="fas fa-bell"></i> 安全预警</div>
    <div class="page-desc">
        基于风险档案数据，对存在重大风险的房屋自动生成预警信息，推送至户主、村委和乡镇政府，提醒及时采取处置措施。支持规则引擎配置和多渠道发布。
    </div>

    <div class="kpi-wrapper">
        <div class="kpi-card">
            <div class="kpi-card-header"><span>预警总数</span><i class="fas fa-bell" style="color:var(--primary)"></i></div>
            <div class="kpi-card-main"><div class="kpi-card-value" id="kpiTotal">0</div></div>
        </div>
        <div class="kpi-card">
            <div class="kpi-card-header"><span>待处置</span><i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i></div>
            <div class="kpi-card-main">
                <div class="kpi-card-value" id="kpiPending">0</div>
                <div class="kpi-card-trend up" id="kpiPendingTrend">+</div>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-card-header"><span>已处置</span><i class="fas fa-check-circle" style="color:var(--success)"></i></div>
            <div class="kpi-card-main">
                <div class="kpi-card-value" id="kpiHandled">0</div>
                <div class="kpi-card-trend down" id="kpiHandledTrend">-</div>
            </div>
        </div>
        <div class="kpi-card">
            <div class="kpi-card-header"><span>今日新增</span><i class="fas fa-calendar-plus" style="color:var(--secondary)"></i></div>
            <div class="kpi-card-main"><div class="kpi-card-value" id="kpiToday">0</div></div>
        </div>
    </div>

    <div class="toolbar">
        <div class="filter-group">
            <div class="filter-item">
                <label>关键字</label>
                <input type="text" id="searchKeyword" placeholder="房屋/户主/预警内容">
            </div>
            <div class="filter-item">
                <label>预警等级</label>
                <select id="searchLevel">
                    <option value="">全部</option>
                    <option value="high">重大</option>
                    <option value="medium">较大</option>
                    <option value="low">一般</option>
                </select>
            </div>
            <div class="filter-item">
                <label>状态</label>
                <select id="searchStatus">
                    <option value="">全部</option>
                    <option value="pending">待处置</option>
                    <option value="sent">已推送</option>
                    <option value="handled">已处置</option>
                    <option value="closed">已关闭</option>
                </select>
            </div>
            <button class="btn btn-outline" onclick="resetFilter()"><i class="fas fa-undo"></i> 重置</button>
        </div>
        <div class="action-group">
            <button class="btn btn-warning" onclick="generateWarnings()"><i class="fas fa-magic"></i> 生成预警</button>
            <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> 手动新增</button>
            <button class="btn btn-outline" onclick="restoreDefaultData()"><i class="fas fa-redo"></i> 恢复默认</button>
        </div>
    </div>

    <div class="section-card">
        <div class="section-header">
            <div class="section-title"><i class="fas fa-cogs"></i> 预警规则引擎</div>
            <button class="btn btn-outline btn-sm" onclick="toggleRules()"><i class="fas fa-chevron-down" id="ruleToggleIcon"></i> 收起</button>
        </div>
        <div class="section-body" id="ruleSectionBody">
            <div class="rule-list" id="ruleList"></div>
        </div>
    </div>

    <div class="section-card">
        <div class="section-header">
            <div class="section-title"><i class="fas fa-list-alt"></i> 预警信息列表</div>
            <div class="content-stats" id="listStats">共 0 条</div>
        </div>
        <div class="section-body" style="padding:0;">
            <table class="warning-table" id="warningTable">
                <thead>
                    <tr>
                        <th>预警等级</th>
                        <th>预警内容</th>
                        <th>涉及房屋</th>
                        <th>推送对象</th>
                        <th>生成时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="warningTableBody"></tbody>
            </table>
            <div id="pagination"></div>
        </div>
    </div>
</div>

<!-- 新增/编辑模态框 -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <div class="modal-header">
            <span id="editModalTitle">手动新增预警</span>
            <button class="modal-close" onclick="closeModal('editModal')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="warningId">
            <div class="form-row">
                <div class="form-group">
                    <label>预警标题<span class="required">*</span></label>
                    <input type="text" id="wTitle" placeholder="请输入预警标题">
                </div>
                <div class="form-group">
                    <label>预警等级<span class="required">*</span></label>
                    <select id="wLevel">
                        <option value="high">重大</option>
                        <option value="medium">较大</option>
                        <option value="low">一般</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>涉及房屋</label>
                    <input type="text" id="wHouse" placeholder="如 青村镇光明村5组">
                </div>
                <div class="form-group">
                    <label>户主姓名</label>
                    <input type="text" id="wOwner" placeholder="户主姓名">
                </div>
            </div>
            <div class="form-group">
                <label>预警内容</label>
                <textarea id="wContent" placeholder="请描述预警原因及风险..."></textarea>
            </div>
            <div class="form-group">
                <label>建议处置措施</label>
                <textarea id="wSuggestion" placeholder="请填写建议措施..."></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>推送渠道</label>
                    <select id="wChannels" multiple size="3" style="min-height:80px;">
                        <option value="sms" selected>短信</option>
                        <option value="app" selected>APP</option>
                        <option value="phone">电话</option>
                        <option value="screen">大屏</option>
                    </select>
                    <div class="form-hint">按住 Ctrl 多选</div>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="wStatus">
                        <option value="pending">待处置</option>
                        <option value="sent">已推送</option>
                        <option value="handled">已处置</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal('editModal')">取消</button>
            <button class="btn btn-primary" onclick="saveWarning()"><i class="fas fa-save"></i> 保存</button>
        </div>
    </div>
</div>

<!-- 详情模态框 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal">
        <div class="modal-header">
            <span id="detailModalTitle">预警详情</span>
            <button class="modal-close" onclick="closeModal('detailModal')"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" id="detailModalBody"></div>
        <div class="modal-footer" id="detailModalFooter">
            <button class="btn btn-outline" onclick="closeModal('detailModal')">关闭</button>
        </div>
    </div>
</div>

<script>
    const WARNING_KEY = 'rural_safety_warning';
    const RULE_KEY = 'rural_warning_rules';

    const LEVELS = { high: { label: '重大', color: '#d93025', class: 'level-high' }, medium: { label: '较大', color: '#e65100', class: 'level-medium' }, low: { label: '一般', color: '#1e8e3e', class: 'level-low' } };
    const STATUSES = {
        pending: { label: '待处置', class: 'status-pending' },
        sent: { label: '已推送', class: 'status-sent' },
        handled: { label: '已处置', class: 'status-handled' },
        closed: { label: '已关闭', class: 'status-closed' }
    };
    const CHANNELS = { sms: '短信', app: 'APP', phone: '电话', screen: '大屏' };

    let allWarnings = [];
    let rules = [];
    let currentDetail = null;

    function getDefaultRules() {
        return [
            { id: 'r1', name: 'D级危房未整治预警', desc: '风险等级为D级且未完成整治或拆除的房屋，自动触发重大预警。', level: 'high', enabled: true, condition: 'D级危房未整治' },
            { id: 'r2', name: 'C级危房超期整改预警', desc: 'C级危房超出整改期限仍未完成整治，自动触发较大预警。', level: 'medium', enabled: true, condition: 'C级危房超期' },
            { id: 'r3', name: '新增危房预警', desc: '新纳入风险档案的C级及以上危房，自动触发预警。', level: 'medium', enabled: true, condition: '新增危房' },
            { id: 'r4', name: '恶劣天气危房预警', desc: '台风、暴雨等恶劣天气来临前，对C级及以上危房自动触发预警。', level: 'high', enabled: true, condition: '恶劣天气' },
            { id: 'r5', name: '房屋结构变化预警', desc: '房屋结构安全状况出现明显恶化，需及时关注。', level: 'low', enabled: false, condition: '结构变化' }
        ];
    }

    function getDefaultWarnings() {
        return [
            {
                id: 'w1', title: 'D级危房未整治预警', level: 'high', house: '青村镇光明村3组', owner: '张建国',
                content: '该房屋鉴定为D级危房，目前仍未采取整治或拆除措施，存在重大安全隐患。',
                suggestion: '建议立即组织人员搬离，尽快制定拆除或加固方案，并落实资金。',
                targets: ['户主张建国', '光明村村委会', '青村镇政府'],
                channels: ['sms', 'app', 'screen'],
                createTime: '2026-07-11 08:30:00', status: 'sent', ruleId: 'r1',
                pushLog: [
                    { channel: 'sms', target: '张建国', time: '2026-07-11 08:31:00', status: '成功' },
                    { channel: 'app', target: '光明村村委会', time: '2026-07-11 08:31:05', status: '成功' },
                    { channel: 'screen', target: '青村镇政府大屏', time: '2026-07-11 08:31:10', status: '成功' }
                ]
            },
            {
                id: 'w2', title: 'C级危房超期整改预警', level: 'medium', house: '南桥镇沈陆村2组', owner: '李秀英',
                content: '该房屋鉴定为C级危房，整改期限已超15天，尚未完成整治。',
                suggestion: '建议督促户主尽快施工，必要时安排工匠入户评估。',
                targets: ['户主李秀英', '沈陆村村委会'],
                channels: ['sms', 'app'],
                createTime: '2026-07-10 14:20:00', status: 'pending', ruleId: 'r2',
                pushLog: []
            },
            {
                id: 'w3', title: '新增危房预警', level: 'medium', house: '庄行镇潘垫村5组', owner: '王大明',
                content: '新排查发现该房屋存在墙体开裂、地基下沉等问题，已纳入风险档案。',
                suggestion: '建议安排技术人员进一步鉴定，并根据结果制定整治计划。',
                targets: ['户主王大明', '潘垫村村委会', '庄行镇政府'],
                channels: ['app', 'phone'],
                createTime: '2026-07-09 09:15:00', status: 'handled', ruleId: 'r3',
                pushLog: [
                    { channel: 'app', target: '潘垫村村委会', time: '2026-07-09 09:16:00', status: '成功' },
                    { channel: 'phone', target: '庄行镇政府', time: '2026-07-09 09:20:00', status: '成功' }
                ]
            }
        ];
    }

    function init() {
        loadData();
        renderRules();
        renderList();
        renderKPIs();
        bindEvents();
    }

    function loadData() {
        const rawRules = localStorage.getItem(RULE_KEY);
        const rawWarnings = localStorage.getItem(WARNING_KEY);
        rules = rawRules ? JSON.parse(rawRules) : getDefaultRules();
        allWarnings = rawWarnings ? JSON.parse(rawWarnings) : getDefaultWarnings();
        if (!rawRules) saveRules();
        if (!rawWarnings) saveWarnings();
    }

    function saveRules() { localStorage.setItem(RULE_KEY, JSON.stringify(rules)); }
    function saveWarnings() { localStorage.setItem(WARNING_KEY, JSON.stringify(allWarnings)); }

    function restoreDefaultData() {
        if (confirm('确定恢复默认预警数据和规则吗？当前数据将被覆盖。')) {
            rules = getDefaultRules();
            allWarnings = getDefaultWarnings();
            saveRules();
            saveWarnings();
            renderRules();
            renderList();
            renderKPIs();
        }
    }

    function bindEvents() {
        document.getElementById('searchKeyword').addEventListener('input', renderList);
        document.getElementById('searchLevel').addEventListener('change', renderList);
        document.getElementById('searchStatus').addEventListener('change', renderList);
    }

    let currentPage = 1;
    let pageSize = 5;

    function renderRules() {
        const container = document.getElementById('ruleList');
        container.innerHTML = rules.map(rule => `
            <div class="rule-card">
                <div class="rule-toggle"><input type="checkbox" ${rule.enabled ? 'checked' : ''} onchange="toggleRule('${rule.id}')"></div>
                <div class="rule-info">
                    <div class="rule-name">${rule.name}<span class="rule-level ${LEVELS[rule.level].class}">${LEVELS[rule.level].label}</span></div>
                    <div class="rule-desc">${rule.desc}</div>
                    <div class="rule-meta">
                        <span><i class="fas fa-ruler"></i> ${rule.condition}</span>
                        <span><i class="fas fa-power-off"></i> ${rule.enabled ? '已启用' : '已停用'}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function toggleRule(id) {
        const rule = rules.find(r => r.id === id);
        if (rule) { rule.enabled = !rule.enabled; saveRules(); renderRules(); }
    }

    function toggleRules() {
        const body = document.getElementById('ruleSectionBody');
        const icon = document.getElementById('ruleToggleIcon');
        if (body.style.display === 'none') {
            body.style.display = 'block'; icon.className = 'fas fa-chevron-down';
        } else {
            body.style.display = 'none'; icon.className = 'fas fa-chevron-right';
        }
    }

    function getFilteredData() {
        const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
        const level = document.getElementById('searchLevel').value;
        const status = document.getElementById('searchStatus').value;
        return allWarnings.filter(item => {
            if (level && item.level !== level) return false;
            if (status && item.status !== status) return false;
            if (keyword) {
                const text = [item.title, item.content, item.house, item.owner, item.suggestion].join(' ').toLowerCase();
                return text.includes(keyword);
            }
            return true;
        }).sort((a, b) => new Date(b.createTime) - new Date(a.createTime));
    }

    function renderList() {
        const data = getFilteredData();
        document.getElementById('listStats').textContent = `共 ${data.length} 条`;
        const tbody = document.getElementById('warningTableBody');
        if (data.length === 0) {
            tbody.innerHTML = `
                <tr><td colspan="7" class="empty-state">
                    <i class="fas fa-bell-slash"></i><div>未找到符合条件的预警信息</div>
                </td></tr>`;
            document.getElementById('pagination').innerHTML = '';
            return;
        }
        const totalPages = Math.ceil(data.length / pageSize);
        if (currentPage > totalPages) currentPage = totalPages || 1;
        const start = (currentPage - 1) * pageSize;
        const pageData = data.slice(start, start + pageSize);
        tbody.innerHTML = pageData.map(item => `
            <tr onclick="openDetail('${item.id}')" style="cursor:pointer;">
                <td><span class="level-dot" style="background:${LEVELS[item.level].color};"></span>${LEVELS[item.level].label}</td>
                <td>${item.title}</td>
                <td>${item.house}<br><span style="color:var(--text-secondary);font-size:12px;">户主：${item.owner}</span></td>
                <td>${item.targets.map(t => `<div style="font-size:12px;">${t}</div>`).join('')}</td>
                <td>${item.createTime}</td>
                <td><span class="status-badge ${STATUSES[item.status].class}">${STATUSES[item.status].label}</span></td>
                <td onclick="event.stopPropagation()">
                    <button class="btn btn-primary btn-sm" onclick="pushWarning('${item.id}')"><i class="fas fa-paper-plane"></i> 推送</button>
                    <button class="btn btn-success btn-sm" onclick="markHandled('${item.id}')"><i class="fas fa-check"></i> 处置</button>
                    <button class="btn btn-outline btn-sm" onclick="openEditModal('${item.id}')"><i class="fas fa-edit"></i></button>
                </td>
            </tr>
        `).join('');
        renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
        const container = document.getElementById('pagination');
        if (totalPages <= 1) { container.innerHTML = ''; return; }
        let html = `<button onclick="changePage(currentPage - 1)" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;
        for (let i = 1; i <= totalPages; i++) {
            html += `<button class="${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
        }
        html += `<button onclick="changePage(currentPage + 1)" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
        container.innerHTML = html;
    }

    function changePage(p) {
        const data = getFilteredData();
        const totalPages = Math.ceil(data.length / pageSize);
        if (p < 1 || p > totalPages) return;
        currentPage = p;
        renderList();
    }

    function renderKPIs() {
        const total = allWarnings.length;
        const pending = allWarnings.filter(i => i.status === 'pending').length;
        const handled = allWarnings.filter(i => i.status === 'handled' || i.status === 'closed').length;
        const today = new Date().toISOString().split('T')[0];
        const todayCount = allWarnings.filter(i => i.createTime.startsWith(today)).length;
        document.getElementById('kpiTotal').textContent = total;
        document.getElementById('kpiPending').textContent = pending;
        document.getElementById('kpiHandled').textContent = handled;
        document.getElementById('kpiToday').textContent = todayCount;
        const pTrend = document.getElementById('kpiPendingTrend');
        pTrend.textContent = pending > 0 ? `+${pending}` : '0';
        pTrend.className = 'kpi-card-trend ' + (pending > 0 ? 'up' : 'down');
    }

    function resetFilter() {
        document.getElementById('searchKeyword').value = '';
        document.getElementById('searchLevel').value = '';
        document.getElementById('searchStatus').value = '';
        currentPage = 1;
        renderList();
    }

    function generateWarnings() {
        const enabledRules = rules.filter(r => r.enabled);
        if (enabledRules.length === 0) { alert('请先启用至少一条预警规则'); return; }
        const newWarnings = [];
        const now = new Date();
        const timeStr = now.toISOString().replace('T', ' ').substring(0, 19);
        const today = now.toISOString().split('T')[0];
        const villages = ['光明村', '沈陆村', '潘垫村', '新叶村', '张塘村', '金汇村', '柘林村', '海湾村'];
        const towns = ['青村镇', '南桥镇', '庄行镇', '四团镇', '奉城镇', '金汇镇', '柘林镇', '海湾镇'];

        enabledRules.forEach(rule => {
            const idx = Math.floor(Math.random() * villages.length);
            const village = villages[idx];
            const town = towns[idx];
            const house = `${town}${village}${Math.floor(Math.random() * 10) + 1}组`;
            const owner = ['张', '李', '王', '陈', '刘', '赵'][Math.floor(Math.random() * 6)] + ['建国', '秀英', '大明', '小芳', '志强', '丽华'][Math.floor(Math.random() * 6)];

            newWarnings.push({
                id: 'w_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                title: rule.name,
                level: rule.level,
                house: house,
                owner: owner,
                content: rule.desc + '，涉及房屋位于' + house + '。',
                suggestion: rule.level === 'high' ? '建议立即采取避险措施，组织人员撤离并制定整治方案。' : '建议尽快安排现场核查，制定整改计划。',
                targets: [`户主${owner}`, `${village}村委会`, `${town}政府`],
                channels: rule.level === 'high' ? ['sms', 'app', 'phone', 'screen'] : ['sms', 'app'],
                createTime: timeStr,
                status: 'pending',
                ruleId: rule.id,
                pushLog: []
            });
        });

        allWarnings.unshift(...newWarnings);
        saveWarnings();
        renderList();
        renderKPIs();
        alert(`已根据规则自动生成 ${newWarnings.length} 条预警，请进行后续处置。`);
    }

    function openAddModal() {
        document.getElementById('editModalTitle').textContent = '手动新增预警';
        document.getElementById('warningId').value = '';
        document.getElementById('wTitle').value = '';
        document.getElementById('wLevel').value = 'medium';
        document.getElementById('wHouse').value = '';
        document.getElementById('wOwner').value = '';
        document.getElementById('wContent').value = '';
        document.getElementById('wSuggestion').value = '';
        document.getElementById('wStatus').value = 'pending';
        openModal('editModal');
    }

    function openEditModal(id) {
        const item = allWarnings.find(i => i.id === id);
        if (!item) return;
        document.getElementById('editModalTitle').textContent = '编辑预警';
        document.getElementById('warningId').value = item.id;
        document.getElementById('wTitle').value = item.title;
        document.getElementById('wLevel').value = item.level;
        document.getElementById('wHouse').value = item.house;
        document.getElementById('wOwner').value = item.owner;
        document.getElementById('wContent').value = item.content;
        document.getElementById('wSuggestion').value = item.suggestion;
        document.getElementById('wStatus').value = item.status;
        openModal('editModal');
    }

    function saveWarning() {
        const title = document.getElementById('wTitle').value.trim();
        if (!title) { alert('请输入预警标题'); return; }
        const id = document.getElementById('warningId').value;
        const select = document.getElementById('wChannels');
        const channels = Array.from(select.selectedOptions).map(o => o.value);
        const newItem = {
            id: id || 'w_' + Date.now(),
            title: title,
            level: document.getElementById('wLevel').value,
            house: document.getElementById('wHouse').value,
            owner: document.getElementById('wOwner').value,
            content: document.getElementById('wContent').value,
            suggestion: document.getElementById('wSuggestion').value,
            targets: ['户主' + document.getElementById('wOwner').value, '村委会', '乡镇政府'].filter(Boolean),
            channels: channels.length ? channels : ['sms', 'app'],
            createTime: id ? allWarnings.find(i => i.id === id).createTime : new Date().toISOString().replace('T', ' ').substring(0, 19),
            status: document.getElementById('wStatus').value,
            ruleId: 'manual',
            pushLog: id ? allWarnings.find(i => i.id === id).pushLog : []
        };
        if (id) {
            const idx = allWarnings.findIndex(i => i.id === id);
            if (idx >= 0) allWarnings[idx] = newItem;
        } else {
            allWarnings.unshift(newItem);
        }
        saveWarnings();
        closeModal('editModal');
        renderList();
        renderKPIs();
    }

    function pushWarning(id) {
        const item = allWarnings.find(i => i.id === id);
        if (!item) return;
        const now = new Date().toISOString().replace('T', ' ').substring(0, 19);
        item.pushLog = item.channels.map(ch => ({
            channel: ch, target: item.targets[0] || '相关责任人', time: now, status: '成功'
        }));
        item.status = 'sent';
        saveWarnings();
        renderList();
        renderKPIs();
        alert(`预警已通过 ${item.channels.map(c => CHANNELS[c]).join('、')} 推送成功。`);
    }

    function markHandled(id) {
        const item = allWarnings.find(i => i.id === id);
        if (!item) return;
        item.status = 'handled';
        saveWarnings();
        renderList();
        renderKPIs();
    }

    function closeWarning(id) {
        const item = allWarnings.find(i => i.id === id);
        if (!item) return;
        item.status = 'closed';
        saveWarnings();
        renderList();
        renderKPIs();
    }

    function openDetail(id) {
        const item = allWarnings.find(i => i.id === id);
        if (!item) return;
        currentDetail = item;
        document.getElementById('detailModalTitle').textContent = item.title;
        document.getElementById('detailModalBody').innerHTML = `
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-info-circle"></i> 预警基本信息</div>
                <div class="detail-grid">
                    <div><span class="label">预警等级：</span><span class="level-dot" style="background:${LEVELS[item.level].color};"></span>${LEVELS[item.level].label}</div>
                    <div><span class="label">当前状态：</span><span class="status-badge ${STATUSES[item.status].class}">${STATUSES[item.status].label}</span></div>
                    <div><span class="label">涉及房屋：</span>${item.house}</div>
                    <div><span class="label">户主姓名：</span>${item.owner}</div>
                    <div><span class="label">生成时间：</span>${item.createTime}</div>
                    <div><span class="label">推送渠道：</span>${item.channels.map(c => CHANNELS[c]).join('、')}</div>
                </div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-exclamation-circle"></i> 预警内容</div>
                <div class="detail-content">${item.content}</div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-tasks"></i> 建议处置措施</div>
                <div class="detail-content">${item.suggestion}</div>
            </div>
            <div class="detail-section">
                <div class="detail-section-title"><i class="fas fa-paper-plane"></i> 推送记录</div>
                <div class="push-log">
                    ${item.pushLog.length ? item.pushLog.map(log => `
                        <div class="push-log-item">
                            <i class="fas ${log.channel === 'sms' ? 'fa-comment-alt' : log.channel === 'app' ? 'fa-mobile-alt' : log.channel === 'phone' ? 'fa-phone' : 'fa-desktop'}"></i>
                            <span>${CHANNELS[log.channel]}</span>
                            <span style="color:var(--text-secondary);">${log.target}</span>
                            <span style="color:var(--text-secondary);font-size:12px;">${log.time}</span>
                            <span class="status" style="color:var(--success);">${log.status}</span>
                        </div>
                    `).join('') : '<div class="push-log-item">暂无推送记录</div>'}
                </div>
            </div>
        `;
        const footer = document.getElementById('detailModalFooter');
        footer.innerHTML = `
            <button class="btn btn-outline" onclick="closeModal('detailModal')">关闭</button>
            ${item.status !== 'handled' && item.status !== 'closed' ? `<button class="btn btn-primary" onclick="pushWarning('${item.id}');closeModal('detailModal');"><i class="fas fa-paper-plane"></i> 推送预警</button>
            <button class="btn btn-success" onclick="markHandled('${item.id}');closeModal('detailModal');"><i class="fas fa-check"></i> 标记已处置</button>` : ''}
            ${item.status !== 'closed' ? `<button class="btn btn-outline" onclick="closeWarning('${item.id}');closeModal('detailModal');"><i class="fas fa-archive"></i> 关闭预警</button>` : ''}
        `;
        openModal('detailModal');
    }

    function openModal(id) { document.getElementById(id).classList.add('open'); }
    function closeModal(id) { document.getElementById(id).classList.remove('open'); }

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
    });

    window.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open')); });

    init();
</script>
</body>
</html>
