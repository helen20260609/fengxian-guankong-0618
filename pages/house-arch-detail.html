<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房屋建筑档案 - 房屋安全管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --primary-light: #e8f0fe;
            --danger: #d93025;
            --major: #f57c00;
            --warning: #f9ab00;
            --safe: #1e8e3e;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --border: #e8eaed;
            --bg-dark: #f5f7fa;
            --bg-card: #ffffff;
            --bg-hover: #f0f2f5;
            --shadow: rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .page-wrapper { max-width: 1280px; margin: 0 auto; padding: 16px; }

        /* 顶部紧凑标题栏 */
        .topbar {
            background: #fff; border-radius: 8px; padding: 12px 16px;
            box-shadow: 0 2px 8px var(--shadow); margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar-back {
            display: flex; align-items: center; gap: 4px; padding: 6px 12px;
            border: 1px solid var(--border); border-radius: 4px; background: #fff;
            color: var(--text-primary); font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .topbar-back:hover { background: var(--bg-hover); }
        .topbar-title { font-size: 16px; font-weight: 600; }
        .topbar-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .topbar-actions { display: flex; gap: 8px; }
        .topbar-btn {
            display: flex; align-items: center; gap: 4px; padding: 6px 12px;
            border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid var(--border);
            background: #fff; color: var(--text-primary); transition: all 0.2s;
        }
        .topbar-btn:hover { background: var(--bg-hover); }
        .topbar-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .topbar-btn.primary:hover { background: var(--primary-dark); }

        /* 状态/审批/进度信息卡 */
        .status-panel {
            background: #fff; border-radius: 8px; padding: 16px 20px;
            box-shadow: 0 2px 8px var(--shadow); margin-bottom: 12px;
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .status-cell { display: flex; flex-direction: column; gap: 6px; min-width: 120px; }
        .status-cell.full { flex: 1; }
        .status-label { font-size: 12px; color: var(--text-secondary); }
        .status-value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .status-badge {
            display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px;
            font-size: 12px; font-weight: 500; width: fit-content;
        }
        .status-badge.major { background: #fff3e0; color: var(--major); }
        .status-badge.danger { background: #fce8e6; color: var(--danger); }
        .status-badge.warning { background: #fff8e1; color: #f9a825; }

        /* 隐患整治全流程进度时间轴 */
        .timeline-card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px var(--shadow); padding: 18px 20px; margin-bottom: 12px; }
        .timeline-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
        .timeline-title i { color: var(--primary); }
        .timeline-wrap { display: flex; align-items: flex-start; justify-content: space-between; position: relative; }
        .timeline-step { flex: 1; text-align: center; position: relative; z-index: 1; }
        .timeline-step:not(:last-child)::after {
            content: ''; position: absolute; top: 18px; left: 50%; width: 100%; height: 3px;
            background: #e8eaed; z-index: -1; transform: translateX(50%);
        }
        .timeline-step.completed:not(:last-child)::after { background: #34a853; }
        .timeline-step.current:not(:last-child)::after { background: #e8eaed; }
        .timeline-node {
            width: 40px; height: 40px; border-radius: 50%; margin: 0 auto 10px;
            display: flex; align-items: center; justify-content: center; font-size: 15px;
            background: #fff; border: 3px solid #e8eaed; color: #bdc1c6; transition: all 0.3s;
        }
        .timeline-step.completed .timeline-node { background: #34a853; border-color: #34a853; color: #fff; }
        .timeline-step.current .timeline-node { background: #1a73e8; border-color: #1a73e8; color: #fff; box-shadow: 0 0 0 4px rgba(26,115,232,0.15); }
        .timeline-step-title { font-size: 13px; font-weight: 500; color: var(--text-primary); margin-bottom: 6px; }
        .timeline-step.completed .timeline-step-title { color: #34a853; }
        .timeline-step.current .timeline-step-title { color: #1a73e8; font-weight: 600; }
        .timeline-step-status { display: inline-block; font-size: 12px; padding: 2px 10px; border-radius: 12px; }
        .timeline-step-status.done { background: #e6f4ea; color: #34a853; }
        .timeline-step-status.doing { background: #e8f0fe; color: #1a73e8; }
        .timeline-step-status.todo { background: #f0f2f5; color: #5f6368; }
        @media (max-width: 1200px) { .timeline-step-title { font-size: 12px; } }
        @media (max-width: 992px) {
            .timeline-wrap { overflow-x: auto; gap: 16px; }
            .timeline-step { flex: 0 0 110px; }
        }
        .status-cell { display: flex; flex-direction: column; gap: 6px; min-width: 120px; }
        .status-badge.safe { background: #e6f4ea; color: var(--safe); }
        .status-badge.info { background: var(--primary-light); color: var(--primary); }
        .status-measure { font-size: 13px; color: var(--text-primary); font-weight: 500; }
        .progress-wrap { display: flex; align-items: center; gap: 10px; }
        .progress-bar { width: 100px; height: 8px; background: #e8eaed; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; }
        .progress-text { font-size: 14px; font-weight: 600; color: var(--primary); }

        /* 主内容区：左右布局 */
        .main-body { display: flex; gap: 12px; align-items: flex-start; }
        .sidebar {
            width: 230px; flex-shrink: 0; background: #fff; border-radius: 8px;
            box-shadow: 0 2px 8px var(--shadow); overflow: hidden; position: sticky; top: 16px; align-self: flex-start;
        }
        .sidebar-header {
            padding: 14px 16px; font-size: 14px; font-weight: 600; color: var(--text-primary);
            border-bottom: 1px solid var(--border); background: #fafbfc;
        }
        .sidebar-menu { padding: 8px; }
        .sidebar-item {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            padding: 10px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
            margin-bottom: 4px; font-size: 13px; color: var(--text-primary);
        }
        .sidebar-item:hover { background: var(--primary-light); color: var(--primary); }
        .sidebar-item.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
        .sidebar-item-left { display: flex; align-items: center; gap: 8px; }
        .sidebar-item i { width: 16px; text-align: center; color: inherit; }
        .sidebar-tag {
            font-size: 11px; padding: 2px 7px; border-radius: 10px; white-space: nowrap;
            background: #f0f2f5; color: var(--text-secondary);
        }
        .sidebar-item.active .sidebar-tag { background: rgba(26,115,232,0.12); color: var(--primary); }

        .content-area { flex: 1; min-width: 0; }
        .content-card {
            background: #fff; border-radius: 8px; box-shadow: 0 2px 8px var(--shadow); overflow: hidden;
            margin-bottom: 12px;
        }
        .content-card-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; border-bottom: 1px solid var(--border); background: #fafbfc;
        }
        .content-card-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
        .content-card-title i { color: var(--primary); }
        .content-card-meta { display: flex; align-items: center; gap: 10px; }
        .meta-badge { font-size: 12px; color: var(--text-secondary); padding: 3px 10px; background: #f0f2f5; border-radius: 12px; }
        .meta-status { font-size: 12px; padding: 3px 10px; border-radius: 12px; background: #e6f4ea; color: var(--safe); }

        .content-tabs {
            display: flex; gap: 8px; padding: 12px 20px 0; border-bottom: 1px solid var(--border); background: #fff; flex-wrap: wrap;
        }
        .content-tab {
            display: flex; align-items: center; gap: 6px; padding: 8px 14px;
            font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
            border-radius: 6px 6px 0 0; border: 1px solid transparent; border-bottom: none; background: transparent;
            margin-bottom: -1px;
        }
        .content-tab:hover { color: var(--primary); background: var(--primary-light); }
        .content-tab.active { color: var(--primary); font-weight: 500; background: #fff; border-color: var(--border); border-bottom-color: #fff; }
        .content-tab-count {
            font-size: 11px; padding: 1px 7px; border-radius: 10px;
            background: #f0f2f5; color: var(--text-secondary); margin-left: 4px;
        }
        .content-tab.active .content-tab-count { background: var(--primary-light); color: var(--primary); }

        .content-body { padding: 18px 20px; }
        .info-section-title { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--text-primary); }
        .info-section-title i { color: var(--primary); }
        .info-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px 20px; }
        .info-grid.info-grid-table { grid-template-columns: repeat(4, 1fr); }
        .info-item { display: flex; flex-direction: column; gap: 6px; }
        .info-label { font-size: 12px; color: var(--text-secondary); }
        .info-value { font-size: 14px; color: var(--text-primary); font-weight: 500; line-height: 1.4; }
        .info-value.empty { color: #bdc1c6; }

        .table-section-title { font-size: 14px; font-weight: 600; margin: 20px 0 12px; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
        .table-section-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: var(--primary); border-radius: 2px; }
        .arch-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .arch-table th, .arch-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
        .arch-table th { background: #fafbfc; color: var(--text-secondary); font-weight: 500; font-size: 12px; white-space: nowrap; }
        .arch-table td { color: var(--text-primary); }
        .arch-table td .photo-btn { padding: 4px 10px; border: 1px solid var(--primary); border-radius: 4px; background: var(--primary); color: #fff; font-size: 12px; cursor: pointer; }
        .arch-table tr:last-child td { border-bottom: none; }

        .bottom-bar {
            background: #fff; border-radius: 8px; padding: 12px 16px;
            box-shadow: 0 2px 8px var(--shadow); margin-top: 12px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .bottom-info { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
        .bottom-node { font-weight: 600; color: var(--text-primary); }
        .bottom-actions { display: flex; gap: 8px; }
        .bottom-btn {
            display: flex; align-items: center; gap: 4px; padding: 6px 14px;
            border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid var(--border);
            background: #fff; color: var(--text-primary); transition: all 0.2s;
        }
        .bottom-btn:hover { background: var(--bg-hover); }
        .bottom-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .bottom-btn.primary:hover { background: var(--primary-dark); }

        @media (max-width: 900px) {
            .main-body { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
            .info-grid { grid-template-columns: repeat(2, 1fr); }
        }
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999;
            justify-content: center; align-items: flex-start; padding: 40px 16px; overflow-y: auto;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: #fff; border: 1px solid var(--border); border-radius: 8px; width: 92%; max-width: 900px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden;
            max-height: calc(100vh - 80px);
        }
        .modal-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: #fafbfc; }
        .modal-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .modal-close { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--bg-hover); cursor: pointer; font-size: 16px; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; }
        .modal-close:hover { background: var(--danger); color: #fff; }
        .modal-body { padding: 20px; flex: 1; overflow-y: auto; }
        .modal-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; background: #fafbfc; }
        .form-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px 20px; }
        .form-item { display: flex; flex-direction: column; gap: 6px; }
        .form-label { font-size: 12px; color: var(--text-secondary); }
        .form-input { padding: 8px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; color: var(--text-primary); font-family: inherit; }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .modal-btn { padding: 7px 16px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1px solid var(--border); background: #fff; color: var(--text-primary); }
        .modal-btn:hover { background: var(--bg-hover); }
        .modal-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
        .modal-btn.primary:hover { background: var(--primary-dark); }
        @media (max-width: 900px) {
            .form-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

                    statusClass = 'done';

                } else if (idx === activeIndex) {

                    '<thead><tr><th>提交人</th><th>提交时间</th><th>审核时间</th><th>审核人</th><th>审核结论</th><th>审核报告</th><th>备注</th></tr></thead>' +
                    '<tbody>' + renderAuditRows(data.auditList, false) + '</tbody></table></div>';
            }
            html += '</div>' +
            '</div>';
            html += '<div class="bottom-bar">' +
                '<div class="bottom-info">' +
                    '<i class="fas fa-info-circle" style="color:var(--primary);"></i>' +
                    '当前节点：<span class="bottom-node">' + item.title + '</span> | <i class="far fa-eye"></i> 查看/编辑' +
                '</div>' +
                '<div class="bottom-actions">' +
                    '<button class="bottom-btn primary" onclick="openCommonEditModal(\'' + key + '\')"><i class="fas fa-edit"></i> 编辑' + item.title + '</button>' +
                    '<button class="bottom-btn"><i class="fas fa-file-export"></i> 导出</button>' +
                '</div>' +
            '</div>';
            return html;
        }

        let editModalSubTab = 'jbxx';
        let surveyEditModalSubTab = 'survey1';
        let measureEditModalSubTab = 'manage';
        let commonEditKey = '';

        function openBasicEditModal() {
            editModalSubTab = currentSubTab;
            renderEditModalTabs();
            renderEditModalForm();
            document.getElementById('basicEditModal').classList.add('open');
        }

        function closeBasicEditModal() {
            document.getElementById('basicEditModal').classList.remove('open');
        }

        function renderEditModalTabs() {
            const wrap = document.getElementById('editModalTabs');
            const tabsHtml = basicSubTabs.map(tab => {
                const active = tab.key === editModalSubTab ? 'active' : '';
                return '<div class="content-tab ' + active + '" data-key="' + tab.key + '" data-scope="edit">' +
                    '<i class="fas ' + tab.icon + '"></i> ' + tab.title +
                    '</div>';
            }).join('');
            wrap.innerHTML = tabsHtml;
            wrap.querySelectorAll('.content-tab').forEach(el => {
                el.addEventListener('click', function() {
                    editModalSubTab = el.dataset.key;
                    renderEditModalTabs();
                    renderEditModalForm();
                });
            });
        }

        function renderEditModalForm() {
            const rows = basicData[editModalSubTab] || [];
            const gridHtml = rows.map((r, idx) => {
                return '<div class="form-item">' +
                    '<label class="form-label">' + r[0] + '</label>' +
                    '<input class="form-input" type="text" data-idx="' + idx + '" value="' + (r[1] || '').replace(/"/g, '&quot;') + '">' +
                    '</div>';
            }).join('');
            document.getElementById('editModalForm').innerHTML = '<div class="form-grid">' + gridHtml + '</div>';
        }

        function saveBasicEdit() {
            const inputs = document.querySelectorAll('#editModalForm .form-input');
            const rows = basicData[editModalSubTab];
            inputs.forEach(input => {
                const idx = parseInt(input.dataset.idx, 10);
                if (rows && rows[idx]) {
                    rows[idx][1] = input.value;
                }
            });
            currentSubTab = editModalSubTab;
            closeBasicEditModal();
            renderSidebar();
            renderContent();
        }

        function openSurveyEditModal() {
            surveyEditModalSubTab = currentSurveySubTab;
            renderSurveyEditModalTabs();
            renderSurveyEditModalForm();
            document.getElementById('surveyEditModal').classList.add('open');
        }

        function closeSurveyEditModal() {
            document.getElementById('surveyEditModal').classList.remove('open');
        }

        function renderSurveyEditModalTabs() {
            const wrap = document.getElementById('surveyEditModalTabs');
            const tabsHtml = surveySubTabs.map(tab => {
                const active = tab.key === surveyEditModalSubTab ? 'active' : '';
                return '<div class="content-tab ' + active + '" data-key="' + tab.key + '" data-scope="edit-survey">' +
                    '<i class="fas ' + tab.icon + '"></i> ' + tab.title +
                    '</div>';
            }).join('');
            wrap.innerHTML = tabsHtml;
            wrap.querySelectorAll('.content-tab').forEach(el => {
                el.addEventListener('click', function() {
                    surveyEditModalSubTab = el.dataset.key;
                    renderSurveyEditModalTabs();
                    renderSurveyEditModalForm();
                });
            });
        }

        function renderSurveyEditModalForm() {
            const data = surveyData[surveyEditModalSubTab] || { columns: [], rows: [] };
            const rows = data.rows[0] || [];
            const gridHtml = data.columns.map((c, i) => {
                return '<div class="form-item">' +
                    '<label class="form-label">' + c + '</label>' +
                    '<input class="form-input" type="text" data-idx="' + i + '" value="' + (rows[i] || '').replace(/"/g, '&quot;') + '">' +
                    '</div>';
            }).join('');
            document.getElementById('surveyEditModalForm').innerHTML = '<div class="form-grid">' + gridHtml + '</div>';
        }

        function saveSurveyEdit() {
            const data = surveyData[surveyEditModalSubTab];
            const inputs = document.querySelectorAll('#surveyEditModalForm .form-input');
            const row = data.rows[0];
            inputs.forEach(input => {
                const idx = parseInt(input.dataset.idx, 10);
                if (row && row[idx] !== undefined) {
                    row[idx] = input.value;
                }
            });
            currentSurveySubTab = surveyEditModalSubTab;
            closeSurveyEditModal();
            renderSidebar();
            renderContent();
        }

        document.getElementById('basicEditModal').addEventListener('click', function(e) {
            if (e.target === this) closeBasicEditModal();
        });
        document.getElementById('surveyEditModal').addEventListener('click', function(e) {
            if (e.target === this) closeSurveyEditModal();
        });
        document.getElementById('commonEditModal').addEventListener('click', function(e) {
            if (e.target === this) closeCommonEditModal();
        });

        function openMeasureEditModal() {
            measureEditModalSubTab = currentMeasureSubTab;
            renderMeasureEditModalTabs();
            renderMeasureEditModalForm();
            document.getElementById('surveyEditModal').classList.add('open');
        }

        function closeMeasureEditModal() {
            document.getElementById('surveyEditModal').classList.remove('open');
        }

        function renderMeasureEditModalTabs() {
            const wrap = document.getElementById('surveyEditModalTabs');
            const tabsHtml = measureSubTabs.map(tab => {
                const active = tab.key === measureEditModalSubTab ? 'active' : '';
                return '<div class="content-tab ' + active + '" data-key="' + tab.key + '" data-scope="edit-measure">' +
                    '<i class="fas ' + tab.icon + '"></i> ' + tab.title +
                    '</div>';
            }).join('');
            wrap.innerHTML = tabsHtml;
            wrap.querySelectorAll('.content-tab').forEach(el => {
                el.addEventListener('click', function() {
                    measureEditModalSubTab = el.dataset.key;
                    renderMeasureEditModalTabs();
                    renderMeasureEditModalForm();
                });
            });
        }

        function renderMeasureEditModalForm() {
            const data = measureData[measureEditModalSubTab] || { columns: [], rows: [] };
            const rows = data.rows[0] || [];
            const gridHtml = data.columns.map((c, i) => {
                return '<div class="form-item">' +
                    '<label class="form-label">' + c + '</label>' +
                    '<input class="form-input" type="text" data-idx="' + i + '" value="' + (rows[i] || '').replace(/"/g, '&quot;') + '">' +
                    '</div>';
            }).join('');
            document.getElementById('surveyEditModalForm').innerHTML = '<div class="form-grid">' + gridHtml + '</div>';
        }

        function saveMeasureEdit() {
            const data = measureData[measureEditModalSubTab];
            const inputs = document.querySelectorAll('#surveyEditModalForm .form-input');
            const row = data.rows[0];
            inputs.forEach(input => {
                const idx = parseInt(input.dataset.idx, 10);
                if (row && row[idx] !== undefined) {
                    row[idx] = input.value;
                }
            });
            currentMeasureSubTab = measureEditModalSubTab;
            closeMeasureEditModal();
            renderSidebar();
            renderContent();
        }

        function openCommonEditModal(key) {
            commonEditKey = key;
            const data = tableData[commonEditKey];
            const item = sidebarItems.find(i => i.key === key);
            document.getElementById('commonEditTitle').innerHTML = '<i class="fas fa-edit"></i> 编辑' + item.title;
            const rows = data.rows[0] || [];
            const gridHtml = data.columns.map((c, i) => {
                return '<div class="form-item">' +
                    '<label class="form-label">' + c + '</label>' +
                    '<input class="form-input" type="text" data-idx="' + i + '" value="' + (rows[i] || '').replace(/"/g, '&quot;') + '">' +
                    '</div>';
            }).join('');
            let auditHtml = '';
            if (key === 'accept' || key === 'close') {
                auditHtml = renderCommonEditAuditList(data.auditList, key === 'accept');
            }
            document.getElementById('commonEditForm').innerHTML = '<div class="form-grid">' + gridHtml + '</div>' + auditHtml;
            document.getElementById('commonEditModal').classList.add('open');
        }

        function renderCommonEditAuditList(list, showSeq) {
            if (!list) list = [];
            const cols = showSeq ? 8 : 7;
            const header = showSeq ? '<th>序号</th>' : '';
            const rowsHtml = list.length === 0 ? '<tr data-empty="1"><td colspan="' + cols + '" style="text-align:center;color:var(--text-secondary);">暂无数据，点击下方按钮新增</td></tr>' : list.map((item, idx) => {
                return '<tr class="audit-row" data-index="' + idx + '">' +
                    (showSeq ? '<td><input type="text" class="form-input audit-seq" value="' + (item.seq || (idx + 1)) + '" style="min-width:40px;"></td>' : '') +
                    '<td><input type="text" class="form-input audit-submitter" value="' + (item.submitter || '').replace(/"/g, '&quot;') + '"></td>' +
                    '<td><input type="text" class="form-input audit-submitTime" value="' + (item.submitTime || '').replace(/"/g, '&quot;') + '"></td>' +
                    '<td><input type="text" class="form-input audit-auditTime" value="' + (item.auditTime || '').replace(/"/g, '&quot;') + '"></td>' +
                    '<td><input type="text" class="form-input audit-auditor" value="' + (item.auditor || '').replace(/"/g, '&quot;') + '"></td>' +
                    '<td><input type="text" class="form-input audit-conclusion" value="' + (item.conclusion || '').replace(/"/g, '&quot;') + '"></td>' +
                    '<td><input type="text" class="form-input audit-report" value="' + (item.report || '').replace(/"/g, '&quot;') + '"></td>' +
                    '<td><input type="text" class="form-input audit-remark" value="' + (item.remark || '').replace(/"/g, '&quot;') + '"></div>' +
                    '</td>' +
                    '</tr>';
            }).join('');
            return '<div class="table-section-title" style="margin-top:20px;">审核列表</div>' +
                '<div class="table-wrap" style="max-height:220px;overflow:auto;">' +
                '<table class="arch-table" id="commonAuditEditTable">' +
                '<thead><tr>' + header + '<th>提交人</th><th>提交时间</th><th>审核时间</th><th>审核人</th><th>审核结论</th><th>审核报告</th><th>备注</th></tr></thead>' +
                '<tbody>' + rowsHtml + '</tbody></table></div>' +
                '<div style="margin-top:10px;"><button type="button" class="modal-btn" onclick="addCommonAuditRow()"><i class="fas fa-plus"></i> 新增一条</button>' +
                '<button type="button" class="modal-btn" style="margin-left:8px;" onclick="removeCommonAuditLastRow()"><i class="fas fa-trash-alt"></i> 删除最后一条</button></div>';
        }

        function addCommonAuditRow() {
            const tbody = document.querySelector('#commonAuditEditTable tbody');
            if (tbody.querySelector('[data-empty]')) {
                tbody.innerHTML = '';
            }
            const showSeq = commonEditKey === 'accept';
            const row = document.createElement('tr');
            row.className = 'audit-row';
            row.dataset.index = tbody.children.length;
            row.innerHTML = (showSeq ? '<td><input type="text" class="form-input audit-seq" value="' + (tbody.children.length + 1) + '" style="min-width:40px;"></td>' : '') +
                '<td><input type="text" class="form-input audit-submitter" value=""></td>' +
                '<td><input type="text" class="form-input audit-submitTime" value=""></td>' +
                '<td><input type="text" class="form-input audit-auditTime" value=""></td>' +
                '<td><input type="text" class="form-input audit-auditor" value=""></td>' +
                '<td><input type="text" class="form-input audit-conclusion" value=""></td>' +
                '<td><input type="text" class="form-input audit-report" value=""></td>' +
                '<td><input type="text" class="form-input audit-remark" value=""></td>';
            tbody.appendChild(row);
        }

        function removeCommonAuditLastRow() {
            const tbody = document.querySelector('#commonAuditEditTable tbody');
            if (tbody.children.length === 0) return;
            const last = tbody.lastElementChild;
            if (last.dataset.empty) return;
            tbody.removeChild(last);
            if (tbody.children.length === 0) {
                const showSeq = commonEditKey === 'accept';
                const cols = showSeq ? 8 : 7;
                tbody.innerHTML = '<tr data-empty="1"><td colspan="' + cols + '" style="text-align:center;color:var(--text-secondary);">暂无数据，点击下方按钮新增</td></tr>';
            }
        }

        function closeCommonEditModal() {
            document.getElementById('commonEditModal').classList.remove('open');
        }

        function saveCommonEdit() {
            const data = tableData[commonEditKey];
            const inputs = document.querySelectorAll('#commonEditForm .form-input:not(.audit-row .form-input)');
            const row = data.rows[0];
            inputs.forEach(input => {
                const idx = parseInt(input.dataset.idx, 10);
                if (row && row[idx] !== undefined) {
                    row[idx] = input.value;
                }
            });
            if (commonEditKey === 'accept' || commonEditKey === 'close') {
                data.auditList = readCommonEditAuditList();
            }
            closeCommonEditModal();
            renderSidebar();
            renderContent();
        }

        function readCommonEditAuditList() {
            const showSeq = commonEditKey === 'accept';
            const rows = document.querySelectorAll('#commonAuditEditTable tbody .audit-row');
            const list = [];
            rows.forEach(row => {
                const item = {
                    submitter: row.querySelector('.audit-submitter').value,
                    submitTime: row.querySelector('.audit-submitTime').value,
                    auditTime: row.querySelector('.audit-auditTime').value,
                    auditor: row.querySelector('.audit-auditor').value,
                    conclusion: row.querySelector('.audit-conclusion').value,
                    report: row.querySelector('.audit-report').value,
                    remark: row.querySelector('.audit-remark').value
                };
                if (showSeq) item.seq = row.querySelector('.audit-seq').value;
                list.push(item);
            });
            return list;
        }

        renderSidebar();
        renderContent();
    </script>
</body>
</html>
