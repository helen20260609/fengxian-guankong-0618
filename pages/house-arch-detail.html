        // =========================================================
        // 房屋建筑档案状态联动数据层（已接入 house-arch-data.js 统一数据层）
        // =========================================================

        function getUrlParam(key) {
            return new URLSearchParams(location.search).get(key) || '';
        }

        function getCurrentHouseNo() {
            const no = getUrlParam('no');
            if (no) return no;
            return getUrlParam('id') || 'NF-2025-00001';
        }

        // 兼容：house-arch-detail 原有局部函数优先调用统一数据层
        function getCurrentHouseArch() {
            initHouseArchSeed();
            const no = getCurrentHouseNo();
            let rec = getHouseRecord(no);
            if (!rec) {
                rec = JSON.parse(JSON.stringify(DEFAULT_HOUSE_STATUS));
                rec.no = no;
                ensureHouseRecord(no);
            }
            ['manageRecords','projectRecords','qualityTrace','archiveRecords'].forEach(k => {
                if (!Array.isArray(rec[k])) rec[k] = [];
            });
            return rec;
        }

        function saveCurrentHouseArch(status) {
            const no = getCurrentHouseNo();
            const all = getHouseArchStorage();
            all[no] = status;
            setHouseArchStorage(all);
        }

        function generateArchId(prefix) {
            const d = new Date();
            const pad = n => n < 10 ? '0' + n : n;
            const ts = d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '-' +
                       pad(d.getHours()) + pad(d.getMinutes()) + pad(d.getSeconds());
            return prefix + '-' + ts + '-' + Math.floor(Math.random()*900 + 100);
        }

                    const placeholder = i === proofIndex ? 'PDF URL 或将文件拖入下方' : '图片 URL 或将图片拖入下方';
                    const dropzoneText = i === proofIndex ? '点击或拖拽上传 PDF' : '点击或拖拽上传图片';
                    const multiple = i === photoIndex ? 'multiple' : '';
                    let thumbHtml = '';
                    if (i === photoIndex) {
                        const imageUrls = values.filter(isImage);

                        }

                        thumbHtml = '<div class="file-thumb-preview file-thumb-pdf"><i class="fas fa-file-pdf"></i> PDF 已上传</div>';
                    }

                        '<div class="file-upload-dropzone"><i class="fas fa-cloud-upload-alt"></i> ' + dropzoneText + '</div>' +
                        thumbHtml +
                        '</div>';

                    inputHtml = '<input class="form-input" type="text" data-idx="' + i + '" value="' + (rows[i] || '').replace(/"/g, '&quot;') + '">';
                }

        function bindSurveyPhotoDropzones() {
            document.querySelectorAll('#surveyEditModalForm .file-upload-wrap').forEach(wrap => {
                const input = wrap.querySelector('.file-upload-input');
                const dropzone = wrap.querySelector('.file-upload-dropzone');
                dropzone.addEventListener('click', () => input.click());
                ['dragenter', 'dragover'].forEach(event => {
                    dropzone.addEventListener(event, (e) => {
                        e.preventDefault();
                        dropzone.classList.add('dragover');
                    });
                });
                ['dragleave', 'drop'].forEach(event => {
                    dropzone.addEventListener(event, (e) => {
                        e.preventDefault();
                        dropzone.classList.remove('dragover');
                    });
                });
                dropzone.addEventListener('drop', (e) => {
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        input.files = files;
                        handleSurveyPhotoUpload(input);
                    }
                });
            });
        }

        function handleSurveyPhotoUpload(input) {
            const wrap = input.parentElement;
            const idx = parseInt(wrap.dataset.idx, 10);
            const files = Array.from(input.files || []);
            if (files.length === 0) return;
            const proofIndex = surveyData[surveyEditModalSubTab].columns.indexOf('上传证明文件');
            const photoIndex = surveyData[surveyEditModalSubTab].columns.indexOf('排查照片');
            const isProofField = idx === proofIndex;
            const isPhotoField = idx === photoIndex;
            const urlInput = wrap.querySelector('.file-url-input');
            const existingUrls = urlInput.value.split(',').map(s => s.trim()).filter(Boolean);
            if (isProofField) {
                const file = files[0];
                if (file.type !== 'application/pdf') {
                    alert('请上传 PDF 文件');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(e) {
                    urlInput.value = e.target.result;
                    urlInput.dispatchEvent(new Event('input'));
                    renderSurveyPdfThumb(wrap);
                };
                reader.readAsDataURL(file);
                return;
            }
            if (isPhotoField) {
                const invalid = files.find(f => !f.type.startsWith('image/'));
                if (invalid) {
                    alert('请上传图片文件');
                    return;
                }
                const readers = files.map(file => {
                    return new Promise(resolve => {
                        const reader = new FileReader();
                        reader.onload = e => resolve(e.target.result);
                        reader.readAsDataURL(file);
                    });
                });
                Promise.all(readers).then(results => {
                    const allUrls = existingUrls.concat(results).filter((v, i, a) => a.indexOf(v) === i);
                    urlInput.value = allUrls.join(',');
                    urlInput.dispatchEvent(new Event('input'));
                    renderSurveyPhotoThumbs(wrap, allUrls);
                });
            }
        }

        function renderSurveyPhotoThumbs(wrap, urls) {
            let thumb = wrap.querySelector('.file-thumb-preview');
            if (!thumb) {
                thumb = document.createElement('div');
                thumb.className = 'file-thumb-preview';
                wrap.appendChild(thumb);
            }
            thumb.innerHTML = urls.filter(u => u && u !== '—' && u !== '-').map(u => '<img src="' + u + '" alt="预览" onclick="viewPhotoOnline(\'' + u + '\')">').join('');
        }

        function renderSurveyPdfThumb(wrap) {
            let thumb = wrap.querySelector('.file-thumb-preview');
            if (!thumb) {
                thumb = document.createElement('div');
                thumb.className = 'file-thumb-preview';

        function normalizeDateValue(val) {
            if (!val || val === '—' || val === '-') return '';
            const s = String(val).trim();
            if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
            const d = new Date(s);
            if (isNaN(d.getTime())) return '';
            const pad = n => n < 10 ? '0' + n : n;
            return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
        }

        function bindProjectFileDropzones() {
            document.querySelectorAll('#measureEditModalForm .file-upload-wrap').forEach(wrap => {
                const input = wrap.querySelector('.file-upload-input');
                const dropzone = wrap.querySelector('.file-upload-dropzone');
                if (!input || !dropzone) return;
                dropzone.addEventListener('click', () => input.click());
                ['dragenter', 'dragover'].forEach(event => {
                    dropzone.addEventListener(event, (e) => {
                        e.preventDefault();
                        dropzone.classList.add('dragover');
                    });
                });
                ['dragleave', 'drop'].forEach(event => {
                    dropzone.addEventListener(event, (e) => {
                        e.preventDefault();
                        dropzone.classList.remove('dragover');
                    });
                });
                dropzone.addEventListener('drop', (e) => {
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        input.files = files;
                        const key = wrap.dataset.fieldKey;
                        const acceptImages = wrap.dataset.acceptImages === 'true';
                        handleProjectFileUpload(input, key, acceptImages);
                    }
                });
            });
        }

        // 管理措施变更流程
        function getManageMeasureFlatFields() {
            const data = measureData.manage;
            const fields = [];
            data.baseColumns.forEach((c, i) => {
                if (c === '变更或延长申请审批') return;
                fields.push({ key: 'base:' + i, label: c, value: data.baseValues[i] || '' });
            });
            const measureType = data.baseValues[0] || '停止使用';
            const extra = data.extraFields[measureType] || {};
            Object.keys(extra).forEach(k => {
                fields.push({ key: 'extra:' + k, label: k, value: extra[k] || '' });
            });
            return fields;
        }

        function getFieldValueByKey(key) {
            const data = measureData.manage;
            if (key.startsWith('base:')) {
                const idx = parseInt(key.split(':')[1], 10);
                return data.baseValues[idx] || '';
            }
            if (key.startsWith('extra:')) {
                const k = key.split(':')[1];
                const measureType = data.baseValues[0] || '停止使用';
                return (data.extraFields[measureType] || {})[k] || '';
            }
            return '';
        }

        function setFieldValueByKey(key, value) {
            const data = measureData.manage;
            if (key.startsWith('base:')) {
                const idx = parseInt(key.split(':')[1], 10);
                data.baseValues[idx] = value;
            } else if (key.startsWith('extra:')) {
                const k = key.split(':')[1];
                const measureType = data.baseValues[0] || '停止使用';
                if (!data.extraFields[measureType]) data.extraFields[measureType] = {};
                data.extraFields[measureType][k] = value;
            }
        }

        function bindCommonPhotoDropzones() {
            document.querySelectorAll('#commonEditForm .file-upload-wrap').forEach(wrap => {
                const input = wrap.querySelector('.file-upload-input');
                const dropzone = wrap.querySelector('.file-upload-dropzone');
                dropzone.addEventListener('click', () => input.click());
                ['dragenter', 'dragover'].forEach(event => {
                    dropzone.addEventListener(event, (e) => {
                        e.preventDefault();
                        dropzone.classList.add('dragover');
                    });
                });
                ['dragleave', 'drop'].forEach(event => {
                    dropzone.addEventListener(event, (e) => {
                        e.preventDefault();
                        dropzone.classList.remove('dragover');
                    });
                });
                dropzone.addEventListener('drop', (e) => {
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        input.files = files;
                        handleCommonPhotoUpload(input);
                    }
                });
            });
        }

        function handleCommonPhotoUpload(input) {
            const wrap = input.parentElement;
            const files = Array.from(input.files || []);
            if (files.length === 0) return;
            const invalid = files.find(f => !f.type.startsWith('image/'));
            if (invalid) {
                alert('请上传图片文件');
                return;
            }
            const urlInput = wrap.querySelector('.file-url-input');
            const existingUrls = urlInput.value.split(',').map(s => s.trim()).filter(Boolean);
            const readers = files.map(file => {
                return new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            });
            Promise.all(readers).then(results => {
                const allUrls = existingUrls.concat(results).filter((v, i, a) => a.indexOf(v) === i);
                urlInput.value = allUrls.join(',');
                urlInput.dispatchEvent(new Event('input'));
                renderCommonPhotoThumbs(wrap, allUrls);
            });
        }

        function parseCoord(str) {
            if (!str || str === '—' || str === '-') return null;
            const parts = str.split(',').map(s => parseFloat(s.trim())).filter(n => !isNaN(n));
            if (parts.length >= 2) return { lng: parts[0], lat: parts[1] };
            return null;
        }

        function initLocationMap() {
            loadLeaflet(() => {
                if (locationMap) {
                    setTimeout(() => { locationMap.invalidateSize(); }, 100);
                    return;
                }

        const ALLOWED_FILE_TYPES = [
            { ext: '.jpg', mime: 'image/jpeg' }, { ext: '.jpeg', mime: 'image/jpeg' },
            { ext: '.png', mime: 'image/png' }, { ext: '.gif', mime: 'image/gif' },

            { ext: '.xls', mime: 'application/vnd.ms-excel' }, { ext: '.xlsx', mime: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' },
            { ext: '.dwg', mime: 'application/acad' }, { ext: '.dxf', mime: 'image/vnd.dxf' },
            { ext: '.zip', mime: 'application/zip' }, { ext: '.rar', mime: 'application/x-rar-compressed' }
        ];

        const ALLOWED_IMAGE_TYPES = ALLOWED_FILE_TYPES.filter(t => t.mime.startsWith('image/'));

        function getFileExtension(name) {
            if (!name) return '';
            const idx = name.lastIndexOf('.');
            return idx >= 0 ? name.slice(idx).toLowerCase() : '';
        }

        function isAllowedFile(file) {
            const ext = getFileExtension(file.name);
            return ALLOWED_FILE_TYPES.some(t => t.ext === ext);
        }

        function isAllowedImage(file) {
            const ext = getFileExtension(file.name);
            return ALLOWED_IMAGE_TYPES.some(t => t.ext === ext) || file.type.startsWith('image/');
        }

        function formatFileSize(bytes) {
            if (!bytes || bytes < 0) return '-';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.onerror = e => reject(e);
                reader.readAsDataURL(file);
            });
        }

        function validateFiles(files, acceptImages) {
            const invalid = [];
            const valid = [];
            Array.from(files).forEach(f => {
                if (acceptImages ? isAllowedImage(f) : isAllowedFile(f)) {
                    valid.push(f);
                } else {
                    invalid.push(f.name);
                }
            });
            return { valid, invalid };
        }

        function projectFilesToString(files) {
            return files.map(f => f.url).filter(Boolean).join(',');
        }

        function projectFilesFromString(str) {
            if (!str || str === '—' || str === '-') return [];
            return str.split(',').map(s => s.trim()).filter(Boolean).map(url => ({
                name: url.split('/').pop() || url,
                url: url,
                type: getFileExtension(url),
                size: '', uploadTime: ''
            }));
        }

        // 通用批量文件上传（用于工程措施编辑表单）
        async function handleProjectFileUpload(input, fieldKey, acceptImages) {
            const files = Array.from(input.files || []);
            if (files.length === 0) return;
            const { valid, invalid } = validateFiles(files, acceptImages);
            if (invalid.length > 0) {
                alert('以下文件格式不允许：\n' + invalid.join('\n') + '\n\n允许上传：图片、PDF、Word、Excel、CAD、ZIP、RAR 等文件。');
                return;
            }
            const wrap = input.closest('.file-upload-wrap');
            const urlInput = wrap.querySelector('.file-url-input');
            const current = projectFilesFromString(urlInput.value || '');
            const newFiles = [];
            for (const file of valid) {
                if (acceptImages || file.type.startsWith('image/')) {
                    try {
                        const url = await fileToDataUrl(file);
                        newFiles.push({ name: file.name, url: url, type: file.type, size: formatFileSize(file.size), uploadTime: formatDateTime(new Date()) });
                    } catch (e) { /* ignore */ }
                } else {
                    newFiles.push({ name: file.name, url: file.name, type: file.type, size: formatFileSize(file.size), uploadTime: formatDateTime(new Date()) });
                }
            }
            const all = current.concat(newFiles);
            urlInput.value = projectFilesToString(all);
            urlInput.dispatchEvent(new Event('input'));
            renderProjectFileList(wrap, all, fieldKey, acceptImages);
        }

        function renderProjectFileList(wrap, files, fieldKey, acceptImages) {
            let list = wrap.querySelector('.project-file-list');
            if (!list) {
                list = document.createElement('div');
                list.className = 'project-file-list';
                wrap.appendChild(list);
            }
            if (!files || files.length === 0) {
                list.innerHTML = '';
                return;
            }
            list.innerHTML = '<div style="font-size:12px;color:var(--text-secondary);margin-bottom:6px;">已上传 ' + files.length + ' 个文件</div>' + files.map((f, idx) => {
                const isImage = f.url && (f.url.startsWith('data:image') || f.url.startsWith('http') && /\.(jpg|jpeg|png|gif|bmp|webp)$/i.test(f.url));
                const icon = isImage ? 'fa-image' : 'fa-file';
                const preview = isImage ? ' onclick="viewPhotoOnline(\'' + f.url + '\')" style="cursor:pointer;color:var(--primary);"' : ' style="color:var(--text-secondary);"';
                return '<div class="project-file-item">' +
                    '<i class="fas ' + icon + '"></i> ' +
                    '<span' + preview + '>' + (f.name || '附件') + ' <span style="color:#999;">(' + (f.size || '-') + ')</span></span>' +
                    '<button type="button" class="project-file-remove" onclick="removeProjectFile(this, \'' + fieldKey + '\', ' + idx + ')" title="删除"><i class="fas fa-times"></i></button>' +
                    '</div>';
            }).join('');
        }

        function removeProjectFile(btn, fieldKey, idx) {
            const wrap = btn.closest('.file-upload-wrap');
            const urlInput = wrap.querySelector('.file-url-input');
            const current = projectFilesFromString(urlInput.value || '');

                return '<div class="ct-node" data-node-id="' + (node.nodeId || '') + '">' +
                    '<div class="ct-node-dot"></div>' +
                    '<div class="ct-node-header">' +
                        '<span class="ct-node-date">' + (node.nodeDate || '-') + '</span>' +
                        '<span class="ct-node-title">' + (node.title || '-') + '</span>' +
                    '</div>' +
                    '<div class="ct-node-body">' +
                        '<div>' + (node.description || '-') + '</div>' +
                        photoHtml +
                        acceptHtml +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function renderProjectTimelineEdit(container) {
            if (!container) return;
            container.dataset.mode = 'edit';
            const data = measureData.project.timeline || [];
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="ct-node-empty">暂无施工过程记录，点击“新增节点”添加。</div>';
                return;
            }
            container.innerHTML = data.map((node, idx) => {
                const photos = (node.photos || []).filter(u => u && u !== '—' && u !== '-');
                const photoHtml = photos.length
                    ? '<div class="photo-grid">' + photos.map(u => '<img src="' + u + '" alt="照片" onclick="viewPhotoOnline(\'' + u + '\')">').join('') + '</div>'
                    : '';
                const accept = node.acceptRecord || {};
                const acceptHtml = accept.conclusion
                    ? '<div style="margin-top:8px;"><strong>验收结论：</strong>' + accept.conclusion +
                        ' | <strong>验收人：</strong>' + (accept.checker || '-') +
                        ' | <strong>验收日期：</strong>' + (accept.checkDate || '-') + '</div>'
                    : '';
                return '<div class="ct-node" data-node-id="' + (node.nodeId || '') + '">' +
                    '<div class="ct-node-dot"></div>' +
                    '<div class="ct-node-header">' +
                        '<span class="ct-node-date">' + (node.nodeDate || '-') + '</span>' +
                        '<span class="ct-node-title">' + (node.title || '-') + '</span>' +
                        '<button type="button" class="photo-btn" style="margin-left:auto;" onclick="openProjectTimelineNodeModal(\'' + (node.nodeId || '') + '\')">编辑</button>' +
                        '<button type="button" class="photo-btn" style="margin-left:6px;border-color:var(--danger);color:var(--danger);" onclick="deleteProjectTimelineNode(\'' + (node.nodeId || '') + '\')">删除</button>' +
                    '</div>' +
                    '<div class="ct-node-body">' +
                        '<div>' + (node.description || '-') + '</div>' +
                        photoHtml +
                        acceptHtml +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function openProjectTimelineNodeModal(nodeId) {
            editingTimelineNodeId = nodeId || '';
            const node = editingTimelineNodeId
                ? (measureData.project.timeline || []).find(n => n.nodeId === editingTimelineNodeId)
                : null;
            document.getElementById('timelineNodeModalTitle').innerHTML = node ? '<i class="fas fa-edit"></i> 编辑施工节点' : '<i class="fas fa-plus"></i> 新增施工节点';
            document.getElementById('timelineNodeTitle').value = node ? node.title : '';
            document.getElementById('timelineNodeDate').value = normalizeDateValue(node ? node.nodeDate : '');
            document.getElementById('timelineNodeDesc').value = node ? node.description : '';
            document.getElementById('timelineNodePhotos').value = node ? (node.photos || []).join(',') : '';
            document.getElementById('timelineNodeAcceptConclusion').value = node && node.acceptRecord ? node.acceptRecord.conclusion : '';
            document.getElementById('timelineNodeAcceptChecker').value = node && node.acceptRecord ? node.acceptRecord.checker : '';
            document.getElementById('timelineNodeAcceptDate').value = normalizeDateValue(node && node.acceptRecord ? node.acceptRecord.checkDate : '');
            document.getElementById('timelineNodeAcceptFiles').value = node && node.acceptRecord ? (node.acceptRecord.files || []).join(',') : '';
            renderTimelineNodePhotoThumbs();
            renderTimelineNodeFileList();
            document.getElementById('timelineNodeModal').classList.add('open');
        }

        function closeProjectTimelineNodeModal() {
            document.getElementById('timelineNodeModal').classList.remove('open');
            editingTimelineNodeId = '';
        }

        async function handleTimelineNodePhotoUpload(input) {
            const files = Array.from(input.files || []);
            if (files.length === 0) return;
            const { valid, invalid } = validateFiles(files, true);
            if (invalid.length > 0) {
                alert('以下文件格式不允许：\n' + invalid.join('\n') + '\n\n仅允许上传图片。');
                return;
            }
            const urlInput = document.getElementById('timelineNodePhotos');
            const existing = urlInput.value.split(',').map(s => s.trim()).filter(Boolean);
            for (const file of valid) {
                try {
                    const url = await fileToDataUrl(file);
                    existing.push(url);
                } catch (e) { /* ignore */ }
            }
            urlInput.value = existing.join(',');
            renderTimelineNodePhotoThumbs();
        }

        async function handleTimelineNodeFileUpload(input) {
            const files = Array.from(input.files || []);
            if (files.length === 0) return;
            const { valid, invalid } = validateFiles(files, false);
            if (invalid.length > 0) {
                alert('以下文件格式不允许：\n' + invalid.join('\n') + '\n\n允许上传：图片、PDF、Word、Excel、CAD、ZIP、RAR 等文件。');
                return;
            }
            const urlInput = document.getElementById('timelineNodeAcceptFiles');
            const existing = urlInput.value.split(',').map(s => s.trim()).filter(Boolean);
            for (const file of valid) {
                if (file.type.startsWith('image/')) {
                    try { existing.push(await fileToDataUrl(file)); } catch (e) { /* ignore */ }
                } else {
                    existing.push(file.name);
                }
            }
            urlInput.value = existing.join(',');
            renderTimelineNodeFileList();
        }

        function renderTimelineNodePhotoThumbs() {
            const urlInput = document.getElementById('timelineNodePhotos');
            const urls = urlInput.value.split(',').map(s => s.trim()).filter(Boolean);
            let thumb = document.getElementById('timelineNodePhotosWrap').querySelector('.file-thumb-preview');
            if (!thumb) {
                thumb = document.createElement('div');
                thumb.className = 'file-thumb-preview';
                document.getElementById('timelineNodePhotosWrap').appendChild(thumb);
            }
            thumb.innerHTML = urls.map(u => '<img src="' + u + '" alt="预览" onclick="viewPhotoOnline(\'' + u + '\')">').join('');
        }

        function renderTimelineNodeFileList() {
            const urlInput = document.getElementById('timelineNodeAcceptFiles');
            const urls = urlInput.value.split(',').map(s => s.trim()).filter(Boolean);
            let list = document.getElementById('timelineNodeAcceptFilesWrap').querySelector('.file-list-preview');
            if (!list) {
                list = document.createElement('div');
                list.className = 'file-list-preview';
                document.getElementById('timelineNodeAcceptFilesWrap').appendChild(list);
            }
            if (!urls.length) { list.innerHTML = ''; return; }
            list.innerHTML = urls.map((u, idx) => '<div class="file-list-item"><i class="fas fa-file"></i> <a href="' + u + '" target="_blank">附件 ' + (idx + 1) + '</a></div>').join('');
        }

        function saveProjectTimelineNode() {
            const title = document.getElementById('timelineNodeTitle').value.trim();
            if (!title) {
                alert('请填写节点标题。');
                return;
            }
            const nodeDate = document.getElementById('timelineNodeDate').value;
            if (!nodeDate) {
                alert('请填写节点日期。');
                return;
            }
            const timeline = measureData.project.timeline || [];
            const node = {
                nodeId: editingTimelineNodeId || ('NODE-' + Date.now() + '-' + Math.floor(Math.random() * 900 + 100)),
                title: title,
                nodeDate: nodeDate,
                description: document.getElementById('timelineNodeDesc').value.trim(),
                photos: document.getElementById('timelineNodePhotos').value.split(',').map(s => s.trim()).filter(Boolean),
                acceptRecord: {
                    conclusion: document.getElementById('timelineNodeAcceptConclusion').value,
                    checker: document.getElementById('timelineNodeAcceptChecker').value.trim(),
                    checkDate: document.getElementById('timelineNodeAcceptDate').value,
                    files: document.getElementById('timelineNodeAcceptFiles').value.split(',').map(s => s.trim()).filter(Boolean)
                }
            };
            const idx = timeline.findIndex(n => n.nodeId === editingTimelineNodeId);
            if (idx >= 0) timeline[idx] = node;
            else timeline.push(node);
            // 按日期排序
            timeline.sort((a, b) => a.nodeDate.localeCompare(b.nodeDate));
            measureData.project.timeline = timeline;
            closeProjectTimelineNodeModal();
            if (measureEditModalSubTab === 'project') {
                renderProjectEditModalForm();
            }
        }

        function deleteProjectTimelineNode(nodeId) {
            if (!confirm('确定删除该施工节点吗？')) return;
            measureData.project.timeline = (measureData.project.timeline || []).filter(n => n.nodeId !== nodeId);
            if (measureEditModalSubTab === 'project') {
                renderProjectEditModalForm();
            }
        }

        // =========================================================
        // 验收销号：申请与审核流程
        // =========================================================
        let closeAuditMode = true; // true = 通过, false = 驳回

        function openCloseApplyModal() {
            document.getElementById('closeApplyApplicant').value = currentHouseArch.managerName || '李志强';
            document.getElementById('closeApplyTime').value = formatDateTime(new Date()).split(' ')[0];
            document.getElementById('closeApplyRemark').value = '';
            document.getElementById('closeApplyFiles').value = '';
            const wrap = document.getElementById('closeApplyFilesWrap');
            let thumb = wrap.querySelector('.file-thumb-preview');
            if (thumb) thumb.innerHTML = '';
            document.getElementById('closeApplyModal').classList.add('open');
        }

        function closeCloseApplyModal() {
            document.getElementById('closeApplyModal').classList.remove('open');
        }

        async function handleCloseApplyPhotoUpload(input) {
            const files = Array.from(input.files || []);
            if (files.length === 0) return;
            const invalid = files.find(f => !f.type.startsWith('image/'));
            if (invalid) {
                alert('请上传图片文件');
                return;
            }
            const wrap = input.parentElement;
            const urlInput = wrap.querySelector('.file-url-input');
            const existingUrls = urlInput.value.split(',').map(s => s.trim()).filter(Boolean);
            const readers = files.map(file => {
                return new Promise(resolve => {
                    const reader = new FileReader();
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(file);
                });
            });
            Promise.all(readers).then(results => {
                const allUrls = existingUrls.concat(results).filter((v, i, a) => a.indexOf(v) === i);
                urlInput.value = allUrls.join(',');
                renderCommonPhotoThumbs(wrap, allUrls);
            });
        }

        function submitCloseApply() {
            const applicant = document.getElementById('closeApplyApplicant').value.trim() || '李志强';
            const applyTime = document.getElementById('closeApplyTime').value.trim() || formatDateTime(new Date());
            const remark = document.getElementById('closeApplyRemark').value.trim();
            const files = document.getElementById('closeApplyFiles').value.trim();
            // 材料完整性校验：至少要求整改后照片、验收报告、检测报告之一
            if (!files) {
                alert('请至少上传整改后照片、验收报告或检测报告等证明材料。');
                return;
            }
            if (!remark) {
                alert('请填写销号说明。');
                return;
            }
            const s = currentHouseArch;
            s.closeStatus = '待审核';
            s.closeApplyTime = applyTime;
            s.closeAuditTime = '';
            s.closeAuditor = '';
            s.closeAuditOpinion = '';
            s.closeRejectReason = '';
            s.governStatus = '已整治';
            s.risk = s.risk === 'safe' ? 'safe' : (RISK_LABEL_MAP_INV[s.riskLevel] || s.risk || 'warning');
            s.riskLevel = s.risk === 'safe' ? '安全' : RISK_LABEL_MAP[s.risk] || s.riskLevel;
            saveCurrentHouseArch(s);
            // 同步到审核列表
            const closeData = tableData.close;
            closeData.auditList = closeData.auditList || [];
            closeData.auditList.push({
                submitter: applicant,
                submitTime: applyTime,
                auditTime: '',
                auditor: '',
                conclusion: '待审核',
                report: files,
                remark: remark
            });
            // 同步至独立销号申请清单
            const applies = getCloseApplyStorage();
            const existing = applies.find(a => a.no === getCurrentHouseNo());
            if (existing) {
                existing.closeStatus = '待审核';
                existing.applicant = applicant;
                existing.applyTime = applyTime;
                existing.auditor = '';
                existing.auditTime = '';
                existing.auditOpinion = '';
                existing.rejectReason = '';
                existing.files = files;
            } else {
                applies.push({
                    id: generateCloseApplyId('CLOSE'),
                    no: getCurrentHouseNo(),
                    name: s.name || '—',
                    street: s.street || '—',
                    riskLevel: s.riskLevel || '—',
                    governStatus: s.governStatus || '—',
                    closeStatus: '待审核',
                    applicant: applicant,
                    applyTime: applyTime,
                    auditor: '',
                    auditTime: '',
                    auditOpinion: '',
                    rejectReason: '',
                    files: files
                });
            }
            setCloseApplyStorage(applies);
            archiveCloseRecord({
                archId: generateArchId('ARC'),
                type: '销号申请',
                closeTime: applyTime,
                closePerson: applicant,
                closeResult: '待审核',
                closeRemark: remark,
                files: files,
                saveTime: formatDateTime(new Date()),
                source: '验收销项-申请'
            });
            closeCloseApplyModal();
            renderSidebar();
            renderContent();
            alert('销号申请已提交，等待审核。');
        }

        function openCloseAuditModal(pass) {
            closeAuditMode = pass;
            document.getElementById('closeAuditTitle').innerHTML = pass ? '<i class="fas fa-check"></i> 通过销号申请' : '<i class="fas fa-times"></i> 驳回销号申请';
            document.getElementById('closeAuditConclusion').value = pass ? '通过' : '驳回';
            document.getElementById('closeAuditAuditor').value = '王建国';
            document.getElementById('closeAuditOpinionInput').value = '';
            document.getElementById('closeRejectReasonInput').value = '';
            document.getElementById('closeRejectReasonWrap').style.display = pass ? 'none' : 'block';
            document.getElementById('closeAuditModal').classList.add('open');
        }

        function closeCloseAuditModal() {
            document.getElementById('closeAuditModal').classList.remove('open');
        }

        function submitCloseAudit() {
            const conclusion = document.getElementById('closeAuditConclusion').value;
            const auditor = document.getElementById('closeAuditAuditor').value.trim() || '王建国';
            const opinion = document.getElementById('closeAuditOpinionInput').value.trim();
            const rejectReason = document.getElementById('closeRejectReasonInput').value.trim();
            if (!opinion) {
                alert('请填写审核意见。');
                return;
            }
            if (conclusion === '驳回' && !rejectReason) {
                alert('请填写驳回原因 / 整改要求。');
                return;
            }
            const s = currentHouseArch;
            const auditTime = formatDateTime(new Date());
            s.closeStatus = conclusion === '通过' ? '已通过' : '已驳回';
            s.closeAuditTime = auditTime;
            s.closeAuditor = auditor;
            s.closeAuditOpinion = opinion;
            s.closeRejectReason = rejectReason;
            if (conclusion === '通过') {
                s.governStatus = '已治理';
                s.riskLevel = '无风险';
                s.risk = 'safe';
                s.isRemovedFromFocus = true;
            } else {
                s.risk = s.risk === 'safe' ? 'safe' : (RISK_LABEL_MAP_INV[s.riskLevel] || s.risk || 'warning');
                s.riskLevel = s.risk === 'safe' ? '安全' : RISK_LABEL_MAP[s.risk] || s.riskLevel;
            }
            saveCurrentHouseArch(s);
            // 同步审核列表最后一条
            const closeData = tableData.close;
            closeData.auditList = closeData.auditList || [];
            const last = closeData.auditList[closeData.auditList.length - 1];
            if (last) {
                last.auditTime = auditTime;
                last.auditor = auditor;
                last.conclusion = conclusion;
                last.remark = (opinion ? '审核意见：' + opinion : '') + (rejectReason ? '；驳回原因：' + rejectReason : '');
            }
            // 同步至独立销号申请清单
            const applies = getCloseApplyStorage();
            const existing = applies.find(a => a.no === getCurrentHouseNo());
            if (existing) {
                existing.closeStatus = conclusion === '通过' ? '已通过' : '已驳回';
                existing.auditor = auditor;
                existing.auditTime = auditTime;
                existing.auditOpinion = opinion;
                existing.rejectReason = conclusion === '驳回' ? rejectReason : '';
                if (conclusion === '通过') {
                    existing.governStatus = '已治理';
                    existing.risk = 'safe';
                    existing.riskLevel = '无风险';
                } else {
                    existing.risk = s.risk;
                    existing.riskLevel = s.riskLevel;
                }
            }
            setCloseApplyStorage(applies);
            archiveCloseRecord({
                archId: generateArchId('ARC'),
                type: '销号审核',
                closeTime: auditTime,
                closePerson: auditor,
                closeResult: conclusion === '通过' ? '已通过' : '已驳回',
                closeRemark: opinion + (rejectReason ? '；' + rejectReason : ''),
                saveTime: auditTime,
                source: '验收销项-审核'
            });
            closeCloseAuditModal();
            renderSidebar();
            renderContent();
            if (conclusion === '通过') {
                alert('销号审核已通过：房屋风险状态已更新为“已销号”，风险等级调整为“无风险”，并已退出重点监控名单。');
            } else {
                alert('销号申请已驳回：已记录驳回原因和整改要求，请申请人补充材料后重新提交。');
            }
        }

        document.getElementById('closeAuditConclusion').addEventListener('change', function() {
            document.getElementById('closeRejectReasonWrap').style.display = this.value === '驳回' ? 'block' : 'none';
        });

        document.getElementById('closeApplyModal').addEventListener('click', function(e) {
            if (e.target === this) closeCloseApplyModal();
        });

        document.getElementById('closeAuditModal').addEventListener('click', function(e) {
            if (e.target === this) closeCloseAuditModal();
        });

        syncHouseArchFromStatus();
        renderSidebar();
        renderContent();
    </script>
</body>
</html>
