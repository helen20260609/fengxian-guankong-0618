<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机构业绩管理 - 第三方服务机构</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="tp-common.css">
<script src="../js/echarts.min.js"></script>
<script src="../js/third-party-data.js"></script>
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

/* 统计卡片 */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
.stat-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 16px; transition: all 0.3s; }
.stat-item:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stat-icon.blue { background: rgba(26,115,232,0.12); color: var(--primary); }
.stat-icon.green { background: rgba(30,142,62,0.12); color: var(--success); }
.stat-icon.orange { background: rgba(227,116,0,0.12); color: var(--warning); }
.stat-icon.purple { background: rgba(106,68,242,0.12); color: #6a44f2; }
.stat-info { display: flex; flex-direction: column; }
.stat-number { font-size: 24px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
.stat-trend { font-size: 12px; margin-top: 4px; }
.stat-trend.up { color: var(--success); }
.stat-trend.down { color: var(--danger); }

/* 表单卡片 */
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.form-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.form-title .badge { font-size: 12px; font-weight: 400; color: var(--text-secondary); margin-left: 4px; }
.form-body { padding: 20px; }

/* 表单布局 */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; color: var(--text-primary); }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }

/* 全宽表单行 */
.form-row-full { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 16px; }

/* 文件上传 */
.file-upload { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--input-bg); }
.file-upload input[type="file"] { display: none; }
.file-upload label { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; cursor: pointer; background: var(--bg-card); color: var(--text-primary); transition: all 0.2s; }
.file-upload label:hover { border-color: var(--primary); color: var(--primary); }
.file-upload .file-name { font-size: 13px; color: var(--text-secondary); }

/* 按钮 */
.form-actions { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
.btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #166534; }
.btn-sm { padding: 6px 14px; font-size: 13px; }

/* 筛选栏 */
.filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-bar select, .filter-bar input {
    padding: 8px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.filter-bar input { width: 160px; }
.filter-bar .btn { padding: 8px 18px; font-size: 13px; }

/* 图表区域 */
.chart-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 20px; }
.chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.chart-header { padding: 14px 18px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.chart-body { padding: 12px; }
.chart-box { width: 100%; height: 260px; }
.chart-box.tall { height: 360px; }

/* 图表 TAB 栏 */
.chart-tabs { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.chart-tab { padding: 8px 16px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 14px; color: var(--text-secondary); background: transparent; border: none; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.chart-tab:hover { color: var(--primary); background: var(--primary-light); }
.chart-tab.active { color: var(--primary); background: var(--primary-light); font-weight: 600; border-bottom: 2px solid var(--primary); }
.chart-tab .icon { margin-right: 6px; }
.chart-panel { margin-bottom: 20px; }

/* 表格 */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th, .data-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); text-align: left; }
.data-table th { background: var(--header-bg); color: var(--text-secondary); font-weight: 600; white-space: nowrap; }
.data-table tr:hover { background: var(--bg-hover); }
.data-table .amount { font-weight: 600; color: var(--primary); }
.data-table .tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
.tag-success { background: rgba(30,142,62,0.12); color: var(--success); }
.tag-warning { background: rgba(227,116,0,0.12); color: var(--warning); }
.tag-danger { background: rgba(217,48,37,0.12); color: var(--danger); }
.tag-info { background: rgba(26,115,232,0.12); color: var(--primary); }
.tag-domain { background: var(--primary-light); color: var(--primary); }

/* 状态标签（用于表格） */
.status-tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 12px;
    line-height: 1.4;
}
.status-tag.primary { background: var(--primary-light); color: var(--primary); }
.status-tag.success { background: rgba(30,142,62,0.12); color: var(--success); }
.status-tag.warning { background: rgba(227,116,0,0.12); color: var(--warning); }
.status-tag.danger { background: rgba(217,48,37,0.12); color: var(--danger); }
.status-tag.info { background: rgba(26,115,232,0.12); color: var(--primary); }
.status-tag.grey { background: var(--bg-hover); color: var(--text-secondary); }

/* 表格操作链接 */
.table-link {
    color: var(--primary);
    text-decoration: none;
    font-size: 13px;
    margin-right: 10px;
    cursor: pointer;
}
.table-link:hover { text-decoration: underline; }
.table-link.danger { color: var(--danger); }

/* 文件列表 */
.file-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.file-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg-card); font-size: 13px;
}
.file-list-item .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-list-item .file-size { color: var(--text-secondary); font-size: 12px; margin-left: 8px; }
.file-list-item .file-remove { color: var(--danger); cursor: pointer; margin-left: 10px; font-size: 12px; }
.file-list-item .file-remove:hover { text-decoration: underline; }

/* 分页 */
.pagination { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin-top: 16px; }
.pagination .btn { padding: 6px 12px; font-size: 13px; }
.pagination .page-info { font-size: 13px; color: var(--text-secondary); }

/* 模态框 */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.45);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}
.modal-box {
    background: var(--bg-card);
    border-radius: 12px;
    width: 100%;
    max-width: 520px;
    max-height: 80vh;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
.modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
}
.modal-close { font-size: 22px; cursor: pointer; color: var(--text-secondary); }
.modal-close:hover { color: var(--danger); }
.modal-body { padding: 18px; overflow-y: auto; max-height: 60vh; }

/* 响应式 */
@media (max-width: 1200px) {
    .chart-grid { grid-template-columns: 1fr; }
    .stat-row { grid-template-columns: repeat(4, 1fr); }
}
@media (max-width: 900px) {
    .stat-row { grid-template-columns: repeat(2, 1fr); }
}
    .form-row { grid-template-columns: 1fr; }
    .form-row-3 { grid-template-columns: 1fr; }
    .filter-bar { flex-direction: column; align-items: stretch; }
    .filter-bar input { width: 100%; }
    .data-table { display: block; overflow-x: auto; }
}
</style>
</head>
<body>

<!-- 统计卡片 -->
<div class="stat-row">
    <div class="stat-item">
        <div class="stat-icon blue"><i class="fas fa-briefcase"></i></div>
        <div class="stat-info">
            <div class="stat-number" id="statTotal">0</div>
            <div class="stat-label">总业绩项目</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon purple"><i class="fas fa-coins"></i></div>
        <div class="stat-info">
            <div class="stat-number" id="statAmount">0</div>
            <div class="stat-label">合同总金额（万元）</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon green"><i class="fas fa-check-double"></i></div>
        <div class="stat-info">
            <div class="stat-number" id="statPassRate">0%</div>
            <div class="stat-label">验收合格率</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon orange"><i class="fas fa-chart-line"></i></div>
        <div class="stat-info">
            <div class="stat-number" id="statGrowth">0%</div>
            <div class="stat-label">同比增长</div>
            <div class="stat-trend up" id="statGrowthTrend"><i class="fas fa-arrow-up"></i> 较上期</div>
        </div>
    </div>
</div>

<!-- 业绩查询分析 -->
<div class="list-card">
    <div class="list-header">
        <div class="list-title"><i class="fas fa-chart-bar"></i> 业绩查询分析</div>
        <div style="display:flex;gap:10px;">
            <button class="list-btn list-btn-primary" onclick="openPerformanceFormModal()"><i class="fas fa-plus"></i> 业绩录入</button>
            <button class="list-btn list-btn-success" onclick="exportPerformance()"><i class="fas fa-file-export"></i> 导出业绩证明</button>
        </div>
    </div>
    <div class="list-body">
        <div class="filter-card">
            <div class="filter-row">
                <div class="filter-item">
                    <label>服务领域</label>
                    <select id="filterDomain">
                        <option value="">全部</option>
                        <option>建筑工地</option>
                        <option>基坑</option>
                        <option>交通</option>
                        <option>玻璃幕墙</option>
                        <option>燃气</option>
                        <option>高空坠物</option>
                        <option>城镇自建房</option>
                        <option>农村自建房</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>服务类型</label>
                    <select id="filterServiceType">
                        <option value="">全部</option>
                        <option>应急咨询</option>
                        <option>安全评估</option>
                        <option>检测检验</option>
                        <option>隐患排查</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>时间范围</label>
                    <select id="filterTimeRange">
                        <option value="">全部</option>
                        <option value="2026">2026年</option>
                        <option value="2025">2025年</option>
                        <option value="last6">近6个月</option>
                        <option value="last3">近3个月</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>合同金额</label>
                    <select id="filterAmountRange">
                        <option value="">全部</option>
                        <option value="0-50">50万以下</option>
                        <option value="50-100">50-100万</option>
                        <option value="100-200">100-200万</option>
                        <option value="200+">200万以上</option>
                    </select>
                </div>
                <div class="filter-item">
                    <label>验收结论</label>
                    <select id="filterConclusion">
                        <option value="">全部</option>
                        <option>合格</option>
                        <option>基本合格</option>
                        <option>不合格</option>
                        <option>待验收</option>
                    </select>
                </div>
                <div class="filter-item" style="flex:1; min-width:200px; max-width:300px;">
                    <input type="text" id="filterKeyword" placeholder="项目名称 / 委托单位">
                </div>
                <div class="filter-actions">
                    <button class="list-btn list-btn-primary" onclick="applyFilters()"><i class="fas fa-search"></i> 查询</button>
                    <button class="list-btn list-btn-outline" onclick="resetFilters()"><i class="fas fa-undo"></i> 重置</button>
                </div>
            </div>
        </div>

        <div class="chart-tabs">
            <button class="chart-tab" data-chart="list" onclick="switchChartTab('list')">
                <i class="fas fa-table icon" style="color: var(--primary);"></i> 业绩列表
            </button>
            <button class="chart-tab active" data-chart="trend" onclick="switchChartTab('trend')">
                <i class="fas fa-chart-line icon" style="color: var(--primary);"></i> 业绩增长趋势
            </button>
            <button class="chart-tab" data-chart="domain" onclick="switchChartTab('domain')">
                <i class="fas fa-chart-pie icon" style="color: var(--warning);"></i> 领域业绩分布
            </button>
            <button class="chart-tab" data-chart="client" onclick="switchChartTab('client')">
                <i class="fas fa-building icon" style="color: var(--success);"></i> 主要客户分布
            </button>
        </div>

        <div class="chart-panel" id="listPanel" style="display:none;">
            <table class="list-table" id="performanceTable">
                <thead>
                    <tr>
                        <th>项目名称</th>
                        <th>服务领域</th>
                        <th>服务类型</th>
                        <th>机构名称</th>
                        <th>委托单位</th>
                        <th>服务时间</th>
                        <th>合同金额</th>
                        <th>验收结论</th>
                        <th>审核状态</th>
                        <th style="text-align:center; width:120px;">操作</th>
                    </tr>
                </thead>
                <tbody id="performanceTableBody">
                </tbody>
            </table>
            <div class="list-pagination" id="pagination"></div>
        </div>

        <div class="chart-panel" id="chartPanel">
            <div class="chart-card">
                <div class="chart-body">
                    <div id="chartBox" class="chart-box tall"></div>
                </div>
            </div>
        </div>
    </div>
</div>

(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
        localStorage.setItem('theme', e.data.theme);
    }
});

    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();

    }
});

// 机构信息查询跳转
function getOrgWarehouseUrl(orgId) {
    var org = getOrgById(orgId);
    if (!org) return 'javascript:void(0)';
    return 'tp-warehouse.html?orgId=' + encodeURIComponent(org.orgId)
        + '&orgName=' + encodeURIComponent(org.orgName)
        + '&orgCode=' + encodeURIComponent(org.orgCode || '');
}

function getOrgNameById(orgId) {
    var org = getOrgById(orgId);
    return org ? org.orgName : '';
}

var currentOrgId = getTPUrlParam('orgId');
var allData = loadPerformanceData();
var filteredData = allData.slice();
var currentPage = 1;
var pageSize = 5;

// 当前待提交的证明材料（不上传服务器，以 Base64 缓存到 localStorage）
var pendingProofFiles = [];

var trendChart, domainChart, clientChart;
var currentChartTab = 'trend';

function loadPerformanceData() {
    var list = currentOrgId ? getPerformancesByOrg(currentOrgId) : getAllPerformances();
    if (Array.isArray(list) && list.length > 0) return list.slice();
    var defaults = generateData();
    if (currentOrgId) {
        defaults.forEach(function(item) { item.orgId = currentOrgId; });
    }
    localStorage.setItem('performanceData', JSON.stringify(defaults));
    return defaults.slice();
}

function savePerformanceData() {
    localStorage.setItem('performanceData', JSON.stringify(allData));
}

function getAuditListData() {
    var raw = localStorage.getItem('auditListData');
    if (raw) {
        try { return JSON.parse(raw); } catch (e) { return []; }
    }
    return [];
}

function saveAuditListData(list) {
    localStorage.setItem('auditListData', JSON.stringify(list));
}

function formatFileSize(bytes) {
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(2) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(2) + ' KB';
    return bytes + ' B';
}

function onProofFilesSelected(input) {
    if (!input.files || input.files.length === 0) return;
    Array.from(input.files).forEach(function(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            pendingProofFiles.push({
                name: file.name,
                size: file.size,
                type: file.type || 'application/octet-stream',
                data: e.target.result
            });
            renderPendingProofFiles();
        };
        reader.readAsDataURL(file);
    });
    input.value = '';
}

function renderPendingProofFiles() {
    var container = document.getElementById('proofFileList');
    if (!container) return;
    if (pendingProofFiles.length === 0) {
        container.innerHTML = '';
        return;
    }
    container.innerHTML = pendingProofFiles.map(function(file, idx) {
        return '<div class="file-list-item">' +
            '<span class="file-name"><i class="fas fa-paperclip" style="margin-right:6px;color:var(--primary);"></i>' + escapeHtml(file.name) + '</span>' +
            '<span class="file-size">' + formatFileSize(file.size) + '</span>' +
            '<span class="file-remove" onclick="removePendingProofFile(' + idx + ')"><i class="fas fa-times"></i> 删除</span>' +
            '</div>';
    }).join('');
}

function removePendingProofFile(idx) {
    pendingProofFiles.splice(idx, 1);
    renderPendingProofFiles();
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function parseStartMonth(time) {
    var parts = time.split('~');
    var start = parts[0] ? parts[0].trim() : '';
    if (/^\d{4}-\d{2}$/.test(start)) return start;
    if (/^\d{4}-\d{2}-\d{2}$/.test(start)) return start.substring(0, 7);
    return '2026-01';
}

function initCharts() {
    trendChart = echarts.init(document.getElementById('chartBox'));
    domainChart = null;
    clientChart = null;
    window.addEventListener('resize', function() {
        if (trendChart) trendChart.resize();
    });
}

function switchChartTab(tab) {
    currentChartTab = tab;
    document.querySelectorAll('.chart-tab').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-chart') === tab);
    });
    document.getElementById('listPanel').style.display = (tab === 'list') ? 'block' : 'none';
    document.getElementById('chartPanel').style.display = (tab !== 'list') ? 'block' : 'none';
    if (tab === 'list') {
        if (trendChart) { trendChart.dispose(); trendChart = null; }
        renderTable();
        return;
    }
    var box = document.getElementById('chartBox');
    if (trendChart) { trendChart.dispose(); trendChart = null; }
    var chart = echarts.init(box);
    trendChart = chart;
    if (tab === 'trend') {
        updateTrendChart();
    } else if (tab === 'domain') {
        updateDomainChart();
    } else if (tab === 'client') {
        updateClientChart();
    }
    setTimeout(function() { chart.resize(); }, 0);
}

function getChartThemeColors() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    return {
        text: isDark ? '#e2e8f0' : '#202124',
        axis: isDark ? '#1e3a5f' : '#dadce0',
        split: isDark ? '#1e3a5f' : '#e8eaed'
    };
}

function updateStats() {
    var total = filteredData.length;
    var amount = filteredData.reduce(function(s, item) { return s + item.amount; }, 0);
    var passCount = filteredData.filter(function(item) { return item.conclusion === '合格'; }).length;
    var passRate = total > 0 ? (passCount / total * 100).toFixed(1) : 0;

    var currentPeriod = filteredData.filter(function(item) { return item.startMonth >= '2026-01'; });
    var previousPeriod = filteredData.filter(function(item) { return item.startMonth >= '2025-07' && item.startMonth <= '2025-12'; });
    var currentAmount = currentPeriod.reduce(function(s, item) { return s + item.amount; }, 0);
    var previousAmount = previousPeriod.reduce(function(s, item) { return s + item.amount; }, 0);
    var growth = previousAmount > 0 ? ((currentAmount - previousAmount) / previousAmount * 100).toFixed(1) : 0;

    document.getElementById('statTotal').textContent = total;
    document.getElementById('statAmount').textContent = amount.toFixed(1);
    document.getElementById('statPassRate').textContent = passRate + '%';
    document.getElementById('statGrowth').textContent = (growth >= 0 ? '+' : '') + growth + '%';
    var trendEl = document.getElementById('statGrowthTrend');
    if (growth >= 0) {
        trendEl.className = 'stat-trend up';
        trendEl.innerHTML = '<i class="fas fa-arrow-up"></i> 较上期增长';
    } else {
        trendEl.className = 'stat-trend down';
        trendEl.innerHTML = '<i class="fas fa-arrow-down"></i> 较上期下降';
    }
}

function updateTrendChart() {
    if (!trendChart || currentChartTab !== 'trend') return;
    var monthMap = {};
    filteredData.forEach(function(item) {
        var m = item.startMonth;
        if (!monthMap[m]) monthMap[m] = 0;
        monthMap[m] += item.amount;
    });
    var months = Object.keys(monthMap).sort();
    var values = months.map(function(m) { return monthMap[m].toFixed(1); });
    var colors = getChartThemeColors();

    trendChart.setOption({
        tooltip: { trigger: 'axis' },
        grid: { left: '3%', right: '4%', bottom: '3%', containLabel: true },
        xAxis: { type: 'category', data: months, axisLine: { lineStyle: { color: colors.axis } }, axisLabel: { color: colors.text } },
        yAxis: { type: 'value', splitLine: { lineStyle: { color: colors.split } }, axisLabel: { color: colors.text } },
        series: [{
            data: values,
            type: 'line',
            smooth: true,
            areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: 'rgba(26,115,232,0.3)'}, {offset: 1, color: 'rgba(26,115,232,0.05)'}]) },
            lineStyle: { color: 'var(--primary)', width: 3 },
            itemStyle: { color: 'var(--primary)' }
        }]
    }, true);
}

function updateDomainChart() {
    if (!trendChart || currentChartTab !== 'domain') return;
    var domainMap = {};
    filteredData.forEach(function(item) {
        if (!domainMap[item.domain]) domainMap[item.domain] = 0;
        domainMap[item.domain] += item.amount;
    });
    var data = Object.keys(domainMap).map(function(k) { return { value: domainMap[k].toFixed(1), name: k }; });
    var colors = getChartThemeColors();

    trendChart.setOption({
        tooltip: { trigger: 'item', formatter: '{b}: {c}万元 ({d}%)' },
        legend: { bottom: 0, textStyle: { color: colors.text, fontSize: 11 } },
        series: [{
            type: 'pie',
            radius: ['40%', '70%'],
            center: ['50%', '45%'],
            data: data,
            label: { show: true, color: colors.text, fontSize: 11 },
            itemStyle: { borderRadius: 6, borderColor: colors.axis, borderWidth: 1 }
        }]
    }, true);
}

function updateClientChart() {
    if (!trendChart || currentChartTab !== 'client') return;
    var clientMap = {};
    filteredData.forEach(function(item) {
        if (!clientMap[item.client]) clientMap[item.client] = 0;
        clientMap[item.client] += item.amount;
    });
    var sorted = Object.keys(clientMap).sort(function(a, b) { return clientMap[b] - clientMap[a]; }).slice(0, 10);
    var data = sorted.map(function(c) { return clientMap[c].toFixed(1); });
    var colors = getChartThemeColors();

    trendChart.setOption({
        tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
        grid: { left: '3%', right: '8%', bottom: '3%', containLabel: true },
        xAxis: { type: 'value', splitLine: { lineStyle: { color: colors.split } }, axisLabel: { color: colors.text } },
        yAxis: { type: 'category', data: sorted, axisLine: { lineStyle: { color: colors.axis } }, axisLabel: { color: colors.text } },
        series: [{
            data: data,
            type: 'bar',
            itemStyle: { color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [{offset: 0, color: '#60a5fa'}, {offset: 1, color: '#2563eb'}]), borderRadius: [0, 4, 4, 0] },
            label: { show: true, position: 'right', color: colors.text, fontSize: 11 }
        }]
    }, true);
}

function renderTable() {
    var tbody = document.getElementById('performanceTableBody');
    tbody.innerHTML = '';
    var start = (currentPage - 1) * pageSize;
    var end = start + pageSize;
    var pageData = filteredData.slice(start, end);
    if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--text-secondary);padding:24px;">暂无符合条件的数据</td></tr>';
        renderPagination(0);
        return;
    }
    pageData.forEach(function(item) {
        var tr = document.createElement('tr');
        var statusClass = getAuditStatusClass(item.auditStatus);
        var conclusionClass = getConclusionClass(item.conclusion);
        var orgName = item.orgId ? getOrgNameById(item.orgId) : getOrgName();
        var actionLinks = '<a class="table-link" onclick="openPerformanceDetail(' + item.id + ')">查看</a>' +
            '<a class="table-link" onclick="editPerformance(' + item.id + ')">编辑</a>';
        tr.innerHTML =
            '<td>' + escapeHtml(item.projectName) + '</td>' +
            '<td><span class="status-tag primary">' + escapeHtml(item.domain) + '</span></td>' +
            '<td>' + escapeHtml(item.serviceType) + '</td>' +
            '<td>' + (item.orgId ? '<a href="' + getOrgWarehouseUrl(item.orgId) + '" class="table-link" onclick="event.stopPropagation();">' + escapeHtml(orgName) + '</a>' : escapeHtml(orgName)) + '</td>' +
            '<td>' + escapeHtml(item.client) + '</td>' +
            '<td>' + escapeHtml(item.serviceTime) + '</td>' +
            '<td style="font-weight: 600; color: var(--primary);">' + item.amount.toFixed(1) + ' 万</td>' +
            '<td><span class="status-tag ' + conclusionClass + '">' + escapeHtml(item.conclusion) + '</span></td>' +
            '<td><span class="status-tag ' + statusClass + '">' + escapeHtml(item.auditStatus || '待审核') + '</span></td>' +
            '<td style="text-align:center;">' + actionLinks + '</td>';
        tbody.appendChild(tr);
    });
    renderPagination(Math.ceil(filteredData.length / pageSize) || 1);
}

function getConclusionClass(conclusion) {
    if (conclusion === '合格') return 'success';
    if (conclusion === '基本合格') return 'warning';
    if (conclusion === '不合格') return 'danger';
    return 'info';
}

function getAuditStatusClass(status) {
    if (status === '已通过') return 'success';
    if (status === '已退回') return 'danger';
    if (status === '待审核') return 'warning';
    return 'grey';
}

function viewProofFiles(id) {
    var item = allData.find(function(i) { return i.id === id; });
    if (!item || !item.proofFiles || item.proofFiles.length === 0) {
        alert('暂无证明材料');
        return;
    }
    var html = item.proofFiles.map(function(f, idx) {
        return '<div style="margin-bottom:10px;">' +
            '<a href="' + f.data + '" target="_blank" download="' + escapeHtml(f.name) + '" style="color:var(--primary);">' +
            '<i class="fas fa-download"></i> ' + escapeHtml(f.name) + ' (' + formatFileSize(f.size) + ')' +
            '</a></div>';
    }).join('');
    openModal('证明材料：' + escapeHtml(item.projectName), html);
}

function deletePerformance(id) {
    if (!confirm('确定删除该条业绩记录？')) return;
    var idx = allData.findIndex(function(i) { return i.id === id; });
    if (idx >= 0) {
        allData.splice(idx, 1);
        savePerformanceData();
        applyFilters();
    }
}

function closeIframeModal() {

    modal.innerHTML = '<div class="modal-box">' +
        '<div class="modal-header"><span>' + escapeHtml(title) + '</span><span class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">&times;</span></div>' +
        '<div class="modal-body">' + content + '</div>' +
        '</div>';
    document.body.appendChild(modal);
    modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove(); });
}

function renderPagination(totalPages) {
    var container = document.getElementById('pagination');
    if (!container) return;
    var maxVisible = 3;
    var startPage = Math.max(1, Math.min(currentPage - Math.floor(maxVisible / 2), totalPages - maxVisible + 1));
    if (startPage < 1) startPage = 1;
    var endPage = Math.min(totalPages, startPage + maxVisible - 1);
    var html = '<span class="page-info">共 ' + filteredData.length + ' 条</span>';
    html += '<button class="page-btn" ' + (currentPage === 1 || totalPages === 0 ? 'disabled' : '') + ' onclick="goPerformancePage(' + (currentPage - 1) + ')">上一页</button>';
    if (startPage > 1) {
        html += '<button class="page-btn" onclick="goPerformancePage(1)">1</button>';
        if (startPage > 2) html += '<span class="page-ellipsis">...</span>';
    }
    for (var i = startPage; i <= endPage; i++) {
        html += '<button class="page-btn ' + (i === currentPage ? 'active' : '') + '" onclick="goPerformancePage(' + i + ')" ' + (i === currentPage ? 'disabled' : '') + '>' + i + '</button>';
    }
    if (endPage < totalPages) {
        if (endPage < totalPages) html += '<span class="page-ellipsis">...</span>';
        html += '<button class="page-btn" onclick="goPerformancePage(' + totalPages + ')">' + totalPages + '</button>';
    }
    html += '<button class="page-btn" ' + (currentPage === totalPages || totalPages === 0 ? 'disabled' : '') + ' onclick="goPerformancePage(' + (currentPage + 1) + ')">下一页</button>';
    html += '<span class="page-jump">到第 <input type="number" id="pageJumpInput" min="1" max="' + totalPages + '" onkeydown="if(event.key===\'Enter\'){jumpToPage()}""> 页 <button class="page-btn" onclick="jumpToPage()">跳转</button></span>';
    container.innerHTML = html;
}

function jumpToPage() {
    var input = document.getElementById('pageJumpInput');
    if (!input) return;
    var page = parseInt(input.value, 10);
    var totalPages = Math.ceil(filteredData.length / pageSize) || 1;
    if (isNaN(page) || page < 1 || page > totalPages) {
        alert('请输入 1 ~ ' + totalPages + ' 之间的页码');
        return;
    }
    goPerformancePage(page);
}

function goPerformancePage(page) {
    var totalPages = Math.ceil(filteredData.length / pageSize) || 1;
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTable();
}

function applyFilters() {
    var domain = document.getElementById('filterDomain').value;
    var type = document.getElementById('filterServiceType').value;
    var timeRange = document.getElementById('filterTimeRange').value;
    var amountRange = document.getElementById('filterAmountRange').value;
    var conclusion = document.getElementById('filterConclusion').value;
    var keyword = document.getElementById('filterKeyword').value.trim().toLowerCase();

    filteredData = allData.filter(function(item) {
        if (domain && item.domain !== domain) return false;
        if (type && item.serviceType !== type) return false;
        if (conclusion && item.conclusion !== conclusion) return false;
        if (keyword && item.projectName.toLowerCase().indexOf(keyword) === -1 && item.client.toLowerCase().indexOf(keyword) === -1) return false;
        if (timeRange) {
            if (timeRange === '2026' && !item.startMonth.startsWith('2026')) return false;
            if (timeRange === '2025' && !item.startMonth.startsWith('2025')) return false;
            if (timeRange === 'last6' && item.startMonth < '2026-01') return false;
            if (timeRange === 'last3' && item.startMonth < '2026-04') return false;
        }
        if (amountRange) {
            if (amountRange === '0-50' && item.amount >= 50) return false;
            if (amountRange === '50-100' && (item.amount < 50 || item.amount > 100)) return false;
            if (amountRange === '100-200' && (item.amount < 100 || item.amount > 200)) return false;
            if (amountRange === '200+' && item.amount < 200) return false;
        }
        return true;
    });

    currentPage = 1;
    updateAll();
}

function resetFilters() {
    document.getElementById('filterDomain').value = '';
    document.getElementById('filterServiceType').value = '';
    document.getElementById('filterTimeRange').value = '';
    document.getElementById('filterAmountRange').value = '';
    document.getElementById('filterConclusion').value = '';
    document.getElementById('filterKeyword').value = '';
    filteredData = allData.slice();
    currentPage = 1;
    updateAll();
}

function changePage(delta) {
    var totalPages = Math.ceil(filteredData.length / pageSize) || 1;
    var newPage = currentPage + delta;
    if (newPage < 1 || newPage > totalPages) return;
    currentPage = newPage;
    renderTable();
}

function goPerformancePage(page) {
    var totalPages = Math.ceil(filteredData.length / pageSize) || 1;
    if (page < 1 || page > totalPages) return;
    currentPage = page;
    renderTable();
}

function updateAll() {
    updateStats();
    if (currentChartTab === 'list') {
        renderTable();
    } else {
        switchChartTab(currentChartTab);
    }
}

function loadOrgInfo() {
    var raw = localStorage.getItem('orgInfo');
    if (raw) {
        try {
            var info = JSON.parse(raw);
            if (info.name) document.getElementById('inputOrgName').value = info.name;
            if (info.code) document.getElementById('inputOrgCode').value = info.code;
            if (info.level) document.getElementById('inputOrgLevel').value = info.level;
            if (info.phone) document.getElementById('inputOrgPhone').value = info.phone;
        } catch (e) {}
    }
}

function saveOrgInfo() {
    var info = {
        name: document.getElementById('inputOrgName').value.trim(),
        code: document.getElementById('inputOrgCode').value.trim(),
        level: document.getElementById('inputOrgLevel').value.trim(),
        phone: document.getElementById('inputOrgPhone').value.trim()
    };
    if (!info.name) {
        alert('机构名称不能为空');
        return;
    }
    localStorage.setItem('orgInfo', JSON.stringify(info));
    alert('机构信息已保存');
    renderTable();
}

function getOrgName() {
    if (currentOrgId) {
        var org = getOrgById(currentOrgId);
        if (org) return org.orgName;
    }
    var raw = localStorage.getItem('orgInfo');
    if (raw) {
        try { var info = JSON.parse(raw); if (info.name) return info.name; } catch (e) {}
    }
    return '上海建科咨询有限公司';
}

function submitPerformance() {
    var projectName = document.getElementById('inputProjectName').value.trim();
    var client = document.getElementById('inputClient').value.trim();
    var domain = document.getElementById('inputDomain').value;
    var type = document.getElementById('inputServiceType').value;
    var time = document.getElementById('inputServiceTime').value.trim();
    var amount = parseFloat(document.getElementById('inputAmount').value) || 0;
    var conclusion = document.getElementById('inputConclusion').value;
    var deliverable = document.getElementById('inputDeliverable').value.trim();
    var desc = document.getElementById('inputDesc').value.trim();

    if (!projectName || !client) {
        alert('请填写项目名称和委托单位');
        return;
    }
    if (!deliverable) {
        alert('请填写交付物');
        return;
    }
    if (pendingProofFiles.length === 0) {
        alert('请至少上传一份证明材料');
        return;
    }

    var startMonth = parseStartMonth(time);
    var now = new Date();
    var submitTime = now.getFullYear() + '-' + ('0' + (now.getMonth() + 1)).slice(-2) + '-' + ('0' + now.getDate()).slice(-2) + ' ' +
        ('0' + now.getHours()).slice(-2) + ':' + ('0' + now.getMinutes()).slice(-2) + ':' + ('0' + now.getSeconds()).slice(-2);

    var record = {
        id: Date.now(),
        projectName: projectName,
        domain: domain,
        serviceType: type,
        client: client,
        serviceTime: time,
        startMonth: startMonth,
        amount: amount,
        conclusion: conclusion,
        deliverable: deliverable,
        description: desc,
        auditStatus: '待审核',
        proofFiles: pendingProofFiles.slice(),
        submitTime: submitTime,
        source: 'self'
    };

    allData.unshift(record);
    savePerformanceData();

    // 同步写入审核中心数据池
    var auditList = getAuditListData();
    auditList.unshift({
        id: record.id,
        type: '业绩材料',
        name: projectName,
        org: client,
        submitTime: submitTime,
        status: '待审核',
        source: '自助录入',
        attachments: record.proofFiles.length
    });
    saveAuditListData(auditList);

    // 清空表单与暂存文件
    pendingProofFiles = [];
    renderPendingProofFiles();
    document.getElementById('inputProjectName').value = '';
    document.getElementById('inputClient').value = '';
    document.getElementById('inputAmount').value = '';
    document.getElementById('inputServiceTime').value = '';
    document.getElementById('inputDeliverable').value = '';
    document.getElementById('inputDesc').value = '';
    document.getElementById('fileInput').value = '';
    document.getElementById('fileName').textContent = '支持多选，建议选择合同、报告、验收单等扫描件';

    applyFilters();
    alert('业绩数据已提交，进入审核中心等待审核。');
}

function exportPerformance() {
    if (filteredData.length === 0) {
        alert('没有可导出的数据');
        return;
    }
    localStorage.setItem('performanceExportData', JSON.stringify(filteredData));
    openIframeModal('tp-performance-export.html', '导出业绩证明预览', '1024px', '90vh');
}

// 初始化
document.addEventListener('DOMContentLoaded', function() {
    loadOrgInfo();
    initCharts();
    updateAll();
});
</script>
