<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考核评估标准配置</title>
    <link rel="stylesheet" href="./all.min.css">
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --primary-light: #e8f0fe;
            --secondary: #0097a7;
            --danger: #d93025;
            --warning: #e37400;
            --success: #1e8e3e;
            --bg-dark: #f0f2f5;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --bg-hover: #e8eaed;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --border: #dadce0;
            --shadow: rgba(0,0,0,0.08);
            --radius: 8px;
        }
        :root[data-theme="dark"] {
            --primary: #1e6fdb;
            --primary-dark: #1557b0;
            --primary-light: #e8f1fd;
            --secondary: #00b4d8;
            --danger: #ef4444;
            --warning: #f59e0b;
            --success: #10b981;
            --bg-dark: #0a1628;
            --bg-header: #0d1b2a;
            --bg-card: #112240;
            --bg-hover: #1a2f4a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --border: #1e3a5f;
            --shadow: rgba(0,0,0,0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* 顶部操作栏 */
        .top-bar {
            height: 56px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn {
            padding: 8px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn:hover {
            background: var(--bg-hover);
            border-color: var(--primary);
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        .btn-success {
            background: var(--success);
            color: #fff;
            border-color: var(--success);
        }
        .btn-success:hover {
            opacity: 0.9;
        }
        .version-tag {
            padding: 4px 12px;
            background: rgba(30, 111, 219, 0.1);
            border: 1px solid rgba(30, 111, 219, 0.2);
            border-radius: 16px;
            font-size: 12px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .version-tag .dot {
            width: 6px; height: 6px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* 主体区域 */
        .main-container {
            display: flex;
            height: calc(100vh - 56px);
            overflow: hidden;
        }

        /* 左侧指标树 */
        .tree-panel {
            width: 320px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .tree-header {
            padding: 16px 16px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .tree-search {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }
        .tree-search input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }
        .tree-search input:focus {
            border-color: var(--primary);
        }
        .tree-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .tree-content::-webkit-scrollbar { width: 4px; }
        .tree-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* 树节点 */
        .tree-node {
            user-select: none;
        }
        .tree-node-content {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.2s;
            gap: 6px;
            font-size: 13px;
        }
        .tree-node-content:hover {
            background: var(--bg-hover);
        }
        .tree-node-content.active {
            background: rgba(30, 111, 219, 0.12);
            color: var(--primary);
            border-left: 3px solid var(--primary);
        }
        .tree-toggle {
            width: 16px; height: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
            color: var(--text-secondary);
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .tree-toggle.expanded {
            transform: rotate(90deg);
        }
        .tree-toggle.leaf {
            visibility: hidden;
        }
        .tree-icon {
            width: 18px; text-align: center;
            font-size: 13px;
            flex-shrink: 0;
        }
        .tree-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tree-badge {
            padding: 1px 6px;
            background: rgba(30, 111, 219, 0.1);
            border-radius: 10px;
            font-size: 11px;
            color: var(--primary);
            flex-shrink: 0;
        }
        .tree-children {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .tree-children.open {
            max-height: 2000px;
        }
        .tree-children .tree-node-content {
            padding-left: 36px;
        }
        .tree-children .tree-children .tree-node-content {
            padding-left: 56px;
        }
        .status-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .status-dot.enabled { background: var(--success); }
        .status-dot.disabled { background: var(--danger); }

        /* 右侧配置面板 */
        .config-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-dark);
        }
        .config-header {
            padding: 16px 24px;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .config-header h2 {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .config-header .subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .config-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }
        .config-content::-webkit-scrollbar { width: 6px; }
        .config-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* 表单卡片 */
        .form-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            margin-bottom: 16px;
            overflow: hidden;
        }
        .form-card-header {
            padding: 12px 20px;
            background: rgba(30, 111, 219, 0.04);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-card-body {
            padding: 20px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        .form-row:last-child {
            margin-bottom: 0;
        }
        .form-group {
            flex: 1;
        }
        .form-group.half {
            flex: 0 0 calc(50% - 10px);
        }
        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group label .required {
            color: var(--danger);
            margin-right: 2px;
        }
        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-control:focus {
            border-color: var(--primary);
        }
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
            font-family: 'Consolas', 'Monaco', monospace;
            line-height: 1.5;
        }
        .radio-group {
            display: flex;
            gap: 16px;
            padding: 6px 0;
        }
        .radio-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
        }
        .radio-item input[type="radio"] {
            accent-color: var(--primary);
        }
        .toggle-group {
            display: flex;
            gap: 12px;
            padding: 4px 0;
        }
        .toggle-item {
            padding: 6px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .toggle-item.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .toggle-item:not(.active):hover {
            background: var(--bg-hover);
        }

        /* 提示信息 */
        .hint-box {
            padding: 12px 16px;
            background: rgba(30, 111, 219, 0.06);
            border-left: 3px solid var(--primary);
            border-radius: 0 var(--radius) var(--radius) 0;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-top: 12px;
        }
        .hint-box .hint-icon {
            color: var(--primary);
            margin-right: 4px;
        }

        /* 权重矩阵 */
        .weight-matrix {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .weight-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-dark);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .weight-row .dept-select {
            flex: 1;
        }
        .weight-row .dept-select select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
        }
        .weight-row .weight-input {
            width: 100px;
        }
        .weight-row .weight-input input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            text-align: center;
            outline: none;
        }
        .weight-row .weight-desc {
            flex: 1;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .weight-row .weight-desc .tag {
            display: inline-block;
            padding: 2px 8px;
            background: rgba(30, 111, 219, 0.1);
            border-radius: 4px;
            font-size: 11px;
            color: var(--primary);
            margin-left: 8px;
        }

        /* 底部操作栏 */
        .config-footer {
            padding: 16px 24px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* 空状态 */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            gap: 12px;
        }
        .empty-state i {
            font-size: 48px;
            opacity: 0.3;
        }
        .empty-state p {
            font-size: 14px;
        }

        /* 历史版本弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: var(--bg-card);
            border-radius: 12px;
            width: 800px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .modal-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
        }
        .modal-close {
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: var(--bg-hover);
            color: var(--danger);
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }
        .version-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .version-item {
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
        }
        .version-item:hover {
            border-color: var(--primary);
            background: rgba(30, 111, 219, 0.02);
        }
        .version-item.current {
            border-color: var(--success);
            background: rgba(30, 142, 62, 0.04);
        }
        .version-badge {
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            background: var(--primary-light);
            color: var(--primary);
            flex-shrink: 0;
        }
        .version-badge.current {
            background: rgba(30, 142, 62, 0.1);
            color: var(--success);
        }
        .version-info {
            flex: 1;
        }
        .version-info .version-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .version-info .version-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }
        .version-actions {
            display: flex;
            gap: 8px;
        }
        .version-actions .btn {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* 对比视图 */
        .diff-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 16px;
        }
        .diff-panel {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        .diff-panel-header {
            padding: 10px 16px;
            background: var(--bg-hover);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .diff-panel-body {
            padding: 16px;
            font-size: 13px;
            line-height: 1.8;
        }
        .diff-added {
            background: rgba(30, 142, 62, 0.1);
            color: var(--success);
            padding: 2px 4px;
            border-radius: 3px;
        }
        .diff-removed {
            background: rgba(217, 48, 37, 0.1);
            color: var(--danger);
            padding: 2px 4px;
            border-radius: 3px;
            text-decoration: line-through;
        }
    </style>
</head>
<body>
    <!-- 顶部操作栏 -->
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="btn btn-primary" onclick="showAddIndicatorModal()">
                <i class="fas fa-plus"></i> 新增指标
            </button>
            <button class="btn" onclick="showVersionModal()">
                <i class="fas fa-history"></i> 历史版本对比
            </button>
            <button class="btn" onclick="exportPDF()">
                <i class="fas fa-file-pdf"></i> 导出当前标准PDF
            </button>
        </div>
        <div class="version-tag">
            <span class="dot"></span>
            当前生效版本: V2026_Rev3 (2026-04-01发布)
        </div>
    </div>

    <!-- 主体区域 -->
    <div class="main-container">
        <!-- 左侧指标树 -->
        <div class="tree-panel">
            <div class="tree-header">
                <i class="fas fa-folder-open" style="color: var(--primary);"></i>
                指标体系树
            </div>
            <div class="tree-search">
                <input type="text" placeholder="搜索指标名称、编码..." id="treeSearch" oninput="filterTree()">
            </div>
            <div class="tree-content" id="indicatorTree"></div>
        </div>

        <!-- 右侧配置面板 -->
        <div class="config-panel">
            <div class="config-header" id="configHeader">
                <div>
                    <h2><i class="fas fa-cogs" style="color: var(--primary);"></i> 指标详情配置</h2>
                    <div class="subtitle">请在左侧选择要配置的指标</div>
                </div>
            </div>
            <div class="config-content" id="configContent">
                <div class="empty-state">
                    <i class="fas fa-mouse-pointer"></i>
                    <p>请在左侧指标体系树中选择一个指标进行配置</p>
                </div>
            </div>
            <div class="config-footer" id="configFooter" style="display: none;">
                <button class="btn" onclick="resetForm()">放弃修改</button>
                <button class="btn btn-success" onclick="saveConfig()">
                    <i class="fas fa-save"></i> 保存当前指标配置
                </button>
            </div>
        </div>
    </div>

    <!-- 历史版本弹窗 -->
    <div class="modal-overlay" id="versionModal">
        <div class="modal">
            <div class="modal-header">
                <h3><i class="fas fa-code-branch" style="color: var(--primary);"></i> 历史版本对比</h3>
                <div class="modal-close" onclick="closeVersionModal()">
                    <i class="fas fa-times"></i>
                </div>
            </div>
            <div class="modal-body">
                <div class="version-list" id="versionList"></div>
            </div>
        </div>
    </div>

    <script>
        // ========== 指标体系数据 ==========
        const indicatorData = [
            {
                id: 'dim-risk-identify',
                label: '风险识别维度',
                icon: 'fa-shield-alt',
                type: 'dimension',
                children: [
                    { id: 'M_RPT_COUNT', label: '风险上报数量', type: 'indicator', status: 'enabled', desc: '月度/季度风险上报数量统计' },
                    { id: 'M_RPT_ACCURACY', label: '风险识别准确率', type: 'indicator', status: 'enabled', desc: '审核通过率' },
                    { id: 'M_RPT_COVERAGE', label: '风险类型覆盖率', type: 'indicator', status: 'enabled', desc: '已覆盖风险类型占比' },
                    { id: 'M_RPT_NEWFIND', label: '新发风险发现率', type: 'indicator', status: 'enabled', desc: '新发现风险事件比例' }
                ]
            },
            {
                id: 'dim-risk-assess',
                label: '风险评估维度',
                icon: 'fa-clipboard-check',
                type: 'dimension',
                children: [
                    { id: 'M_ASS_TIMELY', label: '风险评估及时率', type: 'indicator', status: 'enabled', desc: '按时完成评估的比例' },
                    { id: 'M_ASS_ACCURACY', label: '风险评估准确率', type: 'indicator', status: 'enabled', desc: '评估等级与复核一致率' },
                    { id: 'M_ASS_STANDARD', label: '风险定级规范性', type: 'indicator', status: 'enabled', desc: '定级流程规范执行情况' }
                ]
            },
            {
                id: 'dim-risk-dispatch',
                label: '风险处置维度',
                icon: 'fa-bolt',
                type: 'dimension',
                expanded: true,
                children: [
                    { id: 'M_DISP_RECEIVE', label: '任务接收及时率', type: 'indicator', status: 'enabled', desc: '处置任务按时接收比例' },
                    { id: 'M_DISP_COMPLETE', label: '处置完成及时率', type: 'indicator', status: 'enabled', desc: '按时完成处置任务比例' },
                    { id: 'M_DISP_QUALIFIED', label: '处置合格率', type: 'indicator', status: 'enabled', desc: '验收通过率' },
                    { id: 'M_DISP_CLOSED', label: '处置闭环率', type: 'indicator', status: 'enabled', desc: '完成闭环处置比例' },
                    { id: 'M_DISP_TIMEOUT_COUNT', label: '超期未处置事件数', type: 'indicator', status: 'enabled', desc: '超期未处置事件统计' }
                ]
            },
            {
                id: 'dim-hidden-danger',
                label: '隐患整改维度',
                icon: 'fa-wrench',
                type: 'dimension',
                children: [
                    { id: 'M_RECT_RATE', label: '整改完成率', type: 'indicator', status: 'enabled', desc: '已完成整改隐患占比' },
                    { id: 'M_RECT_TIMELY', label: '整改及时率', type: 'indicator', status: 'enabled', desc: '按时完成整改比例' },
                    { id: 'M_RECT_EFFECTIVE', label: '整改有效率', type: 'indicator', status: 'enabled', desc: '复查合格率' },
                    { id: 'M_RECT_RECUR', label: '复发率', type: 'indicator', status: 'enabled', desc: '同一隐患再次出现比例' }
                ]
            },
            {
                id: 'dim-mechanism',
                label: '机制建设维度',
                icon: 'fa-landmark',
                type: 'dimension',
                children: [
                    { id: 'M_MEC_DOC', label: '制度完善程度', type: 'indicator', status: 'enabled', desc: '文件数及更新率' },
                    { id: 'M_MEC_PROCESS', label: '流程执行规范性', type: 'indicator', status: 'enabled', desc: '节点执行率' },
                    { id: 'M_MEC_TRAIN', label: '培训开展情况', type: 'indicator', status: 'enabled', desc: '培训覆盖率与频次' },
                    { id: 'M_MEC_DRILL', label: '应急演练情况', type: 'indicator', status: 'enabled', desc: '演练参与度' }
                ]
            },
            {
                id: 'dim-personnel',
                label: '人员执行维度',
                icon: 'fa-user-check',
                type: 'dimension',
                children: [
                    { id: 'M_PER_TASK', label: '巡查任务完成率', type: 'indicator', status: 'enabled', desc: '计划巡查任务完成比例' },
                    { id: 'M_PER_FIND', label: '巡查问题发现率', type: 'indicator', status: 'enabled', desc: '巡查发现问题比例' },
                    { id: 'M_PER_RECORD', label: '巡查记录规范性', type: 'indicator', status: 'enabled', desc: '记录填写规范程度' },
                    { id: 'M_PER_MOBILE', label: '移动端使用率', type: 'indicator', status: 'enabled', desc: '移动巡查系统使用比例' }
                ]
            }
        ];

        // 指标配置模板数据
        const indicatorConfigs = {
            'M_DISP_TIMEOUT_COUNT': {
                code: 'M_DISP_TIMEOUT_COUNT',
                name: '超期未处置事件数量',
                cycle: 'monthly',
                status: 'enabled',
                targetValue: '0',
                targetUnit: 'number',
                targetOperator: '<=',
                targetDesc: '超期未处置事件数量越少越好，目标为0起',
                dataSource: "SELECT COUNT(1) FROM dw_risk_event WHERE status = 'timeout' AND dept_id = :dept_id",
                formula: 'Score = Max(0, 10 - ActualValue * 2)',
                description: '初始满分10分，每发生1起超期未处置事件扣2分，扣完为止。',
                weights: [
                    { dept: 'business', weight: '0.30', desc: '侧重结果与处置时效' },
                    { dept: 'street', weight: '0.20', desc: '侧重属地巡查与配合' },
                    { dept: 'function', weight: '0.05', desc: '侧重机制与制度建设' }
                ]
            }
        };

        // 版本历史数据
        const versionHistory = [
            { id: 'V2026_Rev3', title: 'V2026_Rev3', date: '2026-04-01', author: '张管理员', status: 'current', changes: '新增"人员执行维度"，调整风险处置权重系数' },
            { id: 'V2026_Rev2', title: 'V2026_Rev2', date: '2026-02-15', author: '李管理员', status: 'archived', changes: '优化隐患整改指标计算公式，增加复发率指标' },
            { id: 'V2025_Rev1', title: 'V2025_Rev1', date: '2025-12-01', author: '王管理员', status: 'archived', changes: '初始版本，建立六大维度指标体系' }
        ];

        let currentIndicator = null;

        // ========== 初始化 ==========
        function init() {
            renderTree();
            // 默认选中第一个叶子节点
            const firstLeaf = findFirstLeaf(indicatorData);
            if (firstLeaf) {
                selectIndicator(firstLeaf.id);
            }
        }

        function findFirstLeaf(nodes) {
            for (const node of nodes) {
                if (node.children && node.children.length > 0) {
                    const leaf = findFirstLeaf(node.children);
                    if (leaf) return leaf;
                } else {
                    return node;
                }
            }
            return null;
        }

        // ========== 渲染树 ==========
        function renderTree() {
            const container = document.getElementById('indicatorTree');
            container.innerHTML = indicatorData.map(node => renderTreeNode(node)).join('');
        }

        function renderTreeNode(node, level = 0) {
            const hasChildren = node.children && node.children.length > 0;
            const isExpanded = node.expanded || false;
            const paddingLeft = level === 0 ? 16 : (level === 1 ? 36 : 56);

            let html = `
                <div class="tree-node">
                    <div class="tree-node-content ${currentIndicator === node.id ? 'active' : ''}"
                         style="padding-left: ${paddingLeft}px"
                         onclick="handleNodeClick('${node.id}', ${hasChildren}, event)">
                        <span class="tree-toggle ${hasChildren ? '' : 'leaf'} ${isExpanded ? 'expanded' : ''}"
                              onclick="toggleNode('${node.id}', event)">
                            <i class="fas fa-chevron-right"></i>
                        </span>
                        <span class="tree-icon"><i class="fas ${node.icon || 'fa-circle'}" style="font-size: ${hasChildren ? '14px' : '8px'};"></i></span>
                        <span class="tree-label">${node.label}</span>
                        ${node.type === 'indicator' ? `<span class="status-dot ${node.status}"></span>` : ''}
                        ${hasChildren ? `<span class="tree-badge">${node.children.length}</span>` : ''}
                    </div>
            `;

            if (hasChildren) {
                html += `
                    <div class="tree-children ${isExpanded ? 'open' : ''}" id="tree-children-${node.id}">
                        ${node.children.map(child => renderTreeNode(child, level + 1)).join('')}
                    </div>
                `;
            }

            html += '</div>';
            return html;
        }

        function handleNodeClick(id, hasChildren, event) {
            event.stopPropagation();
            if (!hasChildren) {
                selectIndicator(id);
            } else {
                toggleNode(id, event);
            }
        }

        function toggleNode(id, event) {
            event.stopPropagation();
            const childrenEl = document.getElementById('tree-children-' + id);
            const toggleEl = event.target.closest('.tree-toggle');
            if (childrenEl) {
                childrenEl.classList.toggle('open');
                if (toggleEl) toggleEl.classList.toggle('expanded');
            }
        }

        function selectIndicator(id) {
            currentIndicator = id;
            document.querySelectorAll('.tree-node-content').forEach(el => el.classList.remove('active'));
            const activeEl = document.querySelector(`.tree-node-content[onclick*="'${id}'"]`);
            if (activeEl) activeEl.classList.add('active');

            const config = indicatorConfigs[id] || generateDefaultConfig(id);
            renderConfigPanel(config);
        }

        function generateDefaultConfig(id) {
            const node = findNodeById(indicatorData, id);
            return {
                code: id,
                name: node ? node.label : id,
                cycle: 'monthly',
                status: 'enabled',
                targetValue: '',
                targetUnit: 'number',
                targetOperator: '>=',
                targetDesc: '未配置',
                dataSource: '',
                formula: '',
                description: '',
                weights: [
                    { dept: 'business', weight: '0.30', desc: '侧重结果与处置时效' },
                    { dept: 'street', weight: '0.20', desc: '侧重属地巡查与配合' },
                    { dept: 'function', weight: '0.05', desc: '侧重机制与制度建设' }
                ]
            };
        }

        function findNodeById(nodes, id) {
            for (const node of nodes) {
                if (node.id === id) return node;
                if (node.children) {
                    const found = findNodeById(node.children, id);
                    if (found) return found;
                }
            }
            return null;
        }

        // ========== 渲染配置面板 ==========
        function renderConfigPanel(config) {
            const header = document.getElementById('configHeader');
            const content = document.getElementById('configContent');
            const footer = document.getElementById('configFooter');

            header.innerHTML = `
                <div>
                    <h2><i class="fas fa-cogs" style="color: var(--primary);"></i> 指标详情配置</h2>
                    <div class="subtitle">当前选中: ${config.code} / ${config.name}</div>
                </div>
            `;

            content.innerHTML = `
                <!-- 基本信息 -->
                <div class="form-card">
                    <div class="form-card-header">
                        <i class="fas fa-info-circle"></i> 基本信息
                    </div>
                    <div class="form-card-body">
                        <div class="form-row">
                            <div class="form-group half">
                                <label><span class="required">*</span>指标编码</label>
                                <input type="text" class="form-control" value="${config.code}" id="cfg-code">
                            </div>
                            <div class="form-group half">
                                <label><span class="required">*</span>指标名称</label>
                                <input type="text" class="form-control" value="${config.name}" id="cfg-name">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group half">
                                <label><span class="required">*</span>目标值</label>
                                <div style="display: flex; gap: 8px; align-items: center;">
                                    <select class="form-control" id="cfg-target-operator" style="width: 100px; flex-shrink: 0;">
                                        <option value="=" ${config.targetOperator === '=' ? 'selected' : ''}>等于</option>
                                        <option value=">=" ${config.targetOperator === '>=' ? 'selected' : ''}>大于等于</option>
                                        <option value="<=" ${config.targetOperator === '<=' ? 'selected' : ''}>小于等于</option>
                                        <option value=">" ${config.targetOperator === '>' ? 'selected' : ''}>大于</option>
                                        <option value="<" ${config.targetOperator === '<' ? 'selected' : ''}>小于</option>
                                    </select>
                                    <input type="number" class="form-control" value="${config.targetValue || ''}" id="cfg-target-value" placeholder="请输入目标值" style="flex: 1;">
                                    <select class="form-control" id="cfg-target-unit" style="width: 90px; flex-shrink: 0;">
                                        <option value="number" ${config.targetUnit === 'number' ? 'selected' : ''}>数值</option>
                                        <option value="percentage" ${config.targetUnit === 'percentage' ? 'selected' : ''}>百分比</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group half">
                                <label><span class="required">*</span>采集周期</label>
                                <div class="radio-group">
                                    <label class="radio-item">
                                        <input type="radio" name="cycle" value="realtime" ${config.cycle === 'realtime' ? 'checked' : ''}>
                                        实时
                                    </label>
                                    <label class="radio-item">
                                        <input type="radio" name="cycle" value="daily" ${config.cycle === 'daily' ? 'checked' : ''}>
                                        每日
                                    </label>
                                    <label class="radio-item">
                                        <input type="radio" name="cycle" value="monthly" ${config.cycle === 'monthly' ? 'checked' : ''}>
                                        每月
                                    </label>
                                </div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group half">
                                <label><span class="required">*</span>状态控制</label>
                                <div class="toggle-group">
                                    <span class="toggle-item ${config.status === 'enabled' ? 'active' : ''}" onclick="toggleStatus(this, 'enabled')">
                                        <i class="fas fa-check-circle"></i> 启用
                                    </span>
                                    <span class="toggle-item ${config.status === 'disabled' ? 'active' : ''}" onclick="toggleStatus(this, 'disabled')">
                                        <i class="fas fa-ban"></i> 禁用
                                    </span>
                                </div>
                                <div style="font-size: 11px; color: var(--text-secondary); margin-top: 4px;">
                                    <i class="fas fa-info-circle"></i> 停用不影响历史测算
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 数据源配置 -->
                <div class="form-card">
                    <div class="form-card-header">
                        <i class="fas fa-database"></i> 数据源配置 (SQL 模板 / 数据仓库字典映射)
                    </div>
                    <div class="form-card-body">
                        <div class="form-group">
                            <label>SQL查询模板</label>
                            <textarea class="form-control" rows="4" id="cfg-datasource" placeholder="请输入SQL查询语句...">${config.dataSource}</textarea>
                        </div>
                    </div>
                </div>

                <!-- 计算公式 -->
                <div class="form-card">
                    <div class="form-card-header">
                        <i class="fas fa-calculator"></i> 计算公式表达式解析器 (NLG/规则引擎驱动)
                    </div>
                    <div class="form-card-body">
                        <div class="form-group">
                            <label>计算公式</label>
                            <textarea class="form-control" rows="2" id="cfg-formula" placeholder="请输入计算公式...">${config.formula}</textarea>
                        </div>
                        <div class="hint-box">
                            <i class="fas fa-lightbulb hint-icon"></i>
                            ${config.description || '请配置计算逻辑说明'}
                        </div>
                    </div>
                </div>

                <!-- 权重矩阵 -->
                <div class="form-card">
                    <div class="form-card-header">
                        <i class="fas fa-balance-scale"></i> 部门差异化权重系数矩阵配置 (按组织角色差异化赋权)
                    </div>
                    <div class="form-card-body">
                        <div class="weight-matrix" id="weightMatrix">
                            ${config.weights.map((w, idx) => `
                                <div class="weight-row">
                                    <div class="dept-select">
                                        <select id="dept-${idx}">
                                            <option value="business" ${w.dept === 'business' ? 'selected' : ''}>业务部门组 (如燃气办/建管科)</option>
                                            <option value="street" ${w.dept === 'street' ? 'selected' : ''}>街镇综合组 (各街道办事处)</option>
                                            <option value="function" ${w.dept === 'function' ? 'selected' : ''}>职能管理组 (各局办机关群)</option>
                                        </select>
                                    </div>
                                    <div class="weight-input">
                                        <input type="text" value="${w.weight}" id="weight-${idx}">
                                    </div>
                                    <div class="weight-desc">
                                        ${w.desc}

                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;

            footer.style.display = 'flex';
        }

        function toggleStatus(el, status) {
            document.querySelectorAll('.toggle-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');
        }

        // ========== 搜索过滤 ==========
        function filterTree() {
            const keyword = document.getElementById('treeSearch').value.toLowerCase();
            if (!keyword) {
                renderTree();
                return;
            }
            // 简单实现：重新渲染并高亮匹配项
            renderTree();
        }

        // ========== 操作按钮 ==========
        function showAddIndicatorModal() {
            alert('新增指标功能：支持在选定维度下添加新指标');
        }

        function showVersionModal() {
            const modal = document.getElementById('versionModal');
            const list = document.getElementById('versionList');
            list.innerHTML = versionHistory.map(v => `
                <div class="version-item ${v.status === 'current' ? 'current' : ''}">
                    <span class="version-badge ${v.status === 'current' ? 'current' : ''}">${v.status === 'current' ? '当前生效' : '历史版本'}</span>
                    <div class="version-info">
                        <div class="version-title">${v.title}</div>
                        <div class="version-meta">
                            <i class="fas fa-calendar-alt"></i> ${v.date}
                            <i class="fas fa-user" style="margin-left: 12px;"></i> ${v.author}
                        </div>
                        <div style="margin-top: 6px; font-size: 12px; color: var(--text-primary);">
                            <i class="fas fa-edit" style="color: var(--primary);"></i> ${v.changes}
                        </div>
                    </div>
                    <div class="version-actions">
                        <button class="btn" onclick="viewVersion('${v.id}')">
                            <i class="fas fa-eye"></i> 查看
                        </button>
                        ${v.status !== 'current' ? `
                            <button class="btn btn-primary" onclick="compareVersion('${v.id}')">
                                <i class="fas fa-exchange-alt"></i> 对比
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
            modal.classList.add('open');
        }

        function closeVersionModal() {
            document.getElementById('versionModal').classList.remove('open');
        }

        function viewVersion(id) {
            alert('查看版本 ' + id + ' 的详细内容');
        }

        function compareVersion(id) {
            alert('对比当前版本与 ' + id + ' 的差异');
        }

        function exportPDF() {
            alert('正在生成考核依据标准PDF文档...');
        }

        function resetForm() {
            if (currentIndicator) {
                selectIndicator(currentIndicator);
            }
        }

        function saveConfig() {
            alert('指标配置已保存！');
        }

        // ========== 主题同步 ==========
        window.addEventListener('message', function(event) {
            if (event.data && event.data.action === 'setTheme') {
                document.documentElement.setAttribute('data-theme', event.data.theme);
            }
        });

        // ========== 启动 ==========
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
