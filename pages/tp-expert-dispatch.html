<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专家申请 - 第三方服务机构</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="tp-common.css">
    <script src="../js/third-party-data.js"></script>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --primary-light: #e8f0fe;
            --success: #1e8e3e;
            --danger: #d93025;
            --warning: #e37400;
            --bg-dark: #f0f2f5;
            --bg-card: #ffffff;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --border: #dadce0;
            --shadow: rgba(0,0,0,0.08);
            --radius: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            padding: 16px;
            font-size: 14px;
        }

        .page-container { max-width: 100%; margin: 0 auto; }
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px;
        }
        .page-title { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: 0 1px 4px var(--shadow);
            margin-bottom: 16px;
            overflow: hidden;
        }
        .card-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            display: flex; align-items: center; gap: 8px;
            background: rgba(0,0,0,0.02);
        }
        .card-body { padding: 16px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .form-row-full { display: grid; grid-template-columns: 1fr; margin-bottom: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .form-group label .required { color: var(--danger); margin-left: 2px; }
        .form-group input, .form-group select, .form-group textarea {
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
        }
        .form-group input:disabled, .form-group select:disabled, .form-group textarea:disabled {
            background: #f1f3f4;
            color: var(--text-secondary);
            cursor: not-allowed;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
        .form-group textarea { resize: vertical; min-height: 72px; }
        .btn {
            padding: 9px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: #fff; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { filter: brightness(0.95); }
        .btn-sm { padding: 6px 12px; font-size: 13px; }
        .empty-tip { text-align: center; color: var(--text-secondary); padding: 32px 0; }

        /* 调度记录筛选区：独立在列表卡片上方 */
        .dispatch-filter { margin-bottom: 16px; }
        .dispatch-filter .filter-row {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: nowrap;
        }
        .dispatch-filter .filter-row .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 auto;
            min-width: auto;
        }
        .dispatch-filter .filter-row .filter-item label {
            white-space: nowrap;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .dispatch-filter .filter-row .filter-item select,
        .dispatch-filter .filter-row .filter-item input {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            min-width: 120px;
            height: 36px;
        }
        .dispatch-filter .filter-row .filter-item:first-child {
            flex: 0 0 220px;
            min-width: 180px;
            max-width: 260px;
        }
        .dispatch-filter .filter-row .filter-item:first-child input { width: 100%; }
        .dispatch-filter .filter-row .filter-actions {
            display: flex;
            gap: 8px;
            margin-left: auto;
            align-items: center;
            flex: 0 0 auto;
        }
        .dispatch-filter .filter-row .filter-actions .list-btn {
            height: 36px;
            white-space: nowrap;
        }
        @media (max-width: 1200px) {
            .dispatch-filter .filter-row { flex-wrap: wrap; }
            .dispatch-filter .filter-row .filter-item:first-child { flex: 1 1 200px; max-width: none; }
            .dispatch-filter .filter-row .filter-actions { margin-left: 0; }
        }
        @media (max-width: 768px) {
            .dispatch-filter .filter-row { flex-direction: column; align-items: stretch; }
            .dispatch-filter .filter-row .filter-item,
            .dispatch-filter .filter-row .filter-item:first-child {
                flex: 1 1 100%;
                max-width: none;
                min-width: auto;
            }
            .dispatch-filter .filter-row .filter-item select,
            .dispatch-filter .filter-row .filter-item input { width: 100%; }
            .dispatch-filter .filter-row .filter-actions { margin-left: 0; width: 100%; }
            .dispatch-filter .filter-row .filter-actions .list-btn { flex: 1; }
        }
        /* 调度记录表格：内容单行显示、完整宽度，容器出现横向滚动条，操作列固定右侧 */
        #taskTable {
            table-layout: auto;
            width: auto;
            min-width: 100%;
        }
        #taskTable thead th,
        #taskTable tbody td {
            white-space: nowrap;
            vertical-align: middle;
        }
        #taskTable thead th:first-child,
        #taskTable tbody td:first-child {
            position: static;
            width: auto;
            min-width: auto;
            max-width: none;
            background: transparent;
            border-right: none;
            box-shadow: none;
        }
        #taskTable thead th:first-child {
            background: var(--header-bg, rgba(0,0,0,0.02));
        }
        #taskTable thead th:last-child,
        #taskTable tbody td:last-child {
            position: sticky;
            right: 0;
            z-index: 100;
            background: #ffffff;
            border-left: 1px solid var(--border, #dadce0);
            box-shadow: -2px 0 4px rgba(0,0,0,0.06);
            min-width: 120px;
        }
        #taskTable thead th:last-child {
            z-index: 101;
            background: var(--header-bg, rgba(0,0,0,0.02));
        }
        #taskTable tbody td:last-child .table-link {
            display: inline-block;
            margin-right: 8px;
        }
        #taskTable tbody td:last-child .table-link:last-child {
            margin-right: 0;
        }



        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            display: none; align-items: center; justify-content: center; z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--bg-card); border-radius: var(--radius); width: 100%; max-width: 640px;
            max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
        }
        .modal-header { padding: 14px 16px; border-bottom: 1px solid var(--border); font-weight: 600; }
        .modal-body { padding: 16px; overflow-y: auto; }
        .modal-footer { padding: 14px 16px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
        .expert-card {
            border: 1px solid var(--border); border-radius: var(--radius); padding: 12px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start;
            cursor: pointer; transition: all 0.15s;
        }
        .expert-card:hover { border-color: var(--primary); background: var(--primary-light); }
        .expert-card.selected { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 0 0 2px var(--primary); }
        .expert-info { flex: 1; }
        .expert-name { font-weight: 600; margin-bottom: 4px; }
        .expert-meta { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
        .expert-check { font-size: 18px; color: var(--primary); margin-left: 8px; }
        .selected-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .selected-chip {
            background: var(--primary-light); color: var(--primary); border: 1px solid var(--primary);
            border-radius: 16px; padding: 4px 12px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px;
        }
        .selected-chip .remove { cursor: pointer; font-weight: bold; }
        input[type="file"] { padding: 6px; border: 1px dashed var(--primary); border-radius: var(--radius); background: var(--primary-light); color: var(--primary); }
        input[type="file"]:hover { background: #dbe7fb; }
        /* 状态徽章 */
        .status-tag { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .status-tag.pending { background: rgba(227,116,0,0.12); color: var(--warning); }
        .status-tag.assigned { background: rgba(30,142,62,0.12); color: var(--success); }
        .status-tag.feedback { background: rgba(26,115,232,0.12); color: var(--primary); }
        .status-tag.rejected { background: rgba(217,48,37,0.12); color: var(--danger); }
        .value {
            padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius);
            background: #f8f9fa; color: var(--text-primary); min-height: 38px; line-height: 1.4;
        }
        .feedback-log {
            background: #f8f9fa; border: 1px solid var(--border); border-radius: var(--radius);
            padding: 10px 12px; font-size: 13px; color: var(--text-secondary); line-height: 1.6;
            margin-top: 8px;
        }
        .feedback-log-title { font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
            .filter-bar { flex-direction: column; }
            .filter-bar .form-group { width: 100%; }
        }
    </style>
</head>
<body>
<div class="page-container">
    <div class="page-header">
        <div class="page-title"><i class="fas fa-user-clock" style="color:var(--primary)"></i> 申请专家 / 机构评估</div>
        <button class="btn btn-primary" onclick="openCreateModal()"><i class="fas fa-plus"></i> 新建申请</button>
    </div>

    <div class="filter-card dispatch-filter">
        <div class="filter-row">
            <div class="filter-item">
                <label>需求编号</label>
                <input type="text" id="filterCode" placeholder="请输入需求编号">
            </div>
            <div class="filter-item">
                <label>申请类型</label>
                <select id="filterApplyType">
                    <option value="">全部</option>
                    <option value="expert">专家评估</option>
                    <option value="org">机构鉴定</option>
                </select>
            </div>
            <div class="filter-item">
                <label>需求状态</label>
                <select id="filterStatus">
                    <option value="">全部</option>
                    <option value="pending">待分派</option>
                    <option value="assigned">已分派</option>
                    <option value="feedback">已反馈</option>
                    <option value="rejected">已驳回</option>
                </select>
            </div>
            <div class="filter-item">
                <label>专业领域</label>
                <select id="filterDomain">
                    <option value="">全部</option>
                </select>
            </div>
            <div class="filter-actions">
                <button class="list-btn list-btn-primary" onclick="renderTaskList()"><i class="fas fa-search"></i> 查询</button>
                <button class="list-btn list-btn-outline" onclick="resetFilter()"><i class="fas fa-undo"></i> 重置</button>
            </div>
        </div>
    </div>

    <div class="list-card dispatch-section">
        <div class="list-header">
            <div class="list-title"><i class="fas fa-list-ul"></i> 申请记录</div>
        </div>
        <div class="list-body">
            <div class="table-wrapper" style="width:100%; overflow-x:auto;">
                <table class="list-table" id="taskTable">
                    <thead>
                        <tr>
                            <th>需求编号</th>
                            <th>申请类型</th>
                            <th>需求名称</th>
                            <th>专业领域</th>
                            <th>所需人数</th>
                            <th>已选专家/机构</th>
                            <th>状态</th>
                            <th>提交时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
            </div>
            <div id="emptyTip" class="empty-tip" style="display:none;">暂无申请记录</div>
        </div>
    </div>
</div>

<!-- 新建/编辑申请弹窗 -->
<div class="modal-overlay" id="taskModal">
    <div class="modal">
        <div class="modal-header" id="taskModalTitle">新建申请</div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label>申请类型 <span class="required">*</span></label>
                    <select id="taskApplyType">
                        <option value="expert">专家评估</option>
                        <option value="org">机构鉴定</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>需求名称 <span class="required">*</span></label>
                    <input type="text" id="taskName" placeholder="例如：南桥镇自建房安全评估">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>专业领域 <span class="required">*</span></label>
                    <select id="taskDomain"></select>
                </div>
                <div class="form-group">
                    <label>专业</label>
                    <input type="text" id="taskDirection" placeholder="请输入专业方向" maxlength="50">
                </div>
            </div>
            <div class="form-row-full">
                <div class="form-group">
                    <label>评估目的 <span class="required">*</span></label>
                    <textarea id="taskPurpose" placeholder="请描述需要评估的目的和背景"></textarea>
                </div>
            </div>
            <div class="form-row-full">
                <div class="form-group">
                    <label>评估要求</label>
                    <textarea id="taskRequirement" placeholder="请说明对评估的具体要求，如评估范围、重点内容、完成时限等"></textarea>
                </div>
            </div>
            <div class="form-row-full">
                <div class="form-group">
                    <label id="taskSuggestedTargetLabel">建议专家 / 机构</label>
                    <input type="text" id="taskSuggestedTarget" placeholder="请输入建议的专家姓名或机构名称">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label id="taskCountLabel">所需人数 <span class="required">*</span></label>
                    <input type="number" id="taskCount" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>请求来源</label>
                    <input type="text" id="taskRequestSource" placeholder="例如：风险研判系统 / 房屋安全排查模块">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>请求人 / 单位</label>
                    <input type="text" id="taskRequester" placeholder="请输入请求人姓名或单位">
                </div>
                <div class="form-group">
                    <label>请求方联系方式</label>
                    <input type="text" id="taskContact" placeholder="电话 / 邮箱 / 系统账号">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>结果反馈方式</label>
                    <select id="taskCallbackType">
                        <option value="postMessage">站内消息回传（iframe/弹窗）</option>
                        <option value="link">生成结果链接</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>附件材料</label>
                    <input type="file" id="taskAttachments" multiple onchange="handleTaskAttachments(this)">
                    <div class="selected-list" id="taskAttachmentList"></div>
                </div>
            </div>
            <div class="form-row-full" id="pickerSection">
                <div class="form-group">
                    <label id="pickerLabel">选择专家/机构 <span class="required">*</span></label>
                    <button class="btn btn-outline btn-sm" id="pickerBtn" onclick="openExpertPicker()"><i class="fas fa-user-plus"></i> 选择专家/机构</button>
                    <div class="selected-list" id="selectedExperts"></div>
                </div>
            </div>
        </div>
        <div class="modal-footer" id="taskModalFooter">
            <button class="btn btn-outline" onclick="closeTaskModal()">取消</button>
            <button class="btn btn-primary" onclick="saveTask()">保存为待分派</button>
        </div>
    </div>
</div>

<!-- 选择专家/机构弹窗 -->
<div class="modal-overlay" id="expertModal">
    <div class="modal">
        <div class="modal-header" id="expertModalTitle"><i class="fas fa-user-tie"></i> 选择专家</div>
        <div class="modal-body">
            <div class="filter-bar" style="margin-bottom:12px;display:flex;align-items:center;gap:8px;">
                <div class="form-group" style="flex:1;margin-bottom:0;">
                    <input type="text" id="expertKeyword" placeholder="" style="width:100%;">
                </div>
                <button class="btn btn-primary btn-sm" onclick="renderExpertCandidates()"><i class="fas fa-search"></i> 搜索</button>
            </div>
            <div id="expertCandidateList"></div>
        </div>
        <div class="modal-footer">
            <span style="flex:1;color:var(--text-secondary);font-size:13px;">已选 <span id="selectedExpertCount">0</span> <span id="selectedUnit">人</span></span>
            <button class="btn btn-outline" onclick="closeExpertModal()">取消</button>
            <button class="btn btn-primary" onclick="confirmExpertPick()">确定</button>
        </div>
    </div>
</div>

<!-- 查看结果弹窗 -->
<div class="modal-overlay" id="resultModal">
    <div class="modal" style="max-width:720px;">
        <div class="modal-header"><i class="fas fa-eye"></i> 申请结果</div>
        <div class="modal-body" id="resultBody"></div>
        <div class="modal-footer" id="resultFooter">
            <button class="btn btn-outline" onclick="closeResultModal()">关闭</button>
        </div>
    </div>
</div>

<!-- 反馈结果弹窗 -->
<div class="modal-overlay" id="feedbackModal">
    <div class="modal" style="max-width:720px;">
        <div class="modal-header"><i class="fas fa-paper-plane"></i> 反馈专家申请结果</div>
        <div class="modal-body">
            <div class="form-row">
                <div class="form-group">
                    <label>反馈方式 <span class="required">*</span></label>
                    <select id="feedbackType">
                        <option value="postMessage">站内消息回传（iframe/弹窗）</option>
                        <option value="link">生成结果链接</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>接收方</label>
                    <input type="text" id="feedbackReceiver" placeholder="例如：风险研判系统 / 请求人姓名">
                </div>
            </div>
            <div class="form-row-full">
                <div class="form-group">
                    <label>评估结论 <span class="required">*</span></label>
                    <textarea id="feedbackConclusion" placeholder="请输入评估结论，例如：经现场勘查，该房屋整体结构基本安全..."></textarea>
                </div>
            </div>
            <div class="form-row-full">
                <div class="form-group">
                    <label>评估报告 / 附件材料</label>
                    <input type="file" id="feedbackAttachments" multiple onchange="handleFeedbackAttachments(this)">
                    <div class="selected-list" id="feedbackAttachmentList"></div>
                </div>
            </div>
            <div class="form-row-full">
                <div class="form-group">
                    <label>反馈备注</label>
                    <textarea id="feedbackRemark" placeholder="请输入反馈说明，例如：已按要求安排专家，请查收"></textarea>
                </div>
            </div>
            <div class="form-row-full" id="feedbackLinkWrap" style="display:none;">
                <div class="form-group">
                    <label>结果链接</label>
                    <div class="value" id="feedbackLink"></div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeFeedbackModal()">取消</button>
            <button class="btn btn-primary" onclick="previewFeedback()">预览结果</button>
            <button class="btn btn-success" onclick="submitFeedback()">确认反馈</button>
        </div>
    </div>
</div>

<script>
    var taskList = [];
    var currentTaskId = null;
    var tempSelectedExperts = [];
    var feedbackTaskId = null;
    var taskTempAttachments = [];
    var feedbackTempAttachments = [];
    var STORAGE_KEY = 'expertDispatchTasks';
    var API_URL = '/api/dispatch-tasks';

    function loadTasks(callback) {
        fetch(API_URL)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (Array.isArray(data)) {
                    taskList = data;
                } else {
                    taskList = [];
                }
                if (typeof callback === 'function') callback();
            })
            .catch(function(err) {
                console.error('加载调度记录失败', err);
                // 降级读取本地旧 localStorage 数据
                try {
                    var saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) taskList = JSON.parse(saved);
                } catch(e) {}
                if (typeof callback === 'function') callback();
            });
    }

    function saveTasks(callback) {
        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(taskList)
        })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    // 同步保留一份 localStorage 备份
                    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(taskList)); } catch(e) {}
                }
                if (typeof callback === 'function') callback();

    function readFilesToBase64(inputFiles, callback) {
        var results = [];
        if (!inputFiles || !inputFiles.length) { callback(results); return; }
        var pending = inputFiles.length;
        Array.prototype.forEach.call(inputFiles, function(file) {
            var reader = new FileReader();
            reader.onload = function(e) {
                results.push({ name: file.name, size: file.size, type: file.type, data: e.target.result });
                pending--;
                if (pending === 0) callback(results);
            };
            reader.onerror = function() {
                pending--;
                if (pending === 0) callback(results);
            };
            reader.readAsDataURL(file);
        });
    }

    function validateTask(requireSelected) {
        var name = document.getElementById('taskName').value.trim();
        var count = parseInt(document.getElementById('taskCount').value, 10);
        var domain = document.getElementById('taskDomain').value;
        var purpose = document.getElementById('taskPurpose').value.trim();
        var applyType = document.getElementById('taskApplyType').value;
        if (!name) { alert('请输入需求名称'); return false; }
        if (!purpose) { alert('请输入评估目的'); return false; }
        if (!count || count < 1) { alert('请输入所需人数'); return false; }
        if (!domain) { alert('请选择专业领域'); return false; }
        if (requireSelected) {
            if (!tempSelectedExperts.length) {
                if (applyType === 'expert') { alert('请选择专家'); return false; }
                else { alert('请选择鉴定机构'); return false; }
            }
            if (tempSelectedExperts.length < count) {
                alert('已选' + (applyType === 'org' ? '机构' : '专家') + '数量少于所需数量 ' + count);
                return false;
            }
        }
        return true;
    }

    function buildTask(status) {
        var now = new Date().toISOString().slice(0,19).replace('T',' ');
        var existing = currentTaskId ? (taskList.find(function(t){return t.id===currentTaskId}) || {}) : {};
        return {
            id: currentTaskId || generateCode(),
            code: existing.code || generateCode(),
            applyType: document.getElementById('taskApplyType').value,
            name: document.getElementById('taskName').value.trim(),
            count: parseInt(document.getElementById('taskCount').value, 10),
            domain: document.getElementById('taskDomain').value,
            direction: document.getElementById('taskDirection').value,
            purpose: document.getElementById('taskPurpose').value.trim(),
            requirement: document.getElementById('taskRequirement').value.trim(),
            suggestedTarget: document.getElementById('taskSuggestedTarget').value.trim(),
            remark: document.getElementById('taskRemark') ? document.getElementById('taskRemark').value.trim() : '',
            experts: tempSelectedExperts.slice(),
            status: status,
            requestSource: document.getElementById('taskRequestSource').value.trim() || existing.requestSource || '',
            requester: document.getElementById('taskRequester').value.trim() || existing.requester || '',
            contact: document.getElementById('taskContact').value.trim() || existing.contact || '',
            callbackType: document.getElementById('taskCallbackType').value || existing.callbackType || 'postMessage',
            attachments: taskTempAttachments.slice(),
            createTime: existing.createTime || now,
            updateTime: now,
            feedback: existing.feedback || null
        };
    }

    function saveTask() {
        if (!validateTask(false)) return;
        var task = buildTask('pending');
        if (currentTaskId) {
            var idx = taskList.findIndex(function(t) { return t.id === currentTaskId; });
            if (idx >= 0) taskList[idx] = task;
        } else {
            taskList.unshift(task);
        }
        saveTasks(function() {
            closeTaskModal();
            renderTaskList();
            alert('已保存为待分派');
        });
    }

    function assignTask() {
        if (!validateTask(true)) return;
        var task = taskList.find(function(t) { return t.id === currentTaskId; });
        if (!task) return;
        var applyType = document.getElementById('taskApplyType').value;
        if (tempSelectedExperts.length < task.count) {
            alert('已选' + (applyType === 'org' ? '机构' : '专家') + '数量少于所需数量 ' + task.count);
            return;
        }
        task.applyType = applyType;
        task.experts = tempSelectedExperts.slice();
        task.status = 'assigned';
        task.updateTime = new Date().toISOString().slice(0,19).replace('T',' ');
        saveTasks(function() {
            closeTaskModal();
            renderTaskList();
            alert('已分派，结果已生成可查看记录');
        });
    }

    function renderExpertCandidates() {

        var direction = document.getElementById('taskDirection').value;
        var isOrg = getPickerTargetType() === 'org';
        var list = getPickerSource().filter(function(e) {
            if (domain && e.domain !== domain) return false;
            if (!isOrg && direction && e.direction !== direction) return false;
            if (isOrg && direction && e.direction !== direction) return false;
            if (!keyword) return true;
            var lower = keyword.toLowerCase();
            return (e.name || '').toLowerCase().includes(lower) ||
                   (e.org || '').toLowerCase().includes(lower) ||
                   (e.title || '').toLowerCase().includes(lower);
        });
        var container = document.getElementById('expertCandidateList');
        document.getElementById('expertModalTitle').innerHTML = '<i class="fas fa-' + (isOrg ? 'building' : 'user-tie') + '"></i> ' + (isOrg ? '选择鉴定机构' : '选择专家');

            container.innerHTML = '<div class="empty-tip">未找到符合条件的' + (isOrg ? '鉴定机构' : '专家') + '</div>';
            return;

        container.innerHTML = list.map(function(e) {
            var selected = tempSelectedExperts.some(function(s) { return s.id === e.id; });
            var meta = isOrg
                ? (e.org + ' · ' + e.domain + ' · 资质：' + e.direction + ' · ' + e.phone)
                : (e.org + ' · ' + e.domain + ' · ' + e.direction + ' · ' + e.phone);
            var tags = [];
            if (e.title) tags.push(e.title);
            if (!isOrg && e.industryExpertGroup) tags.push(e.industryExpertGroup);
            return '<div class="expert-card ' + (selected ? 'selected' : '') + '" onclick="toggleExpert(\'' + encodeName(e.name) + '\')">' +
                '<div class="expert-info">' +
                    '<div class="expert-name">' + e.name + ' ' + tags.map(function(t){ return '<span class="tag tag-primary">' + t + '</span>'; }).join(' ') + '</div>' +
                    '<div class="expert-meta">' + meta + '</div>' +
                '</div>' +
                '<div class="expert-check">' + (selected ? '<i class="fas fa-check-circle"></i>' : '<i class="far fa-circle"></i>') + '</div>' +
            '</div>';
        }).join('');
        updateSelectedCount();
    }

            '<div class="form-row"><div class="form-group"><label>请求方联系方式</label><div class="value">' + (task.contact || '—') + '</div></div><div class="form-group"><label>结果反馈方式</label><div class="value">' + ({ postMessage: '站内消息回传', link: '生成结果链接' }[task.callbackType] || '—') + '</div></div></div>' +
            '<div class="form-row-full"><div class="form-group"><label>' + targetLabel + '</label><div class="selected-list">' + (task.experts || []).map(function(e) {
                return '<span class="selected-chip">' + e.name + '（' + e.title + '）</span>';
            }).join('') + '</div></div></div>';
        if ((task.attachments || []).length) {
            html += '<div class="form-row-full"><div class="form-group"><label>附件材料</label><div class="selected-list">' + task.attachments.map(function(a) {
                return '<span class="selected-chip"><i class="fas fa-file"></i> ' + a.name + '</span>';
            }).join('') + '</div></div></div>';
        }
        if (task.remark) {
            html += '<div class="form-row-full"><div class="form-group"><label>需求说明</label><div class="value">' + task.remark + '</div></div></div>';
        }
        if (task.feedback) {
            html += '<div class="feedback-log"><div class="feedback-log-title"><i class="fas fa-paper-plane"></i> 反馈记录</div>' +
                '<div>反馈时间：' + task.feedback.time + '</div>' +
                '<div>反馈方式：' + ({ postMessage: '站内消息回传', link: '生成结果链接' }[task.feedback.type] || '—') + '</div>' +
                '<div>接收方：' + (task.feedback.receiver || '—') + '</div>' +
                '<div>评估结论：' + (task.feedback.conclusion || '—') + '</div>' +
                '<div>备注：' + (task.feedback.remark || '—') + '</div>';
            if ((task.feedback.attachments || []).length) {
                html += '<div>反馈附件：' + task.feedback.attachments.map(function(a){ return a.name; }).join('、') + '</div>';
            }
            html += '</div>';
        }
        document.getElementById('resultBody').innerHTML = html;
        var footerHtml = '<button class="btn btn-outline" onclick="closeResultModal()">关闭</button>';
        if (task.status === 'assigned') {
            footerHtml += '<button class="btn btn-primary" onclick="closeResultModal();openFeedbackModal(\'' + task.id + '\')"><i class="fas fa-paper-plane"></i> 反馈结果</button>';
        }
        document.getElementById('resultFooter').innerHTML = footerHtml;
        document.getElementById('resultModal').classList.add('show');
    }

    function closeResultModal() {
        document.getElementById('resultModal').classList.remove('show');
    }

    function resetFilter() {
        document.getElementById('filterCode').value = '';
        document.getElementById('filterApplyType').value = '';
        document.getElementById('filterStatus').innerHTML = '<option value="">全部</option><option value="pending">待分派</option><option value="assigned">已分派</option><option value="feedback">已反馈</option><option value="rejected">已驳回</option>';
        document.getElementById('filterDomain').value = '';
        renderTaskList();
    }

    document.getElementById('feedbackType').addEventListener('change', function() {
        document.getElementById('feedbackLinkWrap').style.display = 'none';
    });

    function openFeedbackModal(id) {
        feedbackTaskId = id;
        var task = taskList.find(function(t) { return t.id === id; });
        document.getElementById('feedbackType').value = task.callbackType || 'postMessage';
        document.getElementById('feedbackReceiver').value = task.requester || '';
        document.getElementById('feedbackConclusion').value = '';
        document.getElementById('feedbackRemark').value = '';
        feedbackTempAttachments = [];
        renderFeedbackAttachmentList();
        document.getElementById('feedbackLinkWrap').style.display = 'none';
        document.getElementById('feedbackModal').classList.add('show');
    }

    function closeFeedbackModal() {
        document.getElementById('feedbackModal').classList.remove('show');
        feedbackTaskId = null;
    }

    function previewFeedback() {
        var task = taskList.find(function(t) { return t.id === feedbackTaskId; });
        if (!task) return;
        var type = document.getElementById('feedbackType').value;
        if (type === 'link') {
            document.getElementById('feedbackLinkWrap').style.display = 'block';
            document.getElementById('feedbackLink').textContent = location.origin + location.pathname + '?viewResult=' + task.id;
        } else {
            document.getElementById('feedbackLinkWrap').style.display = 'none';
            alert('已选择站内消息回传，确认后将通过 postMessage 发送给来源页面。');
        }
    }

    function submitFeedback() {
        var task = taskList.find(function(t) { return t.id === feedbackTaskId; });
        if (!task) return;
        var type = document.getElementById('feedbackType').value;
        var receiver = document.getElementById('feedbackReceiver').value.trim();
        var conclusion = document.getElementById('feedbackConclusion').value.trim();
        var remark = document.getElementById('feedbackRemark').value.trim();
        if (!conclusion) { alert('请输入评估结论'); return; }

        if (type === 'postMessage' && window.parent !== window) {
            window.parent.postMessage({
                action: 'expertDispatchResult',
                payload: {
                    taskId: task.id,
                    code: task.code || task.id,
                    applyType: task.applyType,
                    name: task.name,
                    domain: task.domain,
                    experts: task.experts,
                    conclusion: conclusion,
                    attachments: feedbackTempAttachments,
                    updateTime: task.updateTime,
                    receiver: receiver,
                    remark: remark
                }
            }, '*');
        }

        task.status = 'feedback';
        task.feedback = {
            type: type,
            receiver: receiver,
            conclusion: conclusion,
            remark: remark,
            attachments: feedbackTempAttachments.slice(),
            time: new Date().toISOString().slice(0,19).replace('T',' ')
        };
        task.updateTime = task.feedback.time;
        saveTasks(function() {
            renderTaskList();
            closeFeedbackModal();
            alert('反馈结果已发送');
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        var domains = getDomainOptions();
        fillSelect('taskDomain', domains);
        fillSelect('filterDomain', domains);
        document.getElementById('taskDomain').addEventListener('change', clearExpertsByDomainChange);
        document.getElementById('taskApplyType').addEventListener('change', function() {
            clearExpertsByDomainChange();
            updatePickerUI();
        });
        // 每次打开页面默认清空所有筛选条件，显示全部记录
        document.getElementById('filterCode').value = '';
        document.getElementById('filterApplyType').value = '';
        document.getElementById('filterStatus').value = '';
        document.getElementById('filterDomain').value = '';
        loadTasks(function() {
            renderTaskList();
        });
    });

    // 接收外部传入的调度需求（其他模块通过 postMessage 发送）
    window.addEventListener('message', function(e) {
        if (e.data && e.data.action === 'createExpertDispatch') {
            var payload = e.data.payload || {};
            currentTaskId = null;
            document.getElementById('taskModalTitle').textContent = '新建申请';
            document.getElementById('taskApplyType').value = payload.applyType || 'expert';
            document.getElementById('taskName').value = payload.name || '';
            document.getElementById('taskDomain').value = payload.domain || '';
            document.getElementById('taskDirection').value = payload.direction || '';
            document.getElementById('taskPurpose').value = payload.purpose || payload.remark || '';
            document.getElementById('taskRequirement').value = payload.requirement || '';
            document.getElementById('taskSuggestedTarget').value = payload.suggestedTarget || payload.suggestedExpert || '';
            document.getElementById('taskCount').value = payload.count || 1;
            document.getElementById('taskRequestSource').value = payload.requestSource || (e.source ? '外部模块' : '');
            document.getElementById('taskRequester').value = payload.requester || '';
            document.getElementById('taskContact').value = payload.contact || '';
            document.getElementById('taskCallbackType').value = payload.callbackType || 'postMessage';
            tempSelectedExperts = [];
            taskTempAttachments = (payload.attachments || []).slice();
            updatePickerUI();
            renderSelectedExperts();
            renderTaskAttachmentList();
            document.getElementById('taskModal').classList.add('show');
        }
    });
</script>
</body>
</html>
