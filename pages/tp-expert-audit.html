<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专家审核</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/third-party-data.js"></script>
    <style>
        :root {
            --primary: #3a6fc3;
            --primary-dark: #2c5aa0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f97316;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --radius: 6px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
            font-size: 14px;
        }
        .popup-container {
            max-width: 880px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        .popup-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .popup-header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: 600;
        }
        .popup-header .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .popup-header .close-btn:hover { background: rgba(255,255,255,0.3); }
        .popup-body { padding: 24px; }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary);
            margin: 0 0 16px 0;
            padding-left: 10px;
            border-left: 3px solid var(--primary);
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px 20px;
            margin-bottom: 24px;
        }
        .info-item { display: flex; flex-direction: column; gap: 6px; }
        .info-item.full { grid-column: span 3; }
        .info-item.half { grid-column: span 2; }
        .info-item label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }
        .info-item .value {
            min-height: 34px;
            line-height: 34px;
            padding: 0 12px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-start;
        }
        .form-group { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .form-group label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
        }
        .form-group label .required { color: var(--danger); margin-left: 4px; }
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            font-family: inherit;
            background: #fff;
        }
        .form-group select { height: 36px; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(58,111,195,0.1);
        }
        .status-enabled { color: var(--success); font-weight: 600; }
        .status-disabled { color: var(--danger); font-weight: 600; }
        .audit-info {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 20px;
        }
        .audit-info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .audit-info-row:last-child { margin-bottom: 0; }
        .audit-info-row span:first-child { color: var(--text-secondary); }
        .audit-info-row span:last-child { color: var(--text); font-weight: 500; }
        .btn-group {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .btn {
            padding: 9px 22px;
            border-radius: var(--radius);
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: #fff; color: var(--text-secondary); border: 1px solid var(--border); }
        .btn-outline:hover { background: #f8fafc; color: var(--text); }
        .btn-success { background: var(--success); color: #fff; }
        .btn-success:hover { background: #059669; }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .file-list { margin-top: 8px; }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
        }
        .file-item i { color: var(--primary); margin-right: 8px; }
        .file-item .file-size { color: var(--text-secondary); font-size: 12px; }
    </style>
</head>
<body>
    <div class="popup-container">
        <div class="popup-body">
            <div class="section-title">基本信息</div>
            <div class="info-grid" id="basicInfo">
                <!-- 动态填充 -->
            </div>

            <div class="section-title">职称与专业信息</div>
            <div class="info-grid" id="titleInfo">
                <!-- 动态填充 -->
            </div>

            <div class="section-title">附件材料</div>
            <div id="fileList" class="file-list">
                <!-- 动态填充 -->
            </div>

            <div class="section-title">审核信息</div>
            <div class="audit-info">
                <div class="audit-info-row">
                    <span>提交时间</span>
                    <span id="submitTime">2025-06-18 14:30</span>
                </div>
                <div class="audit-info-row">
                    <span>当前状态</span>
                    <span id="currentStatus">待审核</span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 0 0 200px;">
                    <label>审核状态 <span class="required">*</span></label>
                    <select id="auditStatus">
                        <option value="enabled">启用</option>
                        <option value="disabled">停用</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>审核意见</label>
                    <textarea id="auditRemark" placeholder="请输入审核意见，如无意见请填写“同意”"></textarea>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-outline" onclick="closeWindow()">取消</button>
                <button class="btn btn-danger" onclick="submitAudit(false)" style="margin-right: auto;"><i class="fas fa-ban"></i> 驳回</button>
                <button class="btn btn-success" onclick="submitAudit(true)"><i class="fas fa-check"></i> 通过</button>
            </div>
        </div>
    </div>

    <script>
        function getParam(key) {
            var params = new URLSearchParams(window.location.search);
            return params.get(key);
        }

        var parentExpertList = null;

        window.addEventListener('message', function (e) {
            if (e.data && e.data.action === 'setExpertData') {
                parentExpertList = e.data.list || [];
                render();
            }
        });

        function getExpertList() {
            if (parentExpertList && parentExpertList.length) return parentExpertList;
            var list = [];
            if (typeof getAllExperts === 'function') {
                list = getAllExperts().map(function (e) {
                    var org = getOrgById(e.orgId);
                    return {
                        name: e.name,
                        gender: e.gender,
                        birth: e.birth,
                        org: e.expertType === '独立专家' || !e.orgId ? '独立专家' : (e.orgName || e.workplace || e.org || ''),
                        orgId: e.orgId || '',
                        expertType: e.expertType || (e.orgId ? '机构专家' : '独立专家'),
                        orgCode: org ? org.orgCode : '',
                        domain: e.domain || '',
                        direction: e.direction || '',
                        industryExpertGroup: e.industryExpertGroup || '',
                        title: e.title || '',
                        titleOrg: e.titleOrg || '',
                        titleTime: e.titleTime || '',
                        years: e.years || '',
                        experience: e.experience || '',
                        phone: e.phone || '',
                        email: e.email || '',
                        address: e.address || '',
                        emergencyPosition: e.emergencyPosition || '',
                        originalDepartment: e.originalDepartment || '',
                        emergencySpecialty: e.emergencySpecialty || '',
                        workplace: org ? org.region : (e.workplace || ''),
                        status: e.status === '正常' ? '启用' : e.status
                    };
                });
            }
            if (window.opener && window.opener.expertList) {
                window.opener.expertList.forEach(function (local) {
                    var exists = list.find(function (e) {
                        return e.name === local.name || (local.expertId && e.expertId === local.expertId);
                    });
                    if (!exists) list.push(local);
                });
            }
            return list;
        }

        function formatDateDisplay(dateStr) {
            if (!dateStr) return '';
            var s = String(dateStr).trim();
            if (/^[0-9]{4}-[0-9]{2}$/.test(s)) return s + '-01';
            if (/^[0-9]{4}\/[0-9]{2}$/.test(s)) return s.split('/').join('-') + '-01';
            if (/^[0-9]{4}-[0-9]{2}-[0-9]{2}$/.test(s)) return s;
            var d = new Date(s.split('/').join('-'));
            if (!isNaN(d.getTime())) {
                var y = d.getFullYear();
                var m = ('0' + (d.getMonth() + 1)).slice(-2);
                var day = ('0' + d.getDate()).slice(-2);
                return y + '-' + m + '-' + day;
            }
            return s;
        }

        function formatSize(bytes) {
            if (bytes === 0 || bytes == null) return '0 B';
            var k = 1024;
            var sizes = ['B', 'KB', 'MB', 'GB'];
            var i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function render() {
            var name = getParam('name');
            var params = (typeof getTPQueryParams === 'function') ? getTPQueryParams() : { orgId: getParam('orgId') };
            var list = getExpertList();
            if (params.orgId) {
                list = list.filter(function (e) { return e.orgId === params.orgId || e.expertType === '独立专家'; });
            }
            var expert = null;
            if (name) {
                for (var i = 0; i < list.length; i++) {
                    if (list[i].name === name) {
                        expert = list[i];
                        break;
                    }
                }
            }
            if (!expert) {
                expert = list[0];
            }

            var basicHtml = '';
            basicHtml += createInfoItem('姓名', expert.name);
            basicHtml += createInfoItem('性别', expert.gender);
            basicHtml += createInfoItem('出生年月', formatDateDisplay(expert.birth));
            basicHtml += createInfoItem('工作单位', expert.org, '', expert.orgId);
            basicHtml += createInfoItem('联系电话', expert.phone);
            basicHtml += createInfoItem('电子邮箱', expert.email);
            basicHtml += createInfoItem('通讯地址', expert.address, 'full');
            basicHtml += createInfoItem('应急管理职务', expert.emergencyPosition || '—');
            basicHtml += createInfoItem('原单位部门', expert.originalDepartment || '—');
            basicHtml += createInfoItem('应急管理特长', expert.emergencySpecialty || '—', 'full');
            document.getElementById('basicInfo').innerHTML = basicHtml;

            var titleHtml = '';
            titleHtml += createInfoItem('专业领域', expert.domain);
            titleHtml += createInfoItem('专业', expert.direction);
            titleHtml += createInfoItem('所属行业专家组', expert.industryExpertGroup || '—');
            titleHtml += createInfoItem('职称', expert.title);
            titleHtml += createInfoItem('评定机构', expert.titleOrg);
            titleHtml += createInfoItem('评定时间', formatDateDisplay(expert.titleTime));
            titleHtml += createInfoItem('工作地点', expert.workplace || '');
            titleHtml += createInfoItem('工作年限', expert.years + ' 年');
            titleHtml += createInfoItem('主要工作经历', expert.experience, 'full');
            document.getElementById('titleInfo').innerHTML = titleHtml;

            document.getElementById('currentStatus').innerHTML = expert.status === '启用' || expert.status === 'enabled' ?
                '<span class="status-enabled">启用</span>' : '<span class="status-disabled">停用</span>';
            document.getElementById('auditStatus').value = (expert.status === '启用' || expert.status === 'enabled') ? 'enabled' : 'disabled';

            renderFiles(expert);
        }

        function createInfoItem(label, value, cls, orgId) {
            var display = (value || '');
            if (label === '工作单位' && orgId) {
                display = '<a style="cursor:pointer;color:var(--primary);text-decoration:underline;" onclick="if(parent.goToTPOrg)parent.goToTPOrg(\'' + orgId + '\');">' + display + '</a>';
            }
            return '<div class="info-item ' + (cls || '') + '"><label>' + label + '</label><div class="value">' + display + '</div></div>';
        }

        function renderFiles(expert) {
            var files = [];
            if (window.opener && window.opener.selectedFiles) {
                files = window.opener.selectedFiles;
            }
            if (files.length === 0) {
                files = [
                    { name: '职称证书.pdf', size: 2048000 },
                    { name: '业绩证明材料.pdf', size: 1536000 },
                    { name: '学历学位证书.pdf', size: 1024000 }
                ];
            }
            var html = '';
            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                html += '<div class="file-item">' +
                    '<div><i class="fas fa-file-pdf"></i> ' + file.name + '</div>' +
                    '<div><span class="file-size">' + formatSize(file.size) + '</span></div>' +
                '</div>';
            }
            document.getElementById('fileList').innerHTML = html;
        }

        function submitAudit(pass) {
            var status = document.getElementById('auditStatus').value;
            var remark = document.getElementById('auditRemark').value.trim();
            if (!remark) {
                alert('请输入审核意见');
                return;
            }
            var statusText = status === 'enabled' ? '启用' : '停用';
            var actionText = pass ? '通过' : '驳回';
            if (confirm('确认' + actionText + '该专家信息？审核后状态将设置为：' + statusText)) {
                var name = getParam('name');
                // 优先使用 postMessage 通知父页面/弹窗容器，保持 iframe 内数据一致
                if (window.parent && window.parent !== window) {
                    try {
                        window.parent.postMessage({
                            action: 'expertAudit',
                            payload: {
                                name: name,
                                passed: pass,
                                remark: remark
                            }
                        }, '*');
                    } catch (e) {}
                } else if (window.opener && window.opener.expertList) {
                    var list = window.opener.expertList;
                    for (var i = 0; i < list.length; i++) {
                        if (list[i].name === name) {
                            list[i].status = statusText;
                            if (!list[i].history) list[i].history = [];
                            list[i].history.unshift({
                                time: formatNow(),
                                action: pass ? '审核通过' : '审核驳回',
                                operator: '审核员',
                                remark: remark
                            });
                            break;
                        }
                    }
                    if (typeof window.opener.searchExpert === 'function') {
                        window.opener.searchExpert();
                    }
                }
                alert('审核' + actionText + '成功');
                closeWindow();
            }
        }

        function formatNow() {
            var now = new Date();
            var y = now.getFullYear();
            var m = String(now.getMonth() + 1).padStart(2, '0');
            var d = String(now.getDate()).padStart(2, '0');
            var h = String(now.getHours()).padStart(2, '0');
            var min = String(now.getMinutes()).padStart(2, '0');
            var s = String(now.getSeconds()).padStart(2, '0');
            return y + '-' + m + '-' + d + ' ' + h + ':' + min + ':' + s;
        }

        function closeWindow() {
            if (window.parent && window.parent !== window) {
                try {
                    window.parent.postMessage({ action: 'closeExpertModal' }, '*');
                } catch (e) {}
            } else {
                if (window.opener && !window.opener.closed) {
                    window.close();
                } else {
                    window.close();
                }
            }
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
