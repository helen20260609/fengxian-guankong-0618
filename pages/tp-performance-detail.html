<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业绩详情 - 第三方服务机构</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="tp-common.css">
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); padding: 20px; }
.page-container { max-width: 960px; margin: 0 auto; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.card-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.card-body { padding: 20px; }
.badge { font-size: 12px; font-weight: 400; color: var(--text-secondary); }

/* 信息展示 */
.info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px 24px; font-size: 14px; }
.info-item { display: flex; flex-direction: column; gap: 6px; }
.info-label { color: var(--text-secondary); font-size: 13px; }
.info-value { color: var(--text-primary); font-weight: 500; word-break: break-all; }
.info-value.amount { color: var(--primary); font-size: 16px; font-weight: 700; }
.status-tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 12px; line-height: 1.4; }
.status-tag.primary { background: var(--primary-light); color: var(--primary); }
.status-tag.success { background: rgba(30,142,62,0.12); color: var(--success); }
.status-tag.warning { background: rgba(227,116,0,0.12); color: var(--warning); }
.status-tag.danger { background: rgba(217,48,37,0.12); color: var(--danger); }
.status-tag.info { background: rgba(26,115,232,0.12); color: var(--primary); }
.status-tag.grey { background: var(--bg-hover); color: var(--text-secondary); }

.full-section { grid-column: 1 / -1; }

/* 编辑表单 */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; color: var(--text-primary); }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }
.form-row-full { display: grid; grid-template-columns: 1fr; gap: 16px 24px; margin-bottom: 16px; }
.file-upload { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--input-bg); }
.file-upload input[type="file"] { display: none; }
.file-upload label { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; cursor: pointer; background: var(--bg-card); color: var(--text-primary); transition: all 0.2s; }
.file-upload label:hover { border-color: var(--primary); color: var(--primary); }
.file-upload .file-name { font-size: 13px; color: var(--text-secondary); }

/* 按钮 */
.form-actions { display: flex; align-items: center; gap: 12px; }
.btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b91c1c; }

/* 文件列表 */
.file-list { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
.file-list-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg-card); font-size: 13px;
}
.file-list-item .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-list-item .file-size { color: var(--text-secondary); font-size: 12px; margin-left: 8px; }
.file-list-item .file-remove { color: var(--danger); cursor: pointer; margin-left: 10px; font-size: 12px; }
.file-list-item .file-remove:hover { text-decoration: underline; }

@media (max-width: 768px) {
    .info-grid, .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="page-container">
    <div class="card" id="detailCard">
        <div class="card-body" id="detailBody">
            <!-- 详情内容或编辑表单 -->
        </div>
    </div>
</div>

<script>
(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();

var domains = ['建筑工地','基坑','交通','玻璃幕墙','燃气','高空坠物','城镇自建房','农村自建房'];
var serviceTypes = ['应急咨询','安全评估','检测检验','隐患排查'];
var conclusions = ['合格','基本合格','不合格','待验收'];

var params = parseUrlParams();
var isEdit = params.mode === 'edit';
var recordId = parseInt(params.id, 10) || 0;

var allData = loadPerformanceData();
var record = allData.find(function(item) { return item.id === recordId; });

var pendingProofFiles = [];

function parseUrlParams() {
    var query = window.location.search.substring(1);
    var result = {};
    query.split('&').forEach(function(part) {
        var pair = part.split('=');
        if (pair.length === 2) {
            result[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1]);
        }
    });
    return result;
}

function loadPerformanceData() {
    var raw = localStorage.getItem('performanceData');
    if (raw) {
        try {
            var list = JSON.parse(raw);
            if (Array.isArray(list)) return list;
        } catch (e) {}
    }
    return [];
}

function savePerformanceData() {
    localStorage.setItem('performanceData', JSON.stringify(allData));
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function formatFileSize(bytes) {
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(2) + ' MB';
    if (bytes >= 1024) return (bytes / 1024).toFixed(2) + ' KB';
    return bytes + ' B';
}

function getConclusionClass(conclusion) {
    if (conclusion === '合格') return 'success';
    if (conclusion === '基本合格') return 'warning';
    if (conclusion === '不合格') return 'danger';
    return 'info';
}

function getAuditStatusClass(status) {
    if (status === '已通过') return 'success';
    if (status === '已退回') return 'danger';
    if (status === '待审核') return 'warning';
    return 'grey';
}

function getSelectOptions(values, selected) {
    return values.map(function(v) {
        return '<option ' + (v === selected ? 'selected' : '') + '>' + escapeHtml(v) + '</option>';
    }).join('');
}

function renderProofFiles(list) {
    if (!list || list.length === 0) {
        return '<div style="color:var(--text-secondary);font-size:13px;">暂无证明材料</div>';
    }
    return '<div class="file-list">' + list.map(function(f, idx) {
        return '<div class="file-list-item">' +
            '<span class="file-name"><i class="fas fa-paperclip" style="margin-right:6px;color:var(--primary);"></i>' + escapeHtml(f.name) + '</span>' +
            '<span class="file-size">' + formatFileSize(f.size) + '</span>' +
            (isEdit ? '<span class="file-remove" onclick="removeEditProofFile(' + idx + ')"><i class="fas fa-times"></i> 删除</span>' : '') +
            '</div>';
    }).join('') + '</div>';
}

function getOrgName() {
    var raw = localStorage.getItem('orgInfo');
    if (raw) {
        try { var info = JSON.parse(raw); if (info.name) return info.name; } catch (e) {}
    }
    return '上海建科咨询有限公司';
}

function renderDetail() {
    var html = '<div class="info-grid">' +
        '<div class="info-item"><div class="info-label">项目名称</div><div class="info-value">' + escapeHtml(record.projectName) + '</div></div>' +
        '<div class="info-item"><div class="info-label">委托单位</div><div class="info-value">' + escapeHtml(record.client) + '</div></div>' +
        '<div class="info-item"><div class="info-label">服务领域</div><div class="info-value"><span class="status-tag primary">' + escapeHtml(record.domain) + '</span></div></div>' +
        '<div class="info-item"><div class="info-label">服务类型</div><div class="info-value">' + escapeHtml(record.serviceType) + '</div></div>' +
        '<div class="info-item"><div class="info-label">机构名称</div><div class="info-value">' + escapeHtml(record.orgName || getOrgName()) + '</div></div>' +
        '<div class="info-item"><div class="info-label">服务时间</div><div class="info-value">' + escapeHtml(record.serviceTime) + '</div></div>' +
        '<div class="info-item"><div class="info-label">合同金额</div><div class="info-value amount">' + record.amount.toFixed(1) + ' 万</div></div>' +
        '<div class="info-item"><div class="info-label">验收结论</div><div class="info-value"><span class="status-tag ' + getConclusionClass(record.conclusion) + '">' + escapeHtml(record.conclusion) + '</span></div></div>' +
        '<div class="info-item"><div class="info-label">审核状态</div><div class="info-value"><span class="status-tag ' + getAuditStatusClass(record.auditStatus) + '">' + escapeHtml(record.auditStatus || '待审核') + '</span></div></div>' +
        '<div class="info-item full-section"><div class="info-label">交付物</div><div class="info-value">' + escapeHtml(record.deliverable || '') + '</div></div>' +
        '<div class="info-item full-section"><div class="info-label">业绩说明</div><div class="info-value">' + escapeHtml(record.description || '') + '</div></div>' +
        '<div class="info-item full-section"><div class="info-label">证明材料</div><div class="info-value">' + renderProofFiles(record.proofFiles) + '</div></div>' +
        '</div>' +
        '</div>';
    document.getElementById('detailBody').innerHTML = html;
}

function switchToEdit() {
    window.location.href = 'tp-performance-detail.html?id=' + recordId + '&mode=edit';
    if (window.parent && window.parent !== window) {
        try { window.parent.postMessage({ action: 'performanceRefresh' }, '*'); } catch (e) {}
    }
}

function closeDetailWindow() {
    if (window.parent && window.parent !== window) {
        try { window.parent.document.querySelector('.modal-overlay')?.remove(); } catch (e) {}
    } else {
        window.close();
    }
}

function renderEdit() {
    pendingProofFiles = (record.proofFiles || []).slice();
    var html = '<div class="form-row">' +
        '<div class="form-group"><label>项目名称 <span class="required">*</span></label><input type="text" id="editProjectName" value="' + escapeHtml(record.projectName) + '"></div>' +
        '<div class="form-group"><label>机构名称 <span class="required">*</span></label><input type="text" id="editOrgName" value="' + escapeHtml(record.orgName || getOrgName()) + '"></div>' +
        '</div>' +
        '<div class="form-row">' +
        '<div class="form-group"><label>委托单位 <span class="required">*</span></label><input type="text" id="editClient" value="' + escapeHtml(record.client) + '"></div>' +
        '<div class="form-group"><label>服务领域 <span class="required">*</span></label><select id="editDomain">' + getSelectOptions(domains, record.domain) + '</select></div>' +
        '</div>' +
        '<div class="form-row">' +
        '<div class="form-group"><label>服务类型 <span class="required">*</span></label><select id="editServiceType">' + getSelectOptions(serviceTypes, record.serviceType) + '</select></div>' +
        '<div class="form-group"><label>服务时间 <span class="required">*</span></label><input type="text" id="editServiceTime" value="' + escapeHtml(record.serviceTime) + '"></div>' +
        '</div>' +
        '<div class="form-row">' +
        '<div class="form-group"><label>合同金额 (万元)</label><input type="number" id="editAmount" value="' + record.amount + '"></div>' +
        '<div class="form-group"><label>验收结论</label><select id="editConclusion">' + getSelectOptions(conclusions, record.conclusion) + '</select></div>' +
        '</div>' +
        '<div class="form-row">' +
        '<div class="form-group"><label>审核状态</label><select id="editAuditStatus">' + getSelectOptions(['待审核','已通过','已退回'], record.auditStatus || '待审核') + '</select></div>' +
        '<div class="form-group"></div>' +
        '</div>' +
        '<div class="form-row-full"><div class="form-group"><label>交付物 <span class="required">*</span></label><textarea id="editDeliverable">' + escapeHtml(record.deliverable || '') + '</textarea></div></div>' +
        '<div class="form-row-full"><div class="form-group"><label>业绩说明</label><textarea id="editDescription">' + escapeHtml(record.description || '') + '</textarea></div></div>' +
        '<div class="form-row-full"><div class="form-group"><label>证明材料 <span class="required">*</span></label><div class="file-upload"><label for="editFileInput">选择文件</label><input type="file" id="editFileInput" multiple onchange="onEditFilesSelected(this)"><span class="file-name" id="editFileName">支持多选，建议选择合同、报告、验收单等扫描件</span></div><div id="editFileList"></div></div></div>' +
        '<div class="form-actions">' +
        '<button class="btn btn-primary" onclick="saveEdit()""><i class="fas fa-save"></i> 保存</button>' +
        '<button class="btn btn-outline" onclick="window.location.href=\'tp-performance-detail.html?id=' + recordId + '\'""><i class="fas fa-times"></i> 取消</button>' +
        '</div>';
    document.getElementById('detailBody').innerHTML = html;
    renderEditFileList();
}

function renderEditFileList() {
    document.getElementById('editFileList').innerHTML = renderProofFiles(pendingProofFiles);
}

function removeEditProofFile(idx) {
    pendingProofFiles.splice(idx, 1);
    renderEditFileList();
}

function onEditFilesSelected(input) {
    if (!input.files || input.files.length === 0) return;
    Array.from(input.files).forEach(function(file) {
        var reader = new FileReader();
        reader.onload = function(e) {
            pendingProofFiles.push({
                name: file.name,
                size: file.size,
                type: file.type || 'application/octet-stream',
                data: e.target.result
            });
            renderEditFileList();
        };
        reader.readAsDataURL(file);
    });
    input.value = '';
}

function parseStartMonth(time) {
    var parts = time.split('~');
    var start = parts[0] ? parts[0].trim() : '';
    if (/^\d{4}-\d{2}$/.test(start)) return start;
    if (/^\d{4}-\d{2}-\d{2}$/.test(start)) return start.substring(0, 7);
    return '2026-01';
}

function saveEdit() {
    var projectName = document.getElementById('editProjectName').value.trim();
    var orgName = document.getElementById('editOrgName').value.trim();
    var client = document.getElementById('editClient').value.trim();
    var domain = document.getElementById('editDomain').value;
    var serviceType = document.getElementById('editServiceType').value;
    var serviceTime = document.getElementById('editServiceTime').value.trim();
    var amount = parseFloat(document.getElementById('editAmount').value) || 0;
    var conclusion = document.getElementById('editConclusion').value;
    var auditStatus = document.getElementById('editAuditStatus').value;
    var deliverable = document.getElementById('editDeliverable').value.trim();
    var description = document.getElementById('editDescription').value.trim();

    if (!projectName || !client || !orgName) {
        alert('请填写项目名称、机构名称和委托单位');
        return;
    }
    if (!deliverable) {
        alert('请填写交付物');
        return;
    }
    if (pendingProofFiles.length === 0) {
        alert('请至少上传一份证明材料');
        return;
    }

    record.projectName = projectName;
    record.client = client;
    record.orgName = orgName;
    record.domain = domain;
    record.serviceType = serviceType;
    record.serviceTime = serviceTime;
    record.startMonth = parseStartMonth(serviceTime);
    record.amount = amount;
    record.conclusion = conclusion;
    record.auditStatus = auditStatus;
    record.deliverable = deliverable;
    record.description = description;
    record.proofFiles = pendingProofFiles.slice();

    savePerformanceData();

    // 通知父页面刷新列表
    if (window.parent && window.parent !== window) {
        try { window.parent.postMessage({ action: 'performanceRefresh' }, '*'); } catch (e) {}
    }

    alert('保存成功');
    window.location.href = 'tp-performance-detail.html?id=' + recordId;
}

document.addEventListener('DOMContentLoaded', function() {
    if (!record) {
        document.getElementById('detailBody').innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">未找到对应的业绩记录</div>';
        return;
    }
    if (isEdit) {
        renderEdit();
    } else {
        renderDetail();
    }
});
</script>
</body>
</html>
