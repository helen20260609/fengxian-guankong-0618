<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>农村自建房 - 新增风险巡查任务</title>
<link rel="stylesheet" href="./all.min.css">
<style>
/* ===== Theme Variables ===== */
:root {
    --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
    --secondary: #0097a7; --danger: #d93025; --warning: #e65100; --success: #1e8e3e;
    --bg-dark: #f0f2f5; --bg-card: #ffffff; --bg-hover: #e8eaed;
    --text-primary: #202124; --text-secondary: #5f6368; --border: #dadce0;
    --shadow: rgba(0,0,0,0.08); --input-bg: #ffffff; --input-border: #dadce0;
}
:root[data-theme="dark"] {
    --primary: #1e6fdb; --primary-dark: #1557b0; --primary-light: #e8f1fd;
    --secondary: #00b4d8; --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
    --bg-dark: #0a1628; --bg-card: #112240; --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0; --text-secondary: #94a3b8; --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3); --input-bg: rgba(255,255,255,0.05); --input-border: #1e3a5f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    padding: 20px 20px 80px 20px;
    min-height: 100vh;
}

/* ===== Breadcrumb ===== */
.breadcrumb {
    font-size: 13px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
}
.breadcrumb a {
    color: var(--primary);
    text-decoration: none;
    cursor: pointer;
}
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb-sep { color: var(--text-secondary); opacity: 0.5; }
.page-title {
    font-size: 20px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
}
.page-title i { color: var(--primary); }

/* ===== Stepper ===== */
.stepper-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin-bottom: 24px;
    padding: 0 20px;
}
.step-item {
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
}
.step-circle {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
    transition: all 0.3s;
    border: 2px solid var(--border);
    background: var(--bg-card);
    color: var(--text-secondary);
}
.step-item.active .step-circle,
.step-item.completed .step-circle {
    border-color: var(--primary);
    background: var(--primary);
    color: #fff;
}
.step-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    white-space: nowrap;
}
.step-item.active .step-label,
.step-item.completed .step-label {
    color: var(--primary);
}
.step-line {
    width: 60px;
    height: 2px;
    background: var(--border);
    margin: 0 12px;
    transition: all 0.3s;
}
.step-line.completed {
    background: var(--primary);
}

/* ===== Section Card ===== */
.section-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 1px 3px var(--shadow);
}
.section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 18px;
    background: var(--bg-hover);
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    font-weight: 700;
}
.section-header i { color: var(--primary); font-size: 14px; }
.section-body { padding: 18px; }

/* ===== Form Styles ===== */
.form-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
}
.form-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.form-item.col-2 { grid-column: span 2; }
.form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
}
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input,
.form-select,
.form-textarea {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--input-bg);
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
    width: 100%;
}
.form-input:focus,
.form-select:focus,
.form-textarea:focus { border-color: var(--primary); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-select { cursor: pointer; }

/* Date Range */
.date-range {
    display: flex;
    align-items: center;
    gap: 8px;
}
.date-range .form-input { flex: 1; }
.date-range-sep {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
}

/* ===== Org Tree Modal ===== */
.org-modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
}
.org-modal-overlay.active { opacity: 1; visibility: visible; }
.org-modal {
    background: var(--bg-card);
    border-radius: 12px;
    width: 90%;
    max-width: 700px;
    max-height: 80vh;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    transform: translateY(-20px);
    transition: transform 0.3s;
    display: flex;
    flex-direction: column;
}
.org-modal-overlay.active .org-modal { transform: translateY(0); }
.org-modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
}
.org-modal-header h3 {
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
}
.org-modal-header h3 i { color: var(--primary); }
.org-modal-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}
.org-modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.org-modal-body {
    display: flex;
    flex: 1;
    overflow: hidden;
    min-height: 400px;
}
.org-tree-panel {
    width: 220px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
}
.org-tree-item {
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-primary);
}
.org-tree-item:hover { background: var(--bg-hover); }
.org-tree-item.active {
    background: var(--primary-light);
    color: var(--primary);
    font-weight: 600;
}
.org-tree-item i {
    font-size: 11px;
    color: var(--text-secondary);
    width: 14px;
    text-align: center;
}
.org-tree-item.active i { color: var(--primary); }
.org-tree-item .toggle-icon {
    font-size: 10px;
    margin-right: 2px;
    transition: transform 0.2s;
}
.org-tree-item.expanded .toggle-icon { transform: rotate(90deg); }
.org-tree-children {
    padding-left: 16px;
}
.org-person-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.org-person-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.org-person-header .selected-info {
    font-size: 13px;
    color: var(--text-secondary);
}
.org-person-header .selected-info strong {
    color: var(--primary);
}
.org-person-search {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
}
.org-person-search input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    background: var(--input-bg);
    color: var(--text-primary);
    outline: none;
}
.org-person-search input:focus { border-color: var(--primary); }
.org-person-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
}
.org-person-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}
.org-person-table thead th {
    padding: 10px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border);
    background: var(--bg-hover);
}
.org-person-table tbody td {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
}
.org-person-table tbody tr:hover { background: rgba(26,115,232,0.04); }
.org-person-table tbody tr.selected { background: var(--primary-light); }
.org-person-table .person-checkbox {
    width: 16px; height: 16px;
    accent-color: var(--primary);
    cursor: pointer;
}
.org-modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
}

/* Person input trigger */
.person-input-trigger {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--input-bg);
    cursor: pointer;
    transition: border-color 0.2s;
    min-height: 40px;
}
.person-input-trigger:hover { border-color: var(--primary); }
.person-input-trigger .placeholder {
    color: var(--text-secondary);
    flex: 1;
}
.person-input-trigger .selected-persons {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    flex: 1;
}
.person-input-trigger .person-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    background: var(--primary-light);
    color: var(--primary);
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
}
.person-input-trigger .person-tag .remove {
    cursor: pointer;
    font-size: 10px;
}
.person-input-trigger .person-tag .remove:hover { color: var(--danger); }
.person-input-trigger .trigger-icon {
    color: var(--text-secondary);
    font-size: 12px;
}
.transfer-wrapper {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    min-height: 420px;
}
.transfer-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-card);
}
.transfer-panel + .transfer-panel {
    border-left: 1px solid var(--border);
}
.transfer-panel-header {
    padding: 12px 16px;
    background: var(--bg-hover);
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.transfer-panel-header .count {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-secondary);
    background: var(--bg-card);
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
}
.transfer-panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
}
.transfer-filter {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}
.transfer-filter .form-input,
.transfer-filter .form-select {
    padding: 6px 10px;
    font-size: 12px;
}
.transfer-select-all-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-hover);
    cursor: pointer;
    transition: background 0.2s;
    position: sticky;
    top: 0;
    z-index: 2;
}
.transfer-select-all-bar:hover { background: var(--bg-card); }
.transfer-select-all-bar input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--primary);
    cursor: pointer;
}

.transfer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid transparent;
    margin-bottom: 6px;
}
.transfer-item:hover {
    background: var(--bg-hover);
    border-color: var(--border);
}
.transfer-item.selected {
    background: var(--primary-light);
    border-color: var(--primary);
}
.transfer-item input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--primary);
    cursor: pointer;
    flex-shrink: 0;
}
.transfer-item-info {
    flex: 1;
    min-width: 0;
}
.transfer-item-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.transfer-item-meta {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 2px;
}
.transfer-item-tag {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 600;
    white-space: nowrap;
}
.transfer-item-tag.gas { background: rgba(26,115,232,0.12); color: var(--primary); }
.transfer-item-tag.pipeline { background: rgba(0,151,167,0.12); color: var(--secondary); }
.transfer-item-tag.station { background: rgba(249,200,70,0.12); color: #c78000; }

/* Selected items in right panel */
.transfer-target-item {
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
}
.transfer-target-item:hover { background: var(--bg-hover); }
.transfer-target-item.selected { background: var(--primary-light); }
.transfer-target-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    cursor: pointer;
}
.transfer-target-header input[type="checkbox"] {
    width: 16px; height: 16px;
    accent-color: var(--primary);
    cursor: pointer;
}
.transfer-target-header .remove-btn {
    width: 24px; height: 24px;
    border-radius: 4px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}
.transfer-target-header .remove-btn:hover {
    background: rgba(217,48,37,0.12);
    color: var(--danger);
}
.expand-icon {
    transition: transform 0.2s ease;
}
.expand-icon.expanded {
    transform: rotate(180deg);
}
.transfer-target-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background: rgba(26,115,232,0.02);
}
.transfer-target-detail.expanded {
    max-height: 500px;
    border-top: 1px solid var(--border);
}
.transfer-target-detail .detail-grid {
    padding: 12px 14px 12px 40px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px 16px;
}
.transfer-target-detail .detail-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
}
.transfer-target-detail .detail-label {
    font-size: 11px;
    color: var(--text-secondary);
    font-weight: 500;
}
.transfer-target-detail .detail-value {
    font-size: 13px;
    color: var(--text-primary);
}
.transfer-target-detail .detail-value .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
}
.transfer-target-detail .detail-value .tag.warning {
    background: rgba(230,81,0,0.12);
    color: var(--warning);
}
.transfer-target-detail .detail-value .tag.danger {
    background: rgba(217,48,37,0.12);
    color: var(--danger);
}
.transfer-target-detail .detail-value .tag.success {
    background: rgba(30,142,62,0.12);
    color: var(--success);
}
.transfer-target-detail .detail-value .tag.info {
    background: rgba(26,115,232,0.12);
    color: var(--primary);
}
.transfer-selected-item .detail-value {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-primary);
}
.transfer-selected-item .remove-btn {
    width: 24px; height: 24px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--danger);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
}
.transfer-selected-item .remove-btn:hover { background: rgba(217,48,37,0.12); }

/* Transfer Actions (middle) */
.transfer-actions {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px;
    background: var(--bg-hover);
    border-left: 1px solid var(--border);
    border-right: 1px solid var(--border);
    min-width: 60px;
}
.transfer-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--primary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 14px;
}
.transfer-btn:hover {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
}
.transfer-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}
.transfer-btn:disabled:hover {
    background: var(--bg-card);
    color: var(--primary);
    border-color: var(--border);
}

/* Empty state for transfer */
.transfer-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: var(--text-secondary);
    gap: 8px;
    text-align: center;
}
.transfer-empty i { font-size: 36px; opacity: 0.3; }
.transfer-empty p { font-size: 13px; }

/* ===== Risk List Table ===== */
.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}
.data-table thead th {
    background: var(--bg-hover);
    padding: 12px 14px;
    text-align: left;
    font-weight: 600;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
}
.data-table tbody td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    vertical-align: middle;
}
.data-table tbody tr:hover { background: rgba(26,115,232,0.04); }
.data-table tbody tr:last-child td { border-bottom: none; }

/* Risk Level Tags */
.risk-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
}
.risk-tag.red {
    background: rgba(217,48,37,0.12);
    color: var(--danger);
}
.risk-tag.orange {
    background: rgba(230,81,0,0.12);
    color: var(--warning);
}
.risk-tag.yellow {
    background: rgba(249,200,70,0.12);
    color: #c78000;
}
.risk-tag.blue {
    background: rgba(26,115,232,0.12);
    color: var(--primary);
}

/* ===== Project Risk Cards (Step 3) ===== */
.project-risk-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: 0 1px 3px var(--shadow);
    transition: all 0.3s;
}
.project-risk-card:hover {
    box-shadow: 0 4px 12px var(--shadow);
}
.project-risk-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--bg-hover);
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.2s;
}
.project-risk-header:hover {
    background: rgba(26,115,232,0.06);
}
.project-risk-header .project-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
}
.project-risk-header .project-icon.gas { background: rgba(26,115,232,0.12); color: var(--primary); }
.project-risk-header .project-icon.pipeline { background: rgba(0,151,167,0.12); color: var(--secondary); }
.project-risk-header .project-icon.station { background: rgba(249,200,70,0.12); color: #c78000; }
.project-risk-header .project-icon.user { background: rgba(30,142,62,0.12); color: var(--success); }
.project-risk-header .project-info {
    flex: 1;
    min-width: 0;
}
.project-risk-header .project-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
}
.project-risk-header .project-meta {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
}
.project-risk-header .project-stats {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
}
.project-risk-header .stat-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
}

function buildOrgTreeHtml(nodes, depth) {
    return nodes.map(node => {
        const isExpanded = expandedOrgDepts.has(node.id);
        const isActive = currentOrgDeptId === node.id;
        const hasChildren = node.children && node.children.length > 0;
        const indent = depth * 12;

        let html = `<div class="org-tree-item ${isActive ? 'active' : ''}" style="padding-left:${16 + indent}px" data-id="${node.id}" onclick="selectOrgDept('${node.id}')">`;
        if (hasChildren) {
            html += `<i class="fas fa-chevron-right toggle-icon ${isExpanded ? 'expanded' : ''}" style="margin-right:4px;" onclick="event.stopPropagation();toggleOrgDept('${node.id}')"></i>`;
        } else {
            html += `<i class="fas fa-building" style="margin-right:4px;font-size:11px;"></i>`;
        }
        html += `<span>${node.name}</span></div>`;

        if (hasChildren && isExpanded) {
            html += `<div class="org-tree-children">${buildOrgTreeHtml(node.children, depth + 1)}</div>`;
        }
        return html;
    }).join('');
}

function isChildDept(childId, parentId) {
    function findNode(nodes, id) {
        for (const node of nodes) {
            if (node.id === id) return node;
            if (node.children) {
                const found = findNode(node.children, id);
                if (found) return found;
            }
        }
        return null;
    }
    function isDescendant(node, targetId) {
        if (!node.children) return false;
        for (const child of node.children) {
            if (child.id === targetId) return true;
            if (isDescendant(child, targetId)) return true;
        }
        return false;
    }
    const parentNode = findNode(orgData, parentId);
    if (!parentNode) return false;
    return isDescendant(parentNode, childId);
}

const stepHints = {
    1: '请填写任务基本信息，带 * 号为必填项',
    2: '从左侧项目库中选择需要巡查的项目，点击箭头添加',
    3: '查看各项目关联的风险清单，系统将自动展示相关风险',
    4: '请确认任务信息无误后发布'
};

function updateStepper() {
    document.querySelectorAll('.step-item').forEach(item => {
        const step = parseInt(item.dataset.step);
        item.classList.remove('active', 'completed');
        if (step < currentStep) {
            item.classList.add('completed');
            item.querySelector('.step-circle').innerHTML = '<i class="fas fa-check"></i>';
        } else if (step === currentStep) {
            item.classList.add('active');
            item.querySelector('.step-circle').textContent = step;
        } else {
            item.querySelector('.step-circle').textContent = step;
        }
    });

    document.querySelectorAll('.step-line').forEach(line => {
        const lineNum = parseInt(line.dataset.line);
        line.classList.toggle('completed', lineNum < currentStep);
    });

    document.querySelectorAll('.step-content').forEach(content => {
        content.classList.remove('active');
    });
    document.getElementById('step' + currentStep).classList.add('active');

    document.getElementById('stepHint').textContent = stepHints[currentStep];

    // Button states
    document.getElementById('btnPrev').disabled = currentStep === 1;
    document.getElementById('btnDraft').style.display = currentStep === totalSteps ? 'none' : 'flex';

    if (currentStep === totalSteps) {
        document.getElementById('btnNext').style.display = 'none';
        document.getElementById('btnConfirm').style.display = 'flex';
        updateConfirmInfo();
    } else {
        document.getElementById('btnNext').style.display = 'flex';
        document.getElementById('btnConfirm').style.display = 'none';
    }
}

function nextStep() {
    if (currentStep < totalSteps) {
        currentStep++;
        updateStepper();
        // Refresh risk table when entering step 3
        if (currentStep === 3) {
            renderRiskTable();
        }
    }
}

function prevStep() {
    if (currentStep > 1) {
        currentStep--;
        updateStepper();
    }
}

function renderRiskTableForProject(risks, projectId) {
    if (risks.length === 0) {
        return `
            <div style="text-align:center;padding:24px;color:var(--text-secondary);font-size:13px;">
                <i class="fas fa-shield-halved" style="font-size:24px;opacity:0.3;display:block;margin-bottom:8px;"></i>
                该项目暂无关联风险
            </div>
        `;
    }

    // Group by category (simulate)
    const categories = [
        { name: '设备设施风险', icon: 'fa-cogs', risks: risks.filter((r, i) => i % 3 === 0) },
        { name: '管道运行风险', icon: 'fa-route', risks: risks.filter((r, i) => i % 3 === 1) },
        { name: '安全管理风险', icon: 'fa-clipboard-check', risks: risks.filter((r, i) => i % 3 === 2) }
    ].filter(c => c.risks.length > 0);

    // If no distribution, put all in one category
    if (categories.length === 0) {
        categories.push({ name: '关联风险', icon: 'fa-exclamation-triangle', risks: risks });
    }

    return categories.map(cat => `
        <div class="risk-category-header">
            <i class="fas ${cat.icon}"></i>
            ${cat.name} (${cat.risks.length}条)
        </div>
        <table class="risk-table">
            <thead>
                <tr>
                        <th style="width:50px;text-align:center;">序号</th>
                        <th style="width:160px;">风险名称</th>
                        <th style="width:100px;">风险辨识</th>
                        <th style="width:80px;">可能导致</th>
                        <th style="width:80px;text-align:center;">分级</th>
                        <th>主要防范措施</th>
                        <th style="width:140px;">工作依据</th>
                    </tr>
                </thead>
                <tbody>
                    ${cat.risks.map((r, idx) => `
                        <tr>
                            <td class="risk-index" style="text-align:center;">${idx + 1}</td>
                            <td><strong>${r.name}</strong></td>
                            <td>${r.type}</td>
                            <td><span class="risk-tag-inline ${r.level}"><span class="risk-level-dot ${r.level}"></span>${r.levelLabel}</span></td>
                            <td style="text-align:center;"><span class="risk-tag-inline ${r.level}">${r.levelLabel}</span></td>
                            <td class="risk-measures" title="定期巡检、及时更换老化部件、建立设备台账">定期巡检、及时更换老化部件、建立设备台账</td>
                            <td class="risk-law" title="《城镇燃气管理条例》《燃气设施运行维护规程》">《城镇燃气管理条例》</td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
        `).join('');
    }

function toggleProjectCard(projectId) {
    const body = document.getElementById('projectBody-' + projectId);
    const icon = document.querySelector(`[onclick="toggleProjectCard('${projectId}')"] .expand-icon`);
    if (body) {
        if (body.classList.contains('expanded')) {
            body.classList.remove('expanded');
            body.style.maxHeight = '0px';
            if (icon) icon.classList.remove('expanded');
        } else {
            body.classList.add('expanded');
            // 先设置为 auto 获取实际高度，再设置 maxHeight 触发动画
            body.style.maxHeight = 'none';
            const scrollHeight = body.scrollHeight;
            body.style.maxHeight = scrollHeight + 'px';
            if (icon) icon.classList.add('expanded');
        }
    }
}

function toggleRiskBound(riskId) {
    if (boundRiskIds.has(riskId)) {
        boundRiskIds.delete(riskId);
    } else {
        boundRiskIds.add(riskId);
    }
    updateRiskBoundCount();
}

function toggleProjectRiskAll(projectId, checked) {
    const project = selectedProjects.find(p => p.id === projectId);
    if (!project) return;
    const projRisks = allRisks.filter(r => r.project === project.name);
    projRisks.forEach(r => {
        if (checked) {
            boundRiskIds.add(r.id);
        } else {
            boundRiskIds.delete(r.id);
        }
    });
    renderProjectRiskCards();
}

function updateRiskBoundCount() {
    // Count all risks for selected projects
    const projectNames = selectedProjects.map(p => p.name);
    const relatedRisks = allRisks.filter(r => projectNames.includes(r.project));
    document.getElementById('riskBoundCount').textContent = relatedRisks.length;
}

function renderRiskTable() {
    // Keep for compatibility, delegate to new function
    renderProjectRiskCards();
}

function updateConfirmInfo() {
    const name = document.getElementById('taskName').value || '-';
    const typeMap = { routine: '日常巡查', special: '专项巡查', emergency: '应急巡查', seasonal: '季节性巡查' };
    const type = typeMap[document.getElementById('taskType').value] || '-';
    const start = document.getElementById('taskStartDate').value || '-';
    const end = document.getElementById('taskEndDate').value || '-';
    const person = selectedPersons.length > 0 ? selectedPersons.map(p => p.name).join('、') : '-';

    const desc = document.getElementById('taskDesc').value || '-';

    document.getElementById('confirmName').textContent = name;
    document.getElementById('confirmType').textContent = type;
    document.getElementById('confirmPeriod').textContent = start !== '-' ? `${start} 至 ${end}` : '-';
    document.getElementById('confirmPerson').textContent = person;
    document.getElementById('confirmDesc').textContent = desc;

    if (selectedProjects.length > 0) {
        document.getElementById('confirmProjects').innerHTML = selectedProjects.map(p =>
            `<span style="display:inline-block;margin:2px 4px;padding:2px 8px;background:var(--primary-light);color:var(--primary);border-radius:4px;font-size:12px;">${p.name}</span>`
        ).join('');
    } else {
        document.getElementById('confirmProjects').textContent = '-';
    }
}
