<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机构入库管理 - 第三方服务机构</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<script src="../js/third-party-data.js"></script>
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

/* 表单卡片 */
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.form-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.form-body { padding: 20px; }
.form-hint { font-size: 12px; color: var(--text-secondary); }

/* 表单布局 */
.form-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.form-section:last-child { border-bottom: none; margin-bottom: 0; }
.form-section-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.form-section-title i { font-size: 16px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-row:last-child { margin-bottom: 0; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full-width { grid-column: 1 / -1; }
.form-group.three-col { grid-column: span 1; }
.form-group label { font-size: 13px; color: var(--text-primary); font-weight: 500; }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group input:disabled, .form-group select:disabled, .form-group textarea:disabled {
    background: var(--bg-hover);
    color: var(--text-secondary);
    cursor: not-allowed;
    opacity: 0.8;
}
.form-group textarea { resize: vertical; min-height: 80px; }

/* 查看模式：标签-值双行展示 */
.modal-container.view-mode .form-group { gap: 4px; }
.modal-container.view-mode .form-group label { font-size: 12px; color: var(--text-secondary); font-weight: 400; }
.modal-container.view-mode .form-group label .required { display: none; }
.modal-container.view-mode .form-group input,
.modal-container.view-mode .form-group select,
.modal-container.view-mode .form-group textarea {
    display: none;
}
.modal-container.view-mode .form-group .view-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.5;
    word-break: break-all;
    min-height: 22px;
}
.modal-container.view-mode .form-group .file-upload {
    display: none;
}
.modal-container.view-mode .form-group .file-view-value {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.5;
}

/* 查看模式：资质信息一行两列 */
.modal-container.view-mode #tab-qualification-modal .dynamic-row-qual {
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-items: start;
}
.modal-container.view-mode #tab-qualification-modal .dynamic-row-qual .form-group:nth-child(3) {
    grid-column: 1 / -1;
}
.modal-container.view-mode #tab-qualification-modal .dynamic-row-qual .btn-remove {
    display: none !important;
}

/* 变更历史时间轴 */
.history-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
.history-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.timeline { position: relative; padding-left: 24px; }
.timeline::before { content: ''; position: absolute; left: 7px; top: 6px; bottom: 6px; width: 2px; background: var(--border); }
.timeline-item { position: relative; margin-bottom: 20px; }
.timeline-item:last-child { margin-bottom: 0; }
.timeline-dot { position: absolute; left: -20px; top: 6px; width: 12px; height: 12px; border-radius: 50%; background: var(--primary); border: 2px solid var(--bg-card); box-shadow: 0 0 0 2px var(--border); }
.timeline-dot.add { background: var(--primary); }
.timeline-dot.edit { background: var(--warning); }
.timeline-dot.audit { background: var(--success); }
.timeline-dot.reject { background: var(--danger); }
.timeline-dot.delete { background: var(--text-secondary); }
.timeline-dot.enable { background: var(--success); }
.timeline-dot.disable { background: var(--danger); }
.timeline-time { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.timeline-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.timeline-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.timeline-badge.add { background: rgba(26,115,232,0.12); color: var(--primary); }
.timeline-badge.edit { background: rgba(227,116,0,0.12); color: var(--warning); }
.timeline-badge.audit { background: rgba(30,142,62,0.12); color: var(--success); }
.timeline-badge.reject { background: rgba(217,48,37,0.12); color: var(--danger); }
.timeline-badge.delete { background: rgba(95,99,104,0.12); color: var(--text-secondary); }
.timeline-badge.enable { background: rgba(30,142,62,0.12); color: var(--success); }
.timeline-badge.disable { background: rgba(217,48,37,0.12); color: var(--danger); }
.timeline-meta { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
.timeline-remark { font-size: 13px; color: var(--text-primary); line-height: 1.5; }
.timeline-diff { margin-top: 6px; padding: 8px 12px; background: var(--bg-dark); border-radius: 8px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
.timeline-diff-item { margin-bottom: 2px; }
.timeline-empty { text-align: center; color: var(--text-secondary); padding: 40px 0; font-size: 13px; }

/* Tab 导航 */
.tab-nav { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 0; background: var(--bg-card); }
.tab-nav-item { padding: 12px 20px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.25s; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.tab-nav-item:hover { color: var(--primary); background: var(--bg-hover); }
.tab-nav-item.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.tab-progress { display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: var(--primary-light); border-bottom: 1px solid var(--border); font-size: 13px; color: var(--primary); }
.tab-progress i { font-size: 14px; }

.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }

/* 动态添加行 */
.dynamic-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; margin-bottom: 12px; }
.dynamic-row .form-group { margin-bottom: 0; }
.dynamic-row-qual { display: grid; grid-template-columns: 1.4fr 1fr 1fr 0.9fr 0.9fr 28px; gap: 10px; align-items: end; margin-bottom: 12px; }
.dynamic-row-qual .form-group { margin-bottom: 0; min-width: 0; }
.dynamic-row-qual .form-group input { width: 100%; min-width: 0; }
.dynamic-row-qual .btn-remove { width: 28px; height: 36px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
.btn-add { padding: 8px 16px; border: 1px dashed var(--border); border-radius: 8px; background: transparent; color: var(--primary); font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
.btn-add:hover { border-color: var(--primary); background: var(--primary-light); }
.btn-remove { padding: 8px; border: none; background: transparent; color: var(--danger); cursor: pointer; border-radius: 6px; transition: all 0.2s; }
.btn-remove:hover { background: rgba(217,48,37,0.1); }

/* 附件上传 */
.file-upload { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--input-bg); }
.file-upload input[type="file"] { display: none; }
.file-upload-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text-primary); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.file-upload-btn:hover { border-color: var(--primary); color: var(--primary); }
.file-upload-text { font-size: 13px; color: var(--text-secondary); }

/* 按钮 */
.form-actions { display: flex; align-items: center; justify-content: flex-end; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.form-actions-left { display: flex; gap: 10px; }
.btn { padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* 弹窗遮罩 */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal-container { background: var(--bg-card); border-radius: 12px; width: 90%; max-width: 960px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
#auditOpinionModal { z-index: 1100; }
#historyModal { z-index: 1100; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.modal-close { width: 32px; height: 32px; border: none; background: transparent; color: var(--text-secondary); font-size: 18px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.modal-close:hover { background: var(--bg-hover); color: var(--danger); }
.modal-body { flex: 1; overflow-y: auto; padding: 0; min-height: 0; }
.modal-body .form-body { padding: 0; display: flex; flex-direction: column; height: 100%; }
.modal-body .tab-content { padding: 16px 20px; display: none; flex: 1; overflow-y: auto; }
.modal-body .tab-content.active { display: block; }
.modal-body .form-actions { margin: 0 20px 20px; padding-top: 16px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }

/* 状态徽章 */
.status-badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.status-normal { background: rgba(30,142,62,0.12); color: var(--success); }
.status-update { background: rgba(227,116,0,0.12); color: var(--warning); }
.status-pending { background: rgba(26,115,232,0.12); color: var(--primary); }
.status-rejected { background: rgba(217,48,37,0.12); color: var(--danger); }

/* 入库统计图表 */
.chart-card { margin-bottom: 20px; }
.chart-subtitle { font-size: 12px; color: var(--text-secondary); font-weight: 400; margin-left: 8px; }
.chart-tabs { display: flex; gap: 8px; }
.chart-tab { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.chart-tab:hover { border-color: var(--primary); color: var(--primary); }
.chart-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }

/* 表格链接 */
.table-link { color: var(--primary); text-decoration: none; font-size: 13px; margin: 0 6px; transition: color 0.2s; }
.table-link:hover { text-decoration: underline; }
.table-link-danger { color: var(--danger); }
.table-link-danger:hover { color: #b91c1c; }

/* 分页按钮 */
.page-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text-primary); font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
.page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.page-btn-active { background: var(--primary); color: #fff; border-color: var(--primary); }
.page-btn-active:hover { background: var(--primary-dark); color: #fff; }

/* 响应式 */
@media (max-width: 768px) {
    .form-row { grid-template-columns: 1fr; }
    .form-actions { flex-direction: column; gap: 12px; align-items: stretch; }
}
</style>
</head>
<body>

<!-- 入库统计图表 -->
<div class="form-card chart-card">
    <div class="form-header">
        <div class="form-title">
            <i class="fas fa-chart-bar" style="color: var(--primary);"></i>
            入库统计
            <span class="chart-subtitle">按月度 / 专业领域统计新增机构数量</span>
        </div>
        <div class="chart-tabs">
            <button class="chart-tab active" data-type="month" onclick="switchWarehouseChart('month')">按月度</button>
            <button class="chart-tab" data-type="domain" onclick="switchWarehouseChart('domain')">按专业领域</button>
        </div>
    </div>
    <div class="form-body">
        <div id="warehouseChart" style="width: 100%; height: 340px;"></div>
    </div>
</div>

<div class="form-card">
    <div class="form-header">
        <div class="form-title"><i class="fas fa-edit" style="color: var(--primary);"></i> 机构信息维护</div>
    </div>
    <div class="form-body">
        <!-- 搜索栏卡片 -->
        <div class="filter-card" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px;">
            <div class="filter-row" style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
                <div class="filter-item" style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 13px; color: var(--text-secondary); white-space: nowrap;">机构名称：</label>
                    <input type="text" placeholder="请输入机构名称" style="padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); font-size: 13px; outline: none; width: 180px;">
                </div>
                <div class="filter-item" style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 13px; color: var(--text-secondary); white-space: nowrap;">统一代码：</label>
                    <input type="text" placeholder="请输入统一代码" style="padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); font-size: 13px; outline: none; width: 180px;">
                </div>
                <div class="filter-item" style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 13px; color: var(--text-secondary); white-space: nowrap;">状态：</label>
                    <select style="padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); font-size: 13px; outline: none; width: 120px;">
                        <option>全部</option>
                        <option>正常</option>
                        <option>信息待更新</option>
                        <option>已停用</option>
                    </select>
                </div>
                <div class="filter-actions" style="display: flex; gap: 10px; margin-left: auto;">
                    <button class="btn btn-primary" style="padding: 8px 20px; font-size: 13px;"><i class="fas fa-search"></i> 查询</button>
                    <button class="btn btn-outline" style="padding: 8px 20px; font-size: 13px;"><i class="fas fa-undo"></i> 重置</button>
                    <button class="btn btn-primary" style="padding: 8px 20px; font-size: 13px; background: var(--success);" onclick="addNewOrg()"><i class="fas fa-plus"></i> 新增机构</button>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <table class="data-table" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: var(--header-bg);">
                    <th style="padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border);">机构名称</th>
                    <th style="padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border);">统一代码</th>
                    <th style="padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border);">法人代表</th>
                    <th style="padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border);">联系电话</th>
                    <th style="padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border);">信用评分</th>
                    <th style="padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border);">状态</th>
                    <th style="padding: 12px 16px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border); width: 200px;">操作</th>
                </tr>
            </thead>
            <tbody id="orgTableBody">
                <!-- 动态渲染 -->
            </tbody>
        </table>
        <!-- 分页 -->
        <div class="pagination" id="orgTablePagination" style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);">
            <button class="page-btn" onclick="goPage(-1)" id="pagePrev">上一页</button>
            <span id="pageNumbers"></span>
            <button class="page-btn" onclick="goPage(1)" id="pageNext">下一页</button>
        </div>
    </div>
</div>

<!-- 独立变更历史弹窗 -->
<div class="modal-overlay" id="historyModal" onclick="if(event.target===this) closeHistoryModal()">
    <div class="modal-container" style="max-width: 720px;">
        <div class="modal-header">
            <div class="modal-title" id="historyModalTitle"><i class="fas fa-history" style="color: var(--primary);"></i> 变更历史</div>
            <button class="modal-close" onclick="closeHistoryModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" style="padding: 20px; min-height: 300px;">
            <div id="historyModalTimeline"></div>
        </div>
        <div class="form-actions" style="margin: 0 20px 20px; padding-top: 16px; justify-content: flex-end;">
            <button class="btn btn-outline" onclick="closeHistoryModal()"><i class="fas fa-times"></i> 关闭</button>
        </div>
    </div>
</div>

<!-- 通用审核意见弹窗（通过/驳回共用） -->
<div class="modal-overlay" id="auditOpinionModal" onclick="if(event.target===this) closeAuditOpinionModal()">
    <div class="modal-container" style="max-width: 540px;">
        <div class="modal-header">
            <div class="modal-title" id="auditOpinionTitle"><i class="fas fa-clipboard-check" style="color: var(--primary);"></i> 审核意见</div>
            <button class="modal-close" onclick="closeAuditOpinionModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body" style="padding: 20px;">
            <div id="auditLevelInfo" style="margin-bottom: 12px; padding: 10px 12px; background: var(--primary-light); border-radius: 8px; font-size: 13px; color: var(--primary); display: none;">
                <i class="fas fa-layer-group"></i> <span></span>
            </div>
            <div class="form-group" style="margin-bottom: 12px;">
                <label>常用语</label>
                <select id="auditPresetSelect" onchange="onAuditPresetChange(this)" style="width: 100%;">
                    <option value="">-- 选择常用语快速填充 --</option>
                </select>

// 弹窗内 Tab 切换功能
var tabNamesModal = ['法人信息', '企业信息', '人员信息', '资质信息', '设备信息'];
var currentTabModal = 0;

function switchTabModal(index) {
    var tabs = document.querySelectorAll('#tabNavModal .tab-nav-item');
    var contents = document.querySelectorAll('#orgModal .tab-content');
    var progress = document.getElementById('tabProgressModal');
    var btnPrev = document.getElementById('btnPrevModal');
    var btnNext = document.getElementById('btnNextModal');
    var btnSave = document.getElementById('btnSaveModal');
    var btnSubmit = document.getElementById('btnSubmitModal');
    var btnReset = document.getElementById('btnResetModal');
    var btnClose = document.getElementById('btnCloseModal');

    tabs.forEach(function(t, i) {
        t.classList.toggle('active', i === index);
    });
    contents.forEach(function(c, i) {
        c.classList.toggle('active', i === index);
    });

    if (progress) {
        progress.querySelector('span').innerHTML = '当前填写第 <strong>' + (index + 1) + '</strong> / ' + tabNamesModal.length + ' 步：' + tabNamesModal[index];
    }

    var isView = currentModalMode === 'view' || currentModalMode === 'audit';
    var isAdd = currentModalMode === 'add';
    var isAudit = currentModalMode === 'audit';

    if (btnPrev) {
        btnPrev.style.display = (isView || index === 0) ? 'none' : 'inline-flex';
    }
    if (btnNext) {
        btnNext.style.display = (isView || index === tabNamesModal.length - 1) ? 'none' : 'inline-flex';
    }
    if (btnSave) {
        btnSave.style.display = isView ? 'none' : 'inline-flex';
    }
    if (btnSubmit) {
        btnSubmit.style.display = (isAdd && index === tabNamesModal.length - 1) ? 'inline-flex' : 'none';
    }
    if (btnReset) {
        btnReset.style.display = isAdd ? 'inline-flex' : 'none';
    }

    // 审核模式：隐藏导航/保存类按钮，显示通过/驳回
    var btnAuditPass = document.getElementById('btnAuditPassModal');
    var btnAuditReject = document.getElementById('btnAuditRejectModal');
    if (btnAuditPass) btnAuditPass.style.display = isAudit ? 'inline-flex' : 'none';
    if (btnAuditReject) btnAuditReject.style.display = isAudit ? 'inline-flex' : 'none';

    currentTabModal = index;
}

function nextTabModal() {
    if (currentTabModal < tabNamesModal.length - 1) {
        switchTabModal(currentTabModal + 1);
    }
}

function prevTabModal() {
    if (currentTabModal > 0) {
        switchTabModal(currentTabModal - 1);
    }
}

// 弹窗 Tab 点击事件

    item.addEventListener('click', function() {
        switchTabModal(index);

});

// 批量资质证书上传：按文件名关键词尝试自动匹配到对应资质行
function handleBatchFiles(input) {
    var files = Array.from(input.files);
    var list = document.getElementById('qualificationBatchList');
    var rows = document.querySelectorAll('#qualificationListModal .dynamic-row-qual');
    if (!files.length) {
        list.innerHTML = '';
        document.getElementById('qualificationBatchText').textContent = '可一次选择多个资质证书扫描件（PDF或图片），请确保文件名与证书名称对应';
        return;
    }

    document.getElementById('qualificationBatchText').textContent = '已选择 ' + files.length + ' 个文件';
    list.innerHTML = files.map(function(f) {
        var matched = '';
        rows.forEach(function(row) {
            var nameInput = row.querySelector('.qual-name');
            if (nameInput && nameInput.value) {
                var kw = nameInput.value.replace(/有限公司|证书|资质/g, '').trim();
                if (kw && f.name.indexOf(kw) !== -1) {
                    matched = '（已匹配：' + nameInput.value + '）';
                }
            }
        });
        return '<span style="background: var(--header-bg); padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border);">' + f.name + matched + '</span>';
    }).join('');
}

    if (currentModalMode === 'edit') {
        alert('机构信息已保存（演示功能）');
    } else {
        alert('表单已保存（演示功能）');
    }
}
function submitFormModal() {
    if (confirm('确定要提交审核吗？提交后将进入材料审核中心。')) {
        alert('提交成功！已发送至材料审核中心。');
        closeOrgModal();
    }
}
function resetFormModal() {
    if (confirm('确定要重置所有表单内容吗？')) {
        var inputs = document.querySelectorAll('#orgModal input, #orgModal textarea');
        inputs.forEach(function(input) {
            if (input.type !== 'button' && input.type !== 'submit') {
                input.value = '';
            }
        });
        var selects = document.querySelectorAll('#orgModal select');
        selects.forEach(function(select) {
            select.selectedIndex = 0;
        });
        document.querySelectorAll('#orgModal .file-upload-text').forEach(function(span) {
            var fileInput = span.parentElement.querySelector('input[type="file"]');
            if (fileInput && fileInput.id === 'socialSecurityFileModal') span.textContent = '请上传近6个月社保缴纳证明';
            else if (fileInput && fileInput.classList.contains('qual-file')) span.textContent = '未选择';
            else if (fileInput && fileInput.id === 'qualificationBatchFileModal') span.textContent = '可一次选择多个资质证书扫描件（PDF或图片），请确保文件名与证书名称对应';
            else if (fileInput && fileInput.id === 'businessLicenseFileModal') span.textContent = '请上传营业执照扫描件（JPG/PNG/PDF）';
            else if (fileInput) span.textContent = '请上传设备校准/检定证书';
        });
        switchTabModal(0);
    }
}

// 当前弹窗模式: add | view | edit | audit
var currentModalMode = 'add';
var currentOrgId = '';
var currentAuditDecision = ''; // 'pass' | 'reject'

// 统一数据映射到弹窗数据模型
function buildOrgDataMap(org) {
    return {
        legalName: org.legalPerson || '-',
        idCard: '',
        phone: org.phone || '-',
        creditScore: org.score || 0,
        enterpriseName: org.orgName || '-',
        creditCode: org.orgCode || '-',
        address: org.region || '-',
        establishDate: org.established || '',
        capital: '',
        businessScope: org.field || '',
        personnel: [],
        qualifications: [],
        equipment: []
    };
}

// 模拟机构数据（从统一数据层加载，保持与其他页面一致）
var orgDataMap = {};

function initOrgDataMap() {
    var orgs = getAllOrgs();
    orgs.forEach(function(org) {
        if (!orgDataMap[org.orgId]) {
            orgDataMap[org.orgId] = buildOrgDataMap(org);
        }
    });
}

// 动态渲染机构列表
var orgTablePage = 1;
var orgTablePageSize = 10;
var allOrgRows = [];

function renderOrgTable() {
    var orgs = getAllOrgs();
    allOrgRows = orgs;
    var tbody = document.getElementById('orgTableBody');
    if (!tbody) return;
    tbody.innerHTML = '';

    var start = (orgTablePage - 1) * orgTablePageSize;
    var end = Math.min(start + orgTablePageSize, orgs.length);
    var pageData = orgs.slice(start, end);

    pageData.forEach(function(org) {
        if (!orgDataMap[org.orgId]) {
            orgDataMap[org.orgId] = buildOrgDataMap(org);
        }
        var status = org.status || '正常';
        var statusClass = status === '正常' ? 'status-normal' : 'status-update';

        // 多级审核进度
        var config = getTPAuditConfig();
        var flow = getTPAuditFlow(org.orgId);
        var auditBadge = '';
        if (config.mode === 'multi' && config.levels > 1) {
            var auditStatusText = '未开始';
            var auditBadgeClass = 'status-pending';
            if (flow.status === 'approved') {
                auditStatusText = '已通过';
                auditBadgeClass = 'status-normal';
            } else if (flow.status === 'rejected') {
                auditStatusText = '已驳回';
                auditBadgeClass = 'status-rejected';
            } else if (flow.currentLevel > 0) {
                auditStatusText = '审核中 ' + flow.currentLevel + '/' + config.levels;
            }
            auditBadge = '<span class="status-badge ' + auditBadgeClass + '" style="margin-left: 6px;">' + auditStatusText + '</span>';
        }

        var tr = document.createElement('tr');
        tr.style.borderBottom = '1px solid var(--border)';
        tr.innerHTML =
            '<td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">' + (org.orgName || '-') + '</td>' +
            '<td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">' + (org.orgCode || '-') + '</td>' +
            '<td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">' + (org.legalPerson || '-') + '</td>' +
            '<td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">' + (org.phone || '-') + '</td>' +
            '<td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">' + (org.score || '0') + '</td>' +
            '<td style="padding: 14px 16px;"><span class="status-badge ' + statusClass + '">' + status + '</span>' + auditBadge + '</td>' +
            '<td style="padding: 14px 16px; text-align: center;">' +
            '<a href="#" class="table-link" onclick="viewOrg(\'' + org.orgId + '\'); return false;">查看</a>' +
            '<a href="#" class="table-link" onclick="editOrg(\'' + org.orgId + '\'); return false;">编辑</a>' +
            '<a href="#" class="table-link" onclick="auditOrg(\'' + org.orgId + '\'); return false;">审核</a>' +
            '<a href="#" class="table-link" onclick="historyOrg(\'' + org.orgId + '\'); return false;">历史</a>' +
            '</td>';
        tbody.appendChild(tr);
    });

    renderOrgPagination();
}

function renderOrgPagination() {
    var total = Math.ceil(allOrgRows.length / orgTablePageSize) || 1;
    var prev = document.getElementById('pagePrev');
    var next = document.getElementById('pageNext');
    var numbers = document.getElementById('pageNumbers');
    if (!prev || !next || !numbers) return;

    prev.disabled = orgTablePage <= 1;
    next.disabled = orgTablePage >= total;

    var html = '';
    for (var i = 1; i <= total; i++) {
        html += '<button class="page-btn ' + (i === orgTablePage ? 'page-btn-active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
    }
    numbers.innerHTML = html;
}

// 分页跳转
function goPage(page) {
    if (typeof page === 'number' && page > 0) {
        orgTablePage = page;
    } else if (page === -1) {
        orgTablePage--;
    } else if (page === 1) {
        orgTablePage++;
    }
    var total = Math.ceil(allOrgRows.length / orgTablePageSize) || 1;
    if (orgTablePage < 1) orgTablePage = 1;
    if (orgTablePage > total) orgTablePage = total;
    renderOrgTable();
}

// 模拟变更历史数据
function initOrgHistoryData() {
    Object.keys(orgDataMap).forEach(function(id) {
        var org = orgDataMap[id];
        if (!org || org.history) return;
        org.history = [
            { action: '新增', time: '2026-03-12 09:30', operator: '管理员-系统', remark: '机构首次入库登记', diff: ['机构名称：' + (org.enterpriseName || '-'), '统一代码：' + (org.creditCode || '-')] }
        ];
    });
}

// 打开弹窗（通用）
function openOrgModal(mode, id) {
    currentModalMode = mode;
    currentOrgId = id || '';
    var modal = document.getElementById('orgModal');
    var modalContainer = modal.querySelector('.modal-container');
    var titleEl = modal.querySelector('.modal-title');
    var progress = document.getElementById('tabProgressModal');

    // 设置查看/编辑模式样式
    if (mode === 'view' || mode === 'audit') {
        modalContainer.classList.add('view-mode');
    } else {
        modalContainer.classList.remove('view-mode');
    }

    // 设置标题
    if (mode === 'add') {
        titleEl.innerHTML = '<i class="fas fa-edit" style="color: var(--primary);"></i> 机构申请录入';
        if (progress) progress.style.display = 'flex';
    } else if (mode === 'edit') {
        titleEl.innerHTML = '<i class="fas fa-edit" style="color: var(--primary);"></i> 编辑机构信息';
        if (progress) progress.style.display = 'none';
    } else if (mode === 'audit') {
        titleEl.innerHTML = '<i class="fas fa-clipboard-check" style="color: var(--primary);"></i> 审核机构信息';
        if (progress) progress.style.display = 'none';
    } else {
        titleEl.innerHTML = '<i class="fas fa-eye" style="color: var(--primary);"></i> 查看机构信息';
        if (progress) progress.style.display = 'none';
    }

    // 设置按钮
    var isReadOnly = (mode === 'view' || mode === 'audit');
    document.getElementById('btnPrevModal').style.display = isReadOnly ? 'none' : (currentTabModal === 0 ? 'none' : 'inline-flex');
    document.getElementById('btnNextModal').style.display = isReadOnly ? 'none' : (currentTabModal === tabNamesModal.length - 1 ? 'none' : 'inline-flex');
    document.getElementById('btnSaveModal').style.display = isReadOnly ? 'none' : 'inline-flex';
    document.getElementById('btnSubmitModal').style.display = (mode === 'add' && currentTabModal === tabNamesModal.length - 1) ? 'inline-flex' : 'none';
    document.getElementById('btnResetModal').style.display = mode === 'add' ? 'inline-flex' : 'none';

    // 填充数据
    fillOrgForm(id);

    // 设置只读状态
    var inputs = modal.querySelectorAll('input, select, textarea, button.btn-add, button.btn-remove');
    inputs.forEach(function(input) {
        if (input.tagName === 'INPUT' || input.tagName === 'SELECT' || input.tagName === 'TEXTAREA') {
            input.disabled = isReadOnly;
        }
        if (input.classList.contains('btn-add') || input.classList.contains('btn-remove')) {
            input.style.display = isReadOnly ? 'none' : 'inline-flex';
        }
    });

    // 查看模式下生成可换行的值展示
    toggleViewModeValues(modal, isReadOnly);

    // 设置审核按钮
    var auditButtons = document.getElementById('modalAuditButtons');
    if (auditButtons) {
        auditButtons.style.display = mode === 'audit' ? 'flex' : 'none';
    }

    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
    switchTabModal(0);
}

// 切换查看模式下的值展示
function toggleViewModeValues(modal, enable) {
    modal.querySelectorAll('.view-value, .file-view-value').forEach(function(el) { el.remove(); });
    modal.querySelectorAll('input, select, textarea').forEach(function(el) { el.style.display = ''; });
    modal.querySelectorAll('.file-upload').forEach(function(el) { el.style.display = ''; });
    if (!enable) return;

    modal.querySelectorAll('.form-group').forEach(function(group) {
        var input = group.querySelector('input, select, textarea');
        var fileUpload = group.querySelector('.file-upload');
        if (input) {
            var value = '';
            if (input.tagName === 'SELECT') {
                value = input.options[input.selectedIndex] ? input.options[input.selectedIndex].text : '';
            } else {
                value = input.value;
            }
            var div = document.createElement('div');
            div.className = 'view-value';
            div.textContent = value;
            input.style.display = 'none';
            input.parentNode.insertBefore(div, input.nextSibling);
        } else if (fileUpload) {
            var textSpan = fileUpload.querySelector('.file-upload-text');
            var fileName = textSpan ? textSpan.textContent : '未上传';
            var div = document.createElement('div');
            div.className = 'file-view-value';
            div.textContent = fileName;
            fileUpload.style.display = 'none';
            fileUpload.parentNode.insertBefore(div, fileUpload.nextSibling);
        }
    });
}

// 填充表单数据
function fillOrgForm(id) {
    var data = orgDataMap[id] || {};
    var org = getOrgById(id);
    if (org) {
        data = {
            legalName: org.legalPerson || data.legalName || '',
            idCard: data.idCard || '',
            phone: org.phone || data.phone || '',
            creditScore: org.score || data.creditScore || 0,
            enterpriseName: org.orgName || data.enterpriseName || '',
            creditCode: org.orgCode || data.creditCode || '',
            address: org.region || data.address || '',
            establishDate: org.established || data.establishDate || '',
            capital: data.capital || '',
            businessScope: org.field || data.businessScope || '',
            personnel: data.personnel || [],
            qualifications: data.qualifications || [],
            equipment: data.equipment || []
        };
    }

    // 法人信息
    setInputValue('#tab-legal-modal input:nth-of-type(1)', data.legalName || '');
    setInputValue('#tab-legal-modal input:nth-of-type(2)', data.idCard || '');
    setInputValue('#tab-legal-modal input:nth-of-type(3)', data.phone || '');

    // 企业信息
    setInputValue('#tab-enterprise-modal input:nth-of-type(1)', data.enterpriseName || '');
    setInputValue('#tab-enterprise-modal input:nth-of-type(2)', data.creditCode || '');
    setInputValue('#tab-enterprise-modal input:nth-of-type(3)', data.address || '');
    setInputValue('#tab-enterprise-modal input:nth-of-type(4)', data.establishDate || '');
    setInputValue('#tab-enterprise-modal input:nth-of-type(5)', data.capital || '');
    setInputValue('#tab-enterprise-modal textarea', data.businessScope || '');

    // 人员信息
    fillDynamicRows('personnelListModal', data.personnel || [], function(p) {
        return '<div class="form-group"><label>姓名</label><input type="text" value="' + (p.name || '') + '" placeholder="技术人员姓名"></div>' +
            '<div class="form-group"><label>职称</label><select>' + buildOptions(['高级工程师', '工程师', '助理工程师', '技术员'], p.title) + '</select></div>' +
            '<div class="form-group"><label>职称证书编号</label><input type="text" value="' + (p.certNo || '') + '" placeholder="证书编号"></div>' +
            '<button class="btn-remove" onclick="removePersonnelRowModal(this)" title="删除"><i class="fas fa-trash-alt"></i></button>';
    });

    // 资质信息
    fillDynamicRows('qualificationListModal', data.qualifications || [], function(q) {
        return '<div class="form-group"><label>资质证书名称 <span class="required">*</span></label><input type="text" class="qual-name" value="' + (q.name || '') + '" placeholder="如：建设工程质量检测机构资质证书"></div>' +
            '<div class="form-group"><label>证书编号 <span class="required">*</span></label><input type="text" class="qual-code" value="' + (q.certNo || '') + '" placeholder="证书编号"></div>' +
            '<div class="form-group"><label>发证机关 <span class="required">*</span></label><input type="text" class="qual-issuer" value="' + (q.issuer || '') + '" placeholder="发证机关全称"></div>' +
            '<div class="form-group"><label>有效期起</label><input type="date" class="qual-start" value="' + (q.start || '') + '"></div>' +
            '<div class="form-group"><label>有效期止 <span class="required">*</span></label><input type="date" class="qual-end" value="' + (q.end || '') + '"></div>' +
            '<button class="btn-remove" onclick="removeQualificationRowModal(this)" title="删除"><i class="fas fa-trash-alt"></i></button>';
    }, 'dynamic-row-qual');

    // 设备信息
    fillDynamicRows('equipmentListModal', data.equipment || [], function(e) {
        return '<div class="form-group"><label>设备名称</label><input type="text" value="' + (e.name || '') + '" placeholder="如：全站仪、压力试验机"></div>' +
            '<div class="form-group"><label>设备型号</label><input type="text" value="' + (e.model || '') + '" placeholder="设备型号/规格"></div>' +
            '<div class="form-group"><label>数量</label><input type="number" value="' + (e.quantity || '') + '" placeholder="台/套" min="1"></div>' +
            '<button class="btn-remove" onclick="removeEquipmentRowModal(this)" title="删除"><i class="fas fa-trash-alt"></i></button>';
    });
}

function setInputValue(selector, value) {
    var el = document.querySelector(selector);
    if (el) el.value = value;
}

function buildOptions(options, selected) {
    return options.map(function(o) {
        return '<option' + (o === selected ? ' selected' : '') + '>' + o + '</option>';
    }).join('');
}

function fillDynamicRows(containerId, dataList, renderFn, rowClass) {
    var container = document.getElementById(containerId);
    if (!container) return;
    var cls = rowClass || 'dynamic-row';
    // 保留第一个空行模板，如果无数据则显示一个空行
    container.innerHTML = '';
    if (dataList.length === 0) {
        var emptyRow = document.createElement('div');
        emptyRow.className = cls;
        emptyRow.innerHTML = renderFn({});
        container.appendChild(emptyRow);
    } else {
        dataList.forEach(function(item) {
            var row = document.createElement('div');
            row.className = cls;
            row.innerHTML = renderFn(item);
            container.appendChild(row);
        });
    }
}

function closeHistoryModal() {
    document.getElementById('historyModal').classList.remove('active');

// 将变更历史渲染到指定容器
function renderHistoryTo(container, id) {
    if (!container) return;
    initOrgHistoryData();
    var data = orgDataMap[id] || {};
    var history = data.history || [];
    if (history.length === 0) {
        container.innerHTML = '<div class="timeline-empty">暂无变更历史</div>';
        return;
    }
    var map = {
        '新增': 'add', '编辑': 'edit', '审核通过': 'audit', '审核驳回': 'reject',
        '删除': 'delete', '启用': 'enable', '停用': 'disable', '提交审核': 'edit'
    };
    container.innerHTML = '<div class="timeline">' + history.map(function(r) {
        var cls = map[r.action] || 'edit';
        var diffHtml = '';
        if (r.diff && r.diff.length) {
            diffHtml = '<div class="timeline-diff">' + r.diff.map(function(d) {
                return '<div class="timeline-diff-item">' + d + '</div>';
            }).join('') + '</div>';
        }
        return '<div class="timeline-item">' +
            '<div class="timeline-dot ' + cls + '"></div>' +
            '<div class="timeline-time">' + r.time + '</div>' +
            '<div class="timeline-title">' +
                '<span class="timeline-badge ' + cls + '">' + r.action + '</span>' +
            '</div>' +
            '<div class="timeline-meta">操作人：' + (r.operator || '-') + '</div>' +
            '<div class="timeline-remark">' + (r.remark || '') + '</div>' +
            diffHtml +
        '</div>';
    }).join('') + '</div>';
}

// 添加变更历史记录
function addOrgHistoryRecord(id, record) {
    initOrgHistoryData();
    var data = orgDataMap[id];
    if (!data) return;
    if (!data.history) data.history = [];
    data.history.unshift(record);
}

// 获取当前时间字符串
function getCurrentTimeString() {
    var now = new Date();
    var y = now.getFullYear();
    var m = String(now.getMonth() + 1).padStart(2, '0');
    var d = String(now.getDate()).padStart(2, '0');
    var h = String(now.getHours()).padStart(2, '0');
    var min = String(now.getMinutes()).padStart(2, '0');
    return y + '-' + m + '-' + d + ' ' + h + ':' + min;
}

// 打开通用审核意见弹窗
function openAuditOpinionModal(decision) {
    currentAuditDecision = decision;
    var modal = document.getElementById('auditOpinionModal');
    var title = document.getElementById('auditOpinionTitle');
    var select = document.getElementById('auditPresetSelect');
    var textarea = document.getElementById('auditOpinionText');
    var levelInfo = document.getElementById('auditLevelInfo');
    var btnPass = document.getElementById('btnConfirmPass');
    var btnReject = document.getElementById('btnConfirmReject');

    var config = getTPAuditConfig();
    var flow = getTPAuditFlow(currentOrgId);
    var currentLevel = flow.currentLevel || 0;
    var levelDisplay = config.mode === 'multi' ? (currentLevel + 1) : 1;
    var totalLevels = config.levels || 1;
    var isPass = decision === 'pass';

    if (title) {
        title.innerHTML = '<i class="fas fa-clipboard-check" style="color: ' + (isPass ? 'var(--success)' : 'var(--danger)') + ';"></i> ' +
            (isPass ? '审核通过意见' : '审核驳回意见') + (config.mode === 'multi' ? '（第' + levelDisplay + '/' + totalLevels + '级）' : '');
    }

    if (levelInfo) {
        levelInfo.style.display = config.mode === 'multi' ? 'block' : 'none';
        levelInfo.querySelector('span').textContent = '当前为第 ' + levelDisplay + ' 级审核，共 ' + totalLevels + ' 级' + (isPass ? '，通过后将' + (levelDisplay >= totalLevels ? '完成终审' : '进入下一级审核') : '');
    }

    // 填充常用语
    if (select) {
        select.innerHTML = '<option value="">-- 选择常用语快速填充 --</option>';
        var presets = isPass ? (config.presetPass || []) : (config.presetReject || []);
        presets.forEach(function(p) {
            var opt = document.createElement('option');
            opt.value = p;
            opt.textContent = p;
            select.appendChild(opt);
        });
    }

    if (textarea) {
        textarea.value = '';
        setTimeout(function() { textarea.focus(); }, 100);
    }

    if (btnPass) btnPass.style.display = isPass ? 'inline-flex' : 'none';
    if (btnReject) btnReject.style.display = isPass ? 'none' : 'inline-flex';

    modal.classList.add('active');
}

function onAuditPresetChange(select) {
    var textarea = document.getElementById('auditOpinionText');
    if (select && textarea && select.value) {
        textarea.value = select.value;
    }
}

function closeAuditOpinionModal() {
    document.getElementById('auditOpinionModal').classList.remove('active');
    currentAuditDecision = '';
}

function confirmAuditOpinion(decision) {
    var textarea = document.getElementById('auditOpinionText');
    var opinion = textarea ? textarea.value.trim() : '';
    var config = getTPAuditConfig();
    if (config.requiredOpinion && !opinion) {
        alert('请输入审核意见');
        if (textarea) textarea.focus();
        return;
    }

    var id = currentOrgId || '';
    var flow = getTPAuditFlow(id);
    var currentLevel = flow.currentLevel || 0;
    var totalLevels = config.levels || 1;
    var isPass = decision === 'pass';
    var now = getCurrentTimeString();

    // 记录到审核流程历史
    if (!flow.history) flow.history = [];
    flow.history.push({
        level: currentLevel + 1,
        decision: decision,
        opinion: opinion,
        operator: '审核员-当前用户',
        time: now
    });

    if (isPass) {
        if (currentLevel + 1 >= totalLevels) {
            flow.currentLevel = totalLevels;
            flow.status = 'approved';
            addOrgHistoryRecord(id, {
                action: '审核通过',
                time: now,
                operator: '审核员-当前用户',
                remark: opinion || '机构审核通过，信息予以入库',
                diff: config.mode === 'multi' ? ['完成第 ' + totalLevels + ' 级终审通过'] : []
            });
            alert('审核已通过' + (config.mode === 'multi' ? '（已完成终审）' : ''));
        } else {
            flow.currentLevel = currentLevel + 1;
            flow.status = 'pending';
            addOrgHistoryRecord(id, {
                action: '审核通过',
                time: now,
                operator: '审核员-当前用户',
                remark: '第 ' + (currentLevel + 1) + ' 级审核通过：' + (opinion || '进入下一级审核'),
                diff: ['当前进度：第 ' + (currentLevel + 1) + ' / ' + totalLevels + ' 级']
            });
            alert('第 ' + (currentLevel + 1) + ' 级审核通过，已流转至下一级审核');
        }
    } else {
        flow.status = 'rejected';
        // 驳回后重置为初始级，允许重新提交后再次审核
        flow.currentLevel = 0;
        addOrgHistoryRecord(id, {
            action: '审核驳回',
            time: now,
            operator: '审核员-当前用户',
            remark: '机构审核被驳回',
            diff: ['驳回原因：' + (opinion || '未填写')]
        });
        alert('审核已驳回：' + (opinion || ''));
    }

    saveTPAuditFlow(id, flow);
    closeAuditOpinionModal();
    closeOrgModal();
    renderOrgTable();
}

    // 根据 URL 参数自动打开对应机构弹窗
    function autoOpenOrgFromUrl() {
        var qp = getTPQueryParams();
        if (qp.orgId) {
            var org = getOrgById(qp.orgId);
            if (org) {
                // 将统一数据映射到现有弹窗数据模型
                orgDataMap[qp.orgId] = {
                    legalName: org.legalPerson || '-',
                    idCard: '',
                    phone: org.phone || '-',
                    creditScore: org.score || 0,
                    enterpriseName: org.orgName,
                    creditCode: org.orgCode || '',
                    address: org.region || '',
                    establishDate: org.established || '',
                    capital: '',
                    businessScope: org.field || '',
                    personnel: [],
                    qualifications: [],
                    equipment: []
                };
                setTimeout(function() {
                    viewOrg(qp.orgId);
                }, 100);
            }
        }
    }

    // 初始化加载
    document.addEventListener('DOMContentLoaded', function() {
        initOrgDataMap();
        renderOrgTable();
        autoOpenOrgFromUrl();
    });

var warehouseChartInstance = null;
var warehouseChartData = {
    month: {
        xAxis: ['2026年1月', '2026年2月', '2026年3月', '2026年4月', '2026年5月', '2026年6月'],
        series: [5, 8, 12, 15, 10, 12]
    },
    domain: {
        xAxis: ['建筑工地', '基坑', '交通', '玻璃幕墙', '燃气', '高空坠物', '城镇自建房', '农村自建房'],
        series: [45, 32, 28, 24, 38, 20, 35, 30]
    }
};

function initWarehouseChart() {
    var chartDom = document.getElementById('warehouseChart');
    if (!chartDom || typeof echarts === 'undefined') return;
    warehouseChartInstance = echarts.init(chartDom);
    switchWarehouseChart('month');
}

function switchWarehouseChart(type) {
    document.querySelectorAll('.chart-tab').forEach(function(btn) {
        btn.classList.toggle('active', btn.getAttribute('data-type') === type);
    });

    var data = warehouseChartData[type];
    var colors = ['#1a73e8', '#34a853', '#f9a825', '#9333ea', '#06b6d4', '#ea580c', '#16a34a', '#8b5cf6'];
    var option = {
        tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'shadow' }
        },
        grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            top: '12%',
            containLabel: true
        },
        xAxis: {
            type: 'category',
            data: data.xAxis,
            axisLabel: {
                color: '#5f6368',
                interval: 0,
                rotate: type === 'domain' ? 20 : 0
            },
            axisLine: { lineStyle: { color: '#dadce0' } }
        },
        yAxis: {
            type: 'value',
            axisLabel: { color: '#5f6368' },
            splitLine: { lineStyle: { type: 'dashed', color: '#e8eaed' } }
        },
        series: [{
            name: '新增机构数',
            type: 'bar',
            data: data.series.map(function(value, index) {
                return {
                    value: value,
                    itemStyle: { color: colors[index % colors.length], borderRadius: [6, 6, 0, 0] }
                };
            }),
            barWidth: '50%',
            label: {
                show: true,
                position: 'top',
                color: '#5f6368',
                fontSize: 12
            }
        }]
    };

    if (warehouseChartInstance) {
        warehouseChartInstance.setOption(option, true);
    }
}

window.addEventListener('load', initWarehouseChart);
window.addEventListener('load', function() {
    autoOpenOrgFromUrl();
});
window.addEventListener('resize', function() {
    if (warehouseChartInstance) warehouseChartInstance.resize();
});
