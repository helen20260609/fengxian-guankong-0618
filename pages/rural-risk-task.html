<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>农村自建房 - 风险巡查任务管理</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== Theme Variables ===== */
:root {
    --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
    --secondary: #0097a7; --danger: #d93025; --warning: #e65100; --success: #1e8e3e;
    --bg-dark: #f0f2f5; --bg-card: #ffffff; --bg-hover: #e8eaed;
    --text-primary: #202124; --text-secondary: #5f6368; --border: #dadce0;
    --shadow: rgba(0,0,0,0.08); --input-bg: #ffffff; --input-border: #dadce0;
}
:root[data-theme="dark"] {
    --primary: #1e6fdb; --primary-dark: #1557b0; --primary-light: #e8f1fd;
    --secondary: #00b4d8; --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
    --bg-dark: #0a1628; --bg-card: #112240; --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0; --text-secondary: #94a3b8; --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3); --input-bg: rgba(255,255,255,0.05); --input-border: #1e3a5f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    padding: 20px;
    min-height: 100vh;
}

/* ===== KPI Cards ===== */
.kpi-wrapper {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
    margin-bottom: 20px;
}
.kpi-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: all 0.3s;
    box-shadow: 0 1px 3px var(--shadow);
    display: flex;
    flex-direction: column;
    gap: 10px;
    position: relative;
    overflow: hidden;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }

.kpi-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.kpi-card-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
}
.kpi-card-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
}
.kpi-card-icon.blue   { background: rgba(26,115,232,0.12); color: var(--primary); }
.kpi-card-icon.yellow { background: rgba(249,200,70,0.12); color: #c78000; }
.kpi-card-icon.green  { background: rgba(30,142,62,0.12); color: var(--success); }
.kpi-card-icon.red    { background: rgba(217,48,37,0.12); color: var(--danger); }
.kpi-card-icon.purple { background: rgba(139,92,246,0.12); color: #8b5cf6; }

.kpi-card-main {
    display: flex;
    align-items: baseline;
    gap: 8px;
}
.kpi-card-total {
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
}
.kpi-card-total.blue   { color: var(--primary); }
.kpi-card-total.yellow { color: #c78000; }
.kpi-card-total.green  { color: var(--success); }
.kpi-card-total.red    { color: var(--danger); }
.kpi-card-total.purple { color: #8b5cf6; }
.kpi-card-unit {
    font-size: 13px;
    color: var(--text-secondary);
}

/* ===== Filter Section ===== */
.filter-section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 16px;
    box-shadow: 0 1px 3px var(--shadow);
}
.filter-row {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
}
.filter-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 160px;
}
.filter-item.wide {
    min-width: 260px;
    flex: 1.5;
}
.filter-item label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
}
.filter-input,
.filter-select {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--input-bg);
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
}
.filter-input:focus,
.filter-select:focus { border-color: var(--primary); }
.filter-actions {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    margin-left: auto;
    flex-shrink: 0;
}
.btn {
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s;
    border: none;
    display: flex;
    align-items: center;
    gap: 6px;
    height: 36px;
}
.btn-primary {
    background: var(--primary);
    color: #fff;
}
.btn-primary:hover { background: var(--primary-dark); }
.btn-secondary {
    background: var(--bg-hover);
    color: var(--text-primary);
    border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--border); }

/* ===== Section Card ===== */
.section-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 1px 3px var(--shadow);
}
.section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 18px;
    background: var(--bg-hover);
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    font-weight: 700;
}
.section-header i { color: var(--primary); font-size: 14px; }
.section-body { padding: 0; }

/* ===== Table ===== */
.data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}
.data-table thead th {
    background: var(--bg-hover);
    padding: 12px 14px;
    text-align: left;
    font-weight: 600;
    color: var(--text-primary);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
}
.data-table tbody td {
    padding: 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    vertical-align: middle;
}
.data-table tbody tr:hover { background: rgba(26,115,232,0.04); }
.data-table tbody tr:last-child td { border-bottom: none; }

/* Progress Bar */
.progress-cell {
    display: flex;
    align-items: center;
    gap: 10px;
}
.progress-bar {
    width: 100px;
    height: 8px;
    background: var(--bg-hover);
    border-radius: 4px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s;
}
.progress-fill.blue   { background: var(--primary); }
.progress-fill.yellow { background: #c78000; }
.progress-fill.green  { background: var(--success); }
.progress-text {
    font-size: 12px;
    color: var(--text-secondary);
    white-space: nowrap;
}

/* Status Tags */
.status-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
}
.status-tag.pending {
    background: rgba(26,115,232,0.12);
    color: var(--primary);
}
.status-tag.processing {
    background: rgba(249,200,70,0.12);
    color: #c78000;
}
.status-tag.completed {
    background: rgba(30,142,62,0.12);
    color: var(--success);
}
.status-tag.overdue {
    background: rgba(217,48,37,0.12);
    color: var(--danger);
}

/* Action Links */
.actions {
    display: flex;
    gap: 10px;
    align-items: center;
}
.action-link {
    font-size: 13px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    transition: opacity 0.2s;
    color: var(--primary);
}
.action-link:hover {
    opacity: 0.8;
    text-decoration: underline;
}
.action-link.delete { color: var(--danger); }

/* Pagination */
.pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: var(--text-secondary);
}
.page-info { display: flex; align-items: center; gap: 8px; }
.page-btns { display: flex; gap: 4px; }
.page-btn {
    padding: 6px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-card);
    color: var(--text-primary);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}
.page-btn:hover { background: var(--bg-hover); }
.page-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
}
.page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Empty State */
.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    color: var(--text-secondary);
    gap: 12px;
}
.empty-state i { font-size: 48px; opacity: 0.3; }
.empty-state p { font-size: 14px; }

/* ===== Modal ===== */
.modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s;
}
.modal-overlay.active { opacity: 1; visibility: visible; }
.modal {
    background: var(--bg-card);
    border-radius: 12px;
    width: 90%;
    max-width: 600px;
    max-height: 90vh;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    transform: translateY(-20px);
    transition: transform 0.3s;
}
.modal-overlay.active .modal { transform: translateY(0); }
.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
}
.modal-header h3 {
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
}
.modal-header h3 i { color: var(--primary); }
.modal-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
}
.modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.modal-body {
    padding: 20px;
    overflow-y: auto;
    max-height: calc(90vh - 130px);
}
.modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
}

/* Form Styles */
.form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
}
.form-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
}
.form-item.full-width { grid-column: span 2; }
.form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
}
.form-label .required { color: var(--danger); margin-left: 2px; }
.form-input,
.form-select,
.form-textarea {
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--input-bg);
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
}
.form-input:focus,
.form-select:focus,
.form-textarea:focus { border-color: var(--primary); }
.form-textarea { resize: vertical; min-height: 80px; }
.form-select { cursor: pointer; }
</style>
</head>
<body>

<!-- ========== TOP: KPI Cards ========== -->
<div class="kpi-wrapper">
    <div class="kpi-card">
        <div class="kpi-card-header">
            <span class="kpi-card-label">巡查任务总数</span>
            <div class="kpi-card-icon blue"><i class="fas fa-clipboard-list"></i></div>
        </div>
        <div class="kpi-card-main">
            <span class="kpi-card-total blue" id="kpiTotal">128</span>
            <span class="kpi-card-unit">个</span>
        </div>
    </div>
    <div class="kpi-card">
        <div class="kpi-card-header">
            <span class="kpi-card-label">进行中任务</span>
            <div class="kpi-card-icon yellow"><i class="fas fa-spinner"></i></div>
        </div>
        <div class="kpi-card-main">
            <span class="kpi-card-total yellow" id="kpiProcessing">45</span>
            <span class="kpi-card-unit">个</span>
        </div>
    </div>
    <div class="kpi-card">
        <div class="kpi-card-header">
            <span class="kpi-card-label">已完成任务</span>
            <div class="kpi-card-icon green"><i class="fas fa-check-circle"></i></div>
        </div>
        <div class="kpi-card-main">
            <span class="kpi-card-total green" id="kpiCompleted">72</span>
            <span class="kpi-card-unit">个</span>
        </div>
    </div>
    <div class="kpi-card">
        <div class="kpi-card-header">
            <span class="kpi-card-label">已超期任务</span>
            <div class="kpi-card-icon red"><i class="fas fa-exclamation-triangle"></i></div>
        </div>
        <div class="kpi-card-main">
            <span class="kpi-card-total red" id="kpiOverdue">11</span>
            <span class="kpi-card-unit">个</span>
        </div>
    </div>
    <div class="kpi-card">
        <div class="kpi-card-header">
            <span class="kpi-card-label">发现隐患总数</span>
            <div class="kpi-card-icon purple"><i class="fas fa-bug"></i></div>
        </div>
        <div class="kpi-card-main">
            <span class="kpi-card-total purple" id="kpiHidden">36</span>
            <span class="kpi-card-unit">个</span>
        </div>
    </div>
</div>

<!-- ========== MIDDLE: Filter Section ========== -->
<div class="filter-section">
    <div class="filter-row">
        <div class="filter-item">
            <label>任务类型</label>
            <select class="filter-select" id="filterType">
                <option value="">全部类型</option>
                <option value="routine">日常巡查</option>
                <option value="special">专项巡查</option>
                <option value="emergency">应急巡查</option>
                <option value="seasonal">季节性巡查</option>
            </select>
        </div>
        <div class="filter-item">
            <label>任务名称</label>
            <input type="text" class="filter-input" id="filterName" placeholder="请输入任务名称">
        </div>
        <div class="filter-item">
            <label>巡查人员</label>
            <input type="text" class="filter-input" id="filterPerson" placeholder="请输入巡查人员">
        </div>
        <div class="filter-item wide">
            <label>任务开始时间</label>
            <div style="display:flex;align-items:center;gap:6px">
                <input type="date" class="filter-input" id="filterStartDateFrom" style="flex:1">
                <span style="color:var(--text-secondary);font-size:12px">至</span>
                <input type="date" class="filter-input" id="filterStartDateTo" style="flex:1">
            </div>
        </div>
        <div class="filter-actions">
            <button class="btn btn-primary" onclick="applyFilter()"><i class="fas fa-search"></i> 查询</button>
            <button class="btn btn-secondary" onclick="resetFilter()"><i class="fas fa-undo"></i> 重置</button>
            <button class="btn btn-primary" onclick="window.location.href='gas-risk-task-add.html'"><i class="fas fa-plus"></i> 新增任务</button>
        </div>
    </div>
</div>

<!-- ========== BOTTOM: Task List ========== -->
<div class="section-card">
    <div class="section-header">
        <i class="fa-solid fa-list-check"></i>
        任务列表
        <span style="margin-left:auto;font-size:12px;font-weight:400;color:var(--text-secondary);">
            共 <strong id="totalCount">5</strong> 条记录
        </span>
    </div>
    <div class="section-body">
        <table class="data-table" id="taskTable">
            <thead>
                <tr>
                    <th>任务名称</th>
                    <th>关联项目数</th>
                    <th>巡查人员</th>
                    <th>开始时间</th>
                    <th>截至时间</th>
                    <th>巡查进度</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="taskTableBody">
                <!-- Data rendered by JS -->
            </tbody>
        </table>
        <div class="empty-state" id="emptyState" style="display:none;">
            <i class="fas fa-clipboard-list"></i>
            <p>暂无风险巡查任务记录</p>
        </div>
    </div>
    <div class="pagination">
        <div class="page-info">
            显示第 <strong>1</strong> 到 <strong>5</strong> 条，共 <strong>5</strong> 条
        </div>
        <div class="page-btns">
            <button class="page-btn" disabled><i class="fas fa-chevron-left"></i></button>
            <button class="page-btn active">1</button>
            <button class="page-btn" disabled><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>
</div>

<!-- Add Task Modal -->
<div class="modal-overlay" id="taskModal">
    <div class="modal">
        <div class="modal-header">
            <h3><i class="fas fa-plus-circle"></i> 新增风险巡查任务</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="form-item">
                    <label class="form-label">任务编号 <span class="required">*</span></label>
                    <input type="text" class="form-input" id="taskNo" placeholder="例如：FX-RW-2025-001">
                </div>
                <div class="form-item">
                    <label class="form-label">任务名称 <span class="required">*</span></label>
                    <input type="text" class="form-input" id="taskName" placeholder="请输入任务名称">
                </div>
                <div class="form-item">
                    <label class="form-label">任务类型 <span class="required">*</span></label>
                    <select class="form-select" id="taskType">
                        <option value="">请选择</option>
                        <option value="routine">日常巡查</option>
                        <option value="special">专项巡查</option>
                        <option value="emergency">应急巡查</option>
                        <option value="seasonal">季节性巡查</option>
                    </select>
                </div>
                <div class="form-item">
                    <label class="form-label">巡查人员 <span class="required">*</span></label>
                    <input type="text" class="form-input" id="taskPerson" placeholder="请输入巡查人员">
                </div>
                <div class="form-item">
                    <label class="form-label">关联项目数</label>
                    <input type="number" class="form-input" id="taskArchiveCount" placeholder="请输入关联项目数量" min="0">
                </div>
                <div class="form-item">
                    <label class="form-label">需巡查总数 <span class="required">*</span></label>
                    <input type="number" class="form-input" id="taskTotalCount" placeholder="请输入巡查总数" min="1">
                </div>
                <div class="form-item">
                    <label class="form-label">任务开始日期 <span class="required">*</span></label>
                    <input type="date" class="form-input" id="taskStartDate">
                </div>
                <div class="form-item">
                    <label class="form-label">任务结束日期 <span class="required">*</span></label>
                    <input type="date" class="form-input" id="taskEndDate">
                </div>
                <div class="form-item full-width">
                    <label class="form-label">巡查内容描述</label>
                    <textarea class="form-textarea" id="taskDesc" placeholder="请输入巡查内容、重点关注事项等..."></textarea>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveTask()"><i class="fas fa-check"></i> 保存</button>
        </div>
    </div>
</div>

<script>
// Theme sync
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
    }
});

// Demo data
let tasks = [
    {
        id: 1, name: '南桥路燃气调压站日常巡查',
        type: 'routine', typeLabel: '日常巡查',
        archiveCount: 3,
        person: '张建国',
        inspected: 8, total: 10,
        status: 'processing', statusLabel: '进行中', statusClass: 'processing',
        hiddenCount: 2,
        startDate: '2025-06-01', endDate: '2025-06-15'
    },
    {
        id: 2, name: '奉浦大道商业综合体专项巡查',
        type: 'special', typeLabel: '专项巡查',
        archiveCount: 5,
        person: '李明华',
        inspected: 12, total: 15,
        status: 'processing', statusLabel: '进行中', statusClass: 'processing',
        hiddenCount: 1,
        startDate: '2025-06-05', endDate: '2025-06-20'
    },
    {
        id: 3, name: '金海社区燃气管道季度检查',
        type: 'seasonal', typeLabel: '季节性巡查',
        archiveCount: 2,
        person: '王志强',
        inspected: 20, total: 20,
        status: 'completed', statusLabel: '已完成', statusClass: 'completed',
        hiddenCount: 0,
        startDate: '2025-05-20', endDate: '2025-06-10'
    },
    {
        id: 4, name: '海湾旅游区供气站安全巡查',
        type: 'routine', typeLabel: '日常巡查',
        archiveCount: 1,
        person: '陈秀英',
        inspected: 6, total: 6,
        status: 'completed', statusLabel: '已完成', statusClass: 'completed',
        hiddenCount: 1,
        startDate: '2025-06-08', endDate: '2025-06-14'
    },
    {
        id: 5, name: '青村镇老旧小区管网应急排查',
        type: 'emergency', typeLabel: '应急巡查',
        archiveCount: 4,
        person: '刘大伟',
        inspected: 3, total: 10,
        status: 'overdue', statusLabel: '已超期', statusClass: 'overdue',
        hiddenCount: 5,
        startDate: '2025-06-01', endDate: '2025-06-10'
    }
];

function getProgressColor(inspected, total) {
    const pct = inspected / total;
    if (pct >= 1) return 'green';
    if (pct >= 0.5) return 'blue';
    return 'yellow';
}

function renderTasks(data) {
    const tbody = document.getElementById('taskTableBody');
    const emptyState = document.getElementById('emptyState');
    const table = document.getElementById('taskTable');

    if (data.length === 0) {
        table.style.display = 'none';
        emptyState.style.display = 'flex';
        document.getElementById('totalCount').textContent = '0';
        return;
    }

    table.style.display = 'table';
    emptyState.style.display = 'none';
    document.getElementById('totalCount').textContent = data.length;

    tbody.innerHTML = data.map(t => {
        const pct = Math.round((t.inspected / t.total) * 100);
        const color = getProgressColor(t.inspected, t.total);
        return `
        <tr>
            <td><strong>${t.name}</strong></td>
            <td><span style="color:var(--primary);font-weight:600;">${t.archiveCount}</span> 个项目</td>
            <td><i class="fas fa-user" style="color:var(--text-secondary);margin-right:4px;font-size:11px;"></i>${t.person}</td>
            <td>${t.startDate || '-'}</td>
            <td>${t.endDate || '-'}</td>
            <td>
                <div class="progress-cell">
                    <div class="progress-bar">
                        <div class="progress-fill ${color}" style="width:${pct}%"></div>
                    </div>
                    <span class="progress-text">${t.inspected}/${t.total} (${pct}%)</span>
                </div>
            </td>
            <td><span class="status-tag ${t.statusClass}">${t.statusLabel}</span></td>
            <td>
                <div class="actions">
                    <button class="action-link view" onclick="viewTask(${t.id})">查看</button>
                    <button class="action-link edit" onclick="editTask(${t.id})">编辑</button>
                    <button class="action-link delete" onclick="deleteTask(${t.id})">删除</button>
                </div>
            </td>
        </tr>
        `;
    }).join('');

    updateKPI(data);
}

function updateKPI(data) {
    const total = data.length;
    const processing = data.filter(t => t.status === 'processing').length;
    const completed = data.filter(t => t.status === 'completed').length;
    const overdue = data.filter(t => t.status === 'overdue').length;
    const hidden = data.reduce((sum, t) => sum + (t.hiddenCount || 0), 0);

    document.getElementById('kpiTotal').textContent = total;
    document.getElementById('kpiProcessing').textContent = processing;
    document.getElementById('kpiCompleted').textContent = completed;
    document.getElementById('kpiOverdue').textContent = overdue;
    document.getElementById('kpiHidden').textContent = hidden;
}

function applyFilter() {
    const type = document.getElementById('filterType').value;
    const name = document.getElementById('filterName').value.toLowerCase();
    const person = document.getElementById('filterPerson').value.toLowerCase();
    const startDate = document.getElementById('filterStartDate').value;

    const filtered = tasks.filter(t => {
        const matchType = !type || t.type === type;
        const matchName = !name || t.name.toLowerCase().includes(name);
        const matchPerson = !person || t.person.toLowerCase().includes(person);
        return matchType && matchName && matchPerson;
    });

    renderTasks(filtered);
}

function resetFilter() {
    document.getElementById('filterType').value = '';
    document.getElementById('filterName').value = '';
    document.getElementById('filterPerson').value = '';
    document.getElementById('filterStartDateFrom').value = '';
    document.getElementById('filterStartDateTo').value = '';
    renderTasks(tasks);
}

function openModal() {
    document.getElementById('taskModal').classList.add('active');
    const nextId = tasks.length + 1;
    const date = new Date();
    const year = date.getFullYear();
    const seq = String(nextId).padStart(3, '0');
    document.getElementById('taskNo').value = `FX-RW-${year}-${seq}`;
}

function closeModal() {
    document.getElementById('taskModal').classList.remove('active');
    document.getElementById('taskName').value = '';
    document.getElementById('taskType').value = '';
    document.getElementById('taskPerson').value = '';
    document.getElementById('taskArchiveCount').value = '';
    document.getElementById('taskTotalCount').value = '';
    document.getElementById('taskStartDate').value = '';
    document.getElementById('taskEndDate').value = '';
    document.getElementById('taskDesc').value = '';
}

function saveTask() {
    const no = document.getElementById('taskNo').value.trim();
    const name = document.getElementById('taskName').value.trim();
    const type = document.getElementById('taskType').value;
    const person = document.getElementById('taskPerson').value.trim();
    const totalCount = parseInt(document.getElementById('taskTotalCount').value) || 0;

    if (!no || !name || !type || !person || !totalCount) {
        alert('请填写所有必填项');
        return;
    }

    const typeMap = {
        routine: '日常巡查',
        special: '专项巡查',
        emergency: '应急巡查',
        seasonal: '季节性巡查'
    };

    const newTask = {
        id: Date.now(),
        name: name,
        type: type,
        typeLabel: typeMap[type],
        archiveCount: parseInt(document.getElementById('taskArchiveCount').value) || 0,
        person: person,
        inspected: 0,
        total: totalCount,
        status: 'pending',
        statusLabel: '待处理',
        statusClass: 'pending',
        hiddenCount: 0
    };

    tasks.unshift(newTask);
    renderTasks(tasks);
    closeModal();
}

function viewTask(id) {
    const task = tasks.find(t => t.id === id);
    if (task) {
        alert(`任务详情：\n名称：${task.name}\n类型：${task.typeLabel}\n关联项目：${task.archiveCount}个\n巡查人员：${task.person}\n进度：${task.inspected}/${task.total}\n状态：${task.statusLabel}\n发现隐患：${task.hiddenCount}个`);
    }
}

function editTask(id) {
    alert('编辑功能：打开编辑界面（演示）');
}

function deleteTask(id) {
    if (confirm('确定要删除该巡查任务吗？')) {
        tasks = tasks.filter(t => t.id !== id);
        renderTasks(tasks);
    }
}

// Init
renderTasks(tasks);
</script>
