<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机构业绩管理 - 第三方服务机构</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

/* 统计卡片 */
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.stat-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 16px; transition: all 0.3s; }
.stat-item:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stat-icon.blue { background: rgba(26,115,232,0.12); color: var(--primary); }
.stat-icon.green { background: rgba(30,142,62,0.12); color: var(--success); }
.stat-info { display: flex; flex-direction: column; }
.stat-number { font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

/* 表单卡片 */
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.form-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.form-title .badge { font-size: 12px; font-weight: 400; color: var(--text-secondary); margin-left: 4px; }
.form-body { padding: 20px; }

/* 表单布局 */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; color: var(--text-primary); }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }

/* 全宽表单行 */
.form-row-full { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 16px; }

/* 文件上传 */
.file-upload { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--input-bg); }
.file-upload input[type="file"] { display: none; }
.file-upload label { padding: 4px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; cursor: pointer; background: var(--bg-card); color: var(--text-primary); transition: all 0.2s; }
.file-upload label:hover { border-color: var(--primary); color: var(--primary); }
.file-upload .file-name { font-size: 13px; color: var(--text-secondary); }

/* 按钮 */
.form-actions { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
.btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-success { background: var(--success); color: #fff; }
.btn-success:hover { background: #166534; }

/* 筛选栏 */
.filter-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-bar select, .filter-bar input {
    padding: 8px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.filter-bar input { width: 180px; }
.filter-bar .btn { padding: 8px 18px; font-size: 13px; }

/* 图表区域 */
.chart-container { width: 100%; height: 260px; position: relative; }
.chart-area { fill: url(#areaGradient); }
.chart-line { fill: none; stroke: var(--primary); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.chart-dot { fill: var(--primary); stroke: var(--bg-card); stroke-width: 2; }
.chart-grid { stroke: var(--border); stroke-width: 1; stroke-dasharray: 4,4; }
.chart-axis-text { fill: var(--text-secondary); font-size: 11px; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.chart-tooltip { position: absolute; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; box-shadow: 0 4px 12px var(--shadow); font-size: 13px; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
.chart-tooltip.visible { opacity: 1; }

/* 响应式 */
@media (max-width: 768px) {
    .stat-row { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .filter-bar { flex-direction: column; align-items: stretch; }
    .filter-bar input { width: 100%; }
}
</style>
</head>
<body>

<!-- 统计卡片 -->
<div class="stat-row">
    <div class="stat-item">
        <div class="stat-icon blue"><i class="fas fa-briefcase"></i></div>
        <div class="stat-info">
            <div class="stat-number">342</div>
            <div class="stat-label">总业绩项目</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon green"><i class="fas fa-check-double"></i></div>
        <div class="stat-info">
            <div class="stat-number">96.3%</div>
            <div class="stat-label">验收合格率</div>
        </div>
    </div>
</div>

<!-- 业绩数据采集 -->
<div class="form-card">
    <div class="form-header">
        <div class="form-title"><i class="fas fa-pencil-alt" style="color: var(--primary);"></i> 业绩数据采集</div>
        <div class="form-title" style="font-weight: 400;"><span class="badge">提交后进入审核中心</span></div>
    </div>
    <div class="form-body">
        <div class="form-row">
            <div class="form-group">
                <label>项目名称 <span class="required">*</span></label>
                <input type="text" value="黄埔区化工园区安全评估">
            </div>
            <div class="form-group">
                <label>委托单位 <span class="required">*</span></label>
                <input type="text" value="黄埔区应急管理局">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>服务类型 <span class="required">*</span></label>
                <select>
                    <option>应急咨询</option>
                    <option>安全评估</option>
                    <option>检测检验</option>
                    <option>隐患排查</option>
                </select>
            </div>
            <div class="form-group">
                <label>服务时间 <span class="required">*</span></label>
                <input type="text" value="2026-01 ~ 2026-06">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>合同金额 (万元)</label>
                <input type="text" value="76.5">
            </div>
            <div class="form-group">
                <label>验收结论</label>
                <select>
                    <option>合格</option>
                    <option>基本合格</option>
                    <option>不合格</option>
                    <option>待验收</option>
                </select>
            </div>
        </div>
        <div class="form-row-full">
            <div class="form-group">
                <label>业绩说明</label>
                <textarea>完成园区 12 家重点企业安全风险评估，提交报告 6 份。</textarea>
            </div>
        </div>
        <div class="form-row-full">
            <div class="form-group">
                <label>证明材料</label>
                <div class="file-upload">
                    <label for="fileInput">选择文件</label>
                    <input type="file" id="fileInput" onchange="document.getElementById('fileName').textContent=this.files[0]?this.files[0].name:'未选择任何文件'">
                    <span class="file-name" id="fileName">未选择任何文件</span>
                </div>
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary"><i class="fas fa-save"></i> 提交审核</button>
            <button class="btn btn-outline"><i class="fas fa-cloud-download-alt"></i> 从业务系统抓取</button>
        </div>
    </div>
</div>

<!-- 业绩查询分析 -->
<div class="form-card">
    <div class="form-header">
        <div class="form-title"><i class="fas fa-chart-bar" style="color: var(--primary);"></i> 业绩查询分析</div>
        <button class="btn btn-success"><i class="fas fa-file-export"></i> 导出业绩证明</button>
    </div>
    <div class="form-body">
        <div class="filter-bar">
            <select>
                <option>全部服务类型</option>
                <option>应急咨询</option>
                <option>安全评估</option>
                <option>检测检验</option>
                <option>隐患排查</option>
            </select>
            <select>
                <option>全部验收结论</option>
                <option>合格</option>
                <option>基本合格</option>
                <option>不合格</option>
                <option>待验收</option>
            </select>
            <input type="text" placeholder="项目名称">
            <button class="btn btn-primary"><i class="fas fa-search"></i> 查询</button>
        </div>
        <div class="chart-container" id="chartContainer">
            <svg width="100%" height="100%" viewBox="0 0 800 260" preserveAspectRatio="none">
                <defs>
                    <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="rgba(26,115,232,0.2)"/>
                        <stop offset="100%" stop-color="rgba(26,115,232,0.02)"/>
                    </linearGradient>
                </defs>
                <!-- 网格线 -->
                <line class="chart-grid" x1="60" y1="40" x2="780" y2="40"/>
                <line class="chart-grid" x1="60" y1="90" x2="780" y2="90"/>
                <line class="chart-grid" x1="60" y1="140" x2="780" y2="140"/>
                <line class="chart-grid" x1="60" y1="190" x2="780" y2="190"/>
                <!-- Y轴标签 -->
                <text class="chart-axis-text" x="45" y="45" text-anchor="end">40</text>
                <text class="chart-axis-text" x="45" y="95" text-anchor="end">30</text>
                <text class="chart-axis-text" x="45" y="145" text-anchor="end">20</text>
                <text class="chart-axis-text" x="45" y="195" text-anchor="end">10</text>
                <text class="chart-axis-text" x="45" y="230" text-anchor="end">0</text>
                <!-- X轴标签 -->
                <text class="chart-axis-text" x="60" y="245" text-anchor="middle">2025-07</text>
                <text class="chart-axis-text" x="130" y="245" text-anchor="middle">2025-08</text>
                <text class="chart-axis-text" x="200" y="245" text-anchor="middle">2025-09</text>
                <text class="chart-axis-text" x="270" y="245" text-anchor="middle">2025-10</text>
                <text class="chart-axis-text" x="340" y="245" text-anchor="middle">2025-11</text>
                <text class="chart-axis-text" x="410" y="245" text-anchor="middle">2025-12</text>
                <text class="chart-axis-text" x="480" y="245" text-anchor="middle">2026-01</text>
                <text class="chart-axis-text" x="550" y="245" text-anchor="middle">2026-02</text>
                <text class="chart-axis-text" x="620" y="245" text-anchor="middle">2026-03</text>
                <text class="chart-axis-text" x="690" y="245" text-anchor="middle">2026-04</text>
                <text class="chart-axis-text" x="760" y="245" text-anchor="middle">2026-05</text>
                <text class="chart-axis-text" x="830" y="245" text-anchor="middle">2026-06</text>
                <!-- 面积图 -->
                <path class="chart-area" d="M60,190 L60,170 L130,155 L200,165 L270,130 L340,135 L410,115 L480,185 L550,175 L620,145 L690,125 L760,105 L830,100 L830,230 L60,230 Z"/>
                <!-- 折线 -->
                <path class="chart-line" d="M60,170 L130,155 L200,165 L270,130 L340,135 L410,115 L480,185 L550,175 L620,145 L690,125 L760,105 L830,100"/>
                <!-- 数据点 -->
                <circle class="chart-dot" cx="60" cy="170" r="4"/>
                <circle class="chart-dot" cx="130" cy="155" r="4"/>
                <circle class="chart-dot" cx="200" cy="165" r="4"/>
                <circle class="chart-dot" cx="270" cy="130" r="4"/>
                <circle class="chart-dot" cx="340" cy="135" r="4"/>
                <circle class="chart-dot" cx="410" cy="115" r="4"/>
                <circle class="chart-dot" cx="480" cy="185" r="4"/>
                <circle class="chart-dot" cx="550" cy="175" r="4"/>
                <circle class="chart-dot" cx="620" cy="145" r="4"/>
                <circle class="chart-dot" cx="690" cy="125" r="4"/>
                <circle class="chart-dot" cx="760" cy="105" r="4"/>
                <circle class="chart-dot" cx="830" cy="100" r="4"/>
            </svg>
            <div class="chart-tooltip" id="chartTooltip"></div>
        </div>
    </div>
</div>

<script>
(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
        localStorage.setItem('theme', e.data.theme);
    }
});

// 图表交互
const chartData = [
    { month: '2025-07', value: 22 },
    { month: '2025-08', value: 26 },
    { month: '2025-09', value: 20 },
    { month: '2025-10', value: 30 },
    { month: '2025-11', value: 28 },
    { month: '2025-12', value: 34 },
    { month: '2026-01', value: 18 },
    { month: '2026-02', value: 24 },
    { month: '2026-03', value: 32 },
    { month: '2026-04', value: 36 },
    { month: '2026-05', value: 40 },
    { month: '2026-06', value: 38 }
];

const container = document.getElementById('chartContainer');
const tooltip = document.getElementById('chartTooltip');
const dots = document.querySelectorAll('.chart-dot');

dots.forEach((dot, index) => {
    dot.addEventListener('mouseenter', function() {
        const data = chartData[index];
        tooltip.innerHTML = '<div style="font-weight:600;">' + data.month + '</div><div style="color:var(--primary);font-weight:700;font-size:16px;">' + data.value + '</div>';
        tooltip.classList.add('visible');
        const rect = dot.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        tooltip.style.left = (rect.left - containerRect.left - 20) + 'px';
        tooltip.style.top = (rect.top - containerRect.top - 50) + 'px';
    });
    dot.addEventListener('mouseleave', function() {
        tooltip.classList.remove('visible');
    });
});
</script>
</body>
</html>
