<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>专家库管理 - 第三方服务机构</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

/* 统计卡片 */
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.stat-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 16px; transition: all 0.3s; }
.stat-item:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stat-icon.blue { background: rgba(26,115,232,0.12); color: var(--primary); }
.stat-icon.green { background: rgba(30,142,62,0.12); color: var(--success); }
.stat-icon.orange { background: rgba(227,116,0,0.12); color: var(--warning); }
.stat-info { display: flex; flex-direction: column; }
.stat-number { font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

/* 表单卡片 */
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.form-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.form-title .badge { font-size: 12px; font-weight: 400; color: var(--text-secondary); margin-left: 4px; }
.form-body { padding: 20px; }

/* 表单布局 */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 13px; color: var(--text-primary); }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }

/* 全宽表单行 */
.form-row-full { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 16px; }

/* 按钮 */
.btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* 搜索栏 */
.search-bar { display: flex; align-items: center; gap: 10px; }
.search-bar input {
    padding: 8px 14px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    width: 180px;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.search-bar input::placeholder { color: var(--text-secondary); }
.search-bar .btn-search {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: var(--primary);
    color: #fff;
    border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
}
.search-bar .btn-search:hover { background: var(--primary-dark); }

/* 专家卡片网格 */
.expert-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px; }
.expert-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: all 0.3s;
}
.expert-card:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
.expert-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; color: #fff;
    margin-bottom: 12px;
}
.expert-avatar.blue { background: var(--primary); }
.expert-avatar.purple { background: #7c4dff; }
.expert-avatar.orange { background: var(--warning); }
.expert-avatar.teal { background: var(--secondary); }
.expert-name { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.expert-title { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
.expert-tags { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
.expert-tag {
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 11px;
    background: var(--bg-hover);
    color: var(--text-secondary);
}
.expert-tag.active { background: rgba(30,142,62,0.12); color: var(--success); }
.expert-tag.inactive { background: rgba(95,99,104,0.12); color: var(--text-secondary); }

/* 任务统计 */
.task-stats { font-size: 13px; color: var(--text-secondary); padding-top: 8px; border-top: 1px solid var(--border); }

/* 响应式 */
@media (max-width: 768px) {
    .stat-row { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .expert-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- 统计卡片 -->
<div class="stat-row">
    <div class="stat-item">
        <div class="stat-icon blue"><i class="fas fa-user-graduate"></i></div>
        <div class="stat-info">
            <div class="stat-number">34</div>
            <div class="stat-label">专家总数</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
        <div class="stat-info">
            <div class="stat-number">28</div>
            <div class="stat-label">已启用</div>
        </div>
    </div>
</div>

<!-- 专家信息录入 -->
<div class="form-card">
    <div class="form-header">
        <div class="form-title"><i class="fas fa-user-plus" style="color: var(--primary);"></i> 专家信息录入</div>
        <div class="form-title" style="font-weight: 400;"><span class="badge">提交后进入审核中心</span></div>
    </div>
    <div class="form-body">
        <div class="form-row">
            <div class="form-group">
                <label>姓名 <span class="required">*</span></label>
                <input type="text" value="周树华">
            </div>
            <div class="form-group">
                <label>工作单位 <span class="required">*</span></label>
                <input type="text" value="华南理工大学安全工程系">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>专业领域 <span class="required">*</span></label>
                <select>
                    <option>结构安全</option>
                    <option>消防安全</option>
                    <option>电气安全</option>
                    <option>化工安全</option>
                    <option>环境安全</option>
                </select>
            </div>
            <div class="form-group">
                <label>职称 <span class="required">*</span></label>
                <select>
                    <option>副教授</option>
                    <option>教授</option>
                    <option>高级工程师</option>
                    <option>工程师</option>
                    <option>研究员</option>
                </select>
            </div>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>工作年限</label>
                <input type="text" value="22">
            </div>
            <div class="form-group">
                <label>联系电话</label>
                <input type="text" value="139 8888 6666">
            </div>
        </div>
        <div class="form-actions">
            <button class="btn btn-primary"><i class="fas fa-save"></i> 提交审核</button>
            <button class="btn btn-outline"><i class="fas fa-sync-alt"></i> 从平台同步</button>
        </div>
    </div>
</div>

<!-- 专家维护管理 -->
<div class="form-card">
    <div class="form-header">
        <div class="form-title"><i class="fas fa-users" style="color: var(--primary);"></i> 专家维护管理</div>
        <div class="search-bar">
            <input type="text" placeholder="搜索专家...">
            <button class="btn-search"><i class="fas fa-search"></i></button>
        </div>
    </div>
    <div class="form-body">
        <div class="expert-grid">
            <div class="expert-card">
                <div class="expert-avatar blue">周</div>
                <div class="expert-name">周树华</div>
                <div class="expert-title">副教授 · 结构安全</div>
                <div class="expert-tags">
                    <span class="expert-tag">22年</span>
                    <span class="expert-tag">华南理工</span>
                    <span class="expert-tag active">启用</span>
                </div>
            </div>
            <div class="expert-card">
                <div class="expert-avatar purple">陈</div>
                <div class="expert-name">陈丽华</div>
                <div class="expert-title">教授 · 消防安全</div>
                <div class="expert-tags">
                    <span class="expert-tag">18年</span>
                    <span class="expert-tag">消防研究所</span>
                    <span class="expert-tag active">启用</span>
                </div>
            </div>
            <div class="expert-card">
                <div class="expert-avatar orange">王</div>
                <div class="expert-name">王建平</div>
                <div class="expert-title">高级工程师 · 环境工程</div>
                <div class="expert-tags">
                    <span class="expert-tag">25年</span>
                    <span class="expert-tag">环保集团</span>
                    <span class="expert-tag inactive">停用</span>
                </div>
            </div>
            <div class="expert-card">
                <div class="expert-avatar teal">李</div>
                <div class="expert-name">李明辉</div>
                <div class="expert-title">教授 · 应急管理</div>
                <div class="expert-tags">
                    <span class="expert-tag">15年</span>
                    <span class="expert-tag">应急研究院</span>
                    <span class="expert-tag active">启用</span>
                </div>
            </div>
        </div>
        <div class="task-stats">近一年参与任务：周树华 12次，陈丽华 8次，李明辉 6次</div>
    </div>
</div>

<script>
(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
        localStorage.setItem('theme', e.data.theme);
    }
});
</script>
</body>
</html>
