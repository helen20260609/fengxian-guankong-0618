<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机构入库管理 - 第三方服务机构</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

/* 统计卡片 */
.stat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.stat-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 16px; transition: all 0.3s; }
.stat-item:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stat-icon.blue { background: rgba(26,115,232,0.12); color: var(--primary); }
.stat-icon.green { background: rgba(30,142,62,0.12); color: var(--success); }
.stat-info { display: flex; flex-direction: column; }
.stat-number { font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

/* 表单卡片 */
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.form-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.form-body { padding: 20px; }
.form-hint { font-size: 12px; color: var(--text-secondary); }

/* 表单布局 */
.form-section { margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.form-section:last-child { border-bottom: none; margin-bottom: 0; }
.form-section-title { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.form-section-title i { font-size: 16px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.form-row:last-child { margin-bottom: 0; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full-width { grid-column: 1 / -1; }
.form-group.three-col { grid-column: span 1; }
.form-group label { font-size: 13px; color: var(--text-primary); font-weight: 500; }
.form-group label .required { color: var(--danger); margin-left: 2px; }
.form-group input, .form-group select, .form-group textarea {
    padding: 10px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--primary); }
.form-group textarea { resize: vertical; min-height: 80px; }

/* Tab 导航 */
.tab-nav { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 0; background: var(--bg-card); }
.tab-nav-item { padding: 12px 20px; font-size: 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.25s; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.tab-nav-item:hover { color: var(--primary); background: var(--bg-hover); }
.tab-nav-item.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
.tab-content { display: none; padding: 20px; }
.tab-content.active { display: block; }
.tab-progress { display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: var(--primary-light); border-bottom: 1px solid var(--border); font-size: 13px; color: var(--primary); }
.tab-progress i { font-size: 14px; }

/* 动态添加行 */
.dynamic-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; margin-bottom: 12px; }
.dynamic-row .form-group { margin-bottom: 0; }
.btn-add { padding: 8px 16px; border: 1px dashed var(--border); border-radius: 8px; background: transparent; color: var(--primary); font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; }
.btn-add:hover { border-color: var(--primary); background: var(--primary-light); }
.btn-remove { padding: 8px; border: none; background: transparent; color: var(--danger); cursor: pointer; border-radius: 6px; transition: all 0.2s; }
.btn-remove:hover { background: rgba(217,48,37,0.1); }

/* 附件上传 */
.file-upload { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border: 1px solid var(--input-border); border-radius: 8px; background: var(--input-bg); }
.file-upload input[type="file"] { display: none; }
.file-upload-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text-primary); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.file-upload-btn:hover { border-color: var(--primary); color: var(--primary); }
.file-upload-text { font-size: 13px; color: var(--text-secondary); }

/* 按钮 */
.form-actions { display: flex; align-items: center; justify-content: flex-end; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.form-actions-left { display: flex; gap: 10px; }
.btn { padding: 8px 20px; border-radius: 6px; font-size: 13px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 6px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* 弹窗遮罩 */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; }
.modal-overlay.active { display: flex; }
.modal-container { background: var(--bg-card); border-radius: 12px; width: 900px; height: 700px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.modal-close { width: 32px; height: 32px; border: none; background: transparent; color: var(--text-secondary); font-size: 18px; cursor: pointer; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.modal-close:hover { background: var(--bg-hover); color: var(--danger); }
.modal-body { flex: 1; overflow-y: auto; padding: 0; }
.modal-body .form-body { padding: 0; }
.modal-body .tab-content { padding: 16px 20px; }
.modal-body .form-actions { margin: 0 20px 20px; padding-top: 16px; }

/* 状态徽章 */
.status-badge { display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.status-normal { background: rgba(30,142,62,0.12); color: var(--success); }
.status-update { background: rgba(227,116,0,0.12); color: var(--warning); }

/* 表格链接 */
.table-link { color: var(--primary); text-decoration: none; font-size: 13px; margin: 0 6px; transition: color 0.2s; }
.table-link:hover { text-decoration: underline; }
.table-link-danger { color: var(--danger); }
.table-link-danger:hover { color: #b91c1c; }

/* 分页按钮 */
.page-btn { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); color: var(--text-primary); font-size: 13px; cursor: pointer; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
.page-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.page-btn-active { background: var(--primary); color: #fff; border-color: var(--primary); }
.page-btn-active:hover { background: var(--primary-dark); color: #fff; }

/* 响应式 */
@media (max-width: 768px) {
    .stat-row { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .form-actions { flex-direction: column; gap: 12px; align-items: stretch; }
}
</style>
</head>
<body>

<!-- 统计卡片 -->
<div class="stat-row">
    <div class="stat-item">
        <div class="stat-icon blue"><i class="fas fa-building"></i></div>
        <div class="stat-info">
            <div class="stat-number">128</div>
            <div class="stat-label">已入库机构</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon green"><i class="fas fa-edit"></i></div>
        <div class="stat-info">
            <div class="stat-number">6</div>
            <div class="stat-label">信息变更待处理</div>
        </div>
    </div>
</div>

<!-- 机构信息维护 -->
<div class="form-card">
    <div class="form-header">
        <div class="form-title"><i class="fas fa-edit" style="color: var(--primary);"></i> 机构信息维护</div>
    </div>
    <div class="form-body">
        <!-- 搜索栏卡片 -->
        <div class="filter-card" style="background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px;">
            <div class="filter-row" style="display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
                <div class="filter-item" style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 13px; color: var(--text-secondary); white-space: nowrap;">机构名称：</label>
                    <input type="text" placeholder="请输入机构名称" style="padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); font-size: 13px; outline: none; width: 180px;">
                </div>
                <div class="filter-item" style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 13px; color: var(--text-secondary); white-space: nowrap;">统一代码：</label>
                    <input type="text" placeholder="请输入统一代码" style="padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); font-size: 13px; outline: none; width: 180px;">
                </div>
                <div class="filter-item" style="display: flex; align-items: center; gap: 8px;">
                    <label style="font-size: 13px; color: var(--text-secondary); white-space: nowrap;">状态：</label>
                    <select style="padding: 8px 12px; border: 1px solid var(--input-border); border-radius: 6px; background: var(--input-bg); color: var(--text-primary); font-size: 13px; outline: none; width: 120px;">
                        <option>全部</option>
                        <option>正常</option>
                        <option>信息待更新</option>
                        <option>已停用</option>
                    </select>
                </div>
                <div class="filter-actions" style="display: flex; gap: 10px; margin-left: auto;">
                    <button class="btn btn-primary" style="padding: 8px 20px; font-size: 13px;"><i class="fas fa-search"></i> 查询</button>
                    <button class="btn btn-outline" style="padding: 8px 20px; font-size: 13px;"><i class="fas fa-undo"></i> 重置</button>
                    <button class="btn btn-primary" style="padding: 8px 20px; font-size: 13px; background: var(--success);" onclick="addNewOrg()"><i class="fas fa-plus"></i> 新增机构</button>
                </div>
            </div>
        </div>

        <!-- 数据表格 -->
        <table class="data-table" style="width: 100%; border-collapse: collapse;">
            <thead>
                <tr style="background: var(--header-bg);">
                    <th style="padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border);">机构名称</th>
                    <th style="padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border);">统一代码</th>
                    <th style="padding: 12px 16px; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border);">状态</th>
                    <th style="padding: 12px 16px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-bottom: 1px solid var(--border); width: 160px;">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr style="border-bottom: 1px solid var(--border);">
                    <td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">中科检测技术有限公司</td>
                    <td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">91440101MA5XXXXXX</td>
                    <td style="padding: 14px 16px;"><span class="status-badge status-normal">正常</span></td>
                    <td style="padding: 14px 16px; text-align: center;">
                        <a href="#" class="table-link" onclick="viewOrg(1); return false;">查看</a>
                        <a href="#" class="table-link" onclick="editOrg(1); return false;">编辑</a>
                        <a href="#" class="table-link table-link-danger" onclick="deleteOrg(1); return false;">删除</a>
                    </td>
                </tr>
                <tr style="border-bottom: 1px solid var(--border);">
                    <td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">华安风险评估中心</td>
                    <td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">91440106MA7XXXXXX</td>
                    <td style="padding: 14px 16px;"><span class="status-badge status-update">信息待更新</span></td>
                    <td style="padding: 14px 16px; text-align: center;">
                        <a href="#" class="table-link" onclick="viewOrg(2); return false;">查看</a>
                        <a href="#" class="table-link" onclick="editOrg(2); return false;">编辑</a>
                        <a href="#" class="table-link table-link-danger" onclick="deleteOrg(2); return false;">删除</a>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">南方应急管理研究院</td>
                    <td style="padding: 14px 16px; font-size: 13px; color: var(--text-primary);">91440111MA9XXXXXX</td>
                    <td style="padding: 14px 16px;"><span class="status-badge status-normal">正常</span></td>
                    <td style="padding: 14px 16px; text-align: center;">
                        <a href="#" class="table-link" onclick="viewOrg(3); return false;">查看</a>
                        <a href="#" class="table-link" onclick="editOrg(3); return false;">编辑</a>
                        <a href="#" class="table-link table-link-danger" onclick="deleteOrg(3); return false;">删除</a>
                    </td>
                </tr>
            </tbody>
        </table>
        <!-- 分页 -->
        <div class="pagination" style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);">
            <button class="page-btn" onclick="goPage(1)" disabled>上一页</button>
            <button class="page-btn page-btn-active" onclick="goPage(1)">1</button>
            <button class="page-btn" onclick="goPage(2)">2</button>
            <button class="page-btn" onclick="goPage(3)">3</button>
            <button class="page-btn" onclick="goPage(2)">下一页</button>
        </div>
    </div>
</div>

<!-- 机构申请录入弹窗 -->
<div class="modal-overlay" id="orgModal">
    <div class="modal-container">
        <div class="modal-header">
            <div class="modal-title"><i class="fas fa-edit" style="color: var(--primary);"></i> 机构申请录入</div>
            <button class="modal-close" onclick="closeOrgModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-body">
                <!-- Tab 导航 -->
                <div class="tab-nav" id="tabNavModal">
                    <div class="tab-nav-item active" data-tab="tab-legal-modal">
                        <i class="fas fa-user-tie"></i> 法人信息
                    </div>
                    <div class="tab-nav-item" data-tab="tab-enterprise-modal">
                        <i class="fas fa-building"></i> 企业信息
                    </div>
                    <div class="tab-nav-item" data-tab="tab-personnel-modal">
                        <i class="fas fa-users"></i> 人员信息
                    </div>
                    <div class="tab-nav-item" data-tab="tab-qualification-modal">
                        <i class="fas fa-certificate"></i> 资质信息
                    </div>
                    <div class="tab-nav-item" data-tab="tab-equipment-modal">
                        <i class="fas fa-tools"></i> 设备信息
                    </div>
                </div>
                <div class="tab-progress" id="tabProgressModal">
                    <i class="fas fa-info-circle"></i>
                    <span>当前填写第 <strong>1</strong> / 5 步：法人信息</span>
                </div>

                <!-- Tab 1: 法人信息 -->
                <div class="tab-content active" id="tab-legal-modal">
                    <div class="form-section">
                        <div class="form-row">
                            <div class="form-group">
                                <label>法人姓名 <span class="required">*</span></label>
                                <input type="text" placeholder="请输入法人姓名">
                            </div>
                            <div class="form-group">
                                <label>身份证号 <span class="required">*</span></label>
                                <input type="text" placeholder="请输入18位身份证号">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>联系电话 <span class="required">*</span></label>
                                <input type="text" placeholder="请输入联系电话">
                            </div>
                            <div class="form-group">
                                <label>电子邮箱</label>
                                <input type="text" placeholder="请输入电子邮箱">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 2: 企业信息 -->
                <div class="tab-content" id="tab-enterprise-modal">
                    <div class="form-section">
                        <div class="form-row">
                            <div class="form-group">
                                <label>企业名称 <span class="required">*</span></label>
                                <input type="text" placeholder="请输入企业全称">
                            </div>
                            <div class="form-group">
                                <label>统一社会信用代码 <span class="required">*</span></label>
                                <input type="text" placeholder="请输入18位统一社会信用代码">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>注册地址 <span class="required">*</span></label>
                                <input type="text" placeholder="请输入详细注册地址">
                            </div>
                            <div class="form-group">
                                <label>成立时间 <span class="required">*</span></label>
                                <input type="date">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>注册资本 (万元) <span class="required">*</span></label>
                                <input type="number" placeholder="请输入注册资本">
                            </div>
                            <div class="form-group">
                                <label>企业类型</label>
                                <select>
                                    <option>有限责任公司</option>
                                    <option>股份有限公司</option>
                                    <option>国有企业</option>
                                    <option>合伙企业</option>
                                    <option>个人独资企业</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group full-width">
                                <label>经营范围 <span class="required">*</span></label>
                                <textarea rows="3" placeholder="请详细描述企业经营范围"></textarea>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 3: 人员信息 -->
                <div class="tab-content" id="tab-personnel-modal">
                    <div class="form-section">
                        <div id="personnelListModal">
                            <div class="dynamic-row">
                                <div class="form-group">
                                    <label>姓名</label>
                                    <input type="text" placeholder="技术人员姓名">
                                </div>
                                <div class="form-group">
                                    <label>职称</label>
                                    <select>
                                        <option>高级工程师</option>
                                        <option>工程师</option>
                                        <option>助理工程师</option>
                                        <option>技术员</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>职称证书编号</label>
                                    <input type="text" placeholder="证书编号">
                                </div>
                                <button class="btn-remove" onclick="removePersonnelRowModal(this)" title="删除"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                        <button class="btn-add" onclick="addPersonnelRowModal()"><i class="fas fa-plus"></i> 添加技术人员</button>
                        <div class="form-row" style="margin-top: 16px;">
                            <div class="form-group full-width">
                                <label>社保缴纳记录</label>
                                <div class="file-upload">
                                    <label class="file-upload-btn" for="socialSecurityFileModal">选择文件</label>
                                    <input type="file" id="socialSecurityFileModal">
                                    <span class="file-upload-text">请上传近6个月社保缴纳证明</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 4: 资质信息 -->
                <div class="tab-content" id="tab-qualification-modal">
                    <div class="form-section">
                        <div id="qualificationListModal">
                            <div class="dynamic-row">
                                <div class="form-group">
                                    <label>资质证书名称</label>
                                    <input type="text" placeholder="如：建设工程质量检测机构资质证书">
                                </div>
                                <div class="form-group">
                                    <label>证书编号</label>
                                    <input type="text" placeholder="证书编号">
                                </div>
                                <div class="form-group">
                                    <label>发证机关</label>
                                    <input type="text" placeholder="发证机关全称">
                                </div>
                                <button class="btn-remove" onclick="removeQualificationRowModal(this)" title="删除"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                        <button class="btn-add" onclick="addQualificationRowModal()"><i class="fas fa-plus"></i> 添加资质证书</button>
                        <div class="form-row" style="margin-top: 16px;">
                            <div class="form-group">
                                <label>资质有效期起始</label>
                                <input type="date">
                            </div>
                            <div class="form-group">
                                <label>资质有效期截止 <span class="required">*</span></label>
                                <input type="date">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group full-width">
                                <label>资质证书扫描件</label>
                                <div class="file-upload">
                                    <label class="file-upload-btn" for="qualificationFileModal">选择文件</label>
                                    <input type="file" id="qualificationFileModal">
                                    <span class="file-upload-text">请上传资质证书扫描件（PDF或图片）</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 5: 设备信息 -->
                <div class="tab-content" id="tab-equipment-modal">
                    <div class="form-section">
                        <div id="equipmentListModal">
                            <div class="dynamic-row">
                                <div class="form-group">
                                    <label>设备名称</label>
                                    <input type="text" placeholder="如：全站仪、压力试验机">
                                </div>
                                <div class="form-group">
                                    <label>设备型号</label>
                                    <input type="text" placeholder="设备型号/规格">
                                </div>
                                <div class="form-group">
                                    <label>数量</label>
                                    <input type="number" placeholder="台/套" min="1">
                                </div>
                                <button class="btn-remove" onclick="removeEquipmentRowModal(this)" title="删除"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </div>
                        <button class="btn-add" onclick="addEquipmentRowModal()"><i class="fas fa-plus"></i> 添加设备</button>
                        <div class="form-row" style="margin-top: 16px;">
                            <div class="form-group full-width">
                                <label>设备校准证书</label>
                                <div class="file-upload">
                                    <label class="file-upload-btn" for="calibrationFileModal">选择文件</label>
                                    <input type="file" id="calibrationFileModal">
                                    <span class="file-upload-text">请上传设备校准/检定证书</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-actions" style="margin-top: 24px;">
                    <div class="form-actions-left">
                        <button class="btn btn-outline" id="btnPrevModal" onclick="prevTabModal()" style="display: none;"><i class="fas fa-arrow-left"></i> 上一步</button>
                        <button class="btn btn-primary" id="btnNextModal" onclick="nextTabModal()">下一步 <i class="fas fa-arrow-right"></i></button>
                        <button class="btn btn-outline" id="btnSaveModal" onclick="saveFormModal()"><i class="fas fa-save"></i> 保存</button>
                        <button class="btn btn-primary" id="btnSubmitModal" onclick="submitFormModal()" style="display: none;"><i class="fas fa-paper-plane"></i> 提交审核</button>
                        <button class="btn btn-outline" onclick="resetFormModal()"><i class="fas fa-undo"></i> 重置</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
        localStorage.setItem('theme', e.data.theme);
    }
});

// 弹窗内 Tab 切换功能
var tabNamesModal = ['法人信息', '企业信息', '人员信息', '资质信息', '设备信息'];
var currentTabModal = 0;

function switchTabModal(index) {
    var tabs = document.querySelectorAll('#tabNavModal .tab-nav-item');
    var contents = document.querySelectorAll('#orgModal .tab-content');
    var progress = document.getElementById('tabProgressModal');
    var btnPrev = document.getElementById('btnPrevModal');
    var btnNext = document.getElementById('btnNextModal');
    var btnSave = document.getElementById('btnSaveModal');
    var btnSubmit = document.getElementById('btnSubmitModal');
    
    tabs.forEach(function(t, i) {
        t.classList.toggle('active', i === index);
    });
    contents.forEach(function(c, i) {
        c.classList.toggle('active', i === index);
    });
    
    if (progress) {
        progress.querySelector('span').innerHTML = '当前填写第 <strong>' + (index + 1) + '</strong> / 5 步：' + tabNamesModal[index];
    }
    
    if (btnPrev) {
        btnPrev.style.display = index === 0 ? 'none' : 'inline-flex';
    }
    if (btnNext) {
        btnNext.style.display = index === tabNamesModal.length - 1 ? 'none' : 'inline-flex';
    }
    if (btnSave) {
        btnSave.style.display = 'inline-flex';
    }
    if (btnSubmit) {
        btnSubmit.style.display = index === tabNamesModal.length - 1 ? 'inline-flex' : 'none';
    }
    
    currentTabModal = index;
}

function nextTabModal() {
    if (currentTabModal < tabNamesModal.length - 1) {
        switchTabModal(currentTabModal + 1);
    }
}

function prevTabModal() {
    if (currentTabModal > 0) {
        switchTabModal(currentTabModal - 1);
    }
}

// 弹窗 Tab 点击事件
document.querySelectorAll('#tabNavModal .tab-nav-item').forEach(function(item, index) {
    item.addEventListener('click', function() {
        switchTabModal(index);
    });
});

// 文件上传显示文件名
function bindFileUpload(inputId) {
    var input = document.getElementById(inputId);
    if (input) {
        input.addEventListener('change', function(e) {
            var fileName = e.target.files.length > 0 ? e.target.files[0].name : '未选择任何文件';
            var textSpan = input.parentElement.querySelector('.file-upload-text');
            if (textSpan) textSpan.textContent = fileName;
        });
    }
}

bindFileUpload('socialSecurityFileModal');
bindFileUpload('qualificationFileModal');
bindFileUpload('calibrationFileModal');

// 弹窗内动态添加/删除技术人员
function addPersonnelRowModal() {
    var container = document.getElementById('personnelListModal');
    var row = document.createElement('div');
    row.className = 'dynamic-row';
    row.innerHTML = '<div class="form-group"><label>姓名</label><input type="text" placeholder="技术人员姓名"></div>' +
        '<div class="form-group"><label>职称</label><select><option>高级工程师</option><option>工程师</option><option>助理工程师</option><option>技术员</option></select></div>' +
        '<div class="form-group"><label>职称证书编号</label><input type="text" placeholder="证书编号"></div>' +
        '<button class="btn-remove" onclick="removePersonnelRowModal(this)" title="删除"><i class="fas fa-trash-alt"></i></button>';
    container.appendChild(row);
}
function removePersonnelRowModal(btn) {
    btn.parentElement.remove();
}

// 弹窗内动态添加/删除资质证书
function addQualificationRowModal() {
    var container = document.getElementById('qualificationListModal');
    var row = document.createElement('div');
    row.className = 'dynamic-row';
    row.innerHTML = '<div class="form-group"><label>资质证书名称</label><input type="text" placeholder="如：建设工程质量检测机构资质证书"></div>' +
        '<div class="form-group"><label>证书编号</label><input type="text" placeholder="证书编号"></div>' +
        '<div class="form-group"><label>发证机关</label><input type="text" placeholder="发证机关全称"></div>' +
        '<button class="btn-remove" onclick="removeQualificationRowModal(this)" title="删除"><i class="fas fa-trash-alt"></i></button>';
    container.appendChild(row);
}
function removeQualificationRowModal(btn) {
    btn.parentElement.remove();
}

// 弹窗内动态添加/删除设备
function addEquipmentRowModal() {
    var container = document.getElementById('equipmentListModal');
    var row = document.createElement('div');
    row.className = 'dynamic-row';
    row.innerHTML = '<div class="form-group"><label>设备名称</label><input type="text" placeholder="如：全站仪、压力试验机"></div>' +
        '<div class="form-group"><label>设备型号</label><input type="text" placeholder="设备型号/规格"></div>' +
        '<div class="form-group"><label>数量</label><input type="number" placeholder="台/套" min="1"></div>' +
        '<button class="btn-remove" onclick="removeEquipmentRowModal(this)" title="删除"><i class="fas fa-trash-alt"></i></button>';
    container.appendChild(row);
}
function removeEquipmentRowModal(btn) {
    btn.parentElement.remove();
}

// 弹窗内保存、提交、重置
function saveFormModal() {
    alert('表单已保存（演示功能）');
}
function submitFormModal() {
    if (confirm('确定要提交审核吗？提交后将进入材料审核中心。')) {
        alert('提交成功！已发送至材料审核中心。');
        closeOrgModal();
    }
}
function resetFormModal() {
    if (confirm('确定要重置所有表单内容吗？')) {
        var inputs = document.querySelectorAll('#orgModal input, #orgModal textarea');
        inputs.forEach(function(input) {
            if (input.type !== 'button' && input.type !== 'submit') {
                input.value = '';
            }
        });
        var selects = document.querySelectorAll('#orgModal select');
        selects.forEach(function(select) {
            select.selectedIndex = 0;
        });
        document.querySelectorAll('#orgModal .file-upload-text').forEach(function(span) {
            var fileInput = span.parentElement.querySelector('input[type="file"]');
            if (fileInput && fileInput.id === 'socialSecurityFileModal') span.textContent = '请上传近6个月社保缴纳证明';
            else if (fileInput && fileInput.id === 'qualificationFileModal') span.textContent = '请上传资质证书扫描件（PDF或图片）';
            else if (fileInput) span.textContent = '请上传设备校准/检定证书';
        });
        switchTabModal(0);
    }
}

// 新增机构 - 打开弹窗
function addNewOrg() {
    document.getElementById('orgModal').classList.add('active');
    document.body.style.overflow = 'hidden';
    switchTabModal(0);
}

// 关闭弹窗
function closeOrgModal() {
    document.getElementById('orgModal').classList.remove('active');
    document.body.style.overflow = '';
}

// 点击遮罩关闭弹窗
document.getElementById('orgModal').addEventListener('click', function(e) {
    if (e.target === this) {
        closeOrgModal();
    }
});

// 查看机构
function viewOrg(id) {
    alert('查看机构详情（ID: ' + id + '）');
}

// 编辑机构
function editOrg(id) {
    alert('编辑机构信息（ID: ' + id + '）');
}

// 删除机构
function deleteOrg(id) {
    if (confirm('确定要删除该机构吗？此操作不可恢复。')) {
        alert('删除成功（ID: ' + id + '）');
    }
}

// 分页跳转
function goPage(page) {
    alert('跳转到第 ' + page + ' 页');
}
</script>
</body>
</html>
