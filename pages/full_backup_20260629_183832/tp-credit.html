<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机构信用管理 - 第三方服务机构</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
    --primary: #1a73e8;
    --primary-dark: #1557b0;
    --primary-light: #e8f0fe;
    --secondary: #0097a7;
    --danger: #d93025;
    --warning: #e37400;
    --success: #1e8e3e;
    --bg-dark: #f0f2f5;
    --bg-card: #ffffff;
    --bg-hover: #e8eaed;
    --text-primary: #202124;
    --text-secondary: #5f6368;
    --border: #dadce0;
    --shadow: rgba(0,0,0,0.08);
    --input-bg: #ffffff;
    --input-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02);
}
:root[data-theme="dark"] {
    --primary: #1e6fdb;
    --primary-dark: #1557b0;
    --primary-light: #e8f1fd;
    --secondary: #00b4d8;
    --danger: #ef4444;
    --warning: #f59e0b;
    --success: #10b981;
    --bg-dark: #0a1628;
    --bg-card: #112240;
    --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: var(--bg-dark); color: var(--text-primary); margin: 0; padding: 20px; }

/* 统计卡片 */
.stat-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.stat-item { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; display: flex; align-items: center; gap: 16px; transition: all 0.3s; }
.stat-item:hover { transform: translateY(-2px); box-shadow: 0 4px 12px var(--shadow); }
.stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.stat-icon.blue { background: rgba(26,115,232,0.12); color: var(--primary); }
.stat-icon.green { background: rgba(30,142,62,0.12); color: var(--success); }
.stat-icon.orange { background: rgba(227,116,0,0.12); color: var(--warning); }
.stat-info { display: flex; flex-direction: column; }
.stat-number { font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; }
.stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }

/* 表单卡片 */
.form-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.form-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.form-title .badge { font-size: 12px; font-weight: 400; color: var(--text-secondary); margin-left: 4px; }
.form-body { padding: 20px; }

/* 两栏布局 */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* 环形图 */
.donut-chart { display: flex; align-items: center; justify-content: center; gap: 40px; padding: 20px 0; }
.donut-svg { width: 220px; height: 220px; }
.donut-legend { display: flex; flex-direction: column; gap: 12px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-primary); }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

/* 信用明细 */
.credit-detail { display: flex; align-items: center; gap: 30px; padding: 20px 0; }
.credit-score-circle { width: 120px; height: 120px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 32px; font-weight: 700; flex-shrink: 0; }
.credit-items { display: flex; flex-direction: column; gap: 14px; }
.credit-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-primary); }
.credit-item .label { color: var(--text-secondary); }
.credit-item .value { font-weight: 600; font-size: 16px; color: var(--text-primary); }
.credit-badge { padding: 4px 14px; border-radius: 20px; background: var(--success); color: #fff; font-size: 12px; font-weight: 600; }

/* 按钮 */
.btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-primary); }
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }

/* 数据表格 */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th { text-align: left; padding: 12px 16px; font-size: 13px; color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border); }
.data-table td { padding: 12px 16px; font-size: 13px; color: var(--text-primary); border-bottom: 1px solid var(--border); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover { background: var(--bg-hover); }

/* 分值标签 */
.score-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
.score-tag.positive { background: rgba(30,142,62,0.1); color: var(--success); }
.score-tag.negative { background: rgba(217,48,37,0.1); color: var(--danger); }
.score-tag.neutral { background: rgba(26,115,232,0.1); color: var(--primary); }

/* 评分规则表单 */
.rule-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 16px; }
.rule-group { display: flex; flex-direction: column; gap: 6px; }
.rule-group label { font-size: 13px; color: var(--text-primary); }
.rule-group input {
    padding: 10px 12px;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
}
.rule-group input:focus { border-color: var(--primary); }

/* 响应式 */
@media (max-width: 768px) {
    .stat-row { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .donut-chart { flex-direction: column; }
    .credit-detail { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- 统计卡片 -->
<div class="stat-row">
    <div class="stat-item">
        <div class="stat-icon blue"><i class="fas fa-star"></i></div>
        <div class="stat-info">
            <div class="stat-number">AAA</div>
            <div class="stat-label">最高等级</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon green"><i class="fas fa-building"></i></div>
        <div class="stat-info">
            <div class="stat-number">42</div>
            <div class="stat-label">A级以上机构</div>
        </div>
    </div>
    <div class="stat-item">
        <div class="stat-icon orange"><i class="fas fa-chart-line"></i></div>
        <div class="stat-info">
            <div class="stat-number">+6.2%</div>
            <div class="stat-label">平均分月增幅</div>
        </div>
    </div>
</div>

<!-- 两栏内容 -->
<div class="two-col">
    <!-- 信用评级列表 -->
    <div class="form-card">
        <div class="form-header">
            <div class="form-title">信用评级列表 <span class="badge">分布</span></div>
        </div>
        <div class="form-body">
            <div class="donut-chart">
                <svg class="donut-svg" viewBox="0 0 220 220">
                    <defs>
                        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
                        </filter>
                    </defs>
                    <!-- 背景圆环 -->
                    <circle cx="110" cy="110" r="80" fill="none" stroke="var(--border)" stroke-width="24"/>
                    <!-- AAA 15.38% -->
                    <circle cx="110" cy="110" r="80" fill="none" stroke="#1e8e3e" stroke-width="24" 
                        stroke-dasharray="77.2 424.8" stroke-dashoffset="0" transform="rotate(-90 110 110)" filter="url(#shadow)"/>
                    <!-- AA 23.08% -->
                    <circle cx="110" cy="110" r="80" fill="none" stroke="#34a853" stroke-width="24" 
                        stroke-dasharray="115.8 386.2" stroke-dashoffset="-77.2" transform="rotate(-90 110 110)" filter="url(#shadow)"/>
                    <!-- A 35.9% -->
                    <circle cx="110" cy="110" r="80" fill="none" stroke="#00bfa5" stroke-width="24" 
                        stroke-dasharray="180.0 322.0" stroke-dashoffset="-193.0" transform="rotate(-90 110 110)" filter="url(#shadow)"/>
                    <!-- B 19.23% -->
                    <circle cx="110" cy="110" r="80" fill="none" stroke="#e37400" stroke-width="24" 
                        stroke-dasharray="96.5 405.5" stroke-dashoffset="-373.0" transform="rotate(-90 110 110)" filter="url(#shadow)"/>
                    <!-- C 6.41% -->
                    <circle cx="110" cy="110" r="80" fill="none" stroke="#d93025" stroke-width="24" 
                        stroke-dasharray="32.2 469.8" stroke-dashoffset="-469.5" transform="rotate(-90 110 110)" filter="url(#shadow)"/>
                    
                    <!-- 标签引线 -->
                    <!-- AAA 15.38% -->
                    <line x1="160" y1="55" x2="190" y2="35" stroke="#1e8e3e" stroke-width="1"/>
                    <circle cx="160" cy="55" r="2" fill="#1e8e3e"/>
                    <text x="195" y="32" font-size="11" fill="var(--text-secondary)" font-family="Microsoft YaHei">AAA</text>
                    <text x="195" y="48" font-size="11" fill="var(--text-primary)" font-weight="600" font-family="Microsoft YaHei">15.38%</text>
                    
                    <!-- AA 23.08% -->
                    <line x1="175" y1="145" x2="205" y2="165" stroke="#34a853" stroke-width="1"/>
                    <circle cx="175" cy="145" r="2" fill="#34a853"/>
                    <text x="195" y="180" font-size="11" fill="var(--text-secondary)" font-family="Microsoft YaHei">AA</text>
                    <text x="195" y="164" font-size="11" fill="var(--text-primary)" font-weight="600" font-family="Microsoft YaHei">23.08%</text>
                    
                    <!-- A 35.9% -->
                    <line x1="75" y1="175" x2="45" y2="195" stroke="#00bfa5" stroke-width="1"/>
                    <circle cx="75" cy="175" r="2" fill="#00bfa5"/>
                    <text x="20" y="210" font-size="11" fill="var(--text-secondary)" font-family="Microsoft YaHei">A</text>
                    <text x="20" y="194" font-size="11" fill="var(--text-primary)" font-weight="600" font-family="Microsoft YaHei">35.9%</text>
                    
                    <!-- B 19.23% -->
                    <line x1="35" y1="105" x2="10" y2="95" stroke="#e37400" stroke-width="1"/>
                    <circle cx="35" cy="105" r="2" fill="#e37400"/>
                    <text x="5" y="85" font-size="11" fill="var(--text-secondary)" font-family="Microsoft YaHei">B</text>
                    <text x="5" y="101" font-size="11" fill="var(--text-primary)" font-weight="600" font-family="Microsoft YaHei">19.23%</text>
                    
                    <!-- C 6.41% -->
                    <line x1="55" y1="55" x2="30" y2="35" stroke="#d93025" stroke-width="1"/>
                    <circle cx="55" cy="55" r="2" fill="#d93025"/>
                    <text x="5" y="32" font-size="11" fill="var(--text-secondary)" font-family="Microsoft YaHei">C</text>
                    <text x="5" y="48" font-size="11" fill="var(--text-primary)" font-weight="600" font-family="Microsoft YaHei">6.41%</text>
                </svg>
                <div class="donut-legend">
                    <div class="legend-item"><div class="legend-dot" style="background:#1e8e3e;"></div> AAA</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#34a853;"></div> AA</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#00bfa5;"></div> A</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#e37400;"></div> B</div>
                    <div class="legend-item"><div class="legend-dot" style="background:#d93025;"></div> C</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 信用明细档案 -->
    <div class="form-card">
        <div class="form-header">
            <div class="form-title">信用明细档案 <span class="badge">中科检测</span></div>
            <div class="credit-badge">AAA</div>
        </div>
        <div class="form-body">
            <div class="credit-detail">
                <div class="credit-score-circle">92.6</div>
                <div class="credit-items">
                    <div class="credit-item"><span class="label">基础信用</span> <span class="value">95</span></div>
                    <div class="credit-item"><span class="label">履约信用</span> <span class="value">91</span></div>
                    <div class="credit-item"><span class="label">质量信用</span> <span class="value">94</span></div>
                    <div class="credit-item"><span class="label">行为信用</span> <span class="value">88</span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 信用变更日志 -->
<div class="form-card">
    <div class="form-header">
        <div class="form-title"><i class="fas fa-history" style="color: var(--primary);"></i> 信用变更日志</div>
    </div>
    <div class="form-body" style="padding: 0;">
        <table class="data-table">
            <thead>
                <tr>
                    <th>时间</th>
                    <th>机构</th>
                    <th>事件</th>
                    <th>分值变化</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>2026-06-20</td>
                    <td>中科检测</td>
                    <td>按时交付报告 <span class="score-tag positive">+0.5</span></td>
                    <td style="color: var(--success); font-weight: 600;">+0.5</td>
                </tr>
                <tr>
                    <td>2026-06-15</td>
                    <td>中科检测</td>
                    <td>客户满意度 4.8 <span class="score-tag positive">+0.3</span></td>
                    <td style="color: var(--success); font-weight: 600;">+0.3</td>
                </tr>
                <tr>
                    <td>2026-06-10</td>
                    <td>安信消防</td>
                    <td>客户投诉核实 <span class="score-tag negative">-2.0</span></td>
                    <td style="color: var(--danger); font-weight: 600;">-2.0</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 评分规则配置 -->
<div class="form-card">
    <div class="form-header">
        <div class="form-title"><i class="fas fa-sliders-h" style="color: var(--primary);"></i> 评分规则配置</div>
    </div>
    <div class="form-body">
        <div class="rule-row">
            <div class="rule-group">
                <label>按时交付报告</label>
                <input type="text" value="+ 0.5 分">
            </div>
            <div class="rule-group">
                <label>客户投诉核实</label>
                <input type="text" value="- 2.0 分">
            </div>
        </div>
        <div class="rule-row">
            <div class="rule-group">
                <label>行政处罚</label>
                <input type="text" value="- 5.0 分，降一级">
            </div>
            <div class="rule-group">
                <label>报告一次通过</label>
                <input type="text" value="+ 0.4 分">
            </div>
        </div>
        <div class="form-actions" style="margin-top: 8px;">
            <button class="btn btn-primary"><i class="fas fa-save"></i> 保存规则</button>
        </div>
    </div>
</div>

<script>
(function(){
    var s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
})();
window.addEventListener('message', function(e) {
    if (e.data && e.data.action === 'setTheme') {
        document.documentElement.setAttribute('data-theme', e.data.theme);
        localStorage.setItem('theme', e.data.theme);
    }
});
</script>
</body>
</html>
