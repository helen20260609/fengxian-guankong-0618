<!DOCTYPE html><html lang="zh-CN" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>整改跟踪</title><link rel="stylesheet" href="./all.min.css"><style>
/* Theme Variables */
:root {
    --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
    --secondary: #0097a7; --danger: #d93025; --warning: #e37400; --success: #1e8e3e;
    --bg-dark: #f0f2f5; --bg-card: #ffffff; --bg-hover: #e8eaed;
    --text-primary: #202124; --text-secondary: #5f6368; --border: #dadce0;
    --shadow: rgba(0,0,0,0.08); --input-bg: #ffffff; --input-border: #dadce0;
    --modal-bg: #ffffff; --tag-bg: #f1f3f4; --tag-border: #dadce0;
    --header-bg: rgba(0,0,0,0.02); --tree-group-bg: rgba(26,115,232,0.06);
    --tree-row-hover: rgba(0,0,0,0.02);
    --dot-red: #d93025; --dot-orange: #e37400; --dot-yellow: #f9ab00; --dot-blue: #1a73e8;
}
:root[data-theme="dark"] {
    --primary: #1e6fdb; --primary-dark: #1557b0; --primary-light: #e8f1fd;
    --secondary: #00b4d8; --danger: #ef4444; --warning: #f59e0b; --success: #10b981;
    --bg-dark: #0a1628; --bg-card: #112240; --bg-hover: #1a2f4a;
    --text-primary: #e2e8f0; --text-secondary: #94a3b8; --border: #1e3a5f;
    --shadow: rgba(0,0,0,0.3); --input-bg: rgba(255,255,255,0.05); --input-border: #1e3a5f;
    --modal-bg: #112240; --tag-bg: rgba(255,255,255,0.05); --tag-border: #1e3a5f;
    --header-bg: rgba(0,0,0,0.2); --tree-group-bg: rgba(30,111,219,0.08);
    --tree-row-hover: rgba(255,255,255,0.02);
    --dot-red: #ef4444; --dot-orange: #f59e0b; --dot-yellow: #eab308; --dot-blue: #3b82f6;
}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#0a1628;color:#e2e8f0;padding:20px;overflow-y:auto}.card{background:#112240;border:1px solid #1e3a5f;border-radius:12px;overflow:hidden;margin-bottom:16px}.card-header{padding:16px 20px;border-bottom:1px solid #1e3a5f;display:flex;align-items:center;justify-content:space-between}.card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}.card-body{padding:20px}.page-section{display:none}.page-section.active{display:block}.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:#94a3b8;margin-bottom:16px}.breadcrumb .current{color:#e2e8f0}.btn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px}.btn-primary{background:#1e6fdb;color:#fff}.btn-outline{background:transparent;border:1px solid #1e3a5f;color:#94a3b8}.icon-box{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}.filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}.filter-input{background:rgba(255,255,255,.05);border:1px solid #1e3a5f;border-radius:6px;padding:8px 12px;color:#e2e8f0;font-size:13px}.filter-select{background:rgba(255,255,255,.05);border:1px solid #1e3a5f;border-radius:6px;padding:8px 12px;color:#e2e8f0;font-size:13px}.data-table{width:100%;border-collapse:collapse}.data-table th{padding:12px 16px;text-align:left;font-size:13px;font-weight:600;color:#94a3b8;border-bottom:1px solid #1e3a5f;background:rgba(0,0,0,.2)}.data-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid #1e3a5f}.data-table tr:hover td{background:rgba(255,255,255,.02)}.status-badge{padding:2px 10px;border-radius:10px;font-size:12px}.status-badge.pending{background:rgba(245,158,11,.15);color:#f59e0b}.status-badge.approved{background:rgba(16,185,129,.15);color:#10b981}.pagination{display:flex;justify-content:flex-end;gap:4px;margin-top:16px}.page-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;border:1px solid #1e3a5f;background:#112240;color:#94a3b8}.page-btn.active{background:#1e6fdb;color:#fff;border-color:#1e6fdb}.risk-tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}.risk-tag.red{background:rgba(239,68,68,.15);color:#ef4444}.risk-tag.orange{background:rgba(245,158,11,.15);color:#f59e0b}.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}.kpi-card{background:#112240;border:1px solid #1e3a5f;border-radius:12px;padding:20px}.kpi-label{font-size:13px;color:#94a3b8;margin-bottom:8px}.kpi-value{font-size:28px;font-weight:700;color:#fff}</style></head><body><div class="breadcrumb"><a href="#" style="color:#94a3b8;text-decoration:none"><i class="fas fa-home"></i></a><i class="fas fa-chevron-right" style="font-size:10px"></i><span>风险督察考核</span><i class="fas fa-chevron-right" style="font-size:10px"></i><span class="current">整改跟踪</span></div><div class="page-section active" id="section-rectify-task"><div class="card"><div class="card-header"><div class="card-title"><div class="icon-box" style="background:rgba(239,68,68,.15);color:#ef4444"><i class="fas fa-tools"></i></div>整改任务</div></div><div class="card-body"><div class="kpi-grid"><div class="kpi-card"><div class="kpi-label">总任务</div><div class="kpi-value">156</div></div><div class="kpi-card"><div class="kpi-label">整改中</div><div class="kpi-value">23</div></div><div class="kpi-card"><div class="kpi-label">已完成</div><div class="kpi-value">128</div></div><div class="kpi-card"><div class="kpi-label">已逾期</div><div class="kpi-value">5</div></div></div><div class="filter-bar"><input type="text" class="filter-input" placeholder="搜索关键词..."><select class="filter-select"><option>全部</option></select></div><table class="data-table"><thead><tr><th>编号</th><th>隐患</th><th>责任单位</th><th>期限</th><th>状态</th></tr></thead><tbody><tr><td>ZG-001</td><td>脚手架不规范</td><td>XX建设</td><td>08-20</td><td><span class="status-badge pending">整改中</span></td></tr><tr><td>ZG-002</td><td>管道老化</td><td>XX燃气</td><td>08-18</td><td><span class="status-badge approved">已完成</span></td></tr></tbody></table><div class="pagination"><div class="page-btn active">1</div><div class="page-btn">2</div></div></div></div></div><div class="page-section" id="section-rectify-progress"><div class="card"><div class="card-header"><div class="card-title"><div class="icon-box" style="background:rgba(245,158,11,.15);color:#f59e0b"><i class="fas fa-spinner"></i></div>整改进度</div></div><div class="card-body"><div style="padding:12px 0;border-bottom:1px solid #1e3a5f"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>脚手架整改</span><span>75%</span></div><div style="height:8px;background:rgba(255,255,255,.05);border-radius:4px"><div style="height:100%;width:75%;background:#1e6fdb;border-radius:4px"></div></div></div><div style="padding:12px 0"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>管道更换</span><span>100%</span></div><div style="height:8px;background:rgba(255,255,255,.05);border-radius:4px"><div style="height:100%;width:100%;background:#10b981;border-radius:4px"></div></div></div></div></div></div><div class="page-section" id="section-rectify-verify"><div class="card"><div class="card-header"><div class="card-title"><div class="icon-box" style="background:rgba(16,185,129,.15);color:#10b981"><i class="fas fa-check-circle"></i></div>复查验证</div></div><div class="card-body"><div class="filter-bar"><input type="text" class="filter-input" placeholder="搜索关键词..."><select class="filter-select"><option>全部</option></select></div><table class="data-table"><thead><tr><th>编号</th><th>隐患</th><th>结果</th><th>验证人</th><th>日期</th></tr></thead><tbody><tr><td>ZG-002</td><td>管道老化</td><td><span class="status-badge approved">通过</span></td><td>李督察</td><td>08-16</td></tr></tbody></table><div class="pagination"><div class="page-btn active">1</div><div class="page-btn">2</div></div></div></div></div><script>window.addEventListener("message",function(e){if(e.data&&e.data.action==="switchSection"){document.querySelectorAll(".page-section").forEach(function(el){el.classList.remove("active")});var t=document.getElementById("section-"+e.data.section);if(t)t.classList.add("active")}});// Theme sync
(function(){var s=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',s);})();

</script></body></html>
