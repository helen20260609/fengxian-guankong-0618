<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>防汛相关法规标准条款 - 防汛防台专题库</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#1a73e8;--primary-rgb:26,115,232;--primary-dark:#1557b0;--danger:#d93025;--danger-rgb:217,48,37;--warning:#e37400;--success:#1e8e3e;--bg-dark:#f0f2f5;--bg-card:#fff;--bg-hover:#e8eaed;--text-primary:#202124;--text-secondary:#5f6368;--border:#dadce0;--shadow:rgba(0,0,0,.08);--input-bg:#fff;--input-border:#dadce0;--modal-bg:#fff;--header-bg:rgba(0,0,0,.02);--row-hover:rgba(0,0,0,.02)}
:root[data-theme="dark"]{--primary:#1e6fdb;--primary-rgb:30,111,219;--primary-dark:#1557b0;--danger:#ef4444;--danger-rgb:239,68,68;--warning:#f59e0b;--success:#10b981;--bg-dark:#0a1628;--bg-card:#112240;--bg-hover:#1a2f4a;--text-primary:#e2e8f0;--text-secondary:#94a3b8;--border:#1e3a5f;--shadow:rgba(0,0,0,.3);--input-bg:rgba(255,255,255,.05);--input-border:#1e3a5f;--modal-bg:#112240;--header-bg:rgba(0,0,0,.2);--row-hover:rgba(255,255,255,.02)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg-dark);color:var(--text-primary);margin:0;padding:20px}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);margin-bottom:16px}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;box-shadow:0 1px 3px var(--shadow)}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-body{padding:20px}
.filter-bar{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.filter-input{background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;padding:8px 12px;color:var(--text-primary);font-size:13px}
.filter-input:focus{outline:none;border-color:var(--primary)}
.filter-select{background:var(--input-bg);border:1px solid var(--input-border);border-radius:6px;padding:8px 12px;color:var(--text-primary);font-size:13px}
.filter-select:focus{outline:none;border-color:var(--primary)}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;transition:all .3s;border:none;display:inline-flex;align-items:center;gap:6px;text-decoration:none}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
/* Layout */
.interp-layout{display:flex;gap:16px}
.interp-sidebar{width:220px;flex-shrink:0}
.interp-main{flex:1;min-width:0}
.interp-subnav .class-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:13px;color:var(--text-secondary);cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.interp-subnav .class-item:hover{background:var(--bg-hover);color:var(--text-primary)}
.interp-subnav .class-item.active{color:var(--primary);font-weight:600;background:rgba(var(--primary-rgb),.08);border-left-color:var(--primary)}
.interp-subnav .class-item .count{font-size:11px;padding:1px 8px;border-radius:10px;background:var(--bg-hover);color:var(--text-secondary)}
.interp-subnav .class-item.active .count{background:rgba(var(--primary-rgb),.12);color:var(--primary)}
/* Sidebar tab switcher */
.law-tab{flex:1;padding:10px 8px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;transition:all .2s;background:var(--bg-card)}
.law-tab:hover{color:var(--primary)}
.law-tab.active{color:var(--primary);border-bottom-color:var(--primary);background:rgba(var(--primary-rgb),.06)}
.law-class-panel{display:none}
.law-class-panel.active{display:block}
/* Data table */
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:12px 16px;text-align:left;font-size:13px;font-weight:600;color:var(--text-secondary);border-bottom:2px solid var(--border);background:var(--header-bg);white-space:nowrap}
.data-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top}
.data-table tr:hover td{background:var(--row-hover)}
.data-table .link-text{color:var(--primary);cursor:pointer}
.data-table .link-text:hover{text-decoration:underline}
.action-link{color:var(--primary);cursor:pointer;font-size:12px;text-decoration:none;margin-right:8px}
.action-link:hover{text-decoration:underline}
/* Badges */
.badge{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:500;display:inline-block;white-space:nowrap}
.badge-published{background:rgba(30,142,62,.12);color:var(--success)}
.badge-pending{background:rgba(227,116,0,.12);color:var(--warning)}
.badge-info{background:rgba(26,115,232,.1);color:var(--primary)}
.badge-standard{background:rgba(57,73,171,.1);color:#3949ab}
/* Toolbar */
.interp-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.interp-toolbar .filter-group{display:flex;gap:8px;flex-wrap:wrap}
/* Hot tags */
.hot-tags{display:flex;gap:6px;flex-wrap:wrap}
.hot-tag{padding:3px 10px;border-radius:12px;font-size:11px;background:rgba(var(--primary-rgb),.08);color:var(--primary);cursor:pointer;border:1px solid rgba(var(--primary-rgb),.15);transition:all .2s}
.hot-tag:hover{background:var(--primary);color:#fff}
/* Pagination */
.pagination{display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding:0 4px}
.pagination-info{font-size:13px;color:var(--text-secondary)}
.pagination-btns{display:flex;gap:4px}
.page-btn{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);transition:all .2s}
.page-btn:hover{border-color:var(--primary);color:var(--primary)}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn.nav-btn{width:auto;padding:0 12px;font-size:12px}
.page-btn.nav-btn:disabled{opacity:.4;cursor:not-allowed}
/* Clause text */
.clause-text{font-size:13px;color:var(--text-secondary);line-height:1.8}
.clause-text p{margin-bottom:6px}
.clause-text p:last-child{margin-bottom:0}
.clause-key{background:rgba(30,115,232,.08);color:var(--primary);padding:1px 4px;border-radius:3px;font-weight:600}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;justify-content:center;align-items:flex-start;padding-top:30px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal-box{background:var(--modal-bg);border:1px solid var(--border);border-radius:12px;width:92%;max-width:800px;box-shadow:0 12px 40px rgba(0,0,0,.3);display:flex;flex-direction:column;overflow:hidden;max-height:92vh}
.modal-box .modal-header{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-box .modal-title{font-size:16px;font-weight:600;color:var(--text-primary);display:flex;align-items:center;gap:8px}
.modal-box .modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg-hover);cursor:pointer;font-size:18px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-box .modal-close:hover{background:var(--danger);color:#fff}
.modal-box .modal-body{padding:24px;flex:1;overflow-y:auto}
.modal-box .modal-footer{padding:12px 24px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.detail-item{display:flex;gap:8px;font-size:13px}
.detail-item .lbl{color:var(--text-secondary);min-width:80px;flex-shrink:0}
.detail-item .val{color:var(--text-primary)}
/* Print */
@media print{body{background:#fff;padding:0}.card{box-shadow:none;border:1px solid #ddd}}
</style>
</head>
<body>

<!-- Breadcrumb -->
<div class="interp-layout">
    <!-- Left sidebar -->
    <div class="interp-sidebar">
        <div class="card" style="margin-bottom:12px">
            <div style="display:flex;border-bottom:1px solid var(--border)">
                <div class="law-tab active" onclick="switchSidebarTab('source',this)">标准来源</div>
                <div class="law-tab" onclick="switchSidebarTab('domain',this)">业务领域</div>

                <div class="interp-subnav">
                    <div class="class-item active" onclick="selectStandardClass(this,'')"><span>全部</span><span class="count">8</span></div>
                    <div class="class-item" onclick="selectStandardClass(this,'建筑基坑工程监测技术标准')"><span>建筑基坑工程监测技术标准</span><span class="count">4</span></div>
                    <div class="class-item" onclick="selectStandardClass(this,'建筑施工安全检查标准')"><span>建筑施工安全检查标准</span><span class="count">4</span></div>

            <div id="sidebar-panel-domain" class="law-class-panel" style="display:none">
                <div class="interp-subnav">

                    <div class="class-item" onclick="selectStandardDomain(this,'建筑安全')"><span>建筑安全</span><span class="count">7</span></div>
                    <div class="class-item" onclick="selectStandardDomain(this,'综合应急')"><span>综合应急</span><span class="count">1</span></div>

        <div class="card" style="padding:14px 16px">

    <!-- Right main -->

        <div class="card" style="margin-bottom:12px">
            <div class="card-body" style="padding:12px 16px">
                <div class="interp-toolbar">
                    <div class="filter-group">
                        <input class="filter-input" id="standard-search" placeholder="🔍 搜索条款关键词，如：降雨、监测、排水、基坑..." style="min-width:240px" oninput="renderStandardTable()">
                        <select class="filter-select" id="standard-scene" onchange="renderStandardTable()">
                            <option value="">全部场景</option>

                <div style="font-size:12px;color:var(--text-secondary)" id="standard-count">共 8 条重点条款</div>
            </div>
        </div>

        <div class="card">
            <div style="overflow-x:auto">
                <table class="data-table" id="standard-table">
                    <thead>
                        <tr>
                            <th style="width:50px;text-align:center">序号</th>
                            <th style="min-width:160px">标准来源</th>

</div>

    </div>
</div>

<script>
// Theme sync
(function(){
    var saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
})();

window.addEventListener('message', function(e){
    if(e.data && e.data.action === 'setTheme'){
        document.documentElement.setAttribute('data-theme', e.data.theme);
        localStorage.setItem('theme', e.data.theme);
    }
});

function closeModal(id){
    var modal = document.getElementById(id);
    if(modal) modal.classList.remove('open');
}
document.addEventListener('click', function(e){
    if(e.target.classList.contains('modal-overlay')) e.target.classList.remove('open');
});

var standards = [
    {id:'s1', source:'建筑基坑工程监测技术标准', sourceCode:'GB 50497', article:'第 7.0.4 条', title:'基坑监测频率要求', scene:'基坑工程', domain:'建筑安全', desc:'<p>基坑工程监测工作应贯穿基坑开挖和地下工程施工全过程。监测频率应根据<span class="clause-key">基坑安全等级</span>、<span class="clause-key">周边环境</span>、<span class="clause-key">施工工况</span>及<span class="clause-key">季节气候变化</span>等因素综合确定。</p><p>当遇<span class="clause-key">降雨</span>、周边地下管线漏水、邻近区域进行爆破或强夯等异常情况时，应加密监测；当监测数据达到预警值或报警值时，应提高监测频率。</p>'},
    {id:'s2', source:'建筑基坑工程监测技术标准', sourceCode:'GB 50497', article:'第 5.2.3 条', title:'地下水位监测', scene:'排水防汛', domain:'建筑安全', desc:'<p>基坑工程应设置<span class="clause-key">地下水位监测点</span>，监测点应沿基坑周边布置，间距宜为 20m～50m。当基坑周边存在水源地、承压水层或上滞水时，应适当增加监测点数量。</p><p>暴雨、台风期间，应加强对基坑内、外地下水位的对比观测，结合降雨量分析水位变化趋势；当坑外水位异常上升或坑内积水无法及时排除时，应立即启动应急预案。</p>'},
    {id:'s3', source:'建筑基坑工程监测技术标准', sourceCode:'GB 50497', article:'第 6.3.1 条', title:'基坑周边土体位移监测', scene:'基坑工程', domain:'建筑安全', desc:'<p>基坑周边土体水平位移和竖向位移监测点应沿基坑周边布置，监测点间距宜为 20m～60m，且在<span class="clause-key">阳角处、中部、邻近建（构）筑物</span>等部位应加密。</p><p>在降雨期间，应重点监测边坡顶部裂缝发展、坡面冲刷及坡脚积水情况；发现边坡有失稳征兆时，应立即停止坑边堆载、设置警戒区域，并采取支护加固或卸载措施。</p>'},
    {id:'s4', source:'建筑基坑工程监测技术标准', sourceCode:'GB 50497', article:'第 8.0.5 条', title:'监测报警与应急', scene:'基坑工程', domain:'建筑安全', desc:'<p>当出现下列情况之一时，应进行报警：①监测数据达到或超过报警值；②监测数据变化速率突然增大；③基坑周边地面出现明显沉降、开裂或塌陷；④基坑支护结构出现明显变形、裂缝或渗漏水加剧；⑤遭遇台风、暴雨、地震等极端天气或自然灾害。</p><p>报警后应立即向建设、施工、监理单位及相关主管部门报告，并启动应急预案，加密监测频率，必要时采取应急抢险措施。</p>'},
    {id:'s5', source:'建筑施工安全检查标准', sourceCode:'JGJ 59', article:'第 3.3.4 条', title:'落地式脚手架检查评定', scene:'脚手架', domain:'建筑安全', desc:'<p>脚手架搭设应设置<span class="clause-key">连墙件</span>、<span class="clause-key">扫地杆</span>、<span class="clause-key">剪刀撑</span>，并与建筑结构可靠连接。台风、暴雨来临前，应对脚手架进行全面检查，确保架体稳定。</p><p>遇六级及以上大风、暴雨、台风等恶劣天气，应停止脚手架搭设、拆除及高处作业；复工前应检查架体基础是否积水、沉降，连墙件是否松动，安全网是否完好。</p>'},
    {id:'s6', source:'建筑施工安全检查标准', sourceCode:'JGJ 59', article:'第 3.18.3 条', title:'塔式起重机检查评定', scene:'起重吊装', domain:'建筑安全', desc:'<p>塔式起重机应按规定进行日常检查和定期维护保养。台风来临前，应将<span class="clause-key">吊臂转至顺风方向</span>、松开回转制动器，锁紧夹轨器、锚定装置或防风拉索，确保塔机处于自由旋转状态。</p><p>遇六级及以上大风时，严禁进行塔机安装、拆卸、顶升作业；台风过后复工前，应对塔机结构、附着装置、钢丝绳、制动系统等进行全面检查，确认安全后方可使用。</p>'},
    {id:'s7', source:'建筑施工安全检查标准', sourceCode:'JGJ 59', article:'第 3.14.3 条', title:'施工用电检查评定', scene:'临时用电', domain:'建筑安全', desc:'<p>施工现场临时用电应采用 TN-S 接零保护系统，配电箱、开关箱应设置防雨、防潮措施。暴雨、台风期间，应重点检查<span class="clause-key">电缆绝缘</span>、<span class="clause-key">漏电保护器有效性</span>及<span class="clause-key">配电箱防雨性能</span>。</p><p>雷雨天气严禁进行露天电气作业；低洼、积水区域配电设施应提前转移至高处或采取可靠的防水淹措施；发现线路破损、漏电等情况应立即断电处理。</p>'},
    {id:'s8', source:'建筑施工安全检查标准', sourceCode:'JGJ 59', article:'第 3.2.3 条', title:'现场防火与防汛管理', scene:'排水防汛', domain:'综合应急', desc:'<p>施工现场应设置连续、封闭的围挡，主要道路及加工区应进行硬化处理，并设置排水设施。雨季、台风季节应制定专项防汛方案，明确<span class="clause-key">排水路线</span>、<span class="clause-key">应急物资</span>及<span class="clause-key">抢险队伍</span>。</p><p>基坑周边、塔吊基础、临时设施周边应保持排水畅通，严禁积水；暴雨后应及时排查围挡、临建板房、材料堆场等重点部位的安全状况。</p>'}
];
var standardFilter = {source:'', domain:'', scene:'', keyword:''};

function switchSidebarTab(panel, el){
    document.querySelectorAll('.law-tab').forEach(function(t){ t.classList.remove('active'); });
    if(el) el.classList.add('active');
    document.querySelectorAll('.law-class-panel').forEach(function(p){ p.classList.remove('active'); p.style.display = 'none'; });
    var target = document.getElementById('sidebar-panel-' + panel);
    if(target){ target.classList.add('active'); target.style.display = 'block'; }
    if(panel === 'source'){
        standardFilter.domain = '';
        document.querySelectorAll('#sidebar-panel-domain .class-item').forEach(function(i){ i.classList.remove('active'); });
    } else {
        standardFilter.source = '';
        document.querySelectorAll('#sidebar-panel-source .class-item').forEach(function(i){ i.classList.remove('active'); });
    }
    renderStandardTable();
}

function selectStandardClass(el, source){
    document.querySelectorAll('#sidebar-panel-source .class-item').forEach(item => item.classList.remove('active'));
    if(el) el.classList.add('active');
    standardFilter.source = source;
    renderStandardTable();
}
function selectStandardDomain(el, domain){
    document.querySelectorAll('#sidebar-panel-domain .class-item').forEach(item => item.classList.remove('active'));
    if(el) el.classList.add('active');
    standardFilter.domain = domain;
    renderStandardTable();
}
function setStandardKeyword(kw){
    document.getElementById('standard-search').value = kw;
    standardFilter.keyword = kw;
    renderStandardTable();
}

function renderStandardTable(){
    standardFilter.keyword = document.getElementById('standard-search').value.trim().toLowerCase();
    standardFilter.scene = document.getElementById('standard-scene').value;

    var data = standards.filter(function(item){
        if(standardFilter.source && item.source !== standardFilter.source) return false;
        if(standardFilter.domain && item.domain !== standardFilter.domain) return false;
        if(standardFilter.scene && item.scene !== standardFilter.scene) return false;
        if(standardFilter.keyword){
            var hay = (item.source + ' ' + item.article + ' ' + item.title + ' ' + item.scene + ' ' + item.domain + ' ' + item.desc.replace(/<[^>]*>/g,'')).toLowerCase();
            if(hay.indexOf(standardFilter.keyword) === -1) return false;
        }
        return true;
    });

    var tbody = document.querySelector('#standard-table tbody');
    tbody.innerHTML = data.map(function(item, idx){
        return '<tr>' +
            '<td style="text-align:center">' + (idx + 1) + '</td>' +
            '<td><div style="font-weight:600">' + item.source + '</div><div style="font-size:11px;color:var(--text-secondary);margin-top:2px">' + item.sourceCode + '</div></td>' +
            '<td style="text-align:center;font-size:12px">' + item.article + '</td>' +
            '<td><span class="link-text" onclick="openStandardViewModal(\'' + item.id + '\')">' + item.title + '</span></td>' +
            '<td style="text-align:center"><span class="badge badge-info">' + item.scene + '</span></td>' +
            '<td style="text-align:center"><a class="action-link" onclick="openStandardViewModal(\'' + item.id + '\')">查看</a></td>' +
        '</tr>';
    }).join('');

    document.getElementById('standard-count').textContent = '共 ' + data.length + ' 条重点条款';
    document.getElementById('standard-pagination-info').textContent = '显示 1-' + data.length + '，共 ' + data.length + ' 条数据';
}

function openStandardViewModal(id){
    var item = standards.find(function(s){ return s.id === id; });
    if(!item) return;
    document.getElementById('standard-view-body').innerHTML =
        '<div style="text-align:center;padding:10px 0 20px">' +
            '<div style="font-size:18px;font-weight:700">' + item.title + '</div>' +
            '<div style="font-size:12px;color:var(--text-secondary);margin-top:8px">' + item.source + ' ' + item.sourceCode + ' · ' + item.article + '</div>' +
        '</div>' +
        '<div class="detail-grid">' +
            '<div class="detail-item"><span class="lbl">标准来源：</span><span class="val">' + item.source + '</span></div>' +
            '<div class="detail-item"><span class="lbl">标准编号：</span><span class="val">' + item.sourceCode + '</span></div>' +
            '<div class="detail-item"><span class="lbl">条款编号：</span><span class="val">' + item.article + '</span></div>' +
            '<div class="detail-item"><span class="lbl">关联场景：</span><span class="val"><span class="badge badge-info">' + item.scene + '</span></span></div>' +
        '</div>' +
        '<div style="margin-top:16px">' +
            '<div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:8px">条款内容</div>' +
            '<div class="clause-text" style="padding:12px 14px;background:var(--bg-dark);border:1px solid var(--border);border-radius:6px">' + item.desc + '</div>' +
        '</div>';
    document.getElementById('modal-standard-view').classList.add('open');
}

document.addEventListener('DOMContentLoaded', renderStandardTable);
</script>
</body>
</html>
