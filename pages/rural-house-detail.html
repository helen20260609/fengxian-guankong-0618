<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>农村自建房 - 全要素档案详情</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../js/third-party-data.js"></script>
    <script src="../js/house-arch-data.js"></script>
    <style>
        :root {
            --primary: #1a73e8; --primary-dark: #1557b0; --primary-light: #e8f0fe;
            --danger: #d93025; --major: #f57c00; --warning: #f9ab00; --safe: #1e8e3e;
            --text-primary: #202124; --text-secondary: #5f6368; --border: #e8eaed;
            --bg-dark: #f5f7fa; --bg-card: #ffffff; --bg-hover: #f0f2f5;
            --shadow: rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', -apple-system, sans-serif;
            background: var(--bg-dark); color: var(--text-primary); min-height: 100vh;
        }
        .page-wrapper { max-width: 1400px; margin: 0 auto; padding: 16px; }

        /* 顶部 */
        .topbar {
            background: #fff; border-radius: 8px; padding: 12px 16px;
            box-shadow: 0 2px 8px var(--shadow); margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
        }
        .topbar-left { display: flex; align-items: center; gap: 12px; }
        .topbar-back {
            display: flex; align-items: center; gap: 4px; padding: 6px 12px;
            border: 1px solid var(--border); border-radius: 4px; background: #fff;
            color: var(--text-primary); font-size: 13px; cursor: pointer; text-decoration: none;
        }
        .topbar-back:hover { background: var(--bg-hover); }
        .topbar-title { font-size: 16px; font-weight: 600; }
        .topbar-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .topbar-actions { display: flex; gap: 8px; align-items: center; }
        .topbar-btn {
            display: flex; align-items: center; gap: 4px; padding: 6px 12px;
            border-radius: 4px; font-size: 12px; cursor: pointer; border: 1px solid var(--border);
            background: #fff; color: var(--text-primary);
        }
        .topbar-btn:hover { background: var(--bg-hover); }

        /* 检索栏 */
        .filter-bar {
            background: #fff; border-radius: 8px; padding: 12px 16px;
            box-shadow: 0 2px 8px var(--shadow); margin-bottom: 12px;
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
        }
        .filter-bar label { font-size: 12px; color: var(--text-secondary); }
        .filter-select {
            padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
            font-size: 13px; min-width: 120px; background: #fff;
        }
        .filter-btn {
            padding: 6px 14px; border: none; border-radius: 4px; background: var(--primary); color: #fff; font-size: 13px; cursor: pointer;
        }
        /* 状态卡 */
        .status-panel {
            background: #fff; border-radius: 8px; padding: 16px 20px;
            box-shadow: 0 2px 8px var(--shadow); margin-bottom: 12px;
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .status-cell { display: flex; flex-direction: column; gap: 6px; min-width: 120px; }
        .status-cell.full { flex: 1; }
        .status-label { font-size: 12px; color: var(--text-secondary); }
        .status-value { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .status-badge {
            display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px;
            font-size: 12px; font-weight: 500; width: fit-content;
        }
        .status-badge.danger { background: #fce8e6; color: var(--danger); }
        .status-badge.major { background: #fff3e0; color: var(--major); }
        .status-badge.warning { background: #fff8e1; color: #f9a825; }
        .status-badge.safe { background: #e6f4ea; color: var(--safe); }
        .status-badge.info { background: var(--primary-light); color: var(--primary); }

        /* 主内容：左树右内容 */
        .main-body { display: flex; gap: 12px; align-items: flex-start; }
        .sidebar {
            width: 240px; flex-shrink: 0; background: #fff; border-radius: 8px;
            box-shadow: 0 2px 8px var(--shadow); overflow: hidden; position: sticky; top: 16px; align-self: flex-start;
        }
        .sidebar-header {
            padding: 14px 16px; font-size: 14px; font-weight: 600; color: var(--text-primary);
            border-bottom: 1px solid var(--border); background: #fafbfc;
        }
        .sidebar-menu { padding: 8px; }
        .sidebar-item {
            display: flex; align-items: center; justify-content: space-between; gap: 8px;
            padding: 9px 12px; border-radius: 6px; cursor: pointer; transition: all 0.15s;
            margin-bottom: 3px; font-size: 13px; color: var(--text-primary);
        }
        .sidebar-item:hover { background: var(--primary-light); color: var(--primary); }
        .sidebar-item.active { background: var(--primary-light); color: var(--primary); font-weight: 500; }
        .sidebar-item-left { display: flex; align-items: center; gap: 8px; }
        .sidebar-item i { width: 16px; text-align: center; color: inherit; }
        .sidebar-tag {
            font-size: 10px; padding: 1px 6px; border-radius: 10px; white-space: nowrap;
            background: #f0f2f5; color: var(--text-secondary);
        }
        .sidebar-item.active .sidebar-tag { background: rgba(26,115,232,0.12); color: var(--primary); }
        .sidebar-divider { height: 1px; background: var(--border); margin: 6px 0; }

        .content-area { flex: 1; min-width: 0; }
        .content-card {
            background: #fff; border-radius: 8px; box-shadow: 0 2px 8px var(--shadow); overflow: hidden; margin-bottom: 12px;
        }
        .content-card-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 20px; border-bottom: 1px solid var(--border); background: #fafbfc;
        }
        .content-card-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; }
        .content-card-title i { color: var(--primary); }
        .content-body { padding: 18px 20px; }

        /* 标签页 */
        .content-tabs {
            display: flex; gap: 8px; padding: 12px 20px 0; border-bottom: 1px solid var(--border); background: #fff; flex-wrap: wrap;
        }
        .content-tab {
            display: flex; align-items: center; gap: 6px; padding: 8px 14px;
            font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
            border-radius: 6px 6px 0 0; border: 1px solid transparent; border-bottom: none; background: transparent;
            margin-bottom: -1px;
        }
        .content-tab:hover { color: var(--primary); background: var(--primary-light); }
        .content-tab.active { color: var(--primary); font-weight: 500; background: #fff; border-color: var(--border); border-bottom-color: #fff; }
        .content-tab-count {
            font-size: 11px; padding: 1px 7px; border-radius: 10px;
            background: #f0f2f5; color: var(--text-secondary); margin-left: 4px;
        }
        .content-tab.active .content-tab-count { background: var(--primary-light); color: var(--primary); }

        /* 信息网格 */
        .info-section-title { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 600; margin-bottom: 14px; color: var(--text-primary); }
        .info-section-title i { color: var(--primary); }
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px 16px; }
        .info-grid-2col { grid-template-columns: repeat(2, 1fr); }
        .info-grid.info-grid-2col { grid-template-columns: repeat(2, 1fr); }
        .info-grid.info-grid-2col .info-item { display: flex; flex-direction: row; align-items: baseline; gap: 12px; }
        .info-grid.info-grid-2col .info-label { width: 140px; flex-shrink: 0; color: var(--text-secondary); font-size: 13px; }
        .info-grid.info-grid-2col .info-value { flex: 1; min-width: 0; font-size: 14px; color: var(--text-primary); font-weight: 500; }
        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-label { font-size: 12px; color: var(--text-secondary); }
        .info-value { font-size: 14px; color: var(--text-primary); font-weight: 500; line-height: 1.4; }
        .info-value.empty { color: #bdc1c6; font-weight: 400; }
        .info-grid-table .info-item { flex-direction: row; align-items: baseline; gap: 12px; }
        .info-grid-table .info-label { width: 140px; flex-shrink: 0; }
        .info-grid-table .info-value { flex: 1; min-width: 0; }
        .info-grid-table .info-item.full-width { grid-column: 1 / -1; }

        /* 表格 */
        .table-section-title { font-size: 14px; font-weight: 600; margin: 20px 0 12px; color: var(--text-primary); display: flex; align-items: center; gap: 6px; }
        .table-section-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: var(--primary); border-radius: 2px; }
        .arch-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .arch-table th, .arch-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: top; }
        .arch-table th { background: #fafbfc; color: var(--text-secondary); font-weight: 500; font-size: 12px; white-space: nowrap; }
        .arch-table td { color: var(--text-primary); }
        .arch-table tr:last-child td { border-bottom: none; }

        /* 照片网格 */
        .photo-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
        .photo-grid img { width: 96px; height: 72px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); cursor: pointer; }
        .photo-empty { color: var(--text-secondary); font-size: 13px; padding: 8px 0; }

        /* 时间轴 */
        .timeline { position: relative; margin-top: 8px; padding-left: 24px; }
        .timeline::before { content: ''; position: absolute; left: 8px; top: 4px; bottom: 4px; width: 2px; background: var(--border); }
        .tl-node { position: relative; padding-bottom: 18px; }
        .tl-node:last-child { padding-bottom: 0; }
        .tl-dot { position: absolute; left: -20px; top: 2px; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); border: 2px solid #fff; box-shadow: 0 0 0 2px var(--primary-light); }
        .tl-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .tl-date { font-size: 12px; color: #fff; background: var(--primary); padding: 2px 8px; border-radius: 10px; }
        .tl-title { font-size: 14px; font-weight: 600; color: var(--text-primary); }
        .tl-body { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-left: 2px; }

        /* 照片查看器 */
        .photo-viewer-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 10000; justify-content: center; align-items: center;
        }
        .photo-viewer-overlay.open { display: flex; }
        .photo-viewer-box { position: relative; max-width: 90%; max-height: 90%; }
        .photo-viewer-box img { max-width: 100%; max-height: 90vh; border-radius: 4px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .photo-viewer-close { position: absolute; top: -40px; right: 0; width: 32px; height: 32px; border: none; border-radius: 50%; background: rgba(255,255,255,0.9); font-size: 20px; cursor: pointer; color: #333; }

        .record-list { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 16px; }        .record-list th, .record-list td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; vertical-align: middle; }
        .record-list th { background: #fafbfc; color: var(--text-secondary); font-weight: 500; font-size: 12px; }
        .record-list tr { cursor: pointer; transition: background 0.15s; }
        .record-list tr:hover { background: var(--bg-hover); }
        .record-list tr.active { background: var(--primary-light); }
        .record-list .actions { text-align: right; white-space: nowrap; }
        .record-list .tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
        .record-list .tag.primary { background: var(--primary-light); color: var(--primary); }
        .record-list .tag.success { background: #e6f4ea; color: var(--safe); }
        .record-list .tag.warning { background: #fff8e1; color: #f9a825; }
        .record-list .tag.danger { background: #fce8e6; color: var(--danger); }
        .record-list .tag.info { background: #f0f2f5; color: var(--text-secondary); }
        .record-empty { color: var(--text-secondary); font-size: 13px; padding: 12px 0; }
        .record-section-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .record-section-title span { font-size: 14px; font-weight: 600; }
        .record-add-btn {
            display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 4px; border: 1px solid var(--primary);
            background: #fff; color: var(--primary); font-size: 12px; cursor: pointer;
        }
        .record-add-btn:hover { background: var(--primary-light); }
        .record-detail-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        .record-detail-header .title { font-size: 14px; font-weight: 600; }
        .record-detail-header .meta { font-size: 12px; color: var(--text-secondary); }

        @media (max-width: 900px) {
            .main-body { flex-direction: column; }
            .sidebar { width: 100%; position: static; }
            .info-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="photo-viewer-overlay" id="photoViewerOverlay" onclick="closePhotoViewer()">
        <div class="photo-viewer-box" onclick="event.stopPropagation()">
            <button class="photo-viewer-close" onclick="closePhotoViewer()">×</button>
            <img id="photoViewerImage" src="" alt="照片">
        </div>
    </div>

    <div class="page-wrapper">
        <div class="topbar">
            <div class="topbar-left">
                <a href="rural-risk-archive-overview.html" class="topbar-back"><i class="fas fa-arrow-left"></i> 返回</a>
                <div>
                    <div class="topbar-title" id="topbarTitle">农村自建房全要素档案</div>
                    <div class="topbar-sub" id="topbarSub">编号：— | 所属区域：—</div>
                </div>
            </div>
            <div class="topbar-actions">
                <button class="topbar-btn" onclick="window.print()"><i class="fas fa-print"></i> 打印</button>
                <button class="topbar-btn" onclick="window.close()" title="关闭"><i class="fas fa-times"></i> 关闭</button>
            </div>
        </div>

        <div class="status-panel" id="statusPanel"></div>

        <div class="main-body">
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">档案模块</div>
                <div class="sidebar-menu" id="sidebarMenu"></div>
            </div>
            <div class="content-area" id="contentArea"></div>
        </div>
    </div>

    <script>
        // ---------------- URL 与数据 ----------------
        function getUrlParam(key) {
            return new URLSearchParams(location.search).get(key) || '';
        }
        function getCurrentHouseNo() {
            const no = getUrlParam('no');
            if (no) return no;
            return getUrlParam('id') || 'NF-2025-00001';
        }
        function getCurrentHouseArch() {
            initHouseArchSeed();
            const no = getCurrentHouseNo();
            let rec = getHouseRecord(no);
            if (!rec) {
                rec = JSON.parse(JSON.stringify(DEFAULT_HOUSE_STATUS));
                rec.no = no;
                ensureHouseRecord(no);
            }
            return rec;
        }

        // 侧边栏模块配置：key / icon / title / tag
        const sidebarModules = [
            { key: 'overview', icon: 'fa-id-card', title: '房屋概况', tag: '基础' },
            { key: 'inspection', icon: 'fa-search', title: '排查记录', tag: '排查' },
            { key: 'risk', icon: 'fa-exclamation-triangle', title: '风险辨识与分类', tag: '风险' },
            { key: 'patrol', icon: 'fa-walking', title: '巡查检查', tag: '巡查' },
            { key: 'measure', icon: 'fa-tools', title: '隐患整治', tag: '整治' },
            { key: 'emergency', icon: 'fa-first-aid', title: '应急处置', tag: '应急' },
            { key: 'close', icon: 'fa-check-circle', title: '验收销号', tag: '闭环' },
            { key: 'appraisal', icon: 'fa-clipboard-check', title: '安全鉴定', tag: '鉴定' },
            { key: 'archive', icon: 'fa-folder-open', title: '整治档案', tag: '归档' }
        ];

        let currentModule = 'overview';
        let currentHouse = getCurrentHouseArch();
        let eventListenersBound = false;

        const overviewSubTabs = [
            { key: 'jbxx', title: '基本信息', icon: 'fa-id-card' },
            { key: 'zjd', title: '宅基地信息', icon: 'fa-map' },
            { key: 'jsqk', title: '建设情况', icon: 'fa-hard-hat' },
            { key: 'glqk', title: '管理情况', icon: 'fa-file-alt' },
            { key: 'designConstruction', title: '设计施工信息', icon: 'fa-hard-hat' },
            { key: 'structure', title: '结构信息', icon: 'fa-building' },
            { key: 'usage', title: '使用信息', icon: 'fa-home' }
        ];
        let currentOverviewSubTab = 'jbxx';

        // 排查记录子Tab配置（与 house-arch-detail.html 排查信息保持一致）
        const inspectionSubTabs = [
            { key: 'survey1', title: '排查情况', icon: 'fa-search' },
            { key: 'survey2', title: '建房现场安全自查情况', icon: 'fa-hard-hat' },
            { key: 'survey3', title: '房屋用途现场情况', icon: 'fa-home' }
        ];
        let currentInspectionSubTab = 'survey1';

        // 各多次记录模块当前选中的记录索引
        const recordViewState = {
            inspection: 0,
            appraisal: 0,
            risk: 0,
            patrol: 0,
            measure: 0,
            close: 0,
            designConstruction: 0
        };

        const inspectionData = {
            survey1: {
                columns: ['结构状况', '损伤具体部位', '增加堆载（二层及以上堆放大量重物）', '其他使用安全隐患', '初步判定', '位置标注', '房屋安全责任人', '联系方式', '安全监管责任人', '联系方式', '排查照片', '安全鉴定：是否整治前鉴定', '未进行鉴定房屋原因', '上传证明文件', '排查备注', '更新时间'],
                rows: [
                    ['C级（局部危险）', '东侧承重墙', '否', '暂无', '立即停止使用', '—', '陈连明', '138****1234', '王建军', '139****5678', '—', '否', '资金尚未到位', '—', '东侧承重墙纵向裂缝长约1.2m，缝宽约2mm', '2024-06-12 09:30']
                ]
            },
            survey2: {
                columns: ['建房类型', '实施路径', '目前建房进度', '是否属于初判存在隐患的农村自建房的解危工程措施', '自查现场是否存在施工安全隐患', '隐患是否已消除', '消除隐患的具体措施', '备注', '建房现场照片', '填报人', '填报时间'],
                rows: [
                    ['-', '-', '-', '-', '-', '-', '-', '-', '-', '-', '-']
                ]
            },
            survey3: {
                columns: ['房屋用途', '当前使用情况', '当前房屋用途', '填报人', '填报时间'],
                rows: [
                    ['-', '-', '-', '-', '-']
                ]
            }
        };


        // ---------------- 初始化 ----------------
        function initPage() {
            renderTopbar();
            renderStatusPanel();
            renderSidebar();
            renderContent();
        }

        function renderTopbar() {
            const s = currentHouse;
            const title = (s.overview && s.overview.houseName) || s.name || '农村自建房档案';
            const sub = '编号：' + (s.no || '—') + ' | 所属区域：' + (s.street || '—') + ' · ' + (s.village || s.community || '—');
            document.getElementById('topbarTitle').textContent = title;
            document.getElementById('topbarSub').textContent = sub;
        }

        function renderStatusPanel() {
            const s = currentHouse;
            const riskClass = riskBadgeClass(s.riskLevel);
            const governClass = governBadgeClass(s.governStatus);
            document.getElementById('statusPanel').innerHTML =
                '<div class="status-cell"><div class="status-label">隐患等级</div><div class="status-badge ' + riskClass + '">' + (s.riskLevel || '—') + '</div></div>' +
                '<div class="status-cell"><div class="status-label">治理状态</div><div class="status-badge ' + governClass + '">' + (s.governStatus || '—') + '</div></div>' +
                '<div class="status-cell full"><div class="status-label">当前措施</div><div class="status-value">' + (s.currentMeasure || '—') + '</div></div>' +
                '<div class="status-cell"><div class="status-label">责任人</div><div class="status-value">' + (s.managerName || '—') + ' <span style="font-weight:400;color:var(--text-secondary);font-size:12px;">' + (s.managerPhone || '') + '</span></div></div>';
        }

        function riskBadgeClass(level) {
            const map = { '安全': 'safe', '无风险': 'safe', '一般隐患': 'warning', '较大隐患': 'major', '重大隐患': 'danger' };
            return map[level] || 'danger';
        }
        function governBadgeClass(status) {
            const map = { '待整治': 'info', '整治中': 'warning', '已整治': 'safe', '已治理': 'safe', '逾期未整治': 'danger' };
            return map[status] || 'info';
        }

        // ---------------- 侧边栏 ----------------
        function renderSidebar() {
            const menu = document.getElementById('sidebarMenu');
            const moduleParam = getUrlParam('module');
            if (moduleParam && sidebarModules.some(m => m.key === moduleParam)) currentModule = moduleParam;
            if (moduleParam === 'designConstruction') {
                currentOverviewSubTab = 'designConstruction';
                currentModule = 'overview';
            }
            if (moduleParam === 'structure') {
                currentOverviewSubTab = 'structure';
                currentModule = 'overview';
            }
            if (moduleParam === 'usage') {
                currentOverviewSubTab = 'usage';
                currentModule = 'overview';
            }
            menu.innerHTML = sidebarModules.map(item => {
                const active = item.key === currentModule ? 'active' : '';
                return '<div class="sidebar-item ' + active + '" data-key="' + item.key + '">' +
                    '<div class="sidebar-item-left"><i class="fas ' + item.icon + '"></i> ' + item.title + '</div>' +

            }).join('');
            menu.querySelectorAll('.sidebar-item').forEach(el => {

        // ---------------- 内容渲染 ----------------
        function renderContent() {
            const s = currentHouse;
            const area = document.getElementById('contentArea');
            const module = sidebarModules.find(m => m.key === currentModule);
            let html = '';
            switch (currentModule) {
                case 'overview': html = renderOverview(s); break;
                case 'inspection': html = renderInspection(s); break;
                case 'appraisal': html = renderAppraisal(s); break;
                case 'risk': html = renderRisk(s); break;
                case 'patrol': html = renderPatrol(s); break;
                case 'measure': html = renderMeasure(s); break;
                case 'emergency': html = renderEmergency(s); break;
                case 'close': html = renderClose(s); break;
                case 'archive': html = renderArchive(s); break;
                default: html = renderOverview(s);
            }
            area.innerHTML = html;
            if (!eventListenersBound) {
                bindContentAreaEvents();
                eventListenersBound = true;
            }
        }

        function bindContentAreaEvents() {
            const container = document.getElementById('contentArea');
            if (!container) return;
            container.addEventListener('click', function(e) {
                // 概览子 tab
                const overviewTab = e.target.closest('.content-tab[data-scope="overview"]');
                if (overviewTab) {
                    e.stopPropagation();
                    currentOverviewSubTab = overviewTab.dataset.key;
                    renderContent();
                    return;
                }
                // 排查子 tab
                const inspectionTab = e.target.closest('.content-tab[data-scope="inspection"]');
                if (inspectionTab) {
                    e.stopPropagation();
                    currentInspectionSubTab = inspectionTab.dataset.key;
                    renderContent();
                    return;
                }
                // 记录列表行
                const row = e.target.closest('.record-list-row[data-module]');
                if (row) {
                    e.stopPropagation();
                    const module = row.dataset.module;
                    const index = parseInt(row.dataset.index, 10);
                    recordViewState[module] = index;
                    renderContent();
                }
            });
        }

                '<div class="content-card-header"><div class="content-card-title"><i class="fas ' + icon + '"></i> ' + title + '</div></div>' +
                '<div class="content-body">' + body + '</div>' +

        // ---------------- 通用记录列表组件 ----------------
        function recordListTable(columns, rows, moduleKey, activeIndex, options) {
            options = options || {};
            if (!rows || rows.length === 0) {
                return '<div class="record-empty">暂无记录</div>';
            }
            const head = '<thead><tr>' + columns.map(c => '<th>' + (c.title || c) + '</th>').join('') + (options.showAction ? '<th>操作</th>' : '') + '</tr></thead>';
            const body = rows.map((row, idx) => {
                const isActive = idx === activeIndex;
                const cells = row.map((cell, cIdx) => {
                    const col = columns[cIdx] || {};
                    const val = cell === undefined || cell === '' || cell === null ? '—' : cell;
                    if (col.tag) {
                        return '<td><span class="tag ' + (col.tagClass ? col.tagClass(val) : 'info') + '">' + val + '</span></td>';
                    }
                    return '<td>' + val + '</td>';
                }).join('');
                return '<tr class="record-list-row ' + (isActive ? 'active' : '') + '" data-module="' + moduleKey + '" data-index="' + idx + '">' + cells + (options.showAction ? '<td class="actions"><span class="tag primary">查看</span></td>' : '') + '</tr>';
            }).join('');
            return '<table class="record-list">' + head + '<tbody>' + body + '</tbody></table>';
        }

        function recordListWrapper(title, listHtml, options) {
            options = options || {};
            return '<div class="record-section-title"><span><i class="fas ' + (options.icon || 'fa-list') + '"></i> ' + title + '</span>' +
                (options.addBtn ? '<button class="record-add-btn" onclick="' + options.addBtn.onclick + '"><i class="fas fa-plus"></i> ' + options.addBtn.text + '</button>' : '') +
                '</div>' + listHtml;
        }

            const activeIndex = recordViewState.appraisal;
            const listHtml = recordListTable(
                ['报告编号', '鉴定机构', '鉴定日期', '鉴定结论', '填报时间', { title: '状态', tag: true }],
                list.map((r, i) => [r.id || '—', r.orgName || '—', r.appraisalDate || '—', r.conclusion || '—', r.reportTime || '—', i === 0 ? '最新' : '历史']),
                'appraisal',
                activeIndex,
                { showAction: true }
            );
            const r = list[activeIndex] || list[0];
            const grid = [
                kv('隐患动态整治状态', s.governStatus || '—'), kv('鉴定机构名称', r.orgName),
                kv('统一社会信用代码', r.orgCode), kv('鉴定时间', r.appraisalDate),
                kv('鉴定负责人', r.appraiser), kv('鉴定结论', r.conclusion),
                kv('阶段性标识', r.phaseTag), kv('鉴定报告', r.reportFiles ? '有' : '—'),
                kv('备注', r.remark), kv('填报人', r.reporter),
                kv('填报时间', r.reportTime)
            ].join('');
            return card('安全鉴定', 'fa-clipboard-check',
                recordListWrapper('安全鉴定记录列表', listHtml, { icon: 'fa-clipboard-list' }) +
                '<div class="record-detail-header"><div class="title">安全鉴定详情（' + (activeIndex + 1) + ' / ' + list.length + '）</div>' +
                '<div class="meta">报告编号：' + (r.id || '—') + '</div></div>' +
                '<div class="info-grid info-grid-2col">' + grid + '</div>'
            );
        }

        function renderRisk(s) {
            const ident = s.riskIdentification || [];
            const cls = s.riskClassification || {};
            const ri = s.riskInfo || {};

            // 风险基础信息
            let body = '<div class="info-section-title"><i class="fas fa-id-card"></i> 风险基础信息</div>' +
                '<div class="info-grid info-grid-2col">' +
                kv('风险编号', ri.riskNo) + kv('风险名称', ri.riskName) +
                kv('风险类型', ri.riskType) + kv('风险等级', ri.riskLevel || cls.level || s.riskLevel) +
                kv('发现时间', ri.discoveryTime) + kv('发现方式', ri.discoveryMethod) +
                kv('发现人员', ri.discoverer) + kv('风险状态', ri.riskStatus || s.governStatus) +
                '</div>';

            // 风险特征信息
            body += '<div class="info-section-title" style="margin-top:20px;"><i class="fas fa-map-marker-alt"></i> 风险特征信息</div>' +
                '<div class="info-grid info-grid-2col">' +
                kv('风险部位', ri.riskPart) + kv('空间位置', ri.spatialLocation) +
                kv('风险描述', ri.riskDesc) +
                kv('评定依据', cls.basis) + kv('评定时间', cls.assessTime) + kv('评定人', cls.assessor) +
                '</div>';

            // 风险关联信息
            body += '<div class="info-section-title" style="margin-top:20px;"><i class="fas fa-link"></i> 风险关联信息</div>' +
                '<div class="info-grid info-grid-2col">' +
                kv('关联房屋', ri.relatedHouse) + kv('关联户主', ri.relatedOwner) +
                kv('关联使用人', ri.relatedUser) + kv('关联排查记录', ri.relatedInspectionId) +
                kv('关联鉴定报告', ri.relatedAppraisalId) + kv('关联巡查记录', ri.relatedPatrolId) +
                kv('关联整治任务', ri.relatedTaskId) +
                '</div>';

            if (ident.length) {
                const activeIndex = recordViewState.risk;
                const listHtml = recordListTable(
                    ['辨识编号', '辨识日期', '隐患类型', '隐患部位', '填报人'],
                    ident.map(r => [r.id || '—', r.identifyDate || '—', r.hazardType || '—', r.hazardPart || '—', r.identifyPerson || '—']),
                    'risk',
                    activeIndex,
                    { showAction: true }
                );
                const r = ident[activeIndex] || ident[0];
                const grid = [
                    kv('辨识编号', r.id), kv('辨识日期', r.identifyDate), kv('辨识人', r.identifyPerson),
                    kv('隐患部位', r.hazardPart), kv('隐患类型', r.hazardType), kv('隐患描述', r.hazardDesc),
                    kv('可能后果', r.possibleConsequence), kv('管控建议', r.controlSuggestion), kv('现场照片', r.photos ? '有' : '无')
                ].join('');
                body += '<div class="info-section-title" style="margin-top:20px;"><i class="fas fa-search-location"></i> 风险辨识记录</div>' +
                    recordListWrapper('风险辨识记录列表', listHtml, { icon: 'fa-search-location' }) +
                    '<div class="record-detail-header"><div class="title">风险辨识详情（' + (activeIndex + 1) + ' / ' + ident.length + '）</div>' +
                    '<div class="meta">辨识编号：' + (r.id || '—') + '</div></div>' +
                    '<div class="info-grid info-grid-2col">' + grid + '</div>';
            }
            return card('风险辨识与分类', 'fa-exclamation-triangle', body);
        }

        function renderPatrol(s) {
            let list = s.patrolRecords || [];
            list = list.slice().sort((a, b) => (b.patrolDate || '').localeCompare(a.patrolDate || ''));
            if (!list.length) return card('巡查检查', 'fa-walking', '<div class="record-empty">暂无巡查检查记录</div>');
            const activeIndex = recordViewState.patrol;
            const listHtml = recordListTable(
                ['巡查日期', '巡查类型', '巡查机构', '巡查人员', '巡查结果', { title: '状态', tag: true }],
                list.map((r, i) => [r.patrolDate || '—', r.patrolType || '—', r.patrolOrg || '—', r.patrolPerson || '—', r.result || '—', i === 0 ? '最新' : '历史']),
                'patrol',
                activeIndex,
                { showAction: true }
            );
            const r = list[activeIndex] || list[0];
            const grid = [
                kv('记录编号', r.id), kv('巡查日期', r.patrolDate), kv('巡查类型', r.patrolType),
                kv('巡查机构', r.patrolOrg), kv('巡查人员', r.patrolPerson), kv('巡查内容', r.content),
                kv('巡查结果', r.result), kv('发现问题', r.foundProblems || '无'),
                kv('现场照片', r.photos ? '有' : '无'), kv('附件', r.files ? '有' : '无'), kv('备注', r.remark)
            ].join('');
            return card('巡查检查', 'fa-walking',
                recordListWrapper('巡查检查记录列表', listHtml, { icon: 'fa-walking' }) +
                '<div class="record-detail-header"><div class="title">巡查详情（' + (activeIndex + 1) + ' / ' + list.length + '）</div>' +
                '<div class="meta">记录编号：' + (r.id || '—') + '</div></div>' +
                '<div class="info-grid info-grid-2col">' + grid + '</div>'
            );
        }

        function renderMeasure(s) {
            const mgmt = s.manageRecords || [];
            const prj = s.projectRecords || [];
            if (!mgmt.length && !prj.length) return card('隐患整治', 'fa-tools', '<div class="record-empty">暂无整治记录</div>');

            let body = '';
            if (mgmt.length) {
                const activeIndex = recordViewState.measure;
                const listHtml = recordListTable(
                    ['记录编号', '措施类型', '开始时间', '计划结束', '完成状态', '填报人'],
                    mgmt.map((r, i) => [r.id || '—', r.measureType || '—', r.startTime || '—', r.planEndTime || '—', r.isDone ? '已完成' : '进行中', r.reporter || '—']),
                    'measure',
                    activeIndex,
                    { showAction: true }
                );
                const r = mgmt[activeIndex] || mgmt[0];
                const grid = [
                    kv('记录编号', r.id), kv('措施类型', r.measureType), kv('实施部位', r.implementPart),
                    kv('开始时间', r.startTime), kv('计划结束时间', r.planEndTime), kv('实际结束时间', r.actualEndTime),
                    kv('实施要求', r.requirement), kv('责任单位', r.dutyUnit), kv('责任人', r.dutyPerson),
                    kv('联系电话', r.phone), kv('管理措施', r.measureDesc), kv('管理措施实施照片', r.implementPhotos ? '有' : '无'),
                    kv('管理措施完成照片', r.completePhotos ? '有' : '无'), kv('措施是否完成', r.isDone ? '已完成' : '进行中'),
                    kv('措施效果评估', r.effectEvaluation), kv('风险是否已有效控制', r.riskControlled ? '是' : '否'),
                    kv('变更或延长申请审批', r.changeApply), kv('备注', r.remark), kv('填报人', r.reporter), kv('填报时间', r.reportTime)
                ].join('');
                body += recordListWrapper('管理措施记录列表', listHtml, { icon: 'fa-shield-alt' }) +
                    '<div class="record-detail-header"><div class="title">管理措施详情（' + (activeIndex + 1) + ' / ' + mgmt.length + '）</div>' +
                    '<div class="meta">记录编号：' + (r.id || '—') + '</div></div>' +
                    '<div class="info-grid info-grid-2col">' + grid + '</div>';
            }
            if (prj.length) {
                body += '<div class="table-section-title"><i class="fas fa-hammer"></i> 工程措施记录</div>' +
                    '<table class="arch-table"><thead><tr><th>工程名称</th><th>施工单位</th><th>开工时间</th><th>竣工时间</th><th>负责人</th><th>联系电话</th><th>状态</th><th>进度</th></tr></thead><tbody>' +
                    prj.map(r => '<tr><td>' + (r.projectName || '—') + '</td><td>' + (r.company || '—') + '</td><td>' + (r.startDate || '—') + '</td><td>' + (r.endDate || '—') + '</td><td>' + (r.manager || '—') + '</td><td>' + (r.phone || '—') + '</td><td>' + (r.status || '—') + '</td><td>' + (r.progress || 0) + '%</td></tr>').join('') +
                    '</tbody></table>';
            }
            return card('隐患整治', 'fa-tools', body);
        }

        function renderEmergency(s) {
            const e = s.emergencyResponse || {};
            let body = '<div class="info-section-title"><i class="fas fa-file-alt"></i> 应急预案</div>' +
                '<div class="info-grid info-grid-2col">' +
                kv('预案名称', e.planName) + kv('编制日期', e.planDate) +
                '</div>';
            const drills = e.drillRecords || [];
            if (drills.length) {
                body += '<div class="table-section-title"><i class="fas fa-running"></i> 应急演练记录</div>' +
                    '<table class="arch-table"><thead><tr><th>演练日期</th><th>演练机构</th><th>演练内容</th><th>参与人数</th><th>备注</th></tr></thead><tbody>' +
                    drills.map(d => '<tr><td>' + (d.drillDate || '—') + '</td><td>' + (d.drillOrg || '—') + '</td><td>' + (d.drillContent || '—') + '</td><td>' + (d.participants || '—') + '</td><td>' + (d.remark || '—') + '</td></tr>').join('') +
                    '</tbody></table>';
            }
            const responses = e.responseRecords || [];
            if (responses.length) {
                body += '<div class="table-section-title"><i class="fas fa-ambulance"></i> 应急响应记录</div>' +
                    '<table class="arch-table"><thead><tr><th>响应日期</th><th>事件描述</th><th>处置措施</th><th>处置结果</th><th>记录人</th></tr></thead><tbody>' +
                    responses.map(r => '<tr><td>' + (r.responseDate || '—') + '</td><td>' + (r.eventDesc || '—') + '</td><td>' + (r.responseMeasure || '—') + '</td><td>' + (r.responseResult || '—') + '</td><td>' + (r.reporter || '—') + '</td></tr>').join('') +
                    '</tbody></table>';
            }
            return card('应急处置', 'fa-first-aid', body);
        }

        function renderClose(s) {
            const records = s.closeRecords || [];
            const statusClass = {
                '未申请': 'info', '待审核': 'warning', '审核中': 'warning', '已通过': 'safe', '已驳回': 'danger'
            }[s.closeStatus] || 'info';
            if (records.length) {
                const activeIndex = recordViewState.close;
                const listHtml = recordListTable(
                    ['申请时间', '审核时间', '审核人', '审核结论', '填报人'],
                    records.map(r => [r.applyTime || '—', r.auditTime || '—', r.auditor || '—', r.conclusion || '—', r.reporter || '—']),
                    'close',
                    activeIndex,
                    { showAction: true }
                );
                const r = records[activeIndex] || records[0];
                const grid = [
                    kv('当前销号状态', '<span class="status-badge ' + statusClass + '">' + (r.status || s.closeStatus || '未申请') + '</span>'),
                    kv('申请时间', r.applyTime), kv('审核时间', r.auditTime),
                    kv('审核人', r.auditor), kv('审核意见', r.auditOpinion),
                    (r.status === '已驳回' || s.closeStatus === '已驳回' ? kv('驳回原因', r.rejectReason || s.closeRejectReason) : ''),
                    kv('重点监控名单', s.isRemovedFromFocus ? '<span class="status-badge safe">已退出</span>' : '<span class="status-badge warning">监控中</span>')
                ].join('');
                return card('验收销号', 'fa-check-circle',
                    recordListWrapper('验收销号申请记录', listHtml, { icon: 'fa-check-circle' }) +
                    '<div class="record-detail-header"><div class="title">验收销号详情（' + (activeIndex + 1) + ' / ' + records.length + '）</div>' +
                    '<div class="meta">申请时间：' + (r.applyTime || '—') + '</div></div>' +
                    '<div class="info-grid info-grid-2col">' + grid + '</div>'
                );
            }
            let body = '<div class="info-section-title"><i class="fas fa-clipboard-check"></i> 销号状态</div>' +
                '<div class="info-grid info-grid-2col">' +
                kv('当前销号状态', '<span class="status-badge ' + statusClass + '">' + (s.closeStatus || '未申请') + '</span>') +
                kv('申请时间', s.closeApplyTime) + kv('审核时间', s.closeAuditTime) +
                kv('审核人', s.closeAuditor) + kv('审核意见', s.closeAuditOpinion) +
                (s.closeStatus === '已驳回' ? kv('驳回原因', s.closeRejectReason) : '') +
                kv('重点监控名单', s.isRemovedFromFocus ? '<span class="status-badge safe">已退出</span>' : '<span class="status-badge warning">监控中</span>') +
                '</div>';
            if (s.archiveRecords && s.archiveRecords.length) {
                body += '<div class="table-section-title"><i class="fas fa-folder"></i> 销号归档材料</div>' +
                    '<table class="arch-table"><thead><tr><th>档案类型</th><th>档案编号</th><th>归档时间</th><th>状态</th><th>文件名</th><th>归档人</th></tr></thead><tbody>' +
                    s.archiveRecords.map(r => '<tr><td>' + (r.archiveType || '—') + '</td><td>' + (r.archiveNo || '—') + '</td><td>' + (r.archiveTime || '—') + '</td><td>' + (r.archiveStatus || '—') + '</td><td>' + (r.fileName || '—') + '</td><td>' + (r.uploader || '—') + '</td></tr>').join('') +
                    '</tbody></table>';
            }
            return card('验收销号', 'fa-check-circle', body);
        }

        function renderArchive(s) {
            const records = s.archiveRecords || [];
            const events = [];
            (s.manageRecords || []).forEach(r => events.push({ type: '管理措施', title: r.measureType || r.id, date: r.reportTime || r.startTime, desc: r.remark || '—' }));
            (s.projectRecords || []).forEach(r => events.push({ type: '工程措施', title: r.projectName || r.id, date: r.reportTime || r.startDate, desc: (r.company || '—') + ' | 状态：' + (r.status || '—') }));
            (s.qualityTrace || []).forEach(r => events.push({ type: '质量追溯', title: r.checkItem || r.id, date: r.checkDate, desc: r.conclusion || '—' }));
            events.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

            let body = '<div class="table-section-title"><i class="fas fa-folder-open"></i> 整治档案清单</div>';
            if (records.length) {
                body += '<table class="arch-table"><thead><tr><th>档案类型</th><th>档案编号</th><th>归档时间</th><th>状态</th><th>文件名</th><th>归档人</th></tr></thead><tbody>' +
                    records.map(r => '<tr><td>' + (r.archiveType || '—') + '</td><td>' + (r.archiveNo || '—') + '</td><td>' + (r.archiveTime || '—') + '</td><td>' + (r.archiveStatus || '—') + '</td><td>' + (r.fileName || '—') + '</td><td>' + (r.uploader || '—') + '</td></tr>').join('') +
                    '</tbody></table>';
            } else {
                body += '<div class="photo-empty">暂无归档记录</div>';
            }
            if (events.length) {
                body += '<div class="table-section-title"><i class="fas fa-history"></i> 风险动态时间线</div><div class="timeline">' +
                    events.map(e => '<div class="tl-node"><div class="tl-dot"></div><div class="tl-header"><span class="tl-date">' + (e.date || '—') + '</span><span class="tl-title">' + e.type + '：' + e.title + '</span></div><div class="tl-body">' + e.desc + '</div></div>').join('') +
                    '</div>';
            }
            return card('整治档案', 'fa-folder-open', body);
        }

        // ---------------- 照片查看 ----------------
        function viewPhotoOnline(url) {
            if (!url) return;
            document.getElementById('photoViewerImage').src = url;
            document.getElementById('photoViewerOverlay').classList.add('open');
        }
        function closePhotoViewer() {
            document.getElementById('photoViewerOverlay').classList.remove('open');
            document.getElementById('photoViewerImage').src = '';
        }

        function viewLocationOnMap(location) {
            alert('位置标注：' + location + '（地图查看功能待对接）');
        }

        // 启动
        initPage();
    </script>
</body>
</html>
