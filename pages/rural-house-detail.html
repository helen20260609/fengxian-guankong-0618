        // ---------------- еҲқе§ӢеҢ– ----------------
        function initPage() {
            renderTopbar();
            renderStatusPanel();
            renderSidebar();
            renderContent();
        }

        function renderTopbar() {
            const s = currentHouse;
            const title = (s.overview && s.overview.houseName) || s.name || 'еҶңжқ‘иҮӘе»әжҲҝжЎЈжЎҲ';
            const sub = 'зј–еҸ·пјҡ' + (s.no || 'вҖ”') + ' | жүҖеұһеҢәеҹҹпјҡ' + (s.street || 'вҖ”') + ' В· ' + (s.village || s.community || 'вҖ”');
            document.getElementById('topbarTitle').textContent = title;
            document.getElementById('topbarSub').textContent = sub;
        }

        function renderStatusPanel() {
            const s = currentHouse;
            const riskClass = riskBadgeClass(s.riskLevel);
            const governClass = governBadgeClass(s.governStatus);
            document.getElementById('statusPanel').innerHTML =
                '<div class="status-cell"><div class="status-label">йҡҗжӮЈзӯүзә§</div><div class="status-badge ' + riskClass + '">' + (s.riskLevel || 'вҖ”') + '</div></div>' +
                '<div class="status-cell"><div class="status-label">жІ»зҗҶзҠ¶жҖҒ</div><div class="status-badge ' + governClass + '">' + (s.governStatus || 'вҖ”') + '</div></div>' +
                '<div class="status-cell full"><div class="status-label">еҪ“еүҚжҺӘж–Ҫ</div><div class="status-value">' + (s.currentMeasure || 'вҖ”') + '</div></div>' +
                '<div class="status-cell"><div class="status-label">иҙЈд»»дәә</div><div class="status-value">' + (s.managerName || 'вҖ”') + ' <span style="font-weight:400;color:var(--text-secondary);font-size:12px;">' + (s.managerPhone || '') + '</span></div></div>';
        }

        function riskBadgeClass(level) {
            const map = { 'е®үе…Ё': 'safe', 'ж— йЈҺйҷ©': 'safe', 'дёҖиҲ¬йҡҗжӮЈ': 'warning', 'иҫғеӨ§йҡҗжӮЈ': 'major', 'йҮҚеӨ§йҡҗжӮЈ': 'danger' };
            return map[level] || 'danger';
        }
        function governBadgeClass(status) {
            const map = { 'еҫ…ж•ҙжІ»': 'info', 'ж•ҙжІ»дёӯ': 'warning', 'е·Іж•ҙжІ»': 'safe', 'е·ІжІ»зҗҶ': 'safe', 'йҖҫжңҹжңӘж•ҙжІ»': 'danger' };
            return map[status] || 'info';
        }

        // ---------------- дҫ§иҫ№ж Ҹ ----------------
        function renderSidebar() {
            const menu = document.getElementById('sidebarMenu');
            const moduleParam = getUrlParam('module');
            if (moduleParam && sidebarModules.some(m => m.key === moduleParam)) currentModule = moduleParam;
            if (moduleParam === 'designConstruction') {
                currentOverviewSubTab = 'designConstruction';
                currentModule = 'overview';
            }
            if (moduleParam === 'structure') {
                currentOverviewSubTab = 'structure';
                currentModule = 'overview';
            }
            if (moduleParam === 'usage') {
                currentOverviewSubTab = 'usage';
                currentModule = 'overview';
            }
            menu.innerHTML = sidebarModules.map(item => {
                const active = item.key === currentModule ? 'active' : '';
                return '<div class="sidebar-item ' + active + '" data-key="' + item.key + '">' +
                    '<div class="sidebar-item-left"><i class="fas ' + item.icon + '"></i> ' + item.title + '</div>' +
                    '<span class="sidebar-tag">' + item.tag + '</span>' +
                    '</div>';
            }).join('');
            menu.querySelectorAll('.sidebar-item').forEach(el => {
                el.addEventListener('click', function() {
                    currentModule = el.dataset.key;
                    renderSidebar();
                    renderContent();
                });
            });
        }

        // ---------------- еҶ…е®№жёІжҹ“ ----------------
        function renderContent() {
            const s = currentHouse;
            const area = document.getElementById('contentArea');
            const module = sidebarModules.find(m => m.key === currentModule);
            let html = '';
            switch (currentModule) {
                case 'overview': html = renderOverview(s); break;
                case 'inspection': html = renderInspection(s); break;
                case 'appraisal': html = renderAppraisal(s); break;
                case 'risk': html = renderRisk(s); break;
                case 'patrol': html = renderPatrol(s); break;
                case 'measure': html = renderMeasure(s); break;
                case 'emergency': html = renderEmergency(s); break;
                case 'close': html = renderClose(s); break;
                case 'archive': html = renderArchive(s); break;
                default: html = renderOverview(s);
            }
            area.innerHTML = html;
            if (!eventListenersBound) {
                bindContentAreaEvents();
                eventListenersBound = true;
            }
        }

        function bindContentAreaEvents() {
            const container = document.getElementById('contentArea');
            if (!container) return;
            container.addEventListener('click', function(e) {
                // жҰӮи§Ҳеӯҗ tab
                const overviewTab = e.target.closest('.content-tab[data-scope="overview"]');
                if (overviewTab) {
                    e.stopPropagation();
                    currentOverviewSubTab = overviewTab.dataset.key;
                    renderContent();
                    return;
                }
                // жҺ’жҹҘеӯҗ tab
                const inspectionTab = e.target.closest('.content-tab[data-scope="inspection"]');
                if (inspectionTab) {
                    e.stopPropagation();
                    currentInspectionSubTab = inspectionTab.dataset.key;
                    renderContent();
                    return;
                }
                // и®°еҪ•еҲ—иЎЁиЎҢ
                const row = e.target.closest('.record-list-row[data-module]');
                if (row) {
                    e.stopPropagation();
                    const module = row.dataset.module;
                    const index = parseInt(row.dataset.index, 10);
                    recordViewState[module] = index;
                    renderContent();
                }
            });
        }

            return '<div class="content-card">' +
                '<div class="content-card-header"><div class="content-card-title"><i class="fas ' + icon + '"></i> ' + title + '</div></div>' +
                '<div class="content-body">' + body + '</div>' +

        }

            const v = value || '';

            return '<div class="info-item"><div class="info-label">' + label + '</div><div class="info-value ' + (isEmpty ? 'empty' : '') + '">' + (isEmpty ? (emptyLabel || 'вҖ”') : v) + '</div></div>';

        // ---------------- йҖҡз”Ёи®°еҪ•еҲ—иЎЁз»„д»¶ ----------------
        function recordListTable(columns, rows, moduleKey, activeIndex, options) {
            options = options || {};
            if (!rows || rows.length === 0) {
                return '<div class="record-empty">жҡӮж— и®°еҪ•</div>';
            }
            const head = '<thead><tr>' + columns.map(c => '<th>' + (c.title || c) + '</th>').join('') + (options.showAction ? '<th>ж“ҚдҪң</th>' : '') + '</tr></thead>';
            const body = rows.map((row, idx) => {
                const isActive = idx === activeIndex;
                const cells = row.map((cell, cIdx) => {
                    const col = columns[cIdx] || {};
                    const val = cell === undefined || cell === '' || cell === null ? 'вҖ”' : cell;
                    if (col.tag) {
                        return '<td><span class="tag ' + (col.tagClass ? col.tagClass(val) : 'info') + '">' + val + '</span></td>';
                    }
                    return '<td>' + val + '</td>';
                }).join('');
                return '<tr class="record-list-row ' + (isActive ? 'active' : '') + '" data-module="' + moduleKey + '" data-index="' + idx + '">' + cells + (options.showAction ? '<td class="actions"><span class="tag primary">жҹҘзңӢ</span></td>' : '') + '</tr>';
            }).join('');
            return '<table class="record-list">' + head + '<tbody>' + body + '</tbody></table>';
        }

        function recordListWrapper(title, listHtml, options) {
            options = options || {};
            return '<div class="record-section-title"><span><i class="fas ' + (options.icon || 'fa-list') + '"></i> ' + title + '</span>' +
                (options.addBtn ? '<button class="record-add-btn" onclick="' + options.addBtn.onclick + '"><i class="fas fa-plus"></i> ' + options.addBtn.text + '</button>' : '') +
                '</div>' + listHtml;
        }

            if (!list.length) return card('е·ЎжҹҘжЈҖжҹҘ', 'fa-walking', '<div class="record-empty">жҡӮж— е·ЎжҹҘжЈҖжҹҘи®°еҪ•</div>');
            const activeIndex = recordViewState.patrol;
            const listHtml = recordListTable(
                ['е·ЎжҹҘж—Ҙжңҹ', 'е·ЎжҹҘзұ»еһӢ', 'е·ЎжҹҘжңәжһ„', 'е·ЎжҹҘдәәе‘ҳ', 'е·ЎжҹҘз»“жһң', { title: 'зҠ¶жҖҒ', tag: true }],
                list.map((r, i) => [r.patrolDate || 'вҖ”', r.patrolType || 'вҖ”', r.patrolOrg || 'вҖ”', r.patrolPerson || 'вҖ”', r.result || 'вҖ”', i === 0 ? 'жңҖж–°' : 'еҺҶеҸІ']),
                'patrol',
                activeIndex,
                { showAction: true }
            );
            const r = list[activeIndex] || list[0];
            const grid = [
                kv('и®°еҪ•зј–еҸ·', r.id), kv('е·ЎжҹҘж—Ҙжңҹ', r.patrolDate), kv('е·ЎжҹҘзұ»еһӢ', r.patrolType),
                kv('е·ЎжҹҘжңәжһ„', r.patrolOrg), kv('е·ЎжҹҘдәәе‘ҳ', r.patrolPerson), kv('е·ЎжҹҘеҶ…е®№', r.content),
                kv('е·ЎжҹҘз»“жһң', r.result), kv('еҸ‘зҺ°й—®йўҳ', r.foundProblems || 'ж— '),
                kv('зҺ°еңәз…§зүҮ', r.photos ? 'жңү' : 'ж— '), kv('йҷ„д»¶', r.files ? 'жңү' : 'ж— '), kv('еӨҮжіЁ', r.remark)
            ].join('');
            return card('е·ЎжҹҘжЈҖжҹҘ', 'fa-walking',
                recordListWrapper('е·ЎжҹҘжЈҖжҹҘи®°еҪ•еҲ—иЎЁ', listHtml, { icon: 'fa-walking' }) +
                '<div class="record-detail-header"><div class="title">е·ЎжҹҘиҜҰжғ…пјҲ' + (activeIndex + 1) + ' / ' + list.length + 'пјү</div>' +
                '<div class="meta">и®°еҪ•зј–еҸ·пјҡ' + (r.id || 'вҖ”') + '</div></div>' +
                '<div class="info-grid info-grid-2col">' + grid + '</div>'
            );
        }

        function renderMeasure(s) {
            const mgmt = s.manageRecords || [];
            const prj = s.projectRecords || [];
            if (!mgmt.length && !prj.length) return card('йҡҗжӮЈж•ҙжІ»', 'fa-tools', '<div class="record-empty">жҡӮж— ж•ҙжІ»и®°еҪ•</div>');

            let body = '';
            if (mgmt.length) {
                const activeIndex = recordViewState.measure;
                const listHtml = recordListTable(
                    ['и®°еҪ•зј–еҸ·', 'жҺӘж–Ҫзұ»еһӢ', 'ејҖе§Ӣж—¶й—ҙ', 'и®ЎеҲ’з»“жқҹ', 'е®ҢжҲҗзҠ¶жҖҒ', 'еЎ«жҠҘдәә'],
                    mgmt.map((r, i) => [r.id || 'вҖ”', r.measureType || 'вҖ”', r.startTime || 'вҖ”', r.planEndTime || 'вҖ”', r.isDone ? 'е·Іе®ҢжҲҗ' : 'иҝӣиЎҢдёӯ', r.reporter || 'вҖ”']),
                    'measure',
                    activeIndex,
                    { showAction: true }
                );
                const r = mgmt[activeIndex] || mgmt[0];
                const grid = [
                    kv('и®°еҪ•зј–еҸ·', r.id), kv('жҺӘж–Ҫзұ»еһӢ', r.measureType), kv('е®һж–ҪйғЁдҪҚ', r.implementPart),
                    kv('ејҖе§Ӣж—¶й—ҙ', r.startTime), kv('и®ЎеҲ’з»“жқҹж—¶й—ҙ', r.planEndTime), kv('е®һйҷ…з»“жқҹж—¶й—ҙ', r.actualEndTime),
                    kv('е®һж–ҪиҰҒжұӮ', r.requirement), kv('иҙЈд»»еҚ•дҪҚ', r.dutyUnit), kv('иҙЈд»»дәә', r.dutyPerson),
                    kv('иҒ”зі»з”өиҜқ', r.phone), kv('з®ЎзҗҶжҺӘж–Ҫ', r.measureDesc), kv('з®ЎзҗҶжҺӘж–Ҫе®һж–Ҫз…§зүҮ', r.implementPhotos ? 'жңү' : 'ж— '),
                    kv('з®ЎзҗҶжҺӘж–Ҫе®ҢжҲҗз…§зүҮ', r.completePhotos ? 'жңү' : 'ж— '), kv('жҺӘж–ҪжҳҜеҗҰе®ҢжҲҗ', r.isDone ? 'е·Іе®ҢжҲҗ' : 'иҝӣиЎҢдёӯ'),
                    kv('жҺӘж–Ҫж•ҲжһңиҜ„дј°', r.effectEvaluation), kv('йЈҺйҷ©жҳҜеҗҰе·Іжңүж•ҲжҺ§еҲ¶', r.riskControlled ? 'жҳҜ' : 'еҗҰ'),
                    kv('еҸҳжӣҙжҲ–е»¶й•ҝз”іиҜ·е®Ўжү№', r.changeApply), kv('еӨҮжіЁ', r.remark), kv('еЎ«жҠҘдәә', r.reporter), kv('еЎ«жҠҘж—¶й—ҙ', r.reportTime)
                ].join('');
                body += recordListWrapper('з®ЎзҗҶжҺӘж–Ҫи®°еҪ•еҲ—иЎЁ', listHtml, { icon: 'fa-shield-alt' }) +
                    '<div class="record-detail-header"><div class="title">з®ЎзҗҶжҺӘж–ҪиҜҰжғ…пјҲ' + (activeIndex + 1) + ' / ' + mgmt.length + 'пјү</div>' +
                    '<div class="meta">и®°еҪ•зј–еҸ·пјҡ' + (r.id || 'вҖ”') + '</div></div>' +
                    '<div class="info-grid info-grid-2col">' + grid + '</div>';
            }
            if (prj.length) {
                body += '<div class="table-section-title"><i class="fas fa-hammer"></i> е·ҘзЁӢжҺӘж–Ҫи®°еҪ•</div>' +
                    '<table class="arch-table"><thead><tr><th>е·ҘзЁӢеҗҚз§°</th><th>ж–Ҫе·ҘеҚ•дҪҚ</th><th>ејҖе·Ҙж—¶й—ҙ</th><th>з«Је·Ҙж—¶й—ҙ</th><th>иҙҹиҙЈдәә</th><th>иҒ”зі»з”өиҜқ</th><th>зҠ¶жҖҒ</th><th>иҝӣеәҰ</th></tr></thead><tbody>' +
                    prj.map(r => '<tr><td>' + (r.projectName || 'вҖ”') + '</td><td>' + (r.company || 'вҖ”') + '</td><td>' + (r.startDate || 'вҖ”') + '</td><td>' + (r.endDate || 'вҖ”') + '</td><td>' + (r.manager || 'вҖ”') + '</td><td>' + (r.phone || 'вҖ”') + '</td><td>' + (r.status || 'вҖ”') + '</td><td>' + (r.progress || 0) + '%</td></tr>').join('') +
                    '</tbody></table>';
            }
            return card('йҡҗжӮЈж•ҙжІ»', 'fa-tools', body);
        }

        function renderEmergency(s) {
            const e = s.emergencyResponse || {};
            let body = '<div class="info-section-title"><i class="fas fa-file-alt"></i> еә”жҖҘйў„жЎҲ</div>' +
                '<div class="info-grid info-grid-2col">' +
                kv('йў„жЎҲеҗҚз§°', e.planName) + kv('зј–еҲ¶ж—Ҙжңҹ', e.planDate) +
                '</div>';
            const drills = e.drillRecords || [];
            if (drills.length) {
                body += '<div class="table-section-title"><i class="fas fa-running"></i> еә”жҖҘжј”з»ғи®°еҪ•</div>' +
                    '<table class="arch-table"><thead><tr><th>жј”з»ғж—Ҙжңҹ</th><th>жј”з»ғжңәжһ„</th><th>жј”з»ғеҶ…е®№</th><th>еҸӮдёҺдәәж•°</th><th>еӨҮжіЁ</th></tr></thead><tbody>' +
                    drills.map(d => '<tr><td>' + (d.drillDate || 'вҖ”') + '</td><td>' + (d.drillOrg || 'вҖ”') + '</td><td>' + (d.drillContent || 'вҖ”') + '</td><td>' + (d.participants || 'вҖ”') + '</td><td>' + (d.remark || 'вҖ”') + '</td></tr>').join('') +
                    '</tbody></table>';
            }
            const responses = e.responseRecords || [];
            if (responses.length) {
                body += '<div class="table-section-title"><i class="fas fa-ambulance"></i> еә”жҖҘе“Қеә”и®°еҪ•</div>' +
                    '<table class="arch-table"><thead><tr><th>е“Қеә”ж—Ҙжңҹ</th><th>дәӢд»¶жҸҸиҝ°</th><th>еӨ„зҪ®жҺӘж–Ҫ</th><th>еӨ„зҪ®з»“жһң</th><th>и®°еҪ•дәә</th></tr></thead><tbody>' +
                    responses.map(r => '<tr><td>' + (r.responseDate || 'вҖ”') + '</td><td>' + (r.eventDesc || 'вҖ”') + '</td><td>' + (r.responseMeasure || 'вҖ”') + '</td><td>' + (r.responseResult || 'вҖ”') + '</td><td>' + (r.reporter || 'вҖ”') + '</td></tr>').join('') +
                    '</tbody></table>';
            }
            return card('еә”жҖҘеӨ„зҪ®', 'fa-first-aid', body);
        }

        function renderClose(s) {
            const records = s.closeRecords || [];
            const statusClass = {
                'жңӘз”іиҜ·': 'info', 'еҫ…е®Ўж ё': 'warning', 'е®Ўж ёдёӯ': 'warning', 'е·ІйҖҡиҝҮ': 'safe', 'е·Ій©іеӣһ': 'danger'
            }[s.closeStatus] || 'info';
            if (records.length) {
                const activeIndex = recordViewState.close;
                const listHtml = recordListTable(
                    ['з”іиҜ·ж—¶й—ҙ', 'е®Ўж ёж—¶й—ҙ', 'е®Ўж ёдәә', 'е®Ўж ёз»“и®ә', 'еЎ«жҠҘдәә'],
                    records.map(r => [r.applyTime || 'вҖ”', r.auditTime || 'вҖ”', r.auditor || 'вҖ”', r.conclusion || 'вҖ”', r.reporter || 'вҖ”']),
                    'close',
                    activeIndex,
                    { showAction: true }
                );
                const r = records[activeIndex] || records[0];
                const grid = [
                    kv('еҪ“еүҚй”ҖеҸ·зҠ¶жҖҒ', '<span class="status-badge ' + statusClass + '">' + (r.status || s.closeStatus || 'жңӘз”іиҜ·') + '</span>'),
                    kv('з”іиҜ·ж—¶й—ҙ', r.applyTime), kv('е®Ўж ёж—¶й—ҙ', r.auditTime),
                    kv('е®Ўж ёдәә', r.auditor), kv('е®Ўж ёж„Ҹи§Ғ', r.auditOpinion),
                    (r.status === 'е·Ій©іеӣһ' || s.closeStatus === 'е·Ій©іеӣһ' ? kv('й©іеӣһеҺҹеӣ ', r.rejectReason || s.closeRejectReason) : ''),
                    kv('йҮҚзӮ№зӣ‘жҺ§еҗҚеҚ•', s.isRemovedFromFocus ? '<span class="status-badge safe">е·ІйҖҖеҮә</span>' : '<span class="status-badge warning">зӣ‘жҺ§дёӯ</span>')
                ].join('');
                return card('йӘҢж”¶й”ҖеҸ·', 'fa-check-circle',
                    recordListWrapper('йӘҢж”¶й”ҖеҸ·з”іиҜ·и®°еҪ•', listHtml, { icon: 'fa-check-circle' }) +
                    '<div class="record-detail-header"><div class="title">йӘҢж”¶й”ҖеҸ·иҜҰжғ…пјҲ' + (activeIndex + 1) + ' / ' + records.length + 'пјү</div>' +
                    '<div class="meta">з”іиҜ·ж—¶й—ҙпјҡ' + (r.applyTime || 'вҖ”') + '</div></div>' +
                    '<div class="info-grid info-grid-2col">' + grid + '</div>'
                );
            }
            let body = '<div class="info-section-title"><i class="fas fa-clipboard-check"></i> й”ҖеҸ·зҠ¶жҖҒ</div>' +
                '<div class="info-grid info-grid-2col">' +
                kv('еҪ“еүҚй”ҖеҸ·зҠ¶жҖҒ', '<span class="status-badge ' + statusClass + '">' + (s.closeStatus || 'жңӘз”іиҜ·') + '</span>') +
                kv('з”іиҜ·ж—¶й—ҙ', s.closeApplyTime) + kv('е®Ўж ёж—¶й—ҙ', s.closeAuditTime) +
                kv('е®Ўж ёдәә', s.closeAuditor) + kv('е®Ўж ёж„Ҹи§Ғ', s.closeAuditOpinion) +
                (s.closeStatus === 'е·Ій©іеӣһ' ? kv('й©іеӣһеҺҹеӣ ', s.closeRejectReason) : '') +
                kv('йҮҚзӮ№зӣ‘жҺ§еҗҚеҚ•', s.isRemovedFromFocus ? '<span class="status-badge safe">е·ІйҖҖеҮә</span>' : '<span class="status-badge warning">зӣ‘жҺ§дёӯ</span>') +
                '</div>';
            if (s.archiveRecords && s.archiveRecords.length) {
                body += '<div class="table-section-title"><i class="fas fa-folder"></i> й”ҖеҸ·еҪ’жЎЈжқҗж–ҷ</div>' +
                    '<table class="arch-table"><thead><tr><th>жЎЈжЎҲзұ»еһӢ</th><th>жЎЈжЎҲзј–еҸ·</th><th>еҪ’жЎЈж—¶й—ҙ</th><th>зҠ¶жҖҒ</th><th>ж–Үд»¶еҗҚ</th><th>еҪ’жЎЈдәә</th></tr></thead><tbody>' +
                    s.archiveRecords.map(r => '<tr><td>' + (r.archiveType || 'вҖ”') + '</td><td>' + (r.archiveNo || 'вҖ”') + '</td><td>' + (r.archiveTime || 'вҖ”') + '</td><td>' + (r.archiveStatus || 'вҖ”') + '</td><td>' + (r.fileName || 'вҖ”') + '</td><td>' + (r.uploader || 'вҖ”') + '</td></tr>').join('') +
                    '</tbody></table>';
            }
            return card('йӘҢж”¶й”ҖеҸ·', 'fa-check-circle', body);
        }

        function renderArchive(s) {
            const records = s.archiveRecords || [];
            const events = [];
            (s.manageRecords || []).forEach(r => events.push({ type: 'з®ЎзҗҶжҺӘж–Ҫ', title: r.measureType || r.id, date: r.reportTime || r.startTime, desc: r.remark || 'вҖ”' }));
            (s.projectRecords || []).forEach(r => events.push({ type: 'е·ҘзЁӢжҺӘж–Ҫ', title: r.projectName || r.id, date: r.reportTime || r.startDate, desc: (r.company || 'вҖ”') + ' | зҠ¶жҖҒпјҡ' + (r.status || 'вҖ”') }));
            (s.qualityTrace || []).forEach(r => events.push({ type: 'иҙЁйҮҸиҝҪжәҜ', title: r.checkItem || r.id, date: r.checkDate, desc: r.conclusion || 'вҖ”' }));
            events.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

            let body = '<div class="table-section-title"><i class="fas fa-folder-open"></i> ж•ҙжІ»жЎЈжЎҲжё…еҚ•</div>';
            if (records.length) {
                body += '<table class="arch-table"><thead><tr><th>жЎЈжЎҲзұ»еһӢ</th><th>жЎЈжЎҲзј–еҸ·</th><th>еҪ’жЎЈж—¶й—ҙ</th><th>зҠ¶жҖҒ</th><th>ж–Үд»¶еҗҚ</th><th>еҪ’жЎЈдәә</th></tr></thead><tbody>' +
                    records.map(r => '<tr><td>' + (r.archiveType || 'вҖ”') + '</td><td>' + (r.archiveNo || 'вҖ”') + '</td><td>' + (r.archiveTime || 'вҖ”') + '</td><td>' + (r.archiveStatus || 'вҖ”') + '</td><td>' + (r.fileName || 'вҖ”') + '</td><td>' + (r.uploader || 'вҖ”') + '</td></tr>').join('') +
                    '</tbody></table>';
            } else {
                body += '<div class="photo-empty">жҡӮж— еҪ’жЎЈи®°еҪ•</div>';
            }
            if (events.length) {
                body += '<div class="table-section-title"><i class="fas fa-history"></i> йЈҺйҷ©еҠЁжҖҒж—¶й—ҙзәҝ</div><div class="timeline">' +
                    events.map(e => '<div class="tl-node"><div class="tl-dot"></div><div class="tl-header"><span class="tl-date">' + (e.date || 'вҖ”') + '</span><span class="tl-title">' + e.type + 'пјҡ' + e.title + '</span></div><div class="tl-body">' + e.desc + '</div></div>').join('') +
                    '</div>';
            }
            return card('ж•ҙжІ»жЎЈжЎҲ', 'fa-folder-open', body);
        }

        // ---------------- з…§зүҮжҹҘзңӢ ----------------
        function viewPhotoOnline(url) {
            if (!url) return;
            document.getElementById('photoViewerImage').src = url;
            document.getElementById('photoViewerOverlay').classList.add('open');
        }
        function closePhotoViewer() {
            document.getElementById('photoViewerOverlay').classList.remove('open');
            document.getElementById('photoViewerImage').src = '';
        }

        function viewLocationOnMap(location) {
            alert('дҪҚзҪ®ж ҮжіЁпјҡ' + location + 'пјҲең°еӣҫжҹҘзңӢеҠҹиғҪеҫ…еҜ№жҺҘпјү');
        }

        // еҗҜеҠЁ
        initPage();
    </script>
</body>
